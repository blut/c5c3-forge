# Patch: scale the dashboard down to a single replica (PDB flips to
# maxUnavailable=1 to avoid drain deadlock).
apiVersion: horizon.openstack.c5c3.io/v1alpha1
kind: Horizon
metadata:
  name: horizon-scale
  namespace: openstack
spec:
  deployment:
    replicas: 1
