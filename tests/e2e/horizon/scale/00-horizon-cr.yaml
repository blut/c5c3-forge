# Horizon CR fixture. Managed cache via clusterRef to openstack-memcached;
# the SECRET_KEY comes from the ESO-synced horizon-secret-key Secret
# (deploy/kind/infrastructure). keystoneEndpoint points at the cluster-local
# convention URL — the login page renders without a live Keystone (Keystone
# is only contacted on login submit).
apiVersion: horizon.openstack.c5c3.io/v1alpha1
kind: Horizon
metadata:
  name: horizon-scale
  namespace: openstack
spec:
  deployment:
    replicas: 3
  image:
    repository: ghcr.io/c5c3/horizon
    tag: "2025.2"
  cache:
    clusterRef:
      name: openstack-memcached
  keystoneEndpoint: http://keystone.openstack.svc.cluster.local:5000/v3
  secretKeyRef:
    name: horizon-secret-key
    key: secret-key
