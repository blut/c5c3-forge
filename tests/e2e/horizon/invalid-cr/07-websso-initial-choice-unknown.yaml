# spec.websso.initialChoice naming no declared choice violates the
# WebSSOSpec CEL rule (and the webhook mirrors it).
apiVersion: horizon.openstack.c5c3.io/v1alpha1
kind: Horizon
metadata:
  name: horizon-invalid-websso-initial
  namespace: openstack
spec:
  deployment:
    replicas: 1
  image:
    repository: ghcr.io/c5c3/horizon
    tag: "2025.2"
  cache:
    clusterRef:
      name: openstack-memcached
  keystoneEndpoint: http://keystone.openstack.svc.cluster.local:5000/v3
  secretKeyRef:
    name: horizon-secret-key
    key: secret-key
  websso:
    enabled: true
    choices:
    - id: credentials
      label: Keystone Credentials
    initialChoice: not-a-choice
