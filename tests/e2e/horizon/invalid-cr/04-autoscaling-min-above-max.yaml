# spec.autoscaling.minReplicas above maxReplicas violates the AutoscalingSpec CEL rule.
apiVersion: horizon.openstack.c5c3.io/v1alpha1
kind: Horizon
metadata:
  name: horizon-invalid-autoscaling
  namespace: openstack
spec:
  deployment:
    replicas: 1
  image:
    repository: ghcr.io/c5c3/horizon
    tag: "2025.2"
  cache:
    clusterRef:
      name: openstack-memcached
  keystoneEndpoint: http://keystone.openstack.svc.cluster.local:5000/v3
  secretKeyRef:
    name: horizon-secret-key
    key: secret-key
  autoscaling:
    minReplicas: 5
    maxReplicas: 2
    targetCPUUtilization: 80
