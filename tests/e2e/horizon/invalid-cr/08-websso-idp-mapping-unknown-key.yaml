# spec.websso.idpMapping keyed on an undeclared choice violates the
# WebSSOSpec CEL rule: the login form would offer no way to reach it.
apiVersion: horizon.openstack.c5c3.io/v1alpha1
kind: Horizon
metadata:
  name: horizon-invalid-websso-mapping
  namespace: openstack
spec:
  deployment:
    replicas: 1
  image:
    repository: ghcr.io/c5c3/horizon
    tag: "2025.2"
  cache:
    clusterRef:
      name: openstack-memcached
  keystoneEndpoint: http://keystone.openstack.svc.cluster.local:5000/v3
  secretKeyRef:
    name: horizon-secret-key
    key: secret-key
  websso:
    enabled: true
    choices:
    - id: credentials
      label: Keystone Credentials
    idpMapping:
      keycloak_openid:
        identityProvider: keycloak
        protocol: openid
