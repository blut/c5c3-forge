# spec.multiDomain.domainDropdown without domainChoices violates the
# MultiDomainSpec CEL rule: the login form would render an empty select.
apiVersion: horizon.openstack.c5c3.io/v1alpha1
kind: Horizon
metadata:
  name: horizon-invalid-multidomain
  namespace: openstack
spec:
  deployment:
    replicas: 1
  image:
    repository: ghcr.io/c5c3/horizon
    tag: "2025.2"
  cache:
    clusterRef:
      name: openstack-memcached
  keystoneEndpoint: http://keystone.openstack.svc.cluster.local:5000/v3
  secretKeyRef:
    name: horizon-secret-key
    key: secret-key
  multiDomain:
    enabled: true
    domainDropdown: true
