# ExternalSecret pulling the Django SECRET_KEY from the same OpenBao path
# the openstack namespace uses (seeded per-ControlPlane by
# deploy/openbao/bootstrap/write-bootstrap-secrets.sh); the eso-management
# policy's bootstrap/* read grant covers it, so no new OpenBao policy work
# is required.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: horizon-secret-key
  namespace: horizon-pss-restricted-test
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-cluster-store
  target:
    name: horizon-secret-key
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: bootstrap/openstack/controlplane-horizon/secret-key
        property: secret-key
