# ExternalSecret pulling the Django SECRET_KEY through this namespace's OWN
# per-tenant openbao-tenant-store (provisioned by the chainsaw Step-1 script via
# setup-eso-tenant.sh, #606) — mirroring the Keystone pod-security-restricted
# sibling. It reads the namespace-scoped path
# `bootstrap/horizon-pss-restricted-test/pss/secret-key` that the eso-tenant
# policy templates to this namespace; the Step-1 script seeds that path by
# COPYING the shared `bootstrap/openstack/controlplane-horizon/secret-key` value.
# Since #606 the shared cluster store is namespace-restricted to `openstack`, so
# a foreign namespace like this one cannot reach the shared paths through it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: horizon-secret-key
  namespace: horizon-pss-restricted-test
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-tenant-store
    kind: SecretStore
  target:
    name: horizon-secret-key
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: bootstrap/horizon-pss-restricted-test/pss/secret-key
        property: secret-key
