# Horizon CR with spec.gateway for the HTTPRoute lifecycle test.
# The parentRef is deliberately non-existent so the real Envoy Gateway
# controller never writes its own RouteParentStatus slot and races the
# status merge-patch in the acceptance-simulation step.
apiVersion: horizon.openstack.c5c3.io/v1alpha1
kind: Horizon
metadata:
  name: horizon-httproute
  namespace: openstack
spec:
  deployment:
    replicas: 1
  image:
    repository: ghcr.io/c5c3/horizon
    tag: "2025.2"
  cache:
    clusterRef:
      name: openstack-memcached
  keystoneEndpoint: http://keystone.openstack.svc.cluster.local:5000/v3
  secretKeyRef:
    name: horizon-secret-key
    key: secret-key
  gateway:
    parentRef:
      name: not-a-real-gateway
    hostname: horizon.e2e.example.com
