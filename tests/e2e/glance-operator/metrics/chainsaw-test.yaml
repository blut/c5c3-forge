# Chainsaw E2E test for the glance-operator metrics ServiceMonitor.
# Verifies that the glance-operator chart renders (and later removes) a
# monitoring.coreos.com/v1 ServiceMonitor pointing at the operator's
# /metrics endpoint when monitoring.serviceMonitor.enabled is toggled.
#
# This mirrors tests/e2e/horizon-operator/metrics/chainsaw-test.yaml so the
# metrics flow is asserted on a real cluster rather than only by the chart's
# helm-unittest.
#
# DEPLOYMENT NOTE — why this test installs its own Helm release:
# The glance-operator HelmRelease at glance-system/glance-operator is
# intentionally suspended in the kind CI overlay (see
# deploy/kind/base/kustomization.yaml). The operator that actually runs in the
# cluster is installed by hack/ci-deploy-operator.sh, which `helm install`s the
# chart with a locally built dev image. Patching the suspended HelmRelease
# therefore has no observable effect. Mirroring the pattern in
# tests/e2e/horizon-operator/metrics, this test installs a dedicated release
# ("glance-operator-metrics") whose lifecycle directly produces and tears down
# the ServiceMonitor under assertion.
#
# DECISION: Prometheus target-Up polling is intentionally NOT implemented here.
# The end-to-end scrape path (a live Prometheus that discovers the
# ServiceMonitor and marks the target Up) is exercised by the WITH_PROMETHEUS
# kind bring-up, not by this suite: the e2e cluster only installs
# prometheus-operator-crds (see
# deploy/flux-system/releases/prometheus-operator-crds.yaml) and does NOT run a
# Prometheus instance, so there is no /api/v1/targets endpoint to poll. The
# structural ServiceMonitor assertion below (CRD shape, labels, selector,
# endpoints port/path/interval) is what this cluster can honestly verify.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: glance-operator-metrics
spec:
  namespace: glance-system
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Install glance-operator chart with monitoring enabled ────────
  # webhook.enabled=false avoids the cluster-scoped MutatingWebhookConfiguration
  # registered by the primary glance-operator deployed by
  # hack/ci-deploy-operator.sh (same rationale as the keystone metrics twin).
  - try:
    - script:
        timeout: 120s
        content: |
          helm install glance-operator-metrics \
            ${GITHUB_WORKSPACE:-.}/operators/glance/helm/glance-operator/ \
            --namespace glance-system --create-namespace \
            --set image.repository=ghcr.io/c5c3/glance-operator \
            --set image.tag=dev \
            --set image.pullPolicy=Never \
            --set replicas=1 \
            --set webhook.enabled=false \
            --set monitoring.serviceMonitor.enabled=true \
            --set monitoring.serviceMonitor.interval=30s \
            --wait --timeout 90s
    catch:
    - script:
        content: |
          echo "=== Helm status ==="
          helm status glance-operator-metrics -n glance-system 2>&1 || true
          echo "=== Pod status ==="
          kubectl get pods -n glance-system -l app.kubernetes.io/instance=glance-operator-metrics -o wide 2>&1 || true
          echo "=== Operator pod logs ==="
          for pod in $(kubectl get pods -n glance-system -l app.kubernetes.io/instance=glance-operator-metrics -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n glance-system "$pod" --all-containers --tail=120 2>&1 || true
          done
          echo "=== Events ==="
          kubectl get events -n glance-system --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 2: Assert the ServiceMonitor exists with the expected spec ──────
  # Mirrors operators/shared/helm/operator-library/templates/_servicemonitor.tpl.
  # With release name "glance-operator-metrics" the helper
  # "operator-library.fullname" resolves to "glance-operator-metrics" (the
  # chart name "glance-operator" is a substring of the release name; see
  # operators/shared/helm/operator-library/templates/_helpers.tpl).
  - try:
    - assert:
        resource:
          apiVersion: monitoring.coreos.com/v1
          kind: ServiceMonitor
          metadata:
            name: glance-operator-metrics
            namespace: glance-system
            labels:
              app.kubernetes.io/name: glance-operator
              app.kubernetes.io/instance: glance-operator-metrics
              app.kubernetes.io/managed-by: Helm
          spec:
            selector:
              matchLabels:
                app.kubernetes.io/name: glance-operator
                app.kubernetes.io/instance: glance-operator-metrics
            endpoints:
            - port: metrics
              path: /metrics
              interval: 30s
    catch:
    - script:
        content: |
          echo "=== ServiceMonitor list ==="
          kubectl get servicemonitor -n glance-system -o wide 2>&1 || true
          echo "=== ServiceMonitor yaml ==="
          kubectl get servicemonitor glance-operator-metrics -n glance-system -o yaml 2>&1 || true
          echo "=== Helm values ==="
          helm get values glance-operator-metrics -n glance-system 2>&1 || true
  # ── Step 3: Uninstall the test release (cleanup) ─────────────────────────
  - try:
    - script:
        timeout: 120s
        content: |
          helm uninstall glance-operator-metrics -n glance-system --wait --timeout 60s 2>&1 || true
  # ── Step 4: Assert the ServiceMonitor is removed ─────────────────────────
  - try:
    - script:
        content: |
          # Verify the ServiceMonitor is gone after helm uninstall
          for i in $(seq 1 12); do
            if ! kubectl get servicemonitor glance-operator-metrics -n glance-system >/dev/null 2>&1; then
              echo "PASS: ServiceMonitor correctly removed"
              exit 0
            fi
            sleep 5
          done
          echo "FAIL: ServiceMonitor still present after helm uninstall"
          kubectl get servicemonitor glance-operator-metrics -n glance-system -o yaml 2>&1 || true
          exit 1
