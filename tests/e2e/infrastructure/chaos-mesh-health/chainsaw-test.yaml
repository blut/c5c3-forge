# Chainsaw E2E test for the Chaos Mesh kind-only opt-in addon.
# Asserts the health invariants of the Chaos Mesh installation deployed
# by deploy/kind/chaos-mesh/ when WITH_CHAOS_MESH=true:
#   - Deployment/chaos-controller-manager in chaos-mesh has at least one
#     available replica (mirrors today's infra-stack-health Step 5
# `(availableReplicas > 0): true` assertion)
#   - DaemonSet/chaos-daemon in chaos-mesh is rolled out with at least
#     one ready node (mirrors today's `(numberReady >= 1): true`
# assertion)
#
# Scope gating — two independent mechanisms, mirroring the
# flux-web-health pattern:
#
#   1. Label selector (`metadata.labels.overlay: kind`): lets the
#      chainsaw CLI filter this test out on non-kind invocations via
#      `chainsaw test --selector 'overlay!=kind' tests/e2e/infrastructure/`.
#      This is the preferred gate for pipelines that know they run
#      against production clusters (which never install Chaos Mesh — the sources/releases manifests were dropped from deploy/flux-system/kustomization.yaml).
#
#   2. Runtime presence check (first line of the script): an early
#      `kubectl get ns chaos-mesh` probe. If the namespace is absent,
#      the script exits 0 with a SKIP log line. The chaos-mesh
#      Namespace is created exclusively by the opt-in overlay
#      (deploy/kind/chaos-mesh/namespace.yaml) — its absence
#      unambiguously signals that WITH_CHAOS_MESH was not set, and
#      the test is therefore default-safe on any cluster regardless
#      of selector use.
#
# The two gates are belt-and-braces: the label lets callers skip the
# test without deploying *anything* (saves the chainsaw start-up
# cost), while the runtime probe keeps the test default-safe for
# operators who forget the selector. Either mechanism alone addresses
# the requirement; both together make "runs against WITH_CHAOS_MESH=
# false clusters don't fail on missing chaos-mesh resources" hold
# regardless of invocation.
#
# The full chaos-mesh health check runs as a single `script` operation
# rather than chainsaw declarative `assert`s because chainsaw has no
# step-level skip: declarative asserts would time out and fail even
# if an earlier guard script exited 0. Consolidating into one script
# is the only way to keep the presence-check short-circuit
# default-safe. Lost value vs. declarative asserts is bounded —
# `kubectl wait` and `kubectl rollout status` give us the same
# retry+timeout semantics, and the `catch` below still runs
# `describe` for post-mortem on failure.
#
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: chaos-mesh-health
  labels:
    # Overlay gate — see header. Non-kind runs must pass
    # `--selector 'overlay!=kind'` to exclude this test.
    overlay: kind
spec:
  # Timeout budget the script's sequential kubectl waits
  # have per-call upper bounds of 2m (Deployment Available) + 2m
  # (DaemonSet rollout) = 4m worst case. In the realistic success
  # path both return in <1s because deploy-infra's Phase 3
  # `wait_for_helmreleases` already blocks until HelmRelease/chaos-mesh
  # is Ready=True before this test runs. `timeouts.exec` and the
  # matching script-level `timeout` are 5m, leaving a safety margin
  # above the 4m worst case so chainsaw does not kill the script
  # mid-execution and surface a confusing timeout failure instead of
  # a useful per-resource signal.
  timeouts:
    assert: 5m
    exec: 5m
  steps:
  - try:
    - script:
        # Matches spec.timeouts.exec above; kept explicit so the
        # per-step bound is visible at the call site.
        timeout: 5m
        # Chainsaw defaults to `sh`, which rejects `set -o pipefail`
        # with "Illegal option -o pipefail" (exit 2). All other infra/
        # keystone e2e scripts pin bash for the same reason.
        shell: bash
        content: |
          set -euo pipefail

          # ── Presence guard ──────────────────────────────
          # The opt-in overlay deploy/kind/chaos-mesh/ creates the
          # chaos-mesh Namespace; its absence unambiguously signals
          # WITH_CHAOS_MESH=false (or a non-kind cluster). Exit 0
          # with a SKIP line so the test passes without failing on
          # the missing Deployment / DaemonSet downstream.
          if ! kubectl get ns chaos-mesh >/dev/null 2>&1; then
            echo "SKIP: chaos-mesh namespace not present."
            echo "      This is expected when WITH_CHAOS_MESH is unset/false"
            echo "      (default) or on non-kind overlays."
            echo "      Run \`WITH_CHAOS_MESH=true make deploy-infra\` to install."
            exit 0
          fi
          echo "OK: chaos-mesh namespace present — running health checks"

          # ──: Deployment Available ──────────────────────────
          # kubectl wait retries until the condition is met or the
          # timeout fires, giving us the same semantics as chainsaw's
          # declarative assert + timeouts.assert. Mirrors today's
          # infra-stack-health Step 5 `(availableReplicas > 0): true`.
          kubectl wait --for=condition=Available \
            deployment/chaos-controller-manager -n chaos-mesh --timeout=2m
          echo "OK: Deployment/chaos-controller-manager is Available"

          # ──: DaemonSet rolled out ──────────────────────────
          # rollout status blocks until the DaemonSet's
          # numberReady == desiredNumberScheduled (or the timeout
          # fires). Stronger than today's `(numberReady >= 1): true`
          # assertion: on a multi-node kind cluster it requires every
          # selected node to host a ready chaos-daemon pod.
          kubectl rollout status daemonset/chaos-daemon \
            -n chaos-mesh --timeout=2m
          echo "OK: DaemonSet/chaos-daemon is rolled out"
    catch:
    # On failure, dump post-mortem state to help CI triage (mirrors
    # the diagnostic pattern used by other infra tests). Each
    # resource is individually scoped so a missing one doesn't
    # short-circuit the remainder of the dump.
    - describe:
        apiVersion: apps/v1
        kind: Deployment
        name: chaos-controller-manager
        namespace: chaos-mesh
    - describe:
        apiVersion: apps/v1
        kind: DaemonSet
        name: chaos-daemon
        namespace: chaos-mesh
