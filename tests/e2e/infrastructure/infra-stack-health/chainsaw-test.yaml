# Chainsaw E2E test for infrastructure stack health verification (CC-0010).
# Asserts that all deployed infrastructure components are running and healthy
# after the full deployment sequence (make deploy-infra) completes.
#
# Covers:
#   - Operator Deployments: cert-manager, external-secrets, mariadb-operator,
#     memcached-operator
#   - OpenBao StatefulSet readiness
#   - Infrastructure CRs: ClusterIssuer, MariaDB, Memcached
#   - ESO resources: ClusterSecretStore (Valid), ExternalSecrets (SecretSynced)
#   - flux-operator: FluxInstance Ready, FluxReport entitled, five flux-system
#     controller Deployments available (CC-0085)
#
# The kind-only Flux Web UI demo addon (CC-0086) lives in a sibling test —
# tests/e2e/infrastructure/flux-web-health/chainsaw-test.yaml — labelled
# `overlay: kind` so non-kind runs can exclude it via
# `chainsaw test --selector 'overlay!=kind'`. Splitting it out keeps this
# overlay-agnostic test unconditional.
#
# The kind-only opt-in Chaos Mesh addon (CC-0097) similarly lives in a
# sibling test — tests/e2e/infrastructure/chaos-mesh-health/chainsaw-test.yaml
# — labelled `overlay: kind` with a runtime presence-check guard. The
# chaos-mesh assertions previously inhabiting Step 5 of this file (CC-0046)
# moved out as part of CC-0097, REQ-005 because the production overlay
# (deploy/flux-system/) no longer installs chaos-mesh by default — keeping
# the assertions here would fail on every default `make deploy-infra` run.
#
# REQ-008 (CC-0010, CC-0085)
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: infra-stack-health
spec:
  # Extended assert timeout (~5min) for operator startup and CRD reconciliation.
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Operator Deployments ────────────────────────────────────────
  # Verify that all infrastructure operator Deployments have available replicas.
  - try:
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: cert-manager
            namespace: cert-manager
          status:
            (availableReplicas > `0`): true
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: external-secrets
            namespace: external-secrets
          status:
            (availableReplicas > `0`): true
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: mariadb-operator
            namespace: mariadb-system
          status:
            (availableReplicas > `0`): true
    # Verified from CI run 23262026727: pod name memcached-operator-8547dc8f67-lhk4j
    # confirms the Deployment is named "memcached-operator" (not the kubebuilder
    # convention -controller-manager).
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: memcached-operator
            namespace: memcached-system
          status:
            (availableReplicas > `0`): true
  # ── Step 2: OpenBao StatefulSet ─────────────────────────────────────────
  # Verify that the OpenBao StatefulSet has at least one ready replica.
  - try:
    - assert:
        resource:
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: openbao
            namespace: openbao-system
          status:
            (readyReplicas >= `1`): true
  # ── Step 3: Infrastructure CRs ─────────────────────────────────────────
  # Verify that ClusterIssuer, MariaDB CR, and Memcached CR have Ready
  # conditions.
  - try:
    - assert:
        resource:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: selfsigned-cluster-issuer
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
    - assert:
        resource:
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: MariaDB
          metadata:
            name: openstack-db
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
    - assert:
        resource:
          apiVersion: memcached.c5c3.io/v1beta1
          kind: Memcached
          metadata:
            name: openstack-memcached
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
  # ── Step 4: ESO Resources ──────────────────────────────────────────────
  # Verify that the ClusterSecretStore is Valid and all ExternalSecrets have
  # reached SecretSynced status.
  #
  # CC-0107 (REQ-010): These assertions now run under enforced mTLS — the
  # OpenBao API listener requires and verifies a client certificate
  # (tls_require_and_verify_client_cert = true), and the ClusterSecretStore
  # presents the eso-openbao-client-tls client cert/key on every Vault call.
  # ClusterSecretStore Ready=True/reason:Valid and the three ExternalSecrets
  # Ready=True/reason:SecretSynced therefore prove end-to-end mutual-auth
  # success: cert-manager issued the client cert, ESO mounted it, OpenBao
  # accepted the TLS handshake, and the Kubernetes-token auth (unchanged)
  # then completed the application-layer login. A regression in any link of
  # that chain (missing client cert, wrong CA, listener misconfig) flips
  # Ready=False here.
  #
  # CC-0116: keystone-db is the kind-only default-identity ExternalSecret
  # (deploy/kind/infrastructure/keystone-db-externalsecret.yaml) serving
  # standalone Keystone CRs — it reads the per-ControlPlane path
  # openstack/keystone/openstack/controlplane/db that the deploy-infra seed
  # writes for the default KORC_CONTROLPLANES identity. The production stack
  # (deploy/eso/) ships no keystone-db ExternalSecret. The operator-created
  # per-ControlPlane ExternalSecret (controlplane-keystone-db-credentials)
  # does not exist after a bare `make deploy-infra` (no ControlPlane CR yet)
  # and is asserted by tests/e2e/c5c3/db-credential-scoping/ instead. This
  # suite always runs against the kind overlay, so the assertion is valid
  # here.
  #
  # CC-0117: keystone-admin and mariadb-root-password are now ALSO kind-only
  # shims (deploy/kind/infrastructure/keystone-admin-externalsecret.yaml and
  # mariadb-root-password-externalsecret.yaml) — the production stack
  # (deploy/eso/) ships NONE of these static ExternalSecrets. The admin
  # password specifically is now operator-projected per-ControlPlane
  # (reconcileAdminPassword) into the per-CP Secret
  # controlplane-keystone-admin-credentials, asserted by
  # tests/e2e/c5c3/admin-password-scoping/. Because this suite always runs
  # against the kind overlay, the three ExternalSecret Ready assertions below
  # remain valid here.
  - try:
    - assert:
        resource:
          apiVersion: external-secrets.io/v1
          kind: ClusterSecretStore
          metadata:
            name: openbao-cluster-store
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: Valid
    - assert:
        resource:
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: keystone-admin
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: SecretSynced
    - assert:
        resource:
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: keystone-db
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: SecretSynced
    - assert:
        resource:
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: mariadb-root-password
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: SecretSynced
  # ── Step 5: flux-operator (CC-0085) ──────────────────────────────────
  # Verify the flux-operator bootstrap is healthy:
  #   - FluxInstance/flux has a Ready=True condition
  #   - FluxReport/flux exists with a non-empty entitlement (operator has
  #     evaluated the distribution)
  #   - All five flux-system controller Deployments have available replicas
  #     (flux-operator itself, source/kustomize/helm/notification controllers)
  - try:
    - assert:
        resource:
          apiVersion: fluxcd.controlplane.io/v1
          kind: FluxInstance
          metadata:
            name: flux
            namespace: flux-system
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
    - assert:
        resource:
          apiVersion: fluxcd.controlplane.io/v1
          kind: FluxReport
          metadata:
            name: flux
            namespace: flux-system
          # In the upstream CRD the report payload (distribution, components,
          # reconcilers, …) lives under `spec`; `status` only carries the
          # reconciler conditions. See controlplaneio-fluxcd/flux-operator
          # api/v1/fluxreport_types.go — `Distribution` is a field of
          # FluxReportSpec, and `Entitlement string` is a plain string.
          # Chainsaw asserts equality between the JMESPath result and the
          # expected literal, not truthiness, so `(entitlement): true` would
          # compare a string against a bool and fail with "types are not
          # comparable". The two-part expression both rejects a missing field
          # (`null != null` is false) and an empty string, without hard-coding
          # a specific literal (e.g. "Verified" / "Issued") that could change
          # across flux-operator releases (CC-0085, REQ-008).
          spec:
            distribution:
              (entitlement != null && entitlement != ''): true
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: flux-operator
            namespace: flux-system
          status:
            (availableReplicas > `0`): true
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: source-controller
            namespace: flux-system
          status:
            (availableReplicas > `0`): true
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: kustomize-controller
            namespace: flux-system
          status:
            (availableReplicas > `0`): true
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: helm-controller
            namespace: flux-system
          status:
            (availableReplicas > `0`): true
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: notification-controller
            namespace: flux-system
          status:
            (availableReplicas > `0`): true
  # Flux Web UI and Chaos Mesh health checks live in sibling tests
  # (flux-web-health and chaos-mesh-health, both labelled `overlay: kind`)
  # — see the header of this file for the rationale behind the splits.
