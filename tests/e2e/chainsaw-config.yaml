# Chainsaw v0.2.14 E2E test configuration.
# Reference: https://kyverno.github.io/chainsaw/latest/configuration/
#
# DECISION: report format JUNIT-TEST vs XML
# Ambiguity: requirement says "JUnit XML output" without specifying format value.
# Chose: JUNIT-TEST because the legacy "XML" format was deprecated in v0.2.10.
# Reviewer: please verify.
apiVersion: chainsaw.kyverno.io/v1alpha2
kind: Configuration
metadata:
  name: cloud-operator-e2e
spec:
  # ── Timeouts ────────────────────────────────────────────────────────────
  timeouts:
    apply: 30s
    assert: 120s
    # Finalizer-driven Keystone deletion waits for MariaDB
    # Database/User/Grant CRs to disappear before releasing the finalizer.
    # Under parallel:4 the MariaDB operator can serialize those deletions past
    # the previous 60s window, so allow up to 3m — above the 2m delete bound
    # enforced by tests/e2e/keystone/deletion-cleanup/chainsaw-test.yaml.
    cleanup: 3m
    delete: 30s
    error: 30s
    exec: 30s

  # ── Cleanup ─────────────────────────────────────────────────────────────
  # Ensure test resources are cleaned up after each test run.
  cleanup:
    skipDelete: false

  # ── Execution ───────────────────────────────────────────────────────────
  # Run tests in parallel; stop on first failure for faster feedback.
  execution:
    failFast: true
    parallel: 4

  # ── Report ──────────────────────────────────────────────────────────────
  # Produce JUnit XML reports for CI integration.
  report:
    format: JUNIT-TEST
    name: chainsaw-report
    path: _output/reports
