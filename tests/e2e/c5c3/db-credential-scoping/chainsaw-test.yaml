# Chainsaw E2E test for per-ControlPlane service DB-credential scoping (#439).
# It applies the canonical ControlPlane ("controlplane" in namespace
# "openstack"), onboards the per-tenant OpenBao database-engine role, and asserts
# that the c5c3-operator's reconcileDBCredentials sub-reconciler projects a
# per-ControlPlane, DYNAMIC (engine-issued) DB credential:
#
#   - a VaultDynamicSecret generator named "controlplane-keystone-db-credentials"
#     reading the per-tenant creds path
#     "database/mariadb/creds/keystone-openstack"
#     ( = database/mariadb/creds/keystone-{ns}, keyed on the namespace alone );
#   - an ExternalSecret of the same name, owned by the ControlPlane, drawing from
#     that generator via dataFrom.sourceRef.generatorRef (no static Data refs);
#   - a per-CP ServiceAccount "keystone-db-creds"; and
#   - the materialised Secret carrying an ENGINE-ISSUED username (a transient
#     v-kube-... login, not the static "keystone" user).
#
# The stage-(a) static per-CP KV DB seed is retired (#439): no long-lived static
# DB password is seeded at rest for managed-mode ControlPlanes.
#
# ── DECISION: belt-and-braces presence guard + single consolidated script ────
# Mirrors tests/e2e/c5c3/full-controlplane-keystone: the c5c3-operator + OpenBao
# stack the DB-credential link spans is NOT installed by the current kind E2E
# wiring (hack/deploy-infra.sh + hack/ci-deploy-operator.sh), and the suite runs
# under execution.failFast: true (tests/e2e/chainsaw-config.yaml), so a pure
# declarative `assert` test would HARD-FAIL every cluster missing that stack —
# including the PR that introduces this file. A runtime presence guard probes for
# the required CRDs + the OpenBao ClusterSecretStore and exits 0 with a SKIP line
# when the stack is absent; when present it asserts the link. Because chainsaw has
# no step-level skip, the guard and all assertions live in ONE script step.
# Reviewer: please verify, and note that wiring the c5c3-operator + OpenBao into
# kind E2E (so this test exercises rather than skips) is the documented
# fast-follow (/).
#
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: db-credential-scoping
spec:
  namespace: openstack
  timeouts:
    assert: 5m
    exec: 10m
  steps:
  # ── Step 1: Presence-gate, apply the ControlPlane, assert the DB link ──────
  - try:
    - script:
        timeout: 10m
        # Chainsaw defaults to `sh`, which rejects `set -o pipefail`; every
        # infra/keystone e2e script pins bash for the same reason.
        shell: bash
        content: |
          set -euo pipefail

          CP_NS=openstack
          CP_NAME=controlplane
          DB_SECRET=controlplane-keystone-db-credentials
          # Per-tenant dynamic role + creds path (must match dbDynamicRoleFor /
          # setup-database-tenant.sh: keystone-<ns>, keyed on the namespace alone).
          DB_ROLE=keystone-openstack
          DB_CREDS_PATH="database/mariadb/creds/${DB_ROLE}"

          # ── Presence guard ──────────────────────────────
          # Probe for the CRDs the DB-credential link spans plus the OpenBao
          # ClusterSecretStore the ExternalSecret reads through. Their absence
          # means the c5c3-operator + OpenBao stack is not deployed here — SKIP
          # cleanly (exit 0).
          missing=""
          for crd in \
            controlplanes.c5c3.io \
            keystones.keystone.openstack.c5c3.io \
            externalsecrets.external-secrets.io \
            vaultdynamicsecrets.generators.external-secrets.io; do
            if ! kubectl get crd "$crd" >/dev/null 2>&1; then
              missing="${missing} ${crd}"
            fi
          done
          if [ -n "${missing}" ]; then
            echo "SKIP: required CRDs not present:${missing}"
            echo "      The c5c3-operator + OpenBao stack is not deployed on this"
            echo "      cluster, so the DB-credential scoping link cannot be"
            echo "      exercised here."
            exit 0
          fi
          if ! kubectl get clustersecretstore openbao-cluster-store >/dev/null 2>&1; then
            echo "SKIP: openbao-cluster-store ClusterSecretStore not present;"
            echo "      the DB-credential ExternalSecret cannot sync."
            exit 0
          fi
          # The CRDs alone no longer prove the stack: the e2e-operator (c5c3)
          # matrix leg installs every CRD the c5c3 controller watches WITHOUT
          # deploying the sibling operators. This suite's ControlPlane needs the
          # keystone-operator to converge (and it shares the canonical
          # namespace with the other stack suites), so probe for running pods
          # (any namespace), not just the schema.
          if ! kubectl get pods -A -l app.kubernetes.io/name=keystone-operator --no-headers 2>/dev/null | grep -q .; then
            echo "SKIP: no keystone-operator is running; the cluster carries the"
            echo "      stack's CRDs only, so the ControlPlane cannot converge here."
            exit 0
          fi
          echo "OK: c5c3 + ESO CRDs, OpenBao store, and a running keystone-operator"
          echo "    present — running the per-ControlPlane DB-credential scoping assertions."

          # ── Helpers ────────────────────────────────────────────────────────
          assert_eq() { # <description> <expected> <actual>
            if [ "$2" != "$3" ]; then
              echo "ERROR: $1 — expected '$2', got '$3'"
              exit 1
            fi
            echo "OK: $1 ('$3')"
          }

          wait_ready_condition() { # <resource> <name> <namespace> <timeoutSeconds>
            local res="$1" name="$2" ns="$3" timeout="$4"
            local deadline status
            deadline=$(( $(date +%s) + timeout ))
            while true; do
              status="$(kubectl get "${res}" "${name}" -n "${ns}" \
                -o "jsonpath={.status.conditions[?(@.type=='Ready')].status}" 2>/dev/null || true)"
              if [ "${status}" = "True" ]; then
                echo "OK: ${res}/${name} Ready=True"
                return 0
              fi
              if [ "$(date +%s)" -ge "${deadline}" ]; then
                echo "ERROR: ${res}/${name} Ready not True within ${timeout}s (last: '${status:-<none>}')"
                return 1
              fi
              sleep 5
            done
          }

          # Apply the canonical ControlPlane now that the presence guard passed.
          # Chainsaw runs scripts with the test directory as CWD. The CR is the
          # same name/namespace the deploy stack provisions, so this apply is
          # idempotent on a cluster that already carries it.
          kubectl apply -f 00-controlplane-cr.yaml

          # ── Onboard the per-tenant OpenBao database-engine role ────────────
          # Managed-mode Keystone draws engine-issued (Dynamic) credentials; the
          # role only exists after setup-database-tenant.sh configures it against
          # the projected, Ready MariaDB. Idempotent, so safe on a cluster the
          # deploy hook already onboarded.
          kubectl wait mariadb/openstack-db -n "${CP_NS}" --for=condition=Ready --timeout=600s
          export BAO_TOKEN
          BAO_TOKEN="$(kubectl get secret openbao-init-keys -n openbao-system \
            -o jsonpath='{.data.init-output}' | base64 -d | jq -r '.root_token')"
          if [ -z "${BAO_TOKEN}" ] || [ "${BAO_TOKEN}" = "null" ]; then
            echo "ERROR: could not extract OpenBao root token for tenant onboarding"; exit 1
          fi
          ../../../../deploy/openbao/bootstrap/setup-database-tenant.sh "${CP_NS}" "${CP_NAME}"
          unset BAO_TOKEN

          # ── Assert the DB-credential ExternalSecret is generator-backed ────
          wait_ready_condition externalsecret "${DB_SECRET}" "${CP_NS}" 300
          assert_eq "DB-credential ExternalSecret owned by ControlPlane" "${CP_NAME}" \
            "$(kubectl get externalsecret "${DB_SECRET}" -n "${CP_NS}" \
              -o "jsonpath={.metadata.ownerReferences[?(@.kind=='ControlPlane')].name}")"
          assert_eq "DB-credential ExternalSecret uses a VaultDynamicSecret generator" "VaultDynamicSecret" \
            "$(kubectl get externalsecret "${DB_SECRET}" -n "${CP_NS}" \
              -o "jsonpath={.spec.dataFrom[0].sourceRef.generatorRef.kind}")"
          assert_eq "DB-credential ExternalSecret generator name" "${DB_SECRET}" \
            "$(kubectl get externalsecret "${DB_SECRET}" -n "${CP_NS}" \
              -o "jsonpath={.spec.dataFrom[0].sourceRef.generatorRef.name}")"
          # The old static KV Data refs must be absent (assert absence of old state).
          assert_eq "DB-credential ExternalSecret carries no static Data refs" "" \
            "$(kubectl get externalsecret "${DB_SECRET}" -n "${CP_NS}" -o 'jsonpath={.spec.data}')"

          # ── Assert the per-CP generator objects (VDS / SA) ─────────────────
          assert_eq "VaultDynamicSecret reads the per-tenant creds path" "${DB_CREDS_PATH}" \
            "$(kubectl get vaultdynamicsecret "${DB_SECRET}" -n "${CP_NS}" -o 'jsonpath={.spec.path}')"
          assert_eq "VaultDynamicSecret owned by ControlPlane" "${CP_NAME}" \
            "$(kubectl get vaultdynamicsecret "${DB_SECRET}" -n "${CP_NS}" \
              -o "jsonpath={.metadata.ownerReferences[?(@.kind=='ControlPlane')].name}")"
          kubectl get serviceaccount keystone-db-creds -n "${CP_NS}" >/dev/null
          echo "OK: per-ControlPlane generator objects (ExternalSecret/VaultDynamicSecret/ServiceAccount) present"

          # ── Assert the materialised Secret carries engine-issued creds ─────
          DB_USERNAME="$(kubectl get secret "${DB_SECRET}" -n "${CP_NS}" \
            -o "jsonpath={.data.username}" | base64 -d)"
          if [ "${DB_USERNAME}" = "keystone" ] || [ -z "${DB_USERNAME}" ]; then
            echo "ERROR: DB-credential Secret username '${DB_USERNAME}' is not engine-issued"
            exit 1
          fi
          echo "OK: DB-credential Secret carries an engine-issued username ('${DB_USERNAME}')"

          # ── Assert the ControlPlane DBCredentialsReady condition ───────────
          assert_eq "ControlPlane DBCredentialsReady" "True" \
            "$(kubectl get controlplane "${CP_NAME}" -n "${CP_NS}" \
              -o "jsonpath={.status.conditions[?(@.type=='DBCredentialsReady')].status}")"
          echo "OK: per-ControlPlane dynamic DB-credential scoping verified."
    catch:
    - script:
        shell: bash
        content: |
          echo "=== ControlPlane status.conditions ==="
          kubectl get controlplane controlplane -n openstack \
            -o jsonpath='{range .status.conditions[*]}{.type}={.status} ({.reason}: {.message}){"\n"}{end}' 2>&1 || true
          echo "=== DB-credential ExternalSecret / VaultDynamicSecret ==="
          kubectl describe externalsecret controlplane-keystone-db-credentials -n openstack 2>&1 || true
          kubectl describe vaultdynamicsecret controlplane-keystone-db-credentials -n openstack 2>&1 || true
          echo "=== DB-credential Secret (keys only, no values) ==="
          kubectl describe secret controlplane-keystone-db-credentials -n openstack 2>&1 || true
          echo "=== c5c3-operator logs (last 100 lines) ==="
          kubectl logs -n c5c3-system -l app.kubernetes.io/name=c5c3-operator --tail=100 --all-containers 2>&1 || true
          echo "=== OpenBao logs (last 80 lines) ==="
          kubectl logs -n openbao-system -l app.kubernetes.io/name=openbao --tail=80 --all-containers 2>&1 || true
          echo "=== Events (openstack ns, last 30) ==="
          kubectl get events -n openstack --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
