# ControlPlane fixture for the dedicated-namespaces E2E test.
#
# It places its two services in namespaces of their OWN, one per lifecycle:
#
#   - Keystone lands in @KEYSTONE_NS@ under the Managed lifecycle: the operator
#     creates the namespace, stamps it with the ControlPlane's ownership labels,
#     and deletes it with the ControlPlane.
#   - Horizon lands in @HORIZON_NS@ under the External lifecycle: the operator
#     uses a pre-existing namespace (the test creates it) and never touches its
#     lifecycle.
#
# The @KEYSTONE_NS@ / @HORIZON_NS@ tokens are substituted by the test script from
# the ephemeral test namespace, so each run gets fresh, collision-free namespace
# names. The CR itself carries NO metadata.namespace: chainsaw runs the suite in
# its own ephemeral namespace and the test applies this CR into it.
#
# The SHARED infrastructure block is MANAGED (clusterRef), so the operator
# provisions its backing services — and, because backing services follow the
# service, it provisions them in each SERVICE's namespace, which is what the suite
# asserts. The instances are kind-sized (single non-Galera replica, small volume)
# so they schedule on a single-node cluster.
#
# The region markers are consumed by a VitePress code-import in
# docs/guides/dedicated-service-namespaces.md — the guide embeds this fixture
# verbatim so its exhibit cannot drift from what the suite tests.
# region controlplane
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp
spec:
  openStackRelease: "2025.2"
  infrastructure:
    database:
      clusterRef:
        name: openstack-db
      database: keystone
      secretRef:
        name: keystone-db
      replicas: 1
      storageSize: 512Mi
    cache:
      clusterRef:
        name: openstack-memcached
      backend: dogpile.cache.pymemcache
      replicas: 1
  services:
    keystone:
      replicas: 1
      namespace:
        name: "@KEYSTONE_NS@"
        lifecycle: Managed
    horizon:
      replicas: 1
      namespace:
        name: "@HORIZON_NS@"
        lifecycle: External
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: keystone-admin
        key: password
    # A service account delivering its credentials into the dedicated Keystone
    # namespace: its source Secret, PushSecret, consumer ExternalSecret, and the
    # materialized credentials Secret all land in @KEYSTONE_NS@ (carrying the
    # ownership labels), reading the OpenBao path keyed on that namespace. The
    # webhook accepts targetNamespace only when it names the ControlPlane's own or
    # one of its dedicated service namespaces, so admitting this CR proves the rule.
    serviceAccounts:
    - name: nova
      project:
        name: service
      targetNamespace: "@KEYSTONE_NS@"
# endregion controlplane
