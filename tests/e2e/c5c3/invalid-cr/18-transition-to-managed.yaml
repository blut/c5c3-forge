# UPDATE of the accepted External base to a Managed shape is rejected with the
# reserved phase-3 takeover message.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-transition-b
spec:
  openStackRelease: "2025.2"
  infrastructure:
    database:
      host: db.example.com
      database: openstack
      secretRef:
        name: db-creds
    cache:
      backend: dogpile.cache.pymemcache
      servers:
      - mc:11211
  services:
    keystone:
      mode: Managed
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
