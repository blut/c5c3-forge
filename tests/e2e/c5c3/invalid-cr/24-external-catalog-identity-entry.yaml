# external.catalog.managedEntries declaring the identity type is rejected:
# the identity catalog entry is owned by the External-mode imports (CEL).
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-external-catalog-identity
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
        catalog:
          managedEntries:
          - type: identity
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
