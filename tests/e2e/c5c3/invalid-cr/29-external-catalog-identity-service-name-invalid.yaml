# external.catalog.identityServiceName carrying a comma is rejected (CRD
# pattern), exactly like managedEntries[].name: it is cast to K-ORC's
# OpenStackName on the Service import filter, whose own pattern is ^[^,]+$.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-external-catalog-bad-identity-name
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
        catalog:
          identityServiceName: keystone,v3
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
