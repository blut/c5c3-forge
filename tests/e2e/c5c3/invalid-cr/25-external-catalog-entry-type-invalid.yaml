# external.catalog.managedEntries[].type outside the DNS-1123 label shape is
# rejected (CRD pattern): the type names the child K-ORC CRs.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-external-catalog-bad-type
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
        catalog:
          managedEntries:
          - type: Image_Service
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
