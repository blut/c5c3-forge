# Accepted base for the External->Managed transition test: the issue's minimal
# External sketch CR (mode + external.authURL + passwordSecretRef, no
# infrastructure). Doubles as the sketch-CR acceptance proof.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-transition-b
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
