# An empty dedicatedBackingServices block violates the CEL rule: it requests no
# backing-service class at all. Omit the block entirely to share the
# ControlPlane-wide instances (the default).
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-dedicated-empty
spec:
  openStackRelease: "2025.2"
  infrastructure:
    database:
      host: db.example.com
      database: openstack
      secretRef:
        name: db-creds
    cache:
      backend: dogpile.cache.pymemcache
      servers:
      - mc:11211
  services:
    keystone:
      mode: Managed
      dedicatedBackingServices: {}
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
