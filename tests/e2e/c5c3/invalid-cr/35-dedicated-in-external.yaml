# services.keystone.dedicatedBackingServices in External mode violates the CEL
# rule: an External ControlPlane provisions no backing services at all, so there
# is nothing to make dedicated.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-dedicated-external
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
      dedicatedBackingServices:
        cache:
          clusterRef:
            name: cp-dedicated-cache
          backend: dogpile.cache.pymemcache
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
