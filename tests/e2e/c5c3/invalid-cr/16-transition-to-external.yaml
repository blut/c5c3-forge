# UPDATE of the accepted base to a valid External shape is rejected outright:
# adopting an existing installation must be a fresh External-mode ControlPlane.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-transition-a
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
