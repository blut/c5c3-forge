# Two service accounts resolving to the same (userName, domainName) are
# rejected by the webhook: they would project two managed Users onto one
# Keystone user and race its password.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-sa-dup-identity
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
    serviceAccounts:
    - name: nova
      project:
        name: service
    - name: nova-secondary
      userName: nova
      project:
        name: service
