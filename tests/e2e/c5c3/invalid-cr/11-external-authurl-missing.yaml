# external without authURL violates the CRD required-field check.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-external-no-authurl
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external: {}
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
