# Chainsaw E2E tests for the ControlPlane External-mode validation matrix.
# Pins the type-level CEL XValidation rules and the validating webhook's
# cross-field / transition-gating rules in operators/c5c3/api/v1alpha1/ to
# deterministic admission failures against a real API server.
#
# Enforcement precedence at admission: the mutating (defaulting) webhook runs
# first, then the CRD schema validation (structural + enum + pattern + CEL),
# then the validating webhook. So an intra-struct violation (a managed-only
# field in External mode, external in Managed mode) is caught by CEL and the
# validating webhook never runs; a cross-field violation (infrastructure or
# horizon in External mode, a mode transition) that CEL cannot express is
# caught by the validating webhook. Each assertion below targets whichever
# layer owns the rule.
#
# Fixtures carry NO metadata.namespace: Chainsaw runs each Test in its own
# ephemeral namespace, isolating the one-ControlPlane-per-namespace webhook
# from the parallel c5c3 suites pinned to `openstack`, and letting the two
# accepted transition bases persist without colliding.
#
# All fixtures are generated from the single canonical scaffold in
# `_generate.py`. After editing the scaffold or any per-fixture override,
# regenerate via:
#   python3 tests/e2e/c5c3/invalid-cr/_generate.py
# CI runs `make verify-invalid-cr-fixtures`, which invokes `_generate.py
# --check` (drift mode, both directions incl. orphans) and `test_generate.py`
# (FIXTURES count + chainsaw-test.yaml cross-reference) so any hand-edit to a
# generated fixture fails the build before the cluster-bound e2e-operator job
# runs.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: c5c3-invalid-cr
spec:
  steps:
  # external set with explicit mode: Managed must be rejected (CEL).
  - try:
    - apply:
        file: 00-external-in-managed-explicit.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'may only be set when services.keystone.mode is External')): true
  # external set with mode unset (defaults Managed) must be rejected (CEL).
  - try:
    - apply:
        file: 01-external-in-managed-unset.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'may only be set when services.keystone.mode is External')): true
  # mode: External without the external block must be rejected (CEL).
  - try:
    - apply:
        file: 02-external-mode-without-external.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'external is required when services.keystone.mode is External')): true
  # spec.infrastructure in External mode must be rejected (webhook, cross-field).
  - try:
    - apply:
        file: 03-external-with-infrastructure.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'infrastructure')): true
            (contains($error, 'forbidden when services.keystone.mode is External')): true
  # services.horizon in External mode must be rejected (webhook, cross-field).
  - try:
    - apply:
        file: 04-external-with-horizon.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'horizon')): true
            (contains($error, 'forbidden when services.keystone.mode is External')): true
  # managed-only replicas in External mode must be rejected (CEL).
  - try:
    - apply:
        file: 05-external-replicas.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'services.keystone.replicas is forbidden when services.keystone.mode is External')): true
  # managed-only image in External mode must be rejected (CEL).
  - try:
    - apply:
        file: 06-external-image.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'services.keystone.image is forbidden when services.keystone.mode is External')): true
  # managed-only policyOverrides in External mode must be rejected (CEL).
  - try:
    - apply:
        file: 07-external-policy-overrides.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'services.keystone.policyOverrides is forbidden when services.keystone.mode is External')): true
  # managed-only rotationInterval in External mode must be rejected (CEL).
  - try:
    - apply:
        file: 08-external-rotation-interval.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'services.keystone.rotationInterval is forbidden when services.keystone.mode is External')): true
  # managed-only gateway in External mode must be rejected (CEL).
  - try:
    - apply:
        file: 09-external-gateway.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'services.keystone.gateway is forbidden when services.keystone.mode is External')): true
  # managed-only publicEndpoint in External mode must be rejected (CEL, P2).
  - try:
    - apply:
        file: 10-external-public-endpoint.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'services.keystone.publicEndpoint is forbidden when services.keystone.mode is External')): true
  # external without authURL must be rejected (CRD required field).
  - try:
    - apply:
        file: 11-external-authurl-missing.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'authURL')): true
  # external.authURL without an http(s) scheme must be rejected (CRD pattern).
  - try:
    - apply:
        file: 12-external-authurl-not-url.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'authURL')): true
  # external.endpointType outside the enum must be rejected (CRD enum).
  - try:
    - apply:
        file: 13-external-endpoint-type-invalid.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'endpointType')): true
  # external.caBundleSecretRef.name empty must be rejected (CRD MinLength).
  - try:
    - apply:
        file: 14-external-cabundle-empty-name.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'caBundleSecretRef')): true
  # services.keystone.federationProxyImage is a managed-only knob and must be
  # rejected in External mode, like every other managed-only field.
  - try:
    - apply:
        file: 19-federation-proxy-image-in-external.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'federationProxyImage')): true
  # services.horizon.publicEndpoint must be an http(s) URL: the WebSSO origin
  # derived from it is what Keystone matches verbatim.
  - try:
    - apply:
        file: 20-horizon-public-endpoint-not-a-url.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'publicEndpoint')): true
  # services.horizon.gateway.hostname must be a concrete DNS name. Gateway API
  # permits a wildcard here, but the WebSSO origin derived from it is compared
  # verbatim by Keystone and would match no dashboard.
  - try:
    - apply:
        file: 21-horizon-gateway-hostname-wildcard.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'gateway.hostname')): true
  # services.horizon.publicEndpoint must name the same host as the gateway
  # hostname: Django derives the origin it sends from the request Host header,
  # so a divergent host produces an origin Keystone rejects only after the user
  # has already authenticated at the identity provider.
  - try:
    - apply:
        file: 22-horizon-public-endpoint-host-mismatch.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'must equal services.horizon.gateway.hostname')): true
  # services.horizon.publicEndpoint must be a bare origin: the ^https?:// pattern
  # anchors only the prefix, so a query string passes the CRD gate and yields a
  # trusted origin Keystone accepts and never matches.
  - try:
    - apply:
        file: 23-horizon-public-endpoint-with-query.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'must be a bare origin')): true
  # An identity managed catalog entry must be rejected (CEL): that entry is owned
  # by the External-mode imports, so declaring it is the one way the creation
  # opt-in could clobber the external catalog's own identity row.
  - try:
    - apply:
        file: 24-external-catalog-identity-entry.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'managedEntries[0].type')): true
            (contains($error, 'owned by the External-mode imports')): true
  # A managed catalog entry type outside the DNS-1123 label shape must be rejected
  # (CRD pattern): the type names the child K-ORC CRs.
  - try:
    - apply:
        file: 25-external-catalog-entry-type-invalid.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'managedEntries[0].type')): true
            (contains($error, 'should match')): true
  # A managed catalog endpoint URL without an http(s) scheme must be rejected
  # (CRD pattern).
  - try:
    - apply:
        file: 26-external-catalog-endpoint-url-invalid.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'managedEntries[0].endpoints[0].url')): true
            (contains($error, 'should match')): true
  # Two endpoints of one entry sharing an interface must be rejected: endpoints is
  # a listType=map keyed on interface, so the apiserver — not the webhook —
  # enforces uniqueness. Assert the duplicate-value error, not merely the word
  # "interface", which Go's own `map[string]interface {}` rendering would satisfy.
  - try:
    - apply:
        file: 27-external-catalog-duplicate-interface.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'managedEntries[0].endpoints[1]')): true
            (contains($error, 'Duplicate value')): true
  # A managed catalog entry name carrying a comma must be rejected (CRD pattern):
  # the name is cast to K-ORC's OpenStackName, whose own pattern is ^[^,]+$, so
  # admitting it here would only move the rejection to the child K-ORC CR — where
  # it wedges the reconcile instead of failing at admission.
  - try:
    - apply:
        file: 28-external-catalog-entry-name-invalid.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'managedEntries[0].name')): true
            (contains($error, 'should match')): true
  # identityServiceName carrying a comma must be rejected (CRD pattern) for the
  # same reason as the entry name above: it is cast to K-ORC's OpenStackName on
  # the Service import filter, and OpenStack list filters are comma-separated,
  # which is exactly why that pattern forbids one.
  - try:
    - apply:
        file: 29-external-catalog-identity-service-name-invalid.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'identityServiceName')): true
            (contains($error, 'should match')): true
  # serviceAccounts[].name outside the DNS-1123 label shape must be rejected
  # (CRD pattern): the name keys the list and names the child K-ORC CRs.
  - try:
    - apply:
        file: 30-service-account-name-invalid.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'serviceAccounts[0].name')): true
            (contains($error, 'should match')): true
  # serviceAccounts[].project.name is required (CRD required-field check).
  - try:
    - apply:
        file: 31-service-account-missing-project-name.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'project.name')): true
  # An entry whose effective identity equals the admin identity must be rejected
  # by the webhook: a managed User would take over the admin user.
  - try:
    - apply:
        file: 32-service-account-admin-identity-collision.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'equals the admin identity')): true
  # Two entries resolving to the same (userName, domainName) must be rejected by
  # the webhook: they would project two managed Users onto one Keystone user.
  - try:
    - apply:
        file: 33-service-account-duplicate-identity.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'serviceAccounts[1].userName')): true
            (contains($error, 'Duplicate')): true
  # Two create:true entries naming one project in one domain must be rejected by
  # the webhook: each managed Project would adopt the other's row.
  - try:
    - apply:
        file: 34-service-account-duplicate-managed-project.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'serviceAccounts[1].project.name')): true
            (contains($error, 'Duplicate')): true
  # services.keystone.dedicatedBackingServices in External mode must be rejected
  # (CEL): an External ControlPlane provisions no backing services at all, so
  # there is nothing to make dedicated.
  - try:
    - apply:
        file: 35-dedicated-in-external.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'dedicatedBackingServices is forbidden when services.keystone.mode is External')): true
  # An empty dedicatedBackingServices block requests no backing-service class and
  # must be rejected (CEL). Omitting the block entirely is how a service shares.
  - try:
    - apply:
        file: 36-dedicated-empty-block.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'must declare at least one backing-service class')): true
  # credentialsMode Dynamic on a DEDICATED database must be rejected by the
  # webhook: the OpenBao database engine carries one connection and role per
  # namespace, bootstrapped against the SHARED cluster, so no engine role can
  # issue credentials for a dedicated instance. CEL cannot catch it — clusterRef
  # IS set, so the Dynamic-requires-managed-mode rule passes.
  - try:
    - apply:
        file: 37-dedicated-database-dynamic-credentials.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'credentialsMode Dynamic is not supported on a dedicated database')): true
  # A two-replica DEDICATED database cannot hold Galera quorum, exactly as a
  # two-replica shared one cannot (webhook; the CRD marker only enforces
  # Minimum=1).
  - try:
    - apply:
        file: 38-dedicated-database-replicas-two.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, '2 cannot hold a majority')): true
  # Two services' dedicated caches naming the same managed clusterRef must be
  # rejected by the webhook: both would resolve to one Memcached child CR that the
  # two projections then fight over, voiding the isolation the opt-in exists for.
  - try:
    - apply:
        file: 39-dedicated-clusterref-collision.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'dedicatedBackingServices.cache.clusterRef.name')): true
            (contains($error, 'Duplicate')): true
    # A namespace assignment in External mode is rejected by the CEL rule: no
    # Keystone workload is deployed, so there is nothing to place.
    - apply:
        file: 42-namespace-in-external-mode.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'services.keystone.namespace')): true
    # Two services co-located in one namespace must agree on its lifecycle: they
    # share that namespace's backing services and its tenant store, so one
    # declaration must not have the teardown delete what the other declared
    # untouchable.
    - apply:
        file: 43-namespace-lifecycle-conflict.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'must declare the same lifecycle')): true
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  # Own ephemeral namespace so the accepted base persists (see the sibling
  # transition waves).
  name: c5c3-invalid-cr-shared-to-dedicated
spec:
  steps:
  - try:
    # Base CR (Managed, sharing the ControlPlane-wide backing services — the
    # default) must be admitted.
    - apply:
        file: 40-transition-base-shared.yaml
    # Moving the live service onto dedicated backing services is rejected: the
    # flip would re-point the consuming child's immutable database fields at a
    # different instance while the previously-provisioned one keeps running with
    # the data still on it. Webhook-only (no CEL transition rule), so a later
    # transition feature can relax the freeze to a gated migration.
    - apply:
        file: 41-transition-to-dedicated.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'switching a service between shared and dedicated backing services')): true
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  # Own ephemeral namespace so the accepted base persists without tripping the
  # one-ControlPlane-per-namespace webhook against the other Tests.
  name: c5c3-invalid-cr-managed-to-external
spec:
  steps:
  - try:
    # Base CR (brownfield, staged-adoption, not External) must be admitted.
    - apply:
        file: 15-transition-base-managed.yaml
    # Flipping the live ControlPlane to External mode is rejected outright.
    - apply:
        file: 16-transition-to-external.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'cannot be changed to External')): true
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: c5c3-invalid-cr-external-to-managed
spec:
  steps:
  - try:
    # The minimal External sketch CR must be admitted (acceptance proof).
    - apply:
        file: 17-transition-base-external.yaml
    # Switching the live External ControlPlane to Managed is rejected with the
    # reserved phase-3 takeover message.
    - apply:
        file: 18-transition-to-managed.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'phase-3')): true
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  # Own ephemeral namespace so the accepted base persists (see the sibling
  # transition waves).
  name: c5c3-invalid-cr-namespace-freeze
spec:
  steps:
  - try:
    # Base CR (Managed, Keystone placed in a pre-existing namespace it does not
    # own) must be admitted. The External lifecycle means the operator never
    # creates that namespace, so the CR parks on NamespaceNotFound and provisions
    # nothing — no side effects for the rejection step to clean up.
    - apply:
        file: 44-transition-base-namespaced.yaml
    # Dropping the namespace assignment from the live ControlPlane is rejected:
    # the assignment is create-only, because moving a live service across
    # namespaces would strand its backing services, its secret store, and every
    # OpenBao path scoped to the old namespace.
    - apply:
        file: 45-transition-remove-namespace.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'the namespace a service is placed in is immutable')): true
