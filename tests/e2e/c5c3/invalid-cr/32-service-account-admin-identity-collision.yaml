# A service account whose effective (userName, domainName) equals the admin
# identity is rejected by the webhook: a managed User would take over the
# admin user and rotate its password.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-sa-admin-collision
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
    serviceAccounts:
    - name: nova
      userName: admin
      domainName: Default
      project:
        name: service
