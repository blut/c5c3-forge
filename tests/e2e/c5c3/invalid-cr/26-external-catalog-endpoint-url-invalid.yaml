# external.catalog.managedEntries[].endpoints[].url without an http(s) scheme
# is rejected (CRD pattern).
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-external-catalog-bad-url
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
        catalog:
          managedEntries:
          - type: image
            endpoints:
            - interface: public
              url: glance.example.com
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
