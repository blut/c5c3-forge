# spec.korc.serviceAccounts[].targetNamespace naming a namespace that is
# neither the ControlPlane's own nor one assigned to a service via
# spec.services.<svc>.namespace is rejected by the webhook: the consumer
# credentials Secret is delivered through that namespace's openbao-tenant-store,
# and none is provisioned for a namespace the ControlPlane neither owns nor
# placed a service in. The knob is inert this commit — the rule guards it before
# the delivery reconciler wiring lands.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-sa-target-namespace-unassigned
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
    serviceAccounts:
    - name: nova
      targetNamespace: shared-services
      project:
        name: service
