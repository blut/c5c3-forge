# services.keystone.replicas is forbidden in External mode (CEL).
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-external-replicas
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
      replicas: 3
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
