# services.keystone.external set with mode unset (defaults Managed)
# violates the CEL rule after the mode default is applied.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-external-unset-mode
spec:
  openStackRelease: "2025.2"
  infrastructure:
    database:
      host: db.example.com
      database: openstack
      secretRef:
        name: db-creds
    cache:
      backend: dogpile.cache.pymemcache
      servers:
      - mc:11211
  services:
    keystone:
      external:
        authURL: https://keystone.example.com/v3
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
