# Two create:true service accounts naming the same project in one domain are
# rejected by the webhook: each managed Project would adopt the other's row.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-sa-dup-managed-project
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
    serviceAccounts:
    - name: nova
      project:
        name: service
        create: true
    - name: glance
      project:
        name: service
        create: true
