# mode: External without the external block violates the CEL rule.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-external-no-block
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
