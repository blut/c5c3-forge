# services.horizon.publicEndpoint with a non-http(s) scheme violates the CRD
# pattern. Keystone matches the derived WebSSO origin verbatim, so an
# unusable endpoint could never match any dashboard.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-horizon-bad-endpoint
spec:
  openStackRelease: "2025.2"
  infrastructure:
    database:
      host: db.example.com
      database: openstack
      secretRef:
        name: db-creds
    cache:
      backend: dogpile.cache.pymemcache
      servers:
      - mc:11211
  services:
    keystone:
      mode: Managed
    horizon:
      publicEndpoint: ftp://horizon.example.com
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
