# spec.korc.serviceAccounts[].project.name is required (CRD required-field
# check and webhook): every account is associated with a project.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-sa-no-project-name
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
    serviceAccounts:
    - name: nova
      project: {}
