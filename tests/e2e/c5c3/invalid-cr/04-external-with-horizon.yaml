# services.horizon set in External mode is forbidden by the webhook (P2, cross-field).
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-external-with-horizon
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
    horizon: {}
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
