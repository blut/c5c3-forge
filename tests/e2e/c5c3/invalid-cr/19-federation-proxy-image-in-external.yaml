# services.keystone.federationProxyImage in External mode violates the CEL rule:
# no Keystone workload is deployed, so there is no sidecar to image.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-external-proxy-image
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
      federationProxyImage:
        repository: ghcr.io/c5c3/keystone-federation-proxy
        tag: dev
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
