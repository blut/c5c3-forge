# credentialsMode Dynamic on a DEDICATED database is rejected by the webhook: the
# OpenBao database engine carries one connection and one role per namespace,
# bootstrapped against the SHARED cluster, so no engine role can issue credentials
# for a dedicated instance — an admitted CR would wedge on an ExternalSecret that
# can never sync. The CRD CEL rule does not catch it (clusterRef IS set, so the
# Dynamic-requires-managed-mode rule passes).
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-dedicated-dynamic
spec:
  openStackRelease: "2025.2"
  infrastructure:
    database:
      host: db.example.com
      database: openstack
      secretRef:
        name: db-creds
    cache:
      backend: dogpile.cache.pymemcache
      servers:
      - mc:11211
  services:
    keystone:
      mode: Managed
      dedicatedBackingServices:
        database:
          clusterRef:
            name: cp-dedicated-db
          credentialsMode: Dynamic
          database: keystone
          secretRef:
            name: keystone-db
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
