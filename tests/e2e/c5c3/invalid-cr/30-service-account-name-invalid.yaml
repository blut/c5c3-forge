# spec.korc.serviceAccounts[].name outside the DNS-1123 label shape is
# rejected (CRD pattern): the name keys the list and names the child K-ORC
# CRs and Secrets.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: cp-sa-bad-name
spec:
  openStackRelease: "2025.2"
  services:
    keystone:
      mode: External
      external:
        authURL: https://keystone.example.com/v3
  korc:
    adminCredential:
      cloudCredentialsRef:
        cloudName: admin
      passwordSecretRef:
        name: external-admin
        key: password
    serviceAccounts:
    - name: Nova_Service
      project:
        name: service
