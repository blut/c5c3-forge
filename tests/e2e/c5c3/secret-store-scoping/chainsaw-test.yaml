# Chainsaw E2E test for per-ControlPlane OpenBao identity / secret-store scoping
# (#605). It exercises the half of the feature that unit and integration tests
# CANNOT reach: the real OpenBao identity a ControlPlane gets through a namespaced
# SecretStore, and OpenBao's own enforcement of cross-tenant isolation via the
# eso-tenant Kubernetes auth role and the eso-tenant templated policy.
#
# The ControlPlane→Keystone/Horizon projection and the SecretsReady gating are
# already covered by the c5c3 operator integration test
# (TestIntegration_SecretStoreRefProjectedAndGated) and the keystone/horizon
# integration tests, so this suite deliberately focuses on what only a live
# OpenBao can prove:
#
#   1. setup-eso-tenant.sh provisions the tenant ServiceAccount, mTLS Certificate,
#      and namespaced SecretStore "openbao-tenant-store" in the test namespace;
#   2. that SecretStore reaches Ready=True — proving the eso-tenant role + policy
#      + mTLS actually authenticate the per-tenant identity against OpenBao;
#   3. a token minted from the tenant's eso-tenant-auth SA can read ITS OWN
#      namespace's Keystone key path but is DENIED on another namespace's path,
#      because the eso-tenant policy templates every path to the caller's own
#      service_account_namespace. This is the OpenBao-enforced isolation that
#      replaces the naming-convention "isolation" the issue set out to fix;
#   4. the shared eso-management identity is DENIED both READ and WRITE on a
#      Keystone key path (#606 retired the push-* write policies and dropped
#      eso-management's openstack/keystone/* read) while still reading the retained
#      shared bootstrap subtree — the confused-deputy grants are gone;
#   5. an ExternalSecret referencing the shared openbao-cluster-store from this
#      non-allow-listed namespace never goes Ready, because #606 restricted the
#      cluster store with spec.conditions to the static-manifest namespace(s);
#   6. a FIRST PushSecret through the operator-default tenant store to a
#      NEVER-SEEDED per-CP app-credential path (the External-mode app-credential
#      round-trip runs on exactly this shape) creates the leaf and lets ESO stamp
#      managed-by=external-secrets ITSELF (the managed-by guard's inverse), the
#      read-back materialises the exact value, and DeletionPolicy: Delete purges
#      the leaf via the eso-tenant delete grant — with zero seeded state and
#      nothing per-CP beyond the one-time cluster bootstrap.
#
# ── Presence + capability guard ──────────────────────────────────────────────
# Like the sibling db-credential-scoping / multi-controlplane suites, the
# c5c3-operator + OpenBao stack this test spans is not installed by every kind
# E2E wiring, and the suite runs under execution.failFast: true, so a pure
# declarative test would hard-fail every cluster missing that stack. A runtime
# guard probes for the required CRDs, the OpenBao ClusterSecretStore, the
# openbao-ca-issuer ClusterIssuer, and — crucially — the eso-tenant auth role
# (which only exists once setup-auth.sh has run WITH this feature). It exits 0
# with a SKIP line when any prerequisite is absent, so a cluster bootstrapped
# before this feature (no eso-tenant role) skips cleanly instead of failing.
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: secret-store-scoping
spec:
  # No fixed spec.namespace: chainsaw runs this Test in its own ephemeral
  # namespace and injects it as $NAMESPACE. The ephemeral namespace becomes the
  # tenant namespace, so the eso-tenant policy templates the tenant token to it.
  timeouts:
    assert: 5m
    # 15m exec/script budget: checks 1-5 worst-case ~5-6m (240s store-Ready +
    # 30s cluster-store window + probes) and check 6 adds ~5-6m (120s push-Ready
    # + 120s read-back-Ready + 90s purge), so ~12m worst case with margin.
    exec: 15m
  steps:
  - try:
    - script:
        timeout: 15m
        shell: bash
        content: |
          set -euo pipefail

          TENANT_NS="${NAMESPACE}"
          STORE_NAME=openbao-tenant-store

          BAO_NS="openbao-system"
          BAO_POD="openbao-0"
          BAO_ADDR="https://127.0.0.1:8200"
          VAULT_CACERT="/openbao/tls/ca.crt"

          # ── Presence + capability guard ─────────────────────────────────────
          missing=""
          for crd in \
            controlplanes.c5c3.io \
            secretstores.external-secrets.io \
            certificates.cert-manager.io \
            clusterissuers.cert-manager.io; do
            if ! kubectl get crd "$crd" >/dev/null 2>&1; then
              missing="${missing} ${crd}"
            fi
          done
          if [ -n "${missing}" ]; then
            echo "SKIP: required CRDs not present:${missing}"
            echo "      The c5c3-operator + OpenBao + cert-manager stack is not"
            echo "      deployed here, so per-tenant secret-store scoping cannot be"
            echo "      exercised."
            exit 0
          fi
          if ! kubectl get clustersecretstore openbao-cluster-store >/dev/null 2>&1; then
            echo "SKIP: openbao-cluster-store ClusterSecretStore not present."
            exit 0
          fi
          if ! kubectl get clusterissuer openbao-ca-issuer >/dev/null 2>&1; then
            echo "SKIP: openbao-ca-issuer ClusterIssuer not present; the tenant"
            echo "      mTLS Certificate cannot be issued."
            exit 0
          fi
          if ! kubectl get pod "${BAO_POD}" -n "${BAO_NS}" >/dev/null 2>&1; then
            echo "SKIP: ${BAO_NS}/${BAO_POD} not present."
            exit 0
          fi

          # Root token for the setup + isolation probes.
          BAO_TOKEN="$(kubectl get secret openbao-init-keys -n "${BAO_NS}" \
            -o jsonpath='{.data.init-output}' | base64 -d | jq -r '.root_token')"
          if [ -z "${BAO_TOKEN}" ] || [ "${BAO_TOKEN}" = "null" ]; then
            echo "SKIP: could not extract the OpenBao root token."
            exit 0
          fi

          # bao_exec runs a bao command inside openbao-0 with the mTLS client
          # material (the OpenBao listener requires a client cert).
          bao_exec() {
            kubectl exec -n "${BAO_NS}" "${BAO_POD}" -- \
              env BAO_ADDR="${BAO_ADDR}" BAO_TOKEN="${BAO_TOKEN}" \
              VAULT_CACERT="${VAULT_CACERT}" \
              VAULT_CLIENT_CERT=/openbao/client-tls/tls.crt \
              VAULT_CLIENT_KEY=/openbao/client-tls/tls.key "$@"
          }

          # The eso-tenant auth role only exists once setup-auth.sh has run WITH
          # this feature. On a cluster bootstrapped before #605 it is absent — SKIP
          # rather than fail, so this suite lands green on such clusters.
          if ! bao_exec bao read auth/kubernetes/management/role/eso-tenant >/dev/null 2>&1; then
            echo "SKIP: the eso-tenant auth role is not configured on this OpenBao"
            echo "      (bootstrap predates #605). Re-run setup-auth.sh /"
            echo "      setup-policies.sh to enable per-tenant identities."
            exit 0
          fi
          echo "OK: prerequisites present — running per-tenant secret-store scoping."

          # ── 1. Provision the per-tenant identity ────────────────────────────
          # Chainsaw runs scripts with the test directory as CWD.
          ../../../../deploy/openbao/bootstrap/setup-eso-tenant.sh "${TENANT_NS}"

          # ── 2. The namespaced SecretStore must reach Ready ──────────────────
          # A Ready store proves the eso-tenant role + policy + mTLS authenticate
          # the per-tenant identity end-to-end.
          deadline=$(( $(date +%s) + 240 ))
          while true; do
            status="$(kubectl get secretstore "${STORE_NAME}" -n "${TENANT_NS}" \
              -o "jsonpath={.status.conditions[?(@.type=='Ready')].status}" 2>/dev/null || true)"
            if [ "${status}" = "True" ]; then
              echo "OK: SecretStore ${STORE_NAME} Ready=True — the per-tenant identity authenticates"
              break
            fi
            if [ "$(date +%s)" -ge "${deadline}" ]; then
              echo "ERROR: SecretStore ${STORE_NAME} Ready not True within 240s (last: '${status:-<none>}')"
              exit 1
            fi
            sleep 5
          done

          # ── 3. OpenBao-enforced cross-tenant isolation ──────────────────────
          # The eso-tenant policy templates every path to the caller's OWN
          # service_account_namespace. Seed a secret in the tenant's own subtree
          # and one in a foreign namespace's subtree (as root), then prove the
          # tenant token reads its own but is DENIED on the foreign one.
          FOREIGN_NS="secret-store-scoping-foreign"
          # Logical KV-v2 paths (no data/ segment) for the root seed writes via
          # `bao kv put`; the raw data-API paths (with data/) are what the tenant
          # token probes, so those hit exactly the leaf the eso-tenant policy
          # templates — no `bao kv` mount preflight in the capability checks.
          OWN_KV="openstack/keystone/${TENANT_NS}/probe/fernet-keys"
          FOREIGN_KV="openstack/keystone/${FOREIGN_NS}/probe/fernet-keys"
          OWN_PATH="kv-v2/data/${OWN_KV}"
          FOREIGN_PATH="kv-v2/data/${FOREIGN_KV}"

          # Seed as root with `bao kv put`, which wraps the fields under the
          # data: object the KV-v2 data endpoint requires; a raw
          # `bao write kv-v2/data/... k=v` sends {"k":"v"} and OpenBao rejects it
          # with 400 "no data provided".
          bao_exec bao kv put -mount=kv-v2 "${OWN_KV}" data-0=own-probe >/dev/null
          bao_exec bao kv put -mount=kv-v2 "${FOREIGN_KV}" data-0=foreign-probe >/dev/null

          # Mint a JWT for the tenant's eso-tenant-auth SA and log in as eso-tenant.
          TENANT_JWT="$(kubectl create token eso-tenant-auth -n "${TENANT_NS}" --duration=10m)"
          TENANT_TOKEN="$(bao_exec bao write -field=token \
            auth/kubernetes/management/login role=eso-tenant jwt="${TENANT_JWT}")"
          if [ -z "${TENANT_TOKEN}" ]; then
            echo "ERROR: eso-tenant login returned no token"; exit 1
          fi

          # Own path MUST read — proves the login + policy grant work, so the deny
          # check below cannot pass vacuously on a broken login.
          if ! bao_exec env BAO_TOKEN="${TENANT_TOKEN}" bao read "${OWN_PATH}" >/dev/null 2>&1; then
            echo "ERROR: tenant token could not read its OWN path ${OWN_PATH}"; exit 1
          fi
          echo "OK: tenant token reads its own namespace path"

          # Foreign path MUST be denied by the templated policy.
          if bao_exec env BAO_TOKEN="${TENANT_TOKEN}" bao read "${FOREIGN_PATH}" >/dev/null 2>&1; then
            echo "ERROR: tenant token READ a foreign namespace path ${FOREIGN_PATH}; cross-tenant isolation is broken"
            exit 1
          fi
          echo "OK: tenant token denied on a foreign namespace path — OpenBao-enforced isolation holds"

          # ── 4. The shared eso-management identity must NOT reach Keystone key
          #       material (#606) ────────────────────────────────────────────────
          # #606 retired the three wildcard write policies (push-keystone-keys /
          # push-keystone-admin / push-app-credentials) and dropped eso-management's
          # openstack/keystone/* read. Prove the shared identity can neither READ nor
          # WRITE a Keystone key path any longer — the confused-deputy grants are gone.
          ESOMGMT_JWT="$(kubectl create token external-secrets -n external-secrets --duration=10m)"
          ESOMGMT_TOKEN="$(bao_exec bao write -field=token \
            auth/kubernetes/management/login role=eso-management jwt="${ESOMGMT_JWT}")"
          if [ -z "${ESOMGMT_TOKEN}" ]; then
            echo "ERROR: eso-management login returned no token"; exit 1
          fi
          # READ of a Keystone key path MUST be denied (the openstack/keystone/* read is gone).
          if bao_exec env BAO_TOKEN="${ESOMGMT_TOKEN}" bao read "${OWN_PATH}" >/dev/null 2>&1; then
            echo "ERROR: eso-management READ a Keystone key path ${OWN_PATH}; the retired openstack/keystone/* read survived"
            exit 1
          fi
          echo "OK: eso-management denied READ on a Keystone key path — the shared read grant is retired"
          # WRITE of a Keystone key path MUST be denied (the push-keystone-keys write is gone).
          if bao_exec env BAO_TOKEN="${ESOMGMT_TOKEN}" \
            bao kv put -mount=kv-v2 "${OWN_KV}" data-0=shared-should-fail >/dev/null 2>&1; then
            echo "ERROR: eso-management WROTE a Keystone key path ${OWN_KV}; a retired push-* write grant survived"
            exit 1
          fi
          echo "OK: eso-management denied WRITE on a Keystone key path — the shared write grants are retired"
          # Sanity: eso-management CAN still read the genuinely shared bootstrap
          # subtree, proving the login works so the two deny checks above cannot pass
          # vacuously on a broken login.
          bao_exec bao kv put -mount=kv-v2 "bootstrap/${TENANT_NS}/probe/admin" data-0=b >/dev/null
          if ! bao_exec env BAO_TOKEN="${ESOMGMT_TOKEN}" \
            bao read "kv-v2/data/bootstrap/${TENANT_NS}/probe/admin" >/dev/null 2>&1; then
            echo "ERROR: eso-management could not read the retained bootstrap/* subtree; login or policy is broken"
            exit 1
          fi
          echo "OK: eso-management still reads the retained shared bootstrap subtree"

          # ── 5. The shared cluster store must REJECT a reference from a
          #       non-allow-listed namespace (#606) ───────────────────────────────
          # #606 added spec.conditions to openbao-cluster-store restricting it to the
          # static-manifest namespace(s). This ephemeral tenant namespace is not on
          # that allow-list, so an ExternalSecret here referencing the cluster store
          # must never go Ready.
          kubectl apply -f - <<EOF
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: shared-store-denied
            namespace: ${TENANT_NS}
          spec:
            refreshInterval: 10s
            secretStoreRef:
              name: openbao-cluster-store
              kind: ClusterSecretStore
            target:
              name: shared-store-denied
            data:
              - secretKey: v
                remoteRef:
                  key: bootstrap/${TENANT_NS}/probe/admin
                  property: data-0
          EOF
          # It must stay NotReady: the store conditions reject the reference. 30s is a
          # generous window for ESO to reconcile it (refreshInterval is 10s).
          sleep 30
          es_ready="$(kubectl get externalsecret shared-store-denied -n "${TENANT_NS}" \
            -o "jsonpath={.status.conditions[?(@.type=='Ready')].status}" 2>/dev/null || true)"
          kubectl delete externalsecret shared-store-denied -n "${TENANT_NS}" --ignore-not-found >/dev/null 2>&1 || true
          if [ "${es_ready}" = "True" ]; then
            echo "ERROR: an ExternalSecret in ${TENANT_NS} synced through openbao-cluster-store; the namespace conditions did not restrict it"
            exit 1
          fi
          echo "OK: openbao-cluster-store rejected the reference from the non-allow-listed namespace"

          # ── 6. First push to a NEVER-SEEDED per-CP path (ESO managed-by guard
          #       inverse) ─────────────────────────────────────────────────────
          # The External-mode app-credential round-trip runs on a per-CP path no
          # seeding script ever writes: openstack/keystone/{ns}/{cp}/admin/
          # app-credential (adminAppCredentialRemoteKeyFor in korc_eso.go). This
          # check proves the OpenBao-side half of that round-trip on a path with
          # ZERO seeded state, reusing the operator-default tenant store check 1
          # provisioned: ESO's FIRST PushSecret CREATES the leaf and stamps
          # custom_metadata.managed-by=external-secrets ITSELF (the managed-by guard
          # only rejects a pre-existing UNMARKED leaf, so a first push always
          # succeeds — the inverse of write-bootstrap-secrets.sh's mark_eso_managed),
          # the read-back ExternalSecret materialises the exact value, and
          # DeletionPolicy: Delete drives the eso-tenant delete grant to purge it.
          # Nothing per-CP beyond the one-time cluster bootstrap is required.
          #
          # wait_ready <kind> <name> <timeout-seconds>: poll the namespaced
          # resource in the tenant namespace until its Ready condition is True,
          # or fail the step once the deadline passes (a still-unset condition
          # counts as a timeout, never a pass). Callers print their own "OK:" line.
          wait_ready() {
            local kind="$1" name="$2" timeout="$3" deadline status
            deadline=$(( $(date +%s) + timeout ))
            while true; do
              status="$(kubectl get "${kind}" "${name}" -n "${TENANT_NS}" \
                -o "jsonpath={.status.conditions[?(@.type=='Ready')].status}" 2>/dev/null || true)"
              [ "${status}" = "True" ] && return 0
              if [ "$(date +%s)" -ge "${deadline}" ]; then
                echo "ERROR: ${kind}/${name} Ready not True within ${timeout}s (last: '${status:-<none>}')"
                exit 1
              fi
              sleep 5
            done
          }

          PROBE_KV="openstack/keystone/${TENANT_NS}/probe-cp/admin/app-credential"
          PROBE_SRC=probe-app-credential
          PROBE_PUSH=probe-app-credential-backup
          PROBE_ES=probe-app-credential-readback
          # Fixed marker: the never-seeded precondition below proves nothing was at
          # this path before, so an exact-match read-back can only observe THIS
          # value if the full push -> materialise round-trip worked.
          MARKER="unseeded-first-push-probe-value"

          # (a) Never-seeded precondition: the path MUST NOT exist yet, else the
          #     round-trip below would be a vacuous false-positive on stale state.
          if bao_exec bao kv get -mount=kv-v2 "${PROBE_KV}" >/dev/null 2>&1; then
            echo "ERROR: ${PROBE_KV} already exists; the never-seeded precondition is violated"
            exit 1
          fi
          echo "OK: ${PROBE_KV} is never-seeded — first push starts from zero state"

          # (b) Source Secret whose whole content the PushSecret mirrors (the c5c3
          #     admin-AC PushSecret pushes the source Secret WHOLE, no Match.SecretKey).
          kubectl create secret generic "${PROBE_SRC}" -n "${TENANT_NS}" \
            --from-literal=clouds.yaml="${MARKER}"

          # (c) First push through the operator-default per-tenant store.
          #     deletionPolicy Delete + whole-secret match mirror adminAppCredentialPushSecret.
          kubectl apply -f - <<EOF
          apiVersion: external-secrets.io/v1alpha1
          kind: PushSecret
          metadata:
            name: ${PROBE_PUSH}
            namespace: ${TENANT_NS}
          spec:
            deletionPolicy: Delete
            refreshInterval: 10s
            secretStoreRefs:
              - name: ${STORE_NAME}
                kind: SecretStore
            selector:
              secret:
                name: ${PROBE_SRC}
            data:
              - match:
                  remoteRef:
                    remoteKey: ${PROBE_KV}
          EOF
          wait_ready pushsecret "${PROBE_PUSH}" 120
          echo "OK: first PushSecret to the never-seeded path reached Ready=True"

          # (d) ESO must have CREATED the path and stamped the managed-by guard
          #     marker ITSELF — the inverse of the pre-seed mark_eso_managed stamp.
          if ! bao_exec bao kv metadata get -format=json -mount=kv-v2 "${PROBE_KV}" \
               | jq -e '.data.custom_metadata."managed-by" == "external-secrets"' >/dev/null; then
            echo "ERROR: ESO did not stamp managed-by=external-secrets on the first push to ${PROBE_KV}"
            exit 1
          fi
          echo "OK: ESO stamped custom_metadata.managed-by=external-secrets on the first push"

          # (e) Read-back through the same tenant store must materialise the EXACT
          #     pushed value (mirrors the k-orc-clouds-yaml ExternalSecret, property
          #     clouds.yaml).
          kubectl apply -f - <<EOF
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: ${PROBE_ES}
            namespace: ${TENANT_NS}
          spec:
            refreshInterval: 10s
            secretStoreRef:
              name: ${STORE_NAME}
              kind: SecretStore
            target:
              name: ${PROBE_ES}
            data:
              - secretKey: clouds.yaml
                remoteRef:
                  key: ${PROBE_KV}
                  property: clouds.yaml
          EOF
          wait_ready externalsecret "${PROBE_ES}" 120
          got="$(kubectl get secret "${PROBE_ES}" -n "${TENANT_NS}" \
            -o "jsonpath={.data.clouds\.yaml}" 2>/dev/null | base64 -d || true)"
          if [ "${got}" != "${MARKER}" ]; then
            echo "ERROR: read-back materialised '${got}', expected '${MARKER}' — round-trip broken"
            exit 1
          fi
          echo "OK: read-back materialised the exact pushed value — full round-trip verified"

          # (f) DeletionPolicy: Delete teardown. Deleting the PushSecret drives ESO's
          #     finalizer to remove the data leaf via the eso-tenant delete grant.
          #     For the app-credential shape the eso-tenant policy grants delete on
          #     the DATA leaf but NOT the metadata path, so ESO soft-deletes the data
          #     (the leaf then reports data:null); a hypothetical hard delete would
          #     make kv get fail outright. Either outcome proves the delete grant
          #     drove the purge, so accept both — a leaf still holding the pushed
          #     value fails the poll and surfaces a real regression.
          kubectl delete externalsecret "${PROBE_ES}" -n "${TENANT_NS}" --ignore-not-found >/dev/null 2>&1 || true
          kubectl delete pushsecret "${PROBE_PUSH}" -n "${TENANT_NS}" --ignore-not-found >/dev/null 2>&1 || true
          deadline=$(( $(date +%s) + 90 ))
          purged=0
          while [ "$(date +%s)" -lt "${deadline}" ]; do
            if json="$(bao_exec bao kv get -format=json -mount=kv-v2 "${PROBE_KV}" 2>/dev/null)"; then
              if echo "${json}" | jq -e '.data.data == null' >/dev/null 2>&1; then
                purged=1
                break
              fi
            else
              purged=1
              break
            fi
            sleep 3
          done
          if [ "${purged}" -ne 1 ]; then
            echo "ERROR: ${PROBE_KV} still holds a live value 90s after PushSecret deletion; DeletionPolicy: Delete / the eso-tenant delete grant did not purge it"
            exit 1
          fi
          echo "OK: DeletionPolicy: Delete purged the never-seeded leaf via the eso-tenant delete grant"

          # Best-effort teardown of the probe source Secret + the KV metadata the
          # soft-delete leaves behind (a root metadata delete clears it).
          kubectl delete secret "${PROBE_SRC}" -n "${TENANT_NS}" --ignore-not-found >/dev/null 2>&1 || true
          bao_exec bao kv metadata delete -mount=kv-v2 "${PROBE_KV}" >/dev/null 2>&1 || true

          # Best-effort cleanup of the probe secrets (KV-v2 hard delete).
          bao_exec bao kv metadata delete -mount=kv-v2 "${OWN_KV}" >/dev/null 2>&1 || true
          bao_exec bao kv metadata delete -mount=kv-v2 "${FOREIGN_KV}" >/dev/null 2>&1 || true
          bao_exec bao kv metadata delete -mount=kv-v2 "bootstrap/${TENANT_NS}/probe/admin" >/dev/null 2>&1 || true

          echo "OK: per-ControlPlane OpenBao identity and secret-store scoping verified."
    catch:
    - script:
        shell: bash
        content: |
          echo "=== SecretStore openbao-tenant-store ==="
          kubectl describe secretstore openbao-tenant-store -n "$NAMESPACE" 2>&1 || true
          echo "=== Certificate eso-tenant-client-tls ==="
          kubectl describe certificate eso-tenant-client-tls -n "$NAMESPACE" 2>&1 || true
          echo "=== PushSecret probe-app-credential-backup (check 6) ==="
          kubectl describe pushsecret probe-app-credential-backup -n "$NAMESPACE" 2>&1 || true
          echo "=== ExternalSecret probe-app-credential-readback (check 6) ==="
          kubectl describe externalsecret probe-app-credential-readback -n "$NAMESPACE" 2>&1 || true
          echo "=== Secret probe-app-credential-readback (check 6; dummy values) ==="
          kubectl get secret probe-app-credential-readback -n "$NAMESPACE" -o yaml 2>&1 || true
          echo "=== external-secrets controller logs (last 100 lines) ==="
          kubectl logs -n external-secrets -l app.kubernetes.io/name=external-secrets --tail=100 --all-containers 2>&1 || true
          echo "=== OpenBao logs (last 100 lines) ==="
          kubectl logs -n openbao-system openbao-0 --tail=100 2>&1 || true
          echo "=== Events ($NAMESPACE, last 30) ==="
          kubectl get events -n "$NAMESPACE" --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
