# OpenStack client verification Job for the full-controlplane-keystone E2E test
# (Link 7b). It authenticates with the materialised admin
# clouds.yaml (the minted, OpenBao-round-tripped application credential
# delivered to the per-CR k-orc-clouds-yaml Secret by the credential chain) and
# runs `openstack token issue` + `openstack catalog list` to prove the
# credential actually works end-to-end and the identity service is catalogued.
#
# the orc-system copy of k-orc-clouds-yaml was removed; the
# operator now materialises the per-CR k-orc-clouds-yaml Secret ONLY into the
# ControlPlane namespace (openstack). This Job therefore runs in the
# ControlPlane namespace `openstack` and mounts the operator-owned per-CR
# k-orc-clouds-yaml Secret materialised there. Applied by the chainsaw script
# via `kubectl apply -f` after the chain has converged, and deleted in the
# test's `finally` block.
#
# DECISION image is the repo's own tempest image, which bundles the
# OpenStack client. The e2e-controlplane CI job loads ghcr.io/c5c3/tempest:2025.2
# into kind (the tag CI builds — there is no :latest), so the image is pinned to
# that tag with imagePullPolicy: IfNotPresent to use the kind-loaded copy rather
# than pulling from GHCR. Behind the chainsaw presence guard the verify step
# never runs on a cluster that lacks the stack. The `admin` cloud entry name is
# the cloudName K-ORC writes into the clouds.yaml (spec.korc.adminCredential in
# 00-controlplane-cr.yaml).
apiVersion: batch/v1
kind: Job
metadata:
  name: cp-openstack-verify
  namespace: openstack
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: osc
          image: ghcr.io/c5c3/tempest:2025.2
          imagePullPolicy: IfNotPresent
          env:
            - name: OS_CLIENT_CONFIG_FILE
              value: /etc/openstack/clouds.yaml
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "== openstack --os-cloud admin token issue =="
              openstack --os-cloud admin token issue
              echo "== openstack --os-cloud admin catalog list =="
              openstack --os-cloud admin catalog list
          volumeMounts:
            - name: clouds
              mountPath: /etc/openstack
              readOnly: true
      volumes:
        - name: clouds
          secret:
            secretName: k-orc-clouds-yaml
