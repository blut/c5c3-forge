# Per-ControlPlane ExternalSecret for the Horizon Django SECRET_KEY.
# The projected Horizon child's default secretKeyRef points at the kind shim
# "horizon-secret-key", which reads the DEFAULT identity's OpenBao path — but
# this suite runs against CONTROLPLANE_NAME=controlplane-keystone, whose seed
# lands at bootstrap/openstack/controlplane-keystone-horizon/secret-key. This
# fixture exercises exactly the documented multi-ControlPlane override:
# services.horizon.secretKeyRef points at this per-CP Secret.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: controlplane-keystone-horizon-secret-key
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: controlplane-keystone-horizon-secret-key
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: bootstrap/openstack/controlplane-keystone-horizon/secret-key
        property: secret-key
