# Chainsaw E2E test for per-ControlPlane admin-password scoping
# It applies the canonical ControlPlane
# ("controlplane" in namespace "openstack") and asserts that the c5c3-operator's
# reconcileAdminPassword sub-reconciler projects a per-ControlPlane,
# OpenBao-backed admin password:
#
#   - an ExternalSecret named "controlplane-keystone-admin-credentials" in the
#     ControlPlane namespace, owned by the ControlPlane, whose single "password"
#     remoteRef reads the per-CP OpenBao key
#     "bootstrap/openstack/controlplane-keystone/admin"
#     ( = bootstrap/{cp.Namespace}/{keystoneName(cp)}/admin ) at property
#     "password"; and
#   - the materialised Secret of the same name carrying the "password" key ESO
#     synced from that path.
#
# The per-CP path is what the deploy-infra seed writes for the default identity
# at bootstrap/{ns}/{keystoneName}/admin
# (deploy/openbao/bootstrap/write-bootstrap-secrets.sh); it is keystone-NAME
# scoped (not cp-name scoped) so it matches the keystone-operator Model B
# rotation PushSecret, which reads/writes the admin password at the same path.
#
# ── DECISION: belt-and-braces presence guard + single consolidated script ────
# Mirrors tests/e2e/c5c3/full-controlplane-keystone: the c5c3-operator + OpenBao
# stack the admin-password link spans is NOT installed by the current kind E2E
# wiring (hack/deploy-infra.sh + hack/ci-deploy-operator.sh), and the suite runs
# under execution.failFast: true (tests/e2e/chainsaw-config.yaml), so a pure
# declarative `assert` test would HARD-FAIL every cluster missing that stack —
# including the PR that introduces this file. A runtime presence guard probes for
# the required CRDs + the OpenBao ClusterSecretStore and exits 0 with a SKIP line
# when the stack is absent; when present it asserts the link. Because chainsaw has
# no step-level skip, the guard and all assertions live in ONE script step.
# Reviewer: please verify, and note that wiring the c5c3-operator + OpenBao into
# kind E2E (so this test exercises rather than skips) is the documented
# fast-follow (/).
#
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: admin-password-scoping
spec:
  namespace: openstack
  timeouts:
    assert: 5m
    exec: 10m
  steps:
  # ── Step 1: Presence-gate, apply the ControlPlane, assert the admin link ───
  - try:
    - script:
        timeout: 10m
        # Chainsaw defaults to `sh`, which rejects `set -o pipefail`; every
        # infra/keystone e2e script pins bash for the same reason.
        shell: bash
        content: |
          set -euo pipefail

          CP_NS=openstack
          CP_NAME=controlplane
          ADMIN_SECRET=controlplane-keystone-admin-credentials
          ADMIN_REMOTE_KEY=bootstrap/openstack/controlplane-keystone/admin

          # ── Presence guard ──────────────────────────────
          # Probe for the CRDs the admin-password link spans plus the OpenBao
          # ClusterSecretStore the ExternalSecret reads through. Their absence
          # means the c5c3-operator + OpenBao stack is not deployed here — SKIP
          # cleanly (exit 0).
          missing=""
          for crd in \
            controlplanes.c5c3.io \
            keystones.keystone.openstack.c5c3.io \
            externalsecrets.external-secrets.io; do
            if ! kubectl get crd "$crd" >/dev/null 2>&1; then
              missing="${missing} ${crd}"
            fi
          done
          if [ -n "${missing}" ]; then
            echo "SKIP: required CRDs not present:${missing}"
            echo "      The c5c3-operator + OpenBao stack is not deployed on this"
            echo "      cluster, so the admin-password scoping link cannot be"
            echo "      exercised here."
            exit 0
          fi
          if ! kubectl get clustersecretstore openbao-cluster-store >/dev/null 2>&1; then
            echo "SKIP: openbao-cluster-store ClusterSecretStore not present;"
            echo "      the admin-password ExternalSecret cannot sync."
            exit 0
          fi
          # The CRDs alone no longer prove the stack: the e2e-operator (c5c3)
          # matrix leg installs every CRD the c5c3 controller watches WITHOUT
          # deploying the sibling operators. This suite's ControlPlane needs the
          # keystone-operator to converge (and it shares the canonical
          # namespace with the other stack suites), so probe for running pods
          # (any namespace), not just the schema.
          if ! kubectl get pods -A -l app.kubernetes.io/name=keystone-operator --no-headers 2>/dev/null | grep -q .; then
            echo "SKIP: no keystone-operator is running; the cluster carries the"
            echo "      stack's CRDs only, so the ControlPlane cannot converge here."
            exit 0
          fi
          echo "OK: c5c3 + ESO CRDs, OpenBao store, and a running keystone-operator"
          echo "    present — running the per-ControlPlane admin-password scoping assertions."

          # ── Helpers ────────────────────────────────────────────────────────
          assert_eq() { # <description> <expected> <actual>
            if [ "$2" != "$3" ]; then
              echo "ERROR: $1 — expected '$2', got '$3'"
              exit 1
            fi
            echo "OK: $1 ('$3')"
          }

          wait_ready_condition() { # <resource> <name> <namespace> <timeoutSeconds>
            local res="$1" name="$2" ns="$3" timeout="$4"
            local deadline status
            deadline=$(( $(date +%s) + timeout ))
            while true; do
              status="$(kubectl get "${res}" "${name}" -n "${ns}" \
                -o "jsonpath={.status.conditions[?(@.type=='Ready')].status}" 2>/dev/null || true)"
              if [ "${status}" = "True" ]; then
                echo "OK: ${res}/${name} Ready=True"
                return 0
              fi
              if [ "$(date +%s)" -ge "${deadline}" ]; then
                echo "ERROR: ${res}/${name} Ready not True within ${timeout}s (last: '${status:-<none>}')"
                return 1
              fi
              sleep 5
            done
          }

          # Apply the canonical ControlPlane now that the presence guard passed.
          # Chainsaw runs scripts with the test directory as CWD. The CR is the
          # same name/namespace the deploy stack provisions, so this apply is
          # idempotent on a cluster that already carries it.
          kubectl apply -f 00-controlplane-cr.yaml

          # ── Assert the admin-password ExternalSecret shape ─────────────────
          # The operator projects it owner-referenced to the ControlPlane, reading
          # the per-CP OpenBao path at property "password".
          wait_ready_condition externalsecret "${ADMIN_SECRET}" "${CP_NS}" 300

          assert_eq "admin-password ExternalSecret owned by ControlPlane" "${CP_NAME}" \
            "$(kubectl get externalsecret "${ADMIN_SECRET}" -n "${CP_NS}" \
              -o "jsonpath={.metadata.ownerReferences[?(@.kind=='ControlPlane')].name}")"
          assert_eq "admin-password ExternalSecret store" "openbao-cluster-store" \
            "$(kubectl get externalsecret "${ADMIN_SECRET}" -n "${CP_NS}" \
              -o 'jsonpath={.spec.secretStoreRef.name}')"
          assert_eq "password remoteRef key is per-CP bootstrap path" "${ADMIN_REMOTE_KEY}" \
            "$(kubectl get externalsecret "${ADMIN_SECRET}" -n "${CP_NS}" \
              -o "jsonpath={.spec.data[?(@.secretKey=='password')].remoteRef.key}")"
          assert_eq "password remoteRef property" "password" \
            "$(kubectl get externalsecret "${ADMIN_SECRET}" -n "${CP_NS}" \
              -o "jsonpath={.spec.data[?(@.secretKey=='password')].remoteRef.property}")"

          # ── Assert the materialised Secret carries password ────────────────
          kubectl get secret "${ADMIN_SECRET}" -n "${CP_NS}" >/dev/null
          val="$(kubectl get secret "${ADMIN_SECRET}" -n "${CP_NS}" \
            -o "jsonpath={.data.password}" 2>/dev/null || true)"
          if [ -z "${val}" ]; then
            echo "ERROR: admin-password Secret ${ADMIN_SECRET} has no 'password' key"
            exit 1
          fi
          echo "OK: admin-password Secret carries 'password'"

          # ── Assert the ControlPlane AdminPasswordReady condition ───────────
          assert_eq "ControlPlane AdminPasswordReady" "True" \
            "$(kubectl get controlplane "${CP_NAME}" -n "${CP_NS}" \
              -o "jsonpath={.status.conditions[?(@.type=='AdminPasswordReady')].status}")"
          echo "OK: per-ControlPlane admin-password scoping verified."
    catch:
    - script:
        shell: bash
        content: |
          echo "=== ControlPlane status.conditions ==="
          kubectl get controlplane controlplane -n openstack \
            -o jsonpath='{range .status.conditions[*]}{.type}={.status} ({.reason}: {.message}){"\n"}{end}' 2>&1 || true
          echo "=== admin-password ExternalSecret ==="
          kubectl describe externalsecret controlplane-keystone-admin-credentials -n openstack 2>&1 || true
          echo "=== admin-password Secret (keys only, no values) ==="
          kubectl describe secret controlplane-keystone-admin-credentials -n openstack 2>&1 || true
          echo "=== c5c3-operator logs (last 100 lines) ==="
          kubectl logs -n c5c3-system -l app.kubernetes.io/name=c5c3-operator --tail=100 --all-containers 2>&1 || true
          echo "=== Events (openstack ns, last 30) ==="
          kubectl get events -n openstack --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
