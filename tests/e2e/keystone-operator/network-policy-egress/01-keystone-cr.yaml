# Minimal Keystone CR fixture for the network-policy-egress E2E test
# (CC-0090, REQ-010, REQ-011). Managed mode: database via clusterRef to the
# shared openstack-db MariaDB, cache via clusterRef to openstack-memcached,
# reusing the infrastructure stack deployed by setup-e2e-infra.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-netpol-egress
  namespace: openstack
spec:
  replicas: 1
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    clusterRef:
      name: openstack-db
    database: keystone_netpol_egress
    secretRef:
      name: keystone-db
  cache:
    clusterRef:
      name: openstack-memcached
    backend: dogpile.cache.pymemcache
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
