# Chainsaw E2E test for the keystone-operator NetworkPolicy egress restriction
#
# SCOPE CAVEAT — enforcement is NOT exercised here
#   The CI kind cluster uses the default kindnet CNI, which silently ignores
#   NetworkPolicy objects. This test therefore validates only that:
#     1. The chart renders the NetworkPolicy (Helm install + Step 2 assert).
#     2. The operator pod starts and reconciles a Keystone CR to Ready=True
#        while the (unenforced) policy is present — i.e. the policy does not
#        crash Helm or the operator on admission.
#   It does NOT prove that packets outside the allow-list are actually
#   dropped. Two further caveats sharpen this:
#     - 10.96.0.1/32 is the in-cluster Service VIP; on Calico/Cilium packets
#       are DNAT'd to real node IPs *before* policy evaluation, so even on an
#       enforcing CNI this CIDR alone would not validate kube-apiserver
#       egress.
#     - With leader election enabled and a second operator release installed
#       alongside the primary one from hack/ci-deploy-operator.sh, there is
#       no guarantee the netpol-restricted pod (vs. the primary) is the one
#       that drove the CR to Ready.
#   Actual enforcement coverage is tracked as a follow-up: adding a
#   Calico-enabled kind CI job would let this test assert on blocked egress.
#
# Installs a second keystone-operator Helm release with networkPolicy.enabled=
# true and the kind-specific kube-apiserver endpoint (10.96.0.1/32:6443), then
# applies a minimal Keystone CR and asserts it reaches Ready=True under the
# (unenforced) egress policy. A catch block dumps operator pod logs, the
# rendered NetworkPolicy, and namespace events on failure.
#
# webhook.enabled=false (see 00-install-operator.yaml) avoids conflicting
# admission-webhook registration with the primary operator deployed by
# hack/ci-deploy-operator.sh — matching the pattern established in
# tests/e2e/keystone/namespace-scoped-rbac/chainsaw-test.yaml.
#
# Verifies:
#   - NetworkPolicy is emitted in the release namespace
#   - Operator pod starts and stays Ready under the policy
#   - A Keystone CR reconciles to Ready=True under the policy
#   - Failures produce enough diagnostic output to debug egress regressions
#     without re-running locally
#
# operator NetworkPolicy lives in keystone-system; the Keystone CR
# remains in openstack to exercise cross-Namespace operator-→-workload semantics.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-operator-network-policy-egress
spec:
  namespace: keystone-system
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Install operator Helm chart with networkPolicy.enabled=true ──
  - try:
    - script:
        timeout: 120s
        content: |
          helm install keystone-operator-netpol \
            ${GITHUB_WORKSPACE:-.}/operators/keystone/helm/keystone-operator/ \
            --namespace keystone-system --create-namespace \
            --values ${GITHUB_WORKSPACE:-.}/tests/e2e/keystone-operator/network-policy-egress/00-install-operator.yaml \
            --wait --timeout 90s
    catch:
    - script:
        content: |
          echo "=== Helm status ==="
          helm status keystone-operator-netpol -n keystone-system 2>&1 || true
          echo "=== Pod status ==="
          kubectl get pods -n keystone-system -l app.kubernetes.io/instance=keystone-operator-netpol -o wide 2>&1 || true
          echo "=== Operator pod logs ==="
          for pod in $(kubectl get pods -n keystone-system -l app.kubernetes.io/instance=keystone-operator-netpol -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n keystone-system "$pod" --all-containers --tail=120 2>&1 || true
            kubectl logs -n keystone-system "$pod" --all-containers --tail=120 --previous 2>&1 || true
          done
          echo "=== NetworkPolicy state ==="
          kubectl get networkpolicy keystone-operator-netpol -n keystone-system -o yaml 2>&1 || true
          echo "=== Events ==="
          kubectl get events -n keystone-system --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 2: Assert NetworkPolicy exists in release namespace ──
  - try:
    - assert:
        resource:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: keystone-operator-netpol
            namespace: keystone-system
            labels:
              app.kubernetes.io/name: keystone-operator
              app.kubernetes.io/instance: keystone-operator-netpol
              app.kubernetes.io/managed-by: Helm
          spec:
            podSelector:
              matchLabels:
                app.kubernetes.io/name: keystone-operator
                app.kubernetes.io/instance: keystone-operator-netpol
            policyTypes:
            - Ingress
            - Egress
  # ── Step 3: Apply minimal Keystone CR ──────────────────────────
  - try:
    - apply:
        file: 01-keystone-cr.yaml
  # ── Step 4: Assert Keystone CR reaches Ready=True under restricted policy
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-netpol-egress
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: |
          echo "=== Operator pod logs (current) ==="
          for pod in $(kubectl get pods -n keystone-system -l app.kubernetes.io/instance=keystone-operator-netpol -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n keystone-system "$pod" --all-containers --tail=200 2>&1 || true
          done
          echo "=== Operator pod logs (previous) ==="
          for pod in $(kubectl get pods -n keystone-system -l app.kubernetes.io/instance=keystone-operator-netpol -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n keystone-system "$pod" --all-containers --tail=200 --previous 2>&1 || true
          done
          echo "=== NetworkPolicy YAML ==="
          kubectl get networkpolicy keystone-operator-netpol -n keystone-system -o yaml 2>&1 || true
          echo "=== Keystone CR status ==="
          kubectl get keystone keystone-netpol-egress -n openstack -o jsonpath='{.status}' 2>&1 | jq . || true
          echo "=== Failed Job logs ==="
          for job in $(kubectl get jobs -n openstack -o name 2>/dev/null); do
            echo "--- $job ---"
            kubectl logs -n openstack "$job" --all-containers --tail=100 2>&1 || true
          done
          echo "=== Events (operator ns, last 30) ==="
          kubectl get events -n keystone-system --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
          echo "=== Events (workload ns, last 30) ==="
          kubectl get events -n openstack --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 5: Cleanup Helm release ─────────────────────────────────────────
  # Release-scoped uninstall removes the Deployment, ServiceAccount,
  # ClusterRole/Binding, and NetworkPolicy owned by this release, leaving the
  # primary operator installed by hack/ci-deploy-operator.sh intact.
  - try:
    - script:
        content: |
          helm uninstall keystone-operator-netpol -n keystone-system 2>&1 || true
          kubectl delete keystone keystone-netpol-egress -n openstack --ignore-not-found 2>&1 || true
