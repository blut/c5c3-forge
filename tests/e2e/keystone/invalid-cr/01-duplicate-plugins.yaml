# Keystone CR with duplicate plugin configSection values.
# The validating webhook must reject this with HTTP 422 referencing
# spec.plugins[1].configSection as a duplicate.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: duplicate-plugins
spec:
  deployment:
    replicas: 3
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    host: db.example.com
    port: 3306
    database: keystone
    secretRef:
      name: keystone-db
  cache:
    backend: dogpile.cache.pymemcache
    servers:
    - "mc:11211"
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
  plugins:
  - name: plugin-alpha
    configSection: section_a
    config:
      key1: value1
  - name: plugin-beta
    configSection: section_a
    config:
      key2: value2
