# Keystone CR with spec.networkPolicy set but
# spec.networkPolicy.ingress as an empty array. The constraint is enforced
# by the CEL XValidation rule on NetworkPolicySpec (keystone_types.go) and
# by the validating webhook (keystone_webhook.go). Admission must reject
# this CR with an $error referencing the parent fieldPath spec.networkPolicy
# and the message "at least one ingress source must be specified". The
# chainsaw assertion intentionally matches the parent path
# (spec.networkPolicy) — not the deeper spec.networkPolicy.ingress —
# because the CEL XValidation rule is declared on the NetworkPolicySpec
# type at the field used as spec.networkPolicy, so the apiserver emits the
# error at that parent path. The validating webhook's deeper-path message
# is unreachable when the CEL layer rejects first.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: invalid-networkpolicy-empty-ingress
spec:
  replicas: 3
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    host: db.example.com
    port: 3306
    database: keystone
    secretRef:
      name: keystone-db
  cache:
    backend: dogpile.cache.pymemcache
    servers:
    - "mc:11211"
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
  networkPolicy:
    ingress: []
