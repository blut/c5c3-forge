# REQ-009 (CC-0094): Keystone CR with spec.autoscaling.minReplicas greater
# than spec.autoscaling.maxReplicas. The validating webhook
# (keystone_webhook.go) rejects the cross-field combination because an HPA
# rendered with min > max would itself be rejected by the API server.
# Admission must reject this CR with an $error referencing
# spec.autoscaling.minReplicas and the message "must not exceed
# maxReplicas". A targetCPUUtilization is set so the rejection is
# attributable solely to the min/max ordering, not the no-target rule
# from REQ-003.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: invalid-hpa-min-greater-than-max
spec:
  replicas: 3
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    host: db.example.com
    port: 3306
    database: keystone
    secretRef:
      name: keystone-db
  cache:
    backend: dogpile.cache.pymemcache
    servers:
    - "mc:11211"
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
  autoscaling:
    minReplicas: 10
    maxReplicas: 5
    targetCPUUtilization: 80
