# Keystone CR with spec.policyOverrides.rules containing
# an empty-string map key. Forbidden by the CEL XValidation rule on
# commonv1.PolicySpec (`self.rules.all(k, size(k) > 0)` in types.go) and by
# policy.ValidatePolicyRules in the validating webhook (keystone_webhook.go).
# Admission must reject this CR with an $error referencing the parent
# fieldPath spec.policyOverrides and the message "policy rule name must
# not be empty". The chainsaw assertion intentionally matches the parent
# path (spec.policyOverrides) — not the deeper spec.policyOverrides.rules
# — because CEL XValidation runs before the validating webhook in the
# admission pipeline and emits the error at the field where the rule is
# declared (here: policyOverrides). The validating webhook's deeper-path
# message is unreachable when the CEL layer rejects first. The empty key
# is quoted ('') so the YAML parser preserves it.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: invalid-policy-overrides-empty-rule-key
spec:
  deployment:
    replicas: 3
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    host: db.example.com
    port: 3306
    database: keystone
    secretRef:
      name: keystone-db
  cache:
    backend: dogpile.cache.pymemcache
    servers:
    - "mc:11211"
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
  policyOverrides:
    rules:
      '': "role:admin"
