# Chainsaw E2E tests for Keystone CRD webhook + CEL validation rejection.
# Pins every implemented CEL XValidation and webhook.validate() rejection
# path in operators/keystone/api/v1alpha1/ to a deterministic admission
# failure. Each step applies an otherwise-valid Keystone
# CR with a single field violating the rule under test, captures the
# admission $error, and asserts the field-path plus message substring.
#
# The create-rejection fixtures (02-…, 03-…, 04-…, 05-…, 06-…, 07-…,
# 09-…, 10-…, 11-…, 12-…, 13-policy-overrides-empty-rule-value, and the
# validation-marker-wave set 13-image-empty-tag through
# 20-perloggerlevels-invalid-value) share the same minimal valid Keystone
# scaffold and are each applied once and rejected at admission. The
# update-rejection fixtures (13-immutable-base, 14-…, 15-…, 16-…, 17-…,
# #466) share the name "immutable-fields": 13-immutable-base is the valid
# base CR applied first, and 14-17 are applied as UPDATEs that the CRD CEL
# transition rules reject. To prevent scaffold drift across these fixtures
# (sourcery-ai review #1), they are generated from a single source of truth
# in `_generate.py`. After editing the canonical scaffold or any per-fixture
# override, regenerate via:
#   python3 tests/e2e/keystone/invalid-cr/_generate.py
# CI runs `make verify-invalid-cr-fixtures` (the
# `verify-invalid-cr-fixtures` job in .github/workflows/ci.yaml), which
# invokes `_generate.py --check` (drift mode) and `test_generate.py`
# (FIXTURES count + chainsaw-test.yaml cross-reference) so any hand-edit
# to a generated fixture — or a rename/removal that desynchs FIXTURES
# from this file — fails the build before the cluster-bound e2e-operator
# job runs.
# The fixtures (00-invalid-cron.yaml, 01-duplicate-plugins.yaml)
# predate and are intentionally NOT regenerated.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-invalid-cr
spec:
  steps:
  # Invalid cron expression must be rejected.
  - try:
    - apply:
        file: 00-invalid-cron.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'rotationSchedule')): true
            (contains($error, 'invalid cron expression')): true
  # Duplicate plugin configSection must be rejected.
  - try:
    - apply:
        file: 01-duplicate-plugins.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'configSection')): true
            (contains($error, 'Duplicate value')): true
  # spec.database with both clusterRef and host must be rejected.
  - try:
    - apply:
        file: 02-database-both-modes.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'spec.database')): true
            (contains($error, 'exactly one of clusterRef or host must be set')): true
  # spec.cache with both clusterRef and a non-empty servers list must be rejected.
  - try:
    - apply:
        file: 03-cache-both-modes.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'spec.cache')): true
            (contains($error, 'exactly one of clusterRef or servers must be set')): true
  # spec.autoscaling without any utilization target must be rejected.
  - try:
    - apply:
        file: 04-autoscaling-no-target.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'spec.autoscaling')): true
            (contains($error, 'at least one of targetCPUUtilization or targetMemoryUtilization')): true
  # spec.policyOverrides with neither rules nor configMapRef must be rejected.
  - try:
    - apply:
        file: 05-policy-overrides-no-source.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'spec.policyOverrides')): true
            (contains($error, 'at least one of rules or configMapRef must be set')): true
  # spec.policyOverrides.rules with an empty key must be rejected.
  # The CEL XValidation rule is declared on the policyOverrides field, so the
  # apiserver emits the error at fieldPath spec.policyOverrides (the parent),
  # NOT spec.policyOverrides.rules. The validating webhook's deeper-path
  # message never reaches Chainsaw because CEL fails first and short-circuits
  # the admission pipeline. The assertion therefore matches only the parent
  # path so the test is stable across rule-relocation refactors.
  - try:
    - apply:
        file: 06-policy-overrides-empty-rule-key.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'spec.policyOverrides')): true
            (contains($error, 'policy rule name must not be empty')): true
  # spec.networkPolicy with an empty ingress array must be
  # rejected. The CEL XValidation rule is declared on NetworkPolicySpec, so
  # the apiserver emits the error at fieldPath spec.networkPolicy (the parent),
  # NOT spec.networkPolicy.ingress. The validating webhook's deeper-path
  # message never reaches Chainsaw because CEL fails first and short-circuits
  # the admission pipeline. The assertion therefore matches only the parent
  # path so the test is stable across rule-relocation refactors.
  - try:
    - apply:
        file: 07-networkpolicy-empty-ingress.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'spec.networkPolicy')): true
            (contains($error, 'at least one ingress source')): true
  # ── Numbering gap (review-1) ─────────────────────────────────
  # / `08-replicas-zero.yaml` is INTENTIONALLY ABSENT. The
  # mutating webhook (operators/keystone/api/v1alpha1/keystone_webhook.go:80-82)
  # coerces `spec.replicas: 0` to 3 BEFORE the
  # +kubebuilder:validation:Minimum=1 marker is evaluated, so the original
  # `replicas: 0` manifest would silently round-trip to a valid CR and
  # the test would never fire an admission error. is therefore
  # subsumed by below, which uses `spec.replicas: -1` — a value
  # the defaulter does not touch — to exercise the same Minimum=1 path.
  # The numeric gaps (no step, no `08-replicas-zero.yaml` file)
  # are preserved so the REQ→manifest mapping in
  # docs/reference/keystone-crd.md stays 1:1 stable across review cycles.
  # ─────────────────────────────────────────────────────────────────────
  # spec.replicas: -1 must be rejected by Minimum=1
  # before any defaulting path can coerce the value.
  - try:
    - apply:
        file: 09-replicas-negative.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'replicas')): true
  # spec.autoscaling.minReplicas > maxReplicas must be rejected. The CEL
  # XValidation rule is declared on AutoscalingSpec, so the apiserver emits the
  # error at fieldPath spec.autoscaling (the parent), NOT
  # spec.autoscaling.minReplicas. The validating webhook's deeper-path message
  # never reaches Chainsaw because CEL fails first and short-circuits the
  # admission pipeline. The assertion therefore matches only the parent path
  # so the test is stable across rule-relocation refactors.
  - try:
    - apply:
        file: 10-hpa-min-greater-than-max.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'spec.autoscaling')): true
            (contains($error, 'must not exceed maxReplicas')): true
  # spec.fernet.maxActiveKeys below the minimum (3) must
  # be rejected by either CRD schema (Minimum=3) or webhook. The assertion
  # matches only 'maxActiveKeys' so either layer satisfies the test.
  - try:
    - apply:
        file: 11-fernet-maxactivekeys-below-minimum.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'maxActiveKeys')): true
  # spec.credentialKeys.maxActiveKeys below the minimum (3)
  # must be rejected by either CRD schema or webhook. The assertion matches
  # only 'maxActiveKeys' so either layer satisfies the test.
  - try:
    - apply:
        file: 12-credentialkeys-maxactivekeys-below-minimum.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'maxActiveKeys')): true
  # spec.policyOverrides.rules with an empty VALUE must be
  # rejected — the empty-value counterpart to 06-policy-overrides-empty-rule-key.yaml, closing the validation
  # gap the 2026-06 audit reported (issue #479). The empty rule-value CEL rule
  # is embedded on the policyOverrides field via its PolicySpec type, so the
  # apiserver emits the error at the parent path spec.policyOverrides (the CEL
  # layer fails first and short-circuits the webhook's deeper-path message).
  # The assertion matches only the parent path so it stays stable across
  # rule-relocation refactors.
  - try:
    - apply:
        file: 13-policy-overrides-empty-rule-value.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'spec.policyOverrides')): true
            (contains($error, 'policy rule value must not be empty')): true
  # ── Field immutability (CEL transition rules, #466) ───────────────────
  # The base CR (13) is applied successfully, then four UPDATEs each mutating a
  # single immutable field (14-17) are rejected by the CRD CEL transition rules
  # (self == oldSelf, evaluated only on UPDATE). All five fixtures share the
  # name "immutable-fields", so applying 14-17 after 13 are UPDATEs of the same
  # object. The base is brownfield (host mode), so the operator creates no
  # MariaDB CRs and pushes no OpenBao secrets; its finalizer cleanup is a no-op
  # and the ephemeral namespace tears down cleanly when the test ends.
  - try:
    # Base CR must be admitted (no expect → success expected).
    - apply:
        file: 13-immutable-base.yaml
    # Renaming spec.database.database is rejected on UPDATE.
    - apply:
        file: 14-immutable-database-name.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'database')): true
            (contains($error, 'immutable')): true
    # Flipping the database mode (brownfield host → managed clusterRef) is
    # rejected on UPDATE.
    - apply:
        file: 15-immutable-database-mode.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'database mode')): true
            (contains($error, 'immutable')): true
    # Changing spec.bootstrap.adminUser is rejected on UPDATE.
    - apply:
        file: 16-immutable-adminuser.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'adminUser')): true
            (contains($error, 'immutable')): true
    # Changing spec.bootstrap.region is rejected on UPDATE.
    - apply:
        file: 17-immutable-region.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'region')): true
            (contains($error, 'immutable')): true
  # Validation-marker wave: empty spec.image.tag rejected by the ImageSpec.Tag
  # Pattern marker (CRD schema).
  - try:
    - apply:
        file: 13-image-empty-tag.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'image.tag')): true
  # Validation-marker wave: spec.database.database with a hyphen rejected by the
  # DatabaseSpec.Database Pattern marker (CRD schema).
  - try:
    - apply:
        file: 14-database-name-invalid-char.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'database.database')): true
  # Validation-marker wave: empty spec.database.secretRef.name rejected by the
  # shared SecretRefSpec.Name MinLength=1 marker (CRD schema).
  - try:
    - apply:
        file: 15-database-secretref-empty-name.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'secretRef.name')): true
  # Validation-marker wave: spec.middleware[].position outside before;after
  # rejected by the PipelinePosition Enum marker (CRD schema).
  - try:
    - apply:
        file: 16-middleware-bad-position.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'position')): true
            (contains($error, 'sideways')): true
  # Validation-marker wave: spec.uwsgi.httpKeepAliveTimeout set while
  # httpKeepAlive is false rejected by the UWSGISpec cross-field CEL rule. The
  # CEL rule fires first (CRD validation precedes the validating webhook), so
  # the assertion matches its message.
  - try:
    - apply:
        file: 17-uwsgi-keepalive-timeout-conflict.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'httpKeepAliveTimeout')): true
  # Validation-marker wave: spec.preStopSleepSeconds not strictly less than
  # spec.terminationGracePeriodSeconds rejected by the KeystoneSpec drain-window
  # CEL rule.
  - try:
    - apply:
        file: 18-prestop-not-less-than-grace.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'preStopSleepSeconds')): true
            (contains($error, 'terminationGracePeriodSeconds')): true
  # Validation-marker wave: non-URL spec.bootstrap.publicEndpoint rejected by the
  # BootstrapSpec.PublicEndpoint Pattern marker (CRD schema).
  - try:
    - apply:
        file: 19-publicendpoint-not-url.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'publicEndpoint')): true
  # Validation-marker wave: spec.logging.perLoggerLevels with a value outside
  # the level enum rejected by the LoggingSpec.PerLoggerLevels CEL rule.
  - try:
    - apply:
        file: 20-perloggerlevels-invalid-value.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'perLoggerLevels')): true
  # Validation-marker wave: spec.image with BOTH tag and digest set, rejected by
  # the ImageSpec tag/digest XOR XValidation rule (CRD schema).
  - try:
    - apply:
        file: 21-image-tag-and-digest.yaml
        expect:
        - check:
            ($error != null): true
            (contains($error, 'digest')): true
