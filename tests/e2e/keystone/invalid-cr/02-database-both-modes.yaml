# REQ-001 (CC-0094): Keystone CR that sets BOTH spec.database.clusterRef AND
# spec.database.host. Mutual-exclusivity is enforced by the CEL XValidation
# rule on KeystoneSpec.Database (keystone_types.go) and by defense-in-depth
# in the validating webhook (keystone_webhook.go). Admission must reject
# this CR with an $error referencing spec.database and the message
# "exactly one of clusterRef or host must be set".
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: invalid-database-both-modes
spec:
  replicas: 3
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    clusterRef:
      name: openstack-db
    host: db.example.com
    port: 3306
    database: keystone
    secretRef:
      name: keystone-db
  cache:
    backend: dogpile.cache.pymemcache
    servers:
    - "mc:11211"
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
