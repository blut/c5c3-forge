# Keystone CR fixture for the httproute E2E test.
# spec.gateway drives the optional HTTPRoute sub-reconciler: the operator
# creates an HTTPRoute attached to a deliberately-non-existent Gateway
# (`openstack/not-a-real-gateway`). The kind overlay installs a
# REAL Envoy Gateway controller in the test cluster bound to
# `Gateway/openstack-gw`, so this fixture used to race that controller:
# its `kubectl patch --subresource=status --type=merge` against
# `status.parents` performs a JSON merge-patch which replaces the entire
# `parents` list, and the real controller would re-add its slot
# (`Accepted=False, NoMatchingListenerHostname` because listener hostname
# `keystone.127-0-0-1.nip.io` does not match this fixture's
# `keystone.e2e.example.com`). Using a non-existent ParentRef name —
# which no Gateway resolves — guarantees the real controller never
# writes a RouteParentStatus slot for this HTTPRoute, so the merge-patch
# remains the sole writer.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-httproute
  namespace: openstack
spec:
  deployment:
    replicas: 1
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    clusterRef:
      name: openstack-db
    database: keystone_httproute
    secretRef:
      name: keystone-db
  cache:
    clusterRef:
      name: openstack-memcached
    backend: dogpile.cache.pymemcache
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
  gateway:
    parentRef:
      name: not-a-real-gateway
    hostname: keystone.e2e.example.com
    path: /v3
    annotations:
      example.com/test-annotation: initial
