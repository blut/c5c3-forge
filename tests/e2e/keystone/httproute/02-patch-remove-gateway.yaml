# Patch to unset spec.gateway on the Keystone CR.
# Chainsaw merge-patches with this manifest, clearing the gateway field so
# the operator deletes the HTTPRoute and sets HTTPRouteReady with reason
# HTTPRouteNotRequired.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-httproute
  namespace: openstack
spec:
  gateway: null
