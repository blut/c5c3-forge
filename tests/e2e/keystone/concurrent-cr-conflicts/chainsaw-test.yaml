# Chainsaw E2E test for concurrent CR conflict handling (CC-0066).
# Deploys two Keystone CRs that share the same secretRef and
# adminPasswordSecretRef, verifies both reach Ready=True with unique
# owned resources, then deletes one CR and asserts the other remains
# healthy and its resources are unaffected.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-concurrent-cr-conflicts
spec:
  namespace: openstack
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Apply both CR fixtures ───────────────────────────────────────
  - try:
    - apply:
        file: 00-keystone-cr-a.yaml
    - apply:
        file: 01-keystone-cr-b.yaml
  # ── Step 2: Assert both CRs Ready=True ───────────────────────────────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-concurrent-a
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-concurrent-b
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: |
          echo "=== Keystone CR-A status ==="
          kubectl get keystone keystone-concurrent-a -n $NAMESPACE -o yaml 2>&1 || true
          echo "=== Keystone CR-B status ==="
          kubectl get keystone keystone-concurrent-b -n $NAMESPACE -o yaml 2>&1 || true
          echo "=== All pod logs ==="
          for pod in $(kubectl get pods -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 2>&1 || true
          done
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 3: Assert per-CR OpenBao kv-v2 isolation (CC-0093, REQ-005) ─────
  # CC-0093 parameterizes the OpenBao RemoteKey per Keystone CR so that
  # concurrent CRs push their fernet-keys / credential-keys to distinct
  # kv-v2 paths instead of colliding on a single shared path. This step
  # exercises that contract end-to-end: after both CRs reach Ready, their
  # PushSecrets must have synced to the four CR-scoped paths
  #   kv-v2/openstack/keystone/keystone-concurrent-a/fernet-keys
  #   kv-v2/openstack/keystone/keystone-concurrent-a/credential-keys
  #   kv-v2/openstack/keystone/keystone-concurrent-b/fernet-keys
  #   kv-v2/openstack/keystone/keystone-concurrent-b/credential-keys
  # proving the RemoteKey templating is actually writing under
  # <cr-name>/<material>. We additionally assert the legacy flat paths
  #   kv-v2/openstack/keystone/fernet-keys
  #   kv-v2/openstack/keystone/credential-keys
  # do NOT exist. This is a regression guard: if the per-CR RemoteKey
  # template in the PushSecret is ever reverted to a hard-coded string,
  # both CRs would race to write the flat paths and silently overwrite
  # each other's key material. Seeing those paths reappear here fails the
  # test loudly before the bug ships.
  #
  # PushSecret sync is eventually-consistent; poll every 3 s for up to
  # 60 s (20 iterations) and exit 0 on the first sweep where all four
  # expected paths exist and both legacy paths are absent. Use date +%s
  # (not $SECONDS) — chainsaw runs scripts under /usr/bin/sh (dash) which
  # does not define SECONDS, so with `set -u` the expansion would fail.
  #
  # Script shape (bootstrap + poll loop + bao-kv-get subshell) intentionally
  # mirrors deletion-cleanup/chainsaw-test.yaml step 6 so a future change to
  # the bao-polling contract (token extraction, env wiring, exit-code
  # handling) lands in one recognisable pattern across both tests
  # (sourcery-review-1).
  - try:
    - script:
        timeout: 90s
        content: |
          set -u
          BAO_NS="openbao-system"
          POD="openbao-0"
          SECRET="openbao-init-keys"
          BAO_ADDR="https://127.0.0.1:8200"
          VAULT_CACERT="/openbao/tls/ca.crt"

          BAO_TOKEN=$(kubectl get secret "${SECRET}" -n "${BAO_NS}" \
            -o jsonpath='{.data.init-output}' | base64 -d | jq -r '.root_token')
          if [ -z "${BAO_TOKEN}" ] || [ "${BAO_TOKEN}" = "null" ]; then
            echo "ERROR: could not extract root token from ${BAO_NS}/${SECRET}"
            exit 1
          fi

          # Bounded retry: 60 s budget, 3 s interval, 20 iterations max.
          # Exit 0 on the first sweep where every expected-present path is
          # present and every expected-absent path is absent.
          deadline=$(( $(date +%s) + 60 ))
          missing=""
          leaked=""
          while [ "$(date +%s)" -lt "${deadline}" ]; do
            all_clear=1
            missing=""
            leaked=""
            for path in "kv-v2/openstack/keystone/keystone-concurrent-a/fernet-keys" \
                        "kv-v2/openstack/keystone/keystone-concurrent-a/credential-keys" \
                        "kv-v2/openstack/keystone/keystone-concurrent-b/fernet-keys" \
                        "kv-v2/openstack/keystone/keystone-concurrent-b/credential-keys"; do
              echo "=== bao kv get ${path} (expect present) ==="
              out=$(kubectl exec -n "${BAO_NS}" "${POD}" -- \
                env BAO_ADDR="${BAO_ADDR}" BAO_TOKEN="${BAO_TOKEN}" \
                    VAULT_CACERT="${VAULT_CACERT}" \
                    bao kv get "${path}" 2>&1) && get_rc=0 || get_rc=$?
              echo "${out}"
              echo "exit=${get_rc}"
              if [ "${get_rc}" -ne 0 ]; then
                echo "NOT-YET: ${path} not present (PushSecret may not have synced yet)"
                missing="${missing} ${path}"
                all_clear=0
              else
                echo "OK: ${path} is present in OpenBao"
              fi
            done
            for path in "kv-v2/openstack/keystone/fernet-keys" \
                        "kv-v2/openstack/keystone/credential-keys"; do
              echo "=== bao kv get ${path} (expect not-found) ==="
              out=$(kubectl exec -n "${BAO_NS}" "${POD}" -- \
                env BAO_ADDR="${BAO_ADDR}" BAO_TOKEN="${BAO_TOKEN}" \
                    VAULT_CACERT="${VAULT_CACERT}" \
                    bao kv get "${path}" 2>&1) && get_rc=0 || get_rc=$?
              echo "${out}"
              echo "exit=${get_rc}"
              if [ "${get_rc}" -eq 0 ]; then
                echo "ERROR: ${path} present (legacy flat path leaked — RemoteKey regression)"
                leaked="${leaked} ${path}"
                all_clear=0
              else
                echo "OK: ${path} is absent in OpenBao"
              fi
            done
            if [ "${all_clear}" -eq 1 ]; then
              exit 0
            fi
            sleep 3
          done

          # Timeout: name each still-wrong path on stderr so chainsaw's
          # failure surface identifies exactly which kv-v2 path regressed
          # (CC-0093, REQ-005).
          for path in ${missing}; do
            echo "ERROR: ${path} missing after 60s (PushSecret did not sync to per-CR path)" >&2
          done
          for path in ${leaked}; do
            echo "ERROR: ${path} present after 60s (legacy flat path leaked — RemoteKey regression)" >&2
          done
          exit 1
    catch:
    - script:
        content: |
          echo "=== openbao pods ==="
          kubectl get pods -n openbao-system -l app.kubernetes.io/name=openbao 2>&1 || true
          echo "=== openbao-0 logs ==="
          kubectl logs -n openbao-system openbao-0 --tail=200 2>&1 || true
          echo "=== PushSecrets in $NAMESPACE ==="
          kubectl get pushsecrets.external-secrets.io -n $NAMESPACE -o wide 2>&1 || true
          echo "=== PushSecret details ==="
          kubectl get pushsecrets.external-secrets.io -n $NAMESPACE -o yaml 2>&1 || true
  # ── Step 4: Assert unique Deployments and Services ───────────────────────
  - try:
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keystone-concurrent-a
            namespace: openstack
          status:
            availableReplicas: 1
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keystone-concurrent-b
            namespace: openstack
          status:
            availableReplicas: 1
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: keystone-concurrent-a
            namespace: openstack
          spec:
            ports:
            - port: 5000
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: keystone-concurrent-b
            namespace: openstack
          spec:
            ports:
            - port: 5000
    catch:
    - script:
        content: |
          echo "=== Keystone CR-A status ==="
          kubectl get keystone keystone-concurrent-a -n $NAMESPACE -o yaml 2>&1 || true
          echo "=== Keystone CR-B status ==="
          kubectl get keystone keystone-concurrent-b -n $NAMESPACE -o yaml 2>&1 || true
          echo "=== Deployments ==="
          kubectl get deployments -n $NAMESPACE -l app.kubernetes.io/name=keystone -o wide 2>&1 || true
          echo "=== Services ==="
          kubectl get services -n $NAMESPACE -o wide 2>&1 || true
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 5: Assert unique Fernet CronJobs and ConfigMaps ─────────────────
  - try:
    - assert:
        resource:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: keystone-concurrent-a-fernet-rotate
            namespace: openstack
    - assert:
        resource:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: keystone-concurrent-b-fernet-rotate
            namespace: openstack
    - script:
        content: |
          set -eu
          kubectl get cm -n $NAMESPACE -o name | grep keystone-concurrent-a-config-
          kubectl get cm -n $NAMESPACE -o name | grep keystone-concurrent-b-config-
    catch:
    - script:
        content: |
          echo "=== CronJobs ==="
          kubectl get cronjobs -n $NAMESPACE -o wide 2>&1 || true
          echo "=== ConfigMaps ==="
          kubectl get cm -n $NAMESPACE -o name 2>&1 || true
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 6: Delete CR-A and assert cleanup ───────────────────────────────
  # CC-0078: the Keystone finalizer blocks deletion until MariaDB
  # Database/User/Grant CRs are fully gone; under parallel:4 this exceeds
  # the global 30s delete timeout, so raise it to match deletion-cleanup.
  - try:
    - delete:
        timeout: 2m
        ref:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          name: keystone-concurrent-a
          namespace: openstack
    - error:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keystone-concurrent-a
            namespace: openstack
    - error:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: keystone-concurrent-a
            namespace: openstack
    - error:
        resource:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: keystone-concurrent-a-fernet-rotate
            namespace: openstack
    - script:
        # Scope the check to this test's own CR instances — the shared
        # `openstack` namespace hosts other chainsaw tests in parallel.
        content: |
          set -eu
          COUNT_A=$(kubectl get deployments -n $NAMESPACE \
            -l app.kubernetes.io/instance=keystone-concurrent-a -o name | wc -l)
          COUNT_B=$(kubectl get deployments -n $NAMESPACE \
            -l app.kubernetes.io/instance=keystone-concurrent-b -o name | wc -l)
          if [ "$COUNT_A" -ne 0 ]; then
            echo "ERROR: expected 0 Deployments for keystone-concurrent-a, found $COUNT_A"
            exit 1
          fi
          if [ "$COUNT_B" -ne 1 ]; then
            echo "ERROR: expected 1 Deployment for keystone-concurrent-b, found $COUNT_B"
            exit 1
          fi
          echo "CR-A Deployment removed, CR-B Deployment intact: correct"
    catch:
    - script:
        content: |
          echo "=== Keystone CR-B status ==="
          kubectl get keystone keystone-concurrent-b -n $NAMESPACE -o yaml 2>&1 || true
          echo "=== Remaining Deployments ==="
          kubectl get deployments -n $NAMESPACE -l app.kubernetes.io/name=keystone -o wide 2>&1 || true
          echo "=== Remaining Services ==="
          kubectl get services -n $NAMESPACE -o wide 2>&1 || true
          echo "=== Remaining CronJobs ==="
          kubectl get cronjobs -n $NAMESPACE -o wide 2>&1 || true
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 7: Assert CR-B still Ready ──────────────────────────────────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-concurrent-b
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keystone-concurrent-b
            namespace: openstack
          status:
            availableReplicas: 1
    catch:
    - script:
        content: |
          echo "=== Keystone CR-B status ==="
          kubectl get keystone keystone-concurrent-b -n $NAMESPACE -o yaml 2>&1 || true
          echo "=== All pod logs ==="
          for pod in $(kubectl get pods -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 2>&1 || true
          done
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
