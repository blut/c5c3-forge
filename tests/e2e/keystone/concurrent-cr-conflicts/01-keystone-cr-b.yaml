# Keystone CR fixture for the concurrent CR conflict E2E test (CC-0066).
# Uses unique name (keystone-concurrent-b) and database (keystone_concurrent_b)
# to avoid conflicts with other test suites. Shares secretRef (keystone-db)
# and adminPasswordSecretRef (keystone-admin) with keystone-concurrent-a
# to test secretToKeystoneMapper behavior under resource contention.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-concurrent-b
  namespace: openstack
spec:
  replicas: 1
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    clusterRef:
      name: openstack-db
    database: keystone_concurrent_b
    secretRef:
      name: keystone-db
  cache:
    clusterRef:
      name: openstack-memcached
    backend: dogpile.cache.pymemcache
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
