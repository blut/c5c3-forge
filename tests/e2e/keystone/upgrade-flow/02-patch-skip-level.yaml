# Patch to trigger a skip-level upgrade from 2026.1 to 2027.2, which must
# be rejected by the controller.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-upgrade-flow
  namespace: openstack
spec:
  image:
    tag: "2027.2"
