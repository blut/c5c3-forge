# Chainsaw E2E test for the expand-migrate-contract upgrade flow (CC-0056).
# Verifies:
#   (1) Fresh deployment sets status.installedRelease
#   (2) Sequential upgrade (2025.2 -> 2026.1) triggers expand-migrate-contract phases
#   (3) Skip-level upgrade (2026.1 -> 2027.2) is rejected with UpgradePathInvalid
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-upgrade-flow
spec:
  namespace: openstack
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Apply Keystone CR with initial release 2025.2 ─────────────
  - try:
    - apply:
        file: 00-keystone-cr.yaml
  # ── Step 2: Assert Ready and installedRelease set (CC-0056, REQ-008) ──
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-upgrade-flow
            namespace: openstack
          status:
            installedRelease: "2025.2"
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: |
          echo "=== All pod logs ==="
          for pod in $(kubectl get pods -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 2>&1 || true
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 --previous 2>&1 || true
          done
          echo "=== Failed Job logs ==="
          for job in $(kubectl get jobs -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $job ---"
            kubectl logs -n $NAMESPACE "$job" --all-containers --tail=100 2>&1 || true
          done
          echo "=== Pod describe ==="
          for pod in $(kubectl get pods -n $NAMESPACE -l job-name -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl describe -n $NAMESPACE "$pod" 2>&1 | tail -30 || true
          done
          echo "=== Job status ==="
          kubectl get jobs -n $NAMESPACE -o wide 2>&1 || true
          echo "=== ConfigMap content ==="
          for cm in $(kubectl get cm -n $NAMESPACE -o name 2>/dev/null | grep config-); do
            echo "--- $cm ---"
            kubectl get -n $NAMESPACE "$cm" -o jsonpath='{.data}' 2>&1 || true
          done
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 3: Patch image tag to trigger sequential upgrade ─────────────
  - try:
    - patch:
        file: 01-patch-upgrade.yaml
  # ── Step 4: Assert upgrade completes via expand-migrate-contract ──────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-upgrade-flow
            namespace: openstack
          status:
            installedRelease: "2026.1"
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    # Verify expand, migrate, and contract Jobs were created (proof that
    # the phased upgrade flow executed rather than a simple db_sync).
    - script:
        content: |
          set -eu
          echo "=== Verifying upgrade phase Jobs ==="
          for phase in expand migrate contract; do
            JOB="keystone-upgrade-flow-db-${phase}"
            if kubectl get job "$JOB" -n openstack >/dev/null 2>&1; then
              echo "OK: Job $JOB exists"
            else
              echo "ERROR: Job $JOB not found"
              exit 1
            fi
          done
    catch:
    - script:
        content: |
          echo "=== Keystone status ==="
          kubectl get keystone keystone-upgrade-flow -n $NAMESPACE -o yaml 2>&1 | tail -40 || true
          echo "=== All pod logs ==="
          for pod in $(kubectl get pods -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 2>&1 || true
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 --previous 2>&1 || true
          done
          echo "=== Failed Job logs ==="
          for job in $(kubectl get jobs -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $job ---"
            kubectl logs -n $NAMESPACE "$job" --all-containers --tail=100 2>&1 || true
          done
          echo "=== Pod describe ==="
          for pod in $(kubectl get pods -n $NAMESPACE -l job-name -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl describe -n $NAMESPACE "$pod" 2>&1 | tail -30 || true
          done
          echo "=== Job status ==="
          kubectl get jobs -n $NAMESPACE -o wide 2>&1 || true
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 5: Patch to skip-level version ───────────────────────────────
  - try:
    - patch:
        file: 02-patch-skip-level.yaml
  # ── Step 6: Assert skip-level upgrade is rejected ─────────────────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-upgrade-flow
            namespace: openstack
          status:
            installedRelease: "2026.1"
            (conditions[?type == 'DatabaseReady']):
            - status: "False"
              reason: UpgradePathInvalid
    catch:
    - script:
        content: |
          echo "=== Keystone status ==="
          kubectl get keystone keystone-upgrade-flow -n $NAMESPACE -o yaml 2>&1 | tail -40 || true
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
