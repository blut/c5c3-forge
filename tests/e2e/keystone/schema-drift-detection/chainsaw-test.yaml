# Chainsaw E2E test for schema drift detection.
# Validates that after a successful deployment:
#   - DatabaseReady=True with message containing "revision verified"
#   - The schema-check Job exists and completes successfully
#
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-schema-drift-detection
spec:
  namespace: openstack
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Apply Keystone CR ──────────────────────────────────────────
  - try:
    - apply:
        file: 00-keystone-cr.yaml
  # ── Step 2: Assert DatabaseReady=True with "revision verified" ────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-schema-drift
            namespace: openstack
          status:
            (conditions[?type == 'DatabaseReady']):
            - status: "True"
              reason: DatabaseSynced
              message: "Database schema is up to date (revision verified)"
    catch:
    - script:
        content: |
          echo "=== All pod logs ==="
          for pod in $(kubectl get pods -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 2>&1 || true
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 --previous 2>&1 || true
          done
          echo "=== Failed Job logs ==="
          for job in $(kubectl get jobs -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $job ---"
            kubectl logs -n $NAMESPACE "$job" --all-containers --tail=100 2>&1 || true
          done
          echo "=== Pod describe ==="
          for pod in $(kubectl get pods -n $NAMESPACE -l job-name -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl describe -n $NAMESPACE "$pod" 2>&1 | tail -40 || true
          done
          echo "=== Job status ==="
          kubectl get jobs -n $NAMESPACE -o wide 2>&1 || true
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 3: Assert schema-check Job exists and completed successfully ─
  - try:
    - assert:
        resource:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: keystone-schema-drift-schema-check
            namespace: openstack
          status:
            (succeeded > `0`): true
