# Chainsaw E2E test for trust flush CronJob feature.
# Verifies:
#   - CronJob creation when spec.trustFlush is set
#   - CronJob schedule and suspend match spec.trustFlush
#   - TrustFlushReady condition set with reason TrustFlushReady
#   - Manual trigger via kubectl create job --from=cronjob executes successfully
#   - Pausing trust flush via spec.trustFlush.suspend: true preserves the CronJob
#     with spec.suspend == true and keeps reason TrustFlushReady
#   - No new Job pods are created while suspended
#
# suspend: true is the documented pause path; nil-back is no
# longer asserted because the defaulting webhook re-materializes the field.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-trust-flush
spec:
  namespace: openstack
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Apply Keystone CR with trustFlush configured ─────────────────
  - try:
    - apply:
        file: 00-keystone-cr.yaml
  # ── Step 2: Wait for Ready=True ────────────────────────────────────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-trust-flush
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: |
          echo "=== All pod logs ==="
          for pod in $(kubectl get pods -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 2>&1 || true
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 --previous 2>&1 || true
          done
          echo "=== Failed Job logs ==="
          for job in $(kubectl get jobs -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $job ---"
            kubectl logs -n $NAMESPACE "$job" --all-containers --tail=100 2>&1 || true
          done
          echo "=== Pod describe ==="
          for pod in $(kubectl get pods -n $NAMESPACE -l job-name -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl describe -n $NAMESPACE "$pod" 2>&1 | tail -30 || true
          done
          echo "=== Job status ==="
          kubectl get jobs -n $NAMESPACE -o wide 2>&1 || true
          echo "=== ConfigMap content ==="
          for cm in $(kubectl get cm -n $NAMESPACE -o name 2>/dev/null | grep config-); do
            echo "--- $cm ---"
            kubectl get -n $NAMESPACE "$cm" -o jsonpath='{.data}' 2>&1 || true
          done
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 3: Assert TrustFlushReady=True ────────────────────────────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-trust-flush
            namespace: openstack
          status:
            (conditions[?type == 'TrustFlushReady']):
            - status: "True"
              reason: TrustFlushReady
  # ── Step 4: Assert CronJob created with correct schedule ─────────────────
  - try:
    - assert:
        resource:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: keystone-trust-flush-trust-flush
            namespace: openstack
          spec:
            schedule: "0 * * * *"
            suspend: false
  # ── Step 5: Trigger manual trust flush and verify job completes ────────
  - try:
    - script:
        timeout: 180s
        content: |
          set -eu

          # Trigger manual trust flush
          kubectl create job keystone-trust-flush-manual-flush \
            --from=cronjob/keystone-trust-flush-trust-flush -n openstack
          kubectl wait --for=condition=complete \
            job/keystone-trust-flush-manual-flush -n openstack --timeout=120s

          echo "OK: Trust flush job completed successfully"
    catch:
    - script:
        content: |
          echo "=== Trust flush Job pods ==="
          kubectl get pods -n $NAMESPACE -l job-name=keystone-trust-flush-manual-flush -o wide 2>&1 || true
          for pod in $(kubectl get pods -n $NAMESPACE -l job-name=keystone-trust-flush-manual-flush -o name 2>/dev/null); do
            echo "--- $pod logs ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=100 2>&1 || true
            echo "--- $pod previous logs ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=100 --previous 2>&1 || true
            echo "--- $pod describe ---"
            kubectl describe -n $NAMESPACE "$pod" 2>&1 | tail -30 || true
          done
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -20 || true
  # ── Step 6: Assert Ready=True maintained after job ─────────────────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-trust-flush
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
  # ── Step 7: Pause trust flush (set spec.trustFlush.suspend: true) ──────
  # suspend: true is the supported pause path. The defaulting
  # webhook re-materializes spec.trustFlush, so nil-back is no longer exercised.
  - try:
    - patch:
        file: 01-patch-suspend-trust-flush.yaml
  # ── Step 8: Assert TrustFlushReady=True with reason TrustFlushReady ────
  # pausing via suspend keeps the CronJob and the
  # TrustFlushReady reason; TrustFlushNotRequired is now the legacy bypass-only
  # reason for nil-spec posture (envtest / webhook-less clusters).
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-trust-flush
            namespace: openstack
          status:
            (conditions[?type == 'TrustFlushReady']):
            - status: "True"
              reason: TrustFlushReady
  # ── Step 9: Assert CronJob preserved with spec.suspend == true ─────────
  # the CronJob persists across pause/resume so resume is a
  # no-churn operation and the next scheduled tick fires immediately.
  - try:
    - assert:
        resource:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: keystone-trust-flush-trust-flush
            namespace: openstack
          spec:
            schedule: "0 * * * *"
            suspend: true
  # ── Step 10: Assert no new Job pods created AFTER suspend was applied ──
  # while suspend is true the controller MUST NOT create new
  # Jobs from the CronJob. The hourly schedule "0 * * * *" can race with the
  # earlier steps if Step 1 ran before a `:00` minute boundary and Step 7
  # (suspend patch) ran after — a legitimate pre-suspend Job may then exist
  # and would falsely fail a naive "no owned jobs" assertion. Filter on
  # `creationTimestamp > $SUSPEND_TIME` so only Jobs created strictly after
  # the suspend patch count as failures.
  - try:
    - script:
        content: |
          set -eu

          # Canonical "when did suspend become true" timestamp: the time of the
          # CronJob managedFields entry that owns spec.suspend (Step 7's patch).
          # kubectl >= 1.21 strips metadata.managedFields from -o json output by
          # default, so --show-managed-fields=true is required for the jq filter
          # below to see anything.
          SUSPEND_TIME=$(kubectl get cronjob keystone-trust-flush-trust-flush \
            -n "$NAMESPACE" --show-managed-fields=true -o json 2>/dev/null \
            | jq -r '[(.metadata.managedFields // [])[]
                      | select(.fieldsV1.["f:spec"].["f:suspend"] != null)
                      | .time] | sort | last // ""')
          if [ -z "$SUSPEND_TIME" ]; then
            echo "FAIL: could not determine suspend-patch timestamp from CronJob managedFields"
            kubectl get cronjob keystone-trust-flush-trust-flush -n "$NAMESPACE" \
              --show-managed-fields=true \
              -o jsonpath='{.metadata.managedFields}' 2>&1 || true
            exit 1
          fi
          echo "Suspend was applied at $SUSPEND_TIME; filtering CronJob-owned Jobs created strictly after."

          # ISO 8601 / RFC 3339 timestamps sort lexicographically, so jq's
          # string comparison gives a correct strict-greater-than filter.
          POST_SUSPEND=$(kubectl get jobs -n "$NAMESPACE" -o json 2>/dev/null \
            | jq -r --arg t "$SUSPEND_TIME" '
                [.items[]
                  | select((.metadata.ownerReferences // [])[0].name == "keystone-trust-flush-trust-flush")
                  | select(.metadata.creationTimestamp > $t)
                  | .metadata.name]
                | join("\n")')

          if [ -n "$POST_SUSPEND" ]; then
            echo "FAIL: CronJob created Jobs after suspend was applied:"
            echo "$POST_SUSPEND"
            exit 1
          fi
          echo "PASS: No CronJob-owned Jobs created after suspend"
