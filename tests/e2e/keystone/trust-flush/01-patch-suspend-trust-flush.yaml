# Patch to pause trust flush via spec.trustFlush.suspend: true.
# Under the trust flush field is materialized by the defaulting webhook and
# nil-back is no longer the documented disable path; suspend: true is the supported
# pause posture and preserves the CronJob for resume without churn.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-trust-flush
  namespace: openstack
spec:
  trustFlush:
    suspend: true
