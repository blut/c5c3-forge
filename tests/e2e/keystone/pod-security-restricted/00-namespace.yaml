# Test namespace + ExternalSecrets fixture for the PSS-restricted E2E test
# (CC-0104, REQ-001, REQ-003).
#
# The namespace carries both `pod-security.kubernetes.io/enforce=restricted`
# AND `pod-security.kubernetes.io/enforce-version=latest`. Without the
# version label, kube-apiserver pins to the cluster's current PSS baseline,
# which can drift on cluster upgrade and surface as a spurious failure;
# `latest` tracks the newest baseline and is the regression net we want.
#
# `keystone-admin` and `keystone-db` are ESO-managed: the operator's
# `reconcileSecrets` gates SecretsReady on its `WaitForExternalSecret` calls
# (operators/keystone/internal/controller/reconcile_secrets.go), so plain
# Secrets — even with all required keys — leave the CR stuck at
# SecretsReady=False/WaitingForDBCredentials and never reach Ready=True. The
# ExternalSecrets pull from the same OpenBao paths the in-cluster
# `openstack` namespace uses: the per-CR admin password at
# `bootstrap/openstack/controlplane-keystone/admin` (the CC-0112 per-CR path the
# deploy-infra seed writes; the legacy flat `bootstrap/keystone-admin` is no
# longer seeded) and the canonical `keystone` MariaDB user at
# `openstack/keystone/db` that brownfield-database
# (tests/e2e/keystone/brownfield-database) also uses; the `eso-management` policy
# (deploy/openbao/policies/eso-management.hcl) grants read access to both paths
# via its `kv-v2/data/bootstrap/*` and `kv-v2/data/openstack/keystone/*`
# wildcards, so no new OpenBao policy work is required.
---
apiVersion: v1
kind: Namespace
metadata:
  name: keystone-pss-restricted-test
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keystone-admin
  namespace: keystone-pss-restricted-test
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: keystone-admin
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: bootstrap/openstack/controlplane-keystone/admin
      property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keystone-db
  namespace: keystone-pss-restricted-test
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: keystone-db
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: openstack/keystone/db
      property: username
  - secretKey: password
    remoteRef:
      key: openstack/keystone/db
      property: password
