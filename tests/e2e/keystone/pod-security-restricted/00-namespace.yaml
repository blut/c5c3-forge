# Test namespace + ExternalSecrets fixture for the PSS-restricted E2E test
#
# The namespace carries both `pod-security.kubernetes.io/enforce=restricted`
# AND `pod-security.kubernetes.io/enforce-version=latest`. Without the
# version label, kube-apiserver pins to the cluster's current PSS baseline,
# which can drift on cluster upgrade and surface as a spurious failure;
# `latest` tracks the newest baseline and is the regression net we want.
#
# `keystone-admin` and `keystone-db` are ESO-managed: the operator's
# `reconcileSecrets` gates SecretsReady on its `WaitForExternalSecret` calls
# (operators/keystone/internal/controller/reconcile_secrets.go), so plain
# Secrets — even with all required keys — leave the CR stuck at
# SecretsReady=False/WaitingForDBCredentials and never reach Ready=True.
#
# Since #606 the shared cluster store no longer grants any read on the
# openstack/keystone/* subtree and is namespace-restricted to `openstack`, so a
# foreign namespace like this one cannot reach the shared standalone paths
# through it. Both ExternalSecrets therefore authenticate through this
# namespace's OWN per-tenant `openbao-tenant-store` (provisioned by the chainsaw
# Step-1 script via setup-eso-tenant.sh) and read namespace-scoped paths that the
# eso-tenant policy templates to this namespace:
#   - the admin password at `bootstrap/keystone-pss-restricted-test/pss/admin`
#   - the `keystone` MariaDB user at
#     `openstack/keystone/keystone-pss-restricted-test/pss/db`
# The Step-1 script seeds those two paths by COPYING the values from the shared
# `bootstrap/openstack/controlplane-keystone/admin` and
# `openstack/keystone/openstack/standalone/db` paths, so the `keystone` user's
# password still matches the value the brownfield-database test reconciles onto
# the same shared MariaDB user — no SET PASSWORD race.
---
apiVersion: v1
kind: Namespace
metadata:
  name: keystone-pss-restricted-test
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keystone-admin
  namespace: keystone-pss-restricted-test
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-tenant-store
    kind: SecretStore
  target:
    name: keystone-admin
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: bootstrap/keystone-pss-restricted-test/pss/admin
      property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keystone-db
  namespace: keystone-pss-restricted-test
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-tenant-store
    kind: SecretStore
  target:
    name: keystone-db
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: openstack/keystone/keystone-pss-restricted-test/pss/db
      property: username
  - secretKey: password
    remoteRef:
      key: openstack/keystone/keystone-pss-restricted-test/pss/db
      property: password
