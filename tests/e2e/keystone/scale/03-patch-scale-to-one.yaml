# Patch to scale down Keystone replicas from 2 to 1 (CC-0037).
# Tests the PDB boundary: replicas == 1 switches from minAvailable to maxUnavailable.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-scale
  namespace: openstack
spec:
  replicas: 1
