# Patch to scale up Keystone replicas from 3 to 5.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-scale
  namespace: openstack
spec:
  deployment:
    replicas: 5
