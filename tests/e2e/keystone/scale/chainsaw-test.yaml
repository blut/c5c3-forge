# Chainsaw E2E test for replica scaling (CC-0016) and PDB policy (CC-0037).
# Verifies that patching spec.replicas propagates to the Deployment and PDB:
#   - Initial deployment with replicas: 3 (PDB: minAvailable=1)
#   - Scale up to 5 replicas (PDB: minAvailable=1)
#   - Scale down to 2 replicas (PDB: minAvailable=1)
#   - Scale down to 1 replica (PDB: maxUnavailable=1)
#
# REQ-006, REQ-012, REQ-013 (CC-0016, CC-0037)
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-scale
spec:
  namespace: openstack
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Apply Keystone CR with replicas: 3 ─────────────────────────
  - try:
    - apply:
        file: 00-keystone-cr.yaml
  # ── Step 2: Assert Ready and initial replica count ─────────────────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-scale
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keystone-scale-api
            namespace: openstack
          spec:
            replicas: 3
          status:
            (availableReplicas >= `3`): true
    # PDB should use minAvailable=1 for replicas > 1 (CC-0037).
    - assert:
        resource:
          apiVersion: policy/v1
          kind: PodDisruptionBudget
          metadata:
            name: keystone-scale-api
            namespace: openstack
          spec:
            minAvailable: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: keystone
                app.kubernetes.io/instance: keystone-scale
    catch:
    - script:
        content: |
          echo "=== All pod logs ==="
          for pod in $(kubectl get pods -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 2>&1 || true
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 --previous 2>&1 || true
          done
          echo "=== Failed Job logs ==="
          for job in $(kubectl get jobs -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $job ---"
            kubectl logs -n $NAMESPACE "$job" --all-containers --tail=100 2>&1 || true
          done
          echo "=== Pod describe ==="
          for pod in $(kubectl get pods -n $NAMESPACE -l job-name -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl describe -n $NAMESPACE "$pod" 2>&1 | tail -30 || true
          done
          echo "=== Job status ==="
          kubectl get jobs -n $NAMESPACE -o wide 2>&1 || true
          echo "=== ConfigMap content ==="
          for cm in $(kubectl get cm -n $NAMESPACE -o name 2>/dev/null | grep config-); do
            echo "--- $cm ---"
            kubectl get -n $NAMESPACE "$cm" -o jsonpath='{.data}' 2>&1 || true
          done
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 3: Scale up to 5 replicas ─────────────────────────────────────
  - try:
    - patch:
        file: 01-patch-scale-up.yaml
  # ── Step 4: Assert scale-up ────────────────────────────────────────────
  - try:
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keystone-scale-api
            namespace: openstack
          spec:
            replicas: 5
          status:
            (availableReplicas >= `5`): true
    # PDB still uses minAvailable=1 for replicas > 1 (CC-0037).
    - assert:
        resource:
          apiVersion: policy/v1
          kind: PodDisruptionBudget
          metadata:
            name: keystone-scale-api
            namespace: openstack
          spec:
            minAvailable: 1
  # ── Step 5: Scale down to 2 replicas ───────────────────────────────────
  - try:
    - patch:
        file: 02-patch-scale-down.yaml
  # ── Step 6: Assert scale-down ──────────────────────────────────────────
  # NOTE: Exact match (== 2) is intentional here, unlike the >= used for
  # scale-up in Steps 2/4. Scale-up uses >= because we only need to wait
  # until enough pods are available. Scale-down uses exact match to prove
  # pods were actually terminated, not just that 2 remain available while
  # the old 5 are still running (which would make >= trivially true).
  - try:
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keystone-scale-api
            namespace: openstack
          spec:
            replicas: 2
          status:
            availableReplicas: 2
    # PDB still uses minAvailable=1 for replicas > 1 (CC-0037).
    - assert:
        resource:
          apiVersion: policy/v1
          kind: PodDisruptionBudget
          metadata:
            name: keystone-scale-api
            namespace: openstack
          spec:
            minAvailable: 1
  # ── Step 7: Scale down to 1 replica (CC-0037) ───────────────────────────
  - try:
    - patch:
        file: 03-patch-scale-to-one.yaml
  # ── Step 8: Assert PDB switches to maxUnavailable (CC-0037) ─────────────
  # When replicas == 1, the PDB must use maxUnavailable=1 instead of
  # minAvailable=1 to avoid drain deadlock.
  - try:
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keystone-scale-api
            namespace: openstack
          spec:
            replicas: 1
          status:
            availableReplicas: 1
    - assert:
        resource:
          apiVersion: policy/v1
          kind: PodDisruptionBudget
          metadata:
            name: keystone-scale-api
            namespace: openstack
          spec:
            maxUnavailable: 1
