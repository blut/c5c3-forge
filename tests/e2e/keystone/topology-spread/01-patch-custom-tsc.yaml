# Patch to override spec.topologySpreadConstraints with a custom constraint (CC-0075).
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-tsc
  namespace: openstack
spec:
  topologySpreadConstraints:
  - maxSkew: 2
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: keystone
        app.kubernetes.io/instance: keystone-tsc
