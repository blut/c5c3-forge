# Chainsaw E2E test for happy-path Keystone deployment (CC-0016).
# Validates the full reconciliation cycle in managed mode:
#   - All 5 sub-conditions progress to True with expected reasons
#   - Aggregate Ready=True with reason AllReady
#   - All owned resources exist (Deployment, Service, CronJob, Secret,
#     RBAC, PushSecret)
#   - ConfigMap with keystone-basic-config- prefix exists
#   - Keystone API at /v3 is accessible via curl
#
# REQ-001, REQ-002, REQ-003, REQ-012, REQ-013 (CC-0016)
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-basic-deployment
spec:
  namespace: openstack
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Apply Keystone CR ──────────────────────────────────────────
  - try:
    - apply:
        file: 00-keystone-cr.yaml
  # ── Step 2: Assert all sub-conditions and Ready ────────────────────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-basic
            namespace: openstack
          status:
            (conditions[?type == 'SecretsReady']):
            - status: "True"
              reason: SecretsAvailable
            (conditions[?type == 'FernetKeysReady']):
            - status: "True"
              reason: FernetKeysAvailable
            (conditions[?type == 'DatabaseReady']):
            - status: "True"
              reason: DatabaseSynced
            (conditions[?type == 'DeploymentReady']):
            - status: "True"
              reason: DeploymentReady
            (conditions[?type == 'BootstrapReady']):
            - status: "True"
              reason: BootstrapComplete
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: |
          echo "=== All pod logs ==="
          for pod in $(kubectl get pods -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 2>&1 || true
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 --previous 2>&1 || true
          done
          echo "=== Failed Job logs ==="
          for job in $(kubectl get jobs -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $job ---"
            kubectl logs -n $NAMESPACE "$job" --all-containers --tail=100 2>&1 || true
          done
          echo "=== Pod describe ==="
          for pod in $(kubectl get pods -n $NAMESPACE -l job-name -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl describe -n $NAMESPACE "$pod" 2>&1 | tail -40 || true
          done
          echo "=== Terminated container statuses ==="
          kubectl get pods -n $NAMESPACE -o json 2>/dev/null | jq -r '.items[] | select(.status.containerStatuses) | .metadata.name + ": " + (.status.containerStatuses[] | .state | tostring)' || true
          echo "=== Job status ==="
          kubectl get jobs -n $NAMESPACE -o wide 2>&1 || true
          echo "=== ConfigMap content ==="
          for cm in $(kubectl get cm -n $NAMESPACE -o name 2>/dev/null | grep config-); do
            echo "--- $cm ---"
            kubectl get -n $NAMESPACE "$cm" -o jsonpath='{.data}' 2>&1 || true
          done
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 3: Assert Deployment and Service ──────────────────────────────
  - try:
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keystone-basic-api
            namespace: openstack
          status:
            (availableReplicas > `0`): true
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: keystone-basic-api
            namespace: openstack
          spec:
            ports:
            - port: 5000
    - assert:
        resource:
          apiVersion: policy/v1
          kind: PodDisruptionBudget
          metadata:
            name: keystone-basic-api
            namespace: openstack
            labels:
              app.kubernetes.io/name: keystone
              app.kubernetes.io/instance: keystone-basic
              app.kubernetes.io/managed-by: keystone-operator
          spec:
            minAvailable: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: keystone
                app.kubernetes.io/instance: keystone-basic
  # ── Step 4: Assert Fernet resources ────────────────────────────────────
  - try:
    - assert:
        resource:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: keystone-basic-fernet-rotate
            namespace: openstack
    - assert:
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: keystone-basic-fernet-keys
            namespace: openstack
    - assert:
        resource:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: keystone-basic-fernet-rotate
            namespace: openstack
    - assert:
        resource:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: keystone-basic-fernet-rotate
            namespace: openstack
    - assert:
        resource:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: keystone-basic-fernet-rotate
            namespace: openstack
    - assert:
        resource:
          apiVersion: external-secrets.io/v1alpha1
          kind: PushSecret
          metadata:
            name: keystone-basic-fernet-keys-backup
            namespace: openstack
  # ── Step 5: Assert OpenBao PushSecret sync (CC-0083) ───────────────────
  # CC-0083: assert both PushSecrets successfully synced to OpenBao. Catches 403
  # regressions from the ESO token missing write capability on the Keystone KV
  # paths. Condition type "Ready" is defined by external-secrets.io/v1alpha1
  # PushSecretConditionType (pushsecret_types.go:213). Consolidating the fernet
  # and credential assertions into one step keeps the diagnostic catch block
  # defined once — both PushSecrets are driven by the same push-keystone-keys
  # policy, so any regression affects both and is surfaced together.
  - try:
    - assert:
        resource:
          apiVersion: external-secrets.io/v1alpha1
          kind: PushSecret
          metadata:
            name: keystone-basic-fernet-keys-backup
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
    - assert:
        resource:
          apiVersion: external-secrets.io/v1alpha1
          kind: PushSecret
          metadata:
            name: keystone-basic-credential-keys-backup
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
    catch:
    - script:
        content: |
          echo "=== PushSecret describe ==="
          kubectl -n openstack describe pushsecret keystone-basic-fernet-keys-backup keystone-basic-credential-keys-backup 2>&1 || true
          echo "=== external-secrets controller logs (last 200 lines) ==="
          kubectl -n external-secrets logs -l app.kubernetes.io/name=external-secrets --tail=200 2>&1 || true
          # CC-0083: OpenBao's audit/server log records the denied KV path and
          # the bound policy on a 403, which the ESO controller log does not —
          # dumping both lets a single CI run identify missing write capability
          # vs. a mis-targeted path without a rerun.
          echo "=== openbao logs (last 100 lines) ==="
          kubectl -n openbao logs -l app.kubernetes.io/name=openbao --tail=100 2>&1 || true
  # ── Step 6: Assert ConfigMap exists ────────────────────────────────────
  - try:
    - script:
        content: |
          kubectl get cm -n openstack -o name | grep keystone-basic-config-
  # ── Step 7: Assert API accessibility ───────────────────────────────────
  - try:
    - script:
        timeout: 30s
        content: |
          kubectl run curl-test-basic --image=ghcr.io/c5c3/keystone:2025.2 --rm -i --restart=Never \
            --command -- python3 -c "import urllib.request; print(urllib.request.urlopen('http://keystone-basic-api.openstack.svc:5000/v3').read().decode())"
