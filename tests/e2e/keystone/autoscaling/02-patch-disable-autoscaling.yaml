# Patch to disable autoscaling by removing the autoscaling field (CC-0038).
# Chainsaw merge-patches with this manifest, setting autoscaling to null.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-autoscaling
  namespace: openstack
spec:
  autoscaling: null
