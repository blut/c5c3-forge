# Patch to add memory metric to autoscaling.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-autoscaling
  namespace: openstack
spec:
  autoscaling:
    maxReplicas: 6
    targetCPUUtilization: 80
    targetMemoryUtilization: 70
