# Policy source ConfigMap for the policy-validation E2E test.
# Contains valid oslo.policy rules referenced by the Keystone CR's
# policyOverrides.configMapRef.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keystone-policy-validation-source
  namespace: openstack
data:
  policy.yaml: |
    "identity:list_users": "role:admin"
    "identity:get_user": "role:admin or user_id:%(target.user.id)s"
    "identity:create_project": "role:admin"
