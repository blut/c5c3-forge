# Patch to disable networkPolicy by removing the networkPolicy field.
# Chainsaw merge-patches with this manifest, setting networkPolicy to null.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-netpol
  namespace: openstack
spec:
  networkPolicy: null
