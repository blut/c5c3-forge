# Patch to update ingress sources — add a second source.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-netpol
  namespace: openstack
spec:
  networkPolicy:
    ingress:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: envoy-gateway-system
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
