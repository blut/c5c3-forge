# Chainsaw E2E test for NetworkPolicy reconciliation.
# Verifies that the operator creates, updates, and deletes NetworkPolicies
# based on spec.networkPolicy:
#   - Initial deployment with ingress from envoy-gateway-system namespace, the
#     auto-whitelisted operator namespace, and auto-derived egress (issue #461)
#   - Update ingress sources (add monitoring namespace)
#   - Disable networkPolicy (NetworkPolicy deleted)
#
# SCOPE CAVEAT: the CI cluster runs kindnet, which does NOT enforce
# NetworkPolicy. This suite therefore asserts the NetworkPolicy *spec* the
# operator renders (ingress peers and egress ports), not runtime enforcement.
# The egress/operator-namespace fixes in issue #461 only manifest as failures
# under an enforcing CNI (Calico/Cilium); an enforcing-CNI e2e leg
# (kind+Calico/Cilium), proposed in issue #461, is out of scope for this suite.
#
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-network-policy
spec:
  namespace: openstack
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Apply Keystone CR with networkPolicy ─────────────────────────
  - try:
    - apply:
        file: 00-keystone-cr.yaml
  # ── Step 2: Assert NetworkPolicyReady and NetworkPolicy created ──────────
  # The aggregate Ready condition is not asserted here: it depends on the full
  # Keystone stack (DB schema sync, bootstrap, key rotation) reaching readiness,
  # which is exercised by the basic-deployment and rotation suites. This suite
  # scopes to NetworkPolicy reconciliation — the NetworkPolicyReady condition
  # plus the rendered ingress peers (user source + auto-whitelisted operator
  # namespace) and auto-derived egress ports asserted below (issue #461).
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-netpol
            namespace: openstack
          status:
            (conditions[?type == 'NetworkPolicyReady']):
            - status: "True"
              reason: NetworkPolicyReady
    - assert:
        resource:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: keystone-netpol
            namespace: openstack
            labels:
              app.kubernetes.io/name: keystone
              app.kubernetes.io/instance: keystone-netpol
              app.kubernetes.io/managed-by: keystone-operator
          spec:
            podSelector:
              matchLabels:
                app.kubernetes.io/name: keystone
                app.kubernetes.io/instance: keystone-netpol
            policyTypes:
            - Ingress
            - Egress
            ingress:
            - ports:
              - protocol: TCP
                port: 5000
              from:
              # User-declared source.
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: envoy-gateway-system
              # Operator namespace, auto-whitelisted so reconcileHealthCheck can
              # reach the Keystone API (issue #461). NAMESPACE defaults to
              # keystone-system in the CI deploy (hack/ci-deploy-operator.sh); a
              # job overriding NAMESPACE must update this peer.
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: keystone-system
            # Auto-derived egress (issue #461), asserted declaratively in the
            # reconciler's deterministic order (DNS, kube-apiserver, database,
            # cache) using the same int-typed scalar form chainsaw matches for
            # the ingress port above. A JMESPath `contains()` over the port list
            # does not match here: the rendered ports are integers and chainsaw's
            # contains() compares values by strict type.
            egress:
            # DNS (UDP+TCP 53).
            - ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53
            # kube-apiserver (TCP 443+6443) for the rotation CronJob pods that
            # share this policy's selector.
            - ports:
              - protocol: TCP
                port: 443
              - protocol: TCP
                port: 6443
            # Database (TCP 3306, managed-mode default).
            - ports:
              - protocol: TCP
                port: 3306
            # Cache (TCP 11211, managed-mode default).
            - ports:
              - protocol: TCP
                port: 11211
    catch:
    - script:
        content: |
          echo "=== All pod logs ==="
          for pod in $(kubectl get pods -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 2>&1 || true
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 --previous 2>&1 || true
          done
          echo "=== Failed Job logs ==="
          for job in $(kubectl get jobs -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $job ---"
            kubectl logs -n $NAMESPACE "$job" --all-containers --tail=100 2>&1 || true
          done
          echo "=== Pod describe ==="
          for pod in $(kubectl get pods -n $NAMESPACE -l job-name -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl describe -n $NAMESPACE "$pod" 2>&1 | tail -30 || true
          done
          echo "=== Job status ==="
          kubectl get jobs -n $NAMESPACE -o wide 2>&1 || true
          echo "=== ConfigMap content ==="
          for cm in $(kubectl get cm -n $NAMESPACE -o name 2>/dev/null | grep config-); do
            echo "--- $cm ---"
            kubectl get -n $NAMESPACE "$cm" -o jsonpath='{.data}' 2>&1 || true
          done
          echo "=== NetworkPolicy status ==="
          kubectl get networkpolicy -n $NAMESPACE -o wide 2>&1 || true
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 3: Update ingress sources ───────────────────────────────────────
  - try:
    - patch:
        file: 01-patch-update-ingress.yaml
  # ── Step 4: Assert NetworkPolicy updated with both ingress sources ───────
  - try:
    - assert:
        resource:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: keystone-netpol
            namespace: openstack
          spec:
            ingress:
            - ports:
              - protocol: TCP
                port: 5000
              from:
              # User-declared sources (envoy-gateway-system + monitoring) plus
              # the auto-whitelisted operator namespace, in build order.
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: envoy-gateway-system
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: monitoring
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: keystone-system
  # ── Step 5: Disable networkPolicy ────────────────────────────────────────
  - try:
    - patch:
        file: 02-patch-disable-networkpolicy.yaml
  # ── Step 6: Assert NetworkPolicy deleted and condition updated ───────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-netpol
            namespace: openstack
          status:
            (conditions[?type == 'NetworkPolicyReady']):
            - status: "True"
              reason: NetworkPolicyNotRequired
    - script:
        content: |
          # Verify NetworkPolicy no longer exists.
          if kubectl get networkpolicy keystone-netpol -n $NAMESPACE 2>/dev/null; then
            echo "FAIL: NetworkPolicy should have been deleted"
            exit 1
          fi
          echo "PASS: NetworkPolicy correctly deleted"
