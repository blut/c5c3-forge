# KeystoneIdentityBackend fixture attaching the Keycloak "forge" realm to
# keystone-oidc. deletionPolicy Delete exercises the disable-then-delete
# domain teardown in-cluster. oauth2Introspection turns the proxy into an
# OAuth2 resource server for this realm so the CLI bearer flow works (at
# most one backend per Keystone may enable it — OIDCOAuth* directives are
# server-scoped).
#
# The mapping gates on the asserted issuer (HTTP_OIDC_ISS — the remote-id
# attribute the proxy passes) and maps the preferred username into an
# ephemeral user plus the declarative federated-users group, whose member
# role on the domain is what authorizes domain-scoped tokens.
# region backend-cr
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: KeystoneIdentityBackend
metadata:
  name: keycloak-forge
  namespace: openstack
spec:
  keystoneRef:
    name: keystone-oidc
  domain:
    name: forge
    mode: Manage
    deletionPolicy: Delete
    description: Keycloak forge realm
  type: OIDC
  oidc:
    issuer: http://keycloak.openstack.svc.cluster.local:8080/realms/forge
    clientID: keystone
    clientSecretRef:
      name: keycloak-forge-client
    # Explicit endpoints (both backends use them: the operator's metadata-fetch
    # SSRF guard blocks discovery against the in-cluster Keycloak's private
    # ClusterIP — the .well-known fetch is unit-tested instead). Everything
    # speaks the fixture's plain-http listener EXCEPT the introspection
    # endpoint, which mod_auth_openidc requires to be https — the fixture serves
    # it on the self-signed 8443 listener, and tlsVerify opts out of verifying
    # that throwaway certificate.
    endpoints:
      authorizationEndpoint: http://keycloak.openstack.svc.cluster.local:8080/realms/forge/protocol/openid-connect/auth
      tokenEndpoint: http://keycloak.openstack.svc.cluster.local:8080/realms/forge/protocol/openid-connect/token
      jwksURI: http://keycloak.openstack.svc.cluster.local:8080/realms/forge/protocol/openid-connect/certs
      userinfoEndpoint: http://keycloak.openstack.svc.cluster.local:8080/realms/forge/protocol/openid-connect/userinfo
      introspectionEndpoint: https://keycloak.openstack.svc.cluster.local:8443/realms/forge/protocol/openid-connect/token/introspect
    oauth2Introspection:
      enabled: true
      tlsVerify: false
  mappings:
  - remote:
    - type: HTTP_OIDC_ISS
      anyOneOf:
      - http://keycloak.openstack.svc.cluster.local:8080/realms/forge
    - type: HTTP_OIDC_PREFERRED_USERNAME
    local:
    # {0} is the first value-producing remote: the HTTP_OIDC_ISS rule carries
    # anyOneOf, so Keystone treats it as a pure condition and never adds it to
    # the positional direct-map tuple — HTTP_OIDC_PREFERRED_USERNAME is the only
    # value, at index 0 (a "{1}" here raises DirectMappingError/IndexError).
    - user:
        name: "{0}"
      group:
        name: federated-users
        domain:
          name: forge
  groups:
  - name: federated-users
    description: Federated Keycloak forge users
    roleAssignments:
    - role: member
      domain: true
# endregion backend-cr
