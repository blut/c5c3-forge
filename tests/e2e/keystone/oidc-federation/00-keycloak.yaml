# In-suite Keycloak fixture for the oidc-federation E2E test: a single
# start-dev pod importing TWO realms (forge and forge2 — the multi-realm
# proof) from this ConfigMap. Each realm ships a confidential "keystone"
# client (direct access grants enabled for the ROPC/bearer flow), one test
# user, and one group with a groups protocol mapper. The image pin is
# tag+digest and Renovate-tracked via the docker-digest customManager in
# renovate.json.
#
# The container deliberately carries no restricted securityContext and a
# ~1Gi memory limit: start-dev bootstraps an embedded H2 plus the JVM — this
# is a throwaway test fixture, never a production workload.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realms
  namespace: openstack
data:
  forge-realm.json: |
    {
      "realm": "forge",
      "enabled": true,
      "sslRequired": "none",
      "groups": [{"name": "engineers", "path": "/engineers"}],
      "users": [
        {
          "username": "fry",
          "enabled": true,
          "email": "fry@planetexpress.example",
          "emailVerified": true,
          "firstName": "Philip",
          "lastName": "Fry",
          "credentials": [{"type": "password", "value": "fry-password", "temporary": false}],
          "groups": ["/engineers"]
        }
      ],
      "clients": [
        {
          "clientId": "keystone",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "secret": "keystone-forge-secret",
          "redirectUris": ["http://keystone-oidc.openstack.svc.cluster.local:5000/*"],
          "webOrigins": ["*"],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "consentRequired": false,
              "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            }
          ]
        }
      ]
    }
  forge2-realm.json: |
    {
      "realm": "forge2",
      "enabled": true,
      "sslRequired": "none",
      "groups": [{"name": "captains", "path": "/captains"}],
      "users": [
        {
          "username": "leela",
          "enabled": true,
          "email": "leela@planetexpress.example",
          "emailVerified": true,
          "firstName": "Turanga",
          "lastName": "Leela",
          "credentials": [{"type": "password", "value": "leela-password", "temporary": false}],
          "groups": ["/captains"]
        }
      ],
      "clients": [
        {
          "clientId": "keystone",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "secret": "keystone-forge2-secret",
          "redirectUris": ["http://keystone-oidc.openstack.svc.cluster.local:5000/*"],
          "webOrigins": ["*"],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: openstack
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/instance: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/instance: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:26.6.4@sha256:0aae0de7fca85525f727d3354df17896092de8bb26ae4c12d89c77e5df8cbce4
        args: ["start-dev", "--import-realm"]
        env:
        - name: KC_BOOTSTRAP_ADMIN_USERNAME
          value: admin
        - name: KC_BOOTSTRAP_ADMIN_PASSWORD
          value: admin-password
        ports:
        - name: http
          containerPort: 8080
        volumeMounts:
        - name: realms
          mountPath: /opt/keycloak/data/import
          readOnly: true
        readinessProbe:
          httpGet:
            path: /realms/master
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 30
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1Gi
      volumes:
      - name: realms
        configMap:
          name: keycloak-realms
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: openstack
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: keycloak
spec:
  selector:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: keycloak
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
---
# Relying-party client secrets for the two KeystoneIdentityBackends: the
# fixed data key "clientSecret" is the contract the projection reads.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-forge-client
  namespace: openstack
type: Opaque
stringData:
  clientSecret: keystone-forge-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-forge2-client
  namespace: openstack
type: Opaque
stringData:
  clientSecret: keystone-forge2-secret
