# Keystone CR fixture for the semantic-invariants E2E test.
# Managed mode: database via clusterRef to openstack-db,
# cache via clusterRef to openstack-memcached.
#
# Intentionally omitted spec.gateway is unset so
# status.endpoint resolves to the cluster-local URL; spec.networkPolicy and
# spec.autoscaling are unset so the corresponding sub-conditions settle on
# their NotRequired/NotConfigured reasons. This keeps the observedGeneration
# assertion simple — every condition must catch up
# regardless of reason.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-invariants
  namespace: openstack
spec:
  replicas: 1
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    clusterRef:
      name: openstack-db
    database: keystone_invariants
    secretRef:
      name: keystone-db
  cache:
    clusterRef:
      name: openstack-memcached
    backend: dogpile.cache.pymemcache
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
