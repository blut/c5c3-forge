# Negative fixture: spec.logging.perLoggerLevels carries a value outside the
# {DEBUG, INFO, WARNING, ERROR, CRITICAL} enum (scenario "Invalid per-logger level rejected"). The chainsaw test applies this patch
# and asserts the validating webhook returns a field.Invalid error at the
# precise field path spec.logging.perLoggerLevels[keystone.middleware] before
# the resource is persisted.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-logging
  namespace: openstack
spec:
  logging:
    perLoggerLevels:
      keystone.middleware: VERBOSE
