# Patch to flip spec.logging.format to json.
# After the rolling update completes, every non-empty oslo.log line on the
# pod's stderr must parse as JSON via `jq -e .` for downstream Loki/OpenSearch
# ingest (uWSGI access lines are filtered out by the chainsaw script).
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-logging
  namespace: openstack
spec:
  logging:
    format: json
    debug: true
