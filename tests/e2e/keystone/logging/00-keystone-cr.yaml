# Keystone CR fixture for the logging E2E test (CC-0098).
# spec.logging is intentionally OMITTED so the defaulting webhook materializes
# the production baseline (Format=text, Level=INFO, Debug=false). The chainsaw
# test then asserts that oslo.log lines appear on the pod's stderr without any
# explicit logging configuration, exercising REQ-009 scenario "Default path
# emits oslo.log lines".
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-logging
  namespace: openstack
spec:
  replicas: 1
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    clusterRef:
      name: openstack-db
    database: keystone_logging
    secretRef:
      name: keystone-db
  cache:
    clusterRef:
      name: openstack-memcached
    backend: dogpile.cache.pymemcache
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
