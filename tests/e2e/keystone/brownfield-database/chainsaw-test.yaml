# Chainsaw E2E test for brownfield database mode (CC-0016).
# Verifies:
#   - No MariaDB CRs (Database, User, Grant) are created when using
#     explicit database.host (no clusterRef)
#   - Derived <name>-db-connection Secret carries a pymysql URL pointing at
#     the explicit host (since CC-0080 the host no longer appears in the
#     ConfigMap — keystone.conf only holds the placeholder URL)
#   - Reconciliation completes to Ready=True via the existing database
#
# REQ-010, REQ-012, REQ-013 (CC-0016), CC-0080
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-brownfield-database
spec:
  namespace: openstack
  timeouts:
    assert: 5m
  steps:
  # ── Step 0: Pre-create MariaDB Database, User, and Grant for brownfield ─
  - try:
    - apply:
        file: 00-brownfield-db-setup.yaml
    - assert:
        resource:
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: Database
          metadata:
            name: keystone-brownfield-db
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
    - assert:
        resource:
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: User
          metadata:
            name: keystone-brownfield-user
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
    - assert:
        resource:
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: Grant
          metadata:
            name: keystone-brownfield-grant
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
  # ── Step 1: Apply Keystone CR with brownfield database ─────────────────
  - try:
    - apply:
        file: 00-keystone-cr.yaml
  # ── Step 2: Assert no MariaDB CRs created for this CR ─────────────────
  - try:
    - error:
        resource:
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: Database
          metadata:
            name: keystone-brownfield
            namespace: openstack
    - error:
        resource:
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: User
          metadata:
            name: keystone-brownfield
            namespace: openstack
    - error:
        resource:
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: Grant
          metadata:
            name: keystone-brownfield
            namespace: openstack
  # ── Step 3: Wait for Ready=True ────────────────────────────────────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-brownfield
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: |
          echo "=== All pod logs ==="
          for pod in $(kubectl get pods -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 2>&1 || true
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 --previous 2>&1 || true
          done
          echo "=== Failed Job logs ==="
          for job in $(kubectl get jobs -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $job ---"
            kubectl logs -n $NAMESPACE "$job" --all-containers --tail=100 2>&1 || true
          done
          echo "=== Pod describe ==="
          for pod in $(kubectl get pods -n $NAMESPACE -l job-name -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl describe -n $NAMESPACE "$pod" 2>&1 | tail -30 || true
          done
          echo "=== Job status ==="
          kubectl get jobs -n $NAMESPACE -o wide 2>&1 || true
          echo "=== ConfigMap content ==="
          for cm in $(kubectl get cm -n $NAMESPACE -o name 2>/dev/null | grep config-); do
            echo "--- $cm ---"
            kubectl get -n $NAMESPACE "$cm" -o jsonpath='{.data}' 2>&1 || true
          done
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 4: Verify derived db-connection Secret points at explicit host ─
  # Since CC-0080 the real connection URL (and thus the brownfield host)
  # lives in the derived <name>-db-connection Secret, not in keystone.conf
  # (which carries the placeholder URL consumed via OS_DATABASE__CONNECTION).
  - try:
    - script:
        content: |
          set -eu
          CONN=$(kubectl get secret -n openstack keystone-brownfield-db-connection \
            -o jsonpath='{.data.connection}' | base64 -d)
          if [ -z "$CONN" ]; then
            echo "ERROR: derived Secret keystone-brownfield-db-connection has no connection data"
            exit 1
          fi
          if ! printf '%s' "$CONN" | grep -qF 'openstack-db.openstack.svc.cluster.local'; then
            echo "FAIL: connection URL does not point at the explicit brownfield host: $CONN"
            exit 1
          fi
          echo "OK: db-connection Secret points at the explicit brownfield host"
