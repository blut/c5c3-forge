# Pre-creates the MariaDB Database, User, and Grant CRs for the brownfield
# database E2E test. In brownfield mode the Keystone operator intentionally
# skips creating these resources, so they must exist beforehand.
apiVersion: k8s.mariadb.com/v1alpha1
kind: Database
metadata:
  name: keystone-brownfield-db
  namespace: openstack
spec:
  mariaDbRef:
    name: openstack-db
  # cleanupPolicy: Skip mirrors the User/Grant CRs below for uniform
  # brownfield-resource protection on teardown. The dedicated database name
  # `keystone_brownfield` already isolates this fixture from sibling tests
  # (e.g. tests/e2e/keystone/pod-security-restricted uses
  # `keystone_pss_restricted`), so Skip here is symmetry/clarity rather than
  # race avoidance — but it keeps the rationale uniform across all three CRs
  # and removes a future foot-gun if a sibling test ever reuses the name
  # (CC-0104).
  cleanupPolicy: Skip
  characterSet: utf8
  collate: utf8_general_ci
  name: keystone_brownfield
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: keystone-brownfield-user
  namespace: openstack
spec:
  mariaDbRef:
    name: openstack-db
  # cleanupPolicy: Skip preserves the canonical `keystone` MariaDB user on
  # teardown. Sibling tests (e.g. tests/e2e/keystone/pod-security-restricted)
  # also manage the same user under `parallel: 4`; without Skip, this test's
  # teardown could drop the user out from under a still-running sibling
  # (CC-0104, W-002).
  cleanupPolicy: Skip
  name: keystone
  passwordSecretKeyRef:
    name: keystone-db
    key: password
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: keystone-brownfield-grant
  namespace: openstack
spec:
  mariaDbRef:
    name: openstack-db
  # cleanupPolicy: Skip — see User CR comment above (CC-0104, W-002).
  cleanupPolicy: Skip
  privileges:
  - "ALL PRIVILEGES"
  database: keystone_brownfield
  table: "*"
  username: keystone
