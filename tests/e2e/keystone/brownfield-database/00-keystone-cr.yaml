# Keystone CR fixture for the brownfield-database E2E test.
# Uses explicit database.host (no clusterRef) to validate brownfield mode:
# no MariaDB CRs should be created by the reconciler.
# Points to the existing openstack-db MariaDB instance for the db-sync Job.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-brownfield
  namespace: openstack
spec:
  secretStoreRef:
    kind: SecretStore
    name: openbao-tenant-store
  deployment:
    replicas: 1
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    host: openstack-db.openstack.svc.cluster.local
    port: 3306
    database: keystone_brownfield
    secretRef:
      name: keystone-db
  cache:
    backend: dogpile.cache.pymemcache
    servers:
    - "openstack-memcached:11211"
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
