# Keystone CR fixture for the missing-secret E2E test (CC-0016).
# References non-existent Secrets (missing-secret-keystone-db,
# missing-secret-keystone-admin) to test SecretsReady=False recovery.
# Uses brownfield database.host and cache.servers to avoid
# MariaDB/Memcached CR dependencies during the initial failure assertion.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-missing-secret
  namespace: openstack
spec:
  replicas: 1
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    host: openstack-db.openstack.svc.cluster.local
    port: 3306
    database: keystone_missing
    secretRef:
      name: missing-secret-keystone-db
  cache:
    backend: dogpile.cache.pymemcache
    servers:
    - "openstack-memcached-0.openstack-memcached:11211"
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: missing-secret-keystone-admin
    region: RegionOne
