# Late-created ExternalSecrets for the missing-secret E2E test (CC-0016).
# These create the previously non-existent Secrets that the Keystone CR
# references, triggering recovery from SecretsReady=False to Ready=True.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: missing-secret-keystone-db
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: missing-secret-keystone-db
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: openstack/keystone/db
      property: username
  - secretKey: password
    remoteRef:
      key: openstack/keystone/db
      property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: missing-secret-keystone-admin
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: missing-secret-keystone-admin
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: bootstrap/keystone-admin
      property: password
