# Late-created ExternalSecrets for the missing-secret E2E test (CC-0016).
# These create the previously non-existent Secrets that the Keystone CR
# references, triggering recovery from SecretsReady=False to Ready=True.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: missing-secret-keystone-db
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: missing-secret-keystone-db
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: openstack/keystone/db
      property: username
  - secretKey: password
    remoteRef:
      key: openstack/keystone/db
      property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: missing-secret-keystone-admin
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: missing-secret-keystone-admin
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      # Per-CR admin-password path the deploy-infra seed writes (CC-0112):
      # bootstrap/{namespace}/{keystone}/admin for ControlPlane "controlplane"
      # in namespace "openstack". The legacy flat bootstrap/keystone-admin path
      # is no longer seeded. Read-only here — this fixture only needs a valid
      # admin password to drive its own CR's recovery to Ready=True.
      key: bootstrap/openstack/controlplane-keystone/admin
      property: password
