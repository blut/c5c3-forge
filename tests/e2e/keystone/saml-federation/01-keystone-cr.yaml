# Keystone CR fixture for the saml-federation E2E test.
# Managed mode: database via clusterRef to openstack-db (unique database
# keystone_saml so parallel suites never share a schema), cache via clusterRef
# to openstack-memcached — but with keystone-side caching disabled for
# hermeticity (the oidc-federation precedent: dogpile keys carry no
# per-deployment discriminator, so parallel suites cross-talk).
#
# spec.federation.proxyImage is the federation sidecar the CI pipeline builds
# and loads into kind under the :dev tag — the sidecar only appears once the
# first federation backend attaches.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-saml
  namespace: openstack
spec:
  deployment:
    replicas: 1
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  federation:
    proxyImage:
      repository: ghcr.io/c5c3/keystone-federation-proxy
      tag: dev
  database:
    clusterRef:
      name: openstack-db
    database: keystone_saml
    secretRef:
      name: keystone-db
  cache:
    clusterRef:
      name: openstack-memcached
    backend: dogpile.cache.pymemcache
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
  extraConfig:
    # Cache hermeticity — caching is not under test here.
    cache:
      enabled: "false"
    # The websso round trip requires the origin to be a trusted dashboard.
    federation:
      trusted_dashboard: http://localhost/dummy
