# Keystone CR fixture for the basic-deployment E2E test.
# Managed mode: database via clusterRef to openstack-db,
# cache via clusterRef to openstack-memcached.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-basic-2026-1
  namespace: openstack
spec:
  deployment:
    replicas: 3
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2026.1"
  database:
    clusterRef:
      name: openstack-db
    database: keystone_basic_2026_1
    secretRef:
      name: keystone-db
  cache:
    clusterRef:
      name: openstack-memcached
    backend: dogpile.cache.pymemcache
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
