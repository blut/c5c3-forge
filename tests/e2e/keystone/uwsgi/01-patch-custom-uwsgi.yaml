# Patch to set custom spec.uwsgi values (CC-0040).
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-uwsgi
  namespace: openstack
spec:
  uwsgi:
    processes: 3
    threads: 3
    httpKeepAlive: false
