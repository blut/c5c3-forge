# Keystone CR fixture for the trust-flush-default E2E test (CC-0096, REQ-007).
# Mirrors tests/e2e/keystone/trust-flush/00-keystone-cr.yaml but OMITS the
# `trustFlush:` block entirely so the defaulting webhook materializes
# spec.trustFlush = {schedule: "0 * * * *", suspend: false}. The CR uses a
# distinct name and database to avoid collisions with the sibling suite.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-trust-flush-default
  namespace: openstack
spec:
  replicas: 1
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    clusterRef:
      name: openstack-db
    database: keystone_trust_flush_default
    secretRef:
      name: keystone-db
  cache:
    clusterRef:
      name: openstack-memcached
    backend: dogpile.cache.pymemcache
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
