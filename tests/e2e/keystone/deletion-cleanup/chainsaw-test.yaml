# Chainsaw E2E test for garbage collection on Keystone CR deletion,
# finalizer-driven MariaDB CR cleanup, and OpenBao PushSecret
# finalizer cleanup. Deploys a Keystone CR, waits for Ready=True,
# asserts both finalizers (cleanup + openbao) are present, deletes the CR,
# then asserts all owned resources, MariaDB CRs, and backup PushSecrets are
# absent (NotFound), and that the remote OpenBao KV-v2 paths backing those
# PushSecrets have been purged, within a bounded deletion window.
#
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-deletion-cleanup
spec:
  namespace: openstack
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Apply Keystone CR ──────────────────────────────────────────
  - try:
    - apply:
        file: 00-keystone-cr.yaml
  # ── Step 2: Wait for Ready=True and assert finalizers present ──────────
  # The cleanup finalizer is added on first reconcile so
  # deletion can trigger MariaDB CR cleanup before the Keystone CR is removed
  # from etcd.
  # The openbao-finalizer is also added on first reconcile
  # so that the two backup PushSecrets (fernet-keys-backup, credential-keys-
  # backup) can be deleted — which drives ESO to purge the remote KV-v2 paths
  # — before the Keystone CR is removed from etcd.
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-cleanup
            namespace: openstack
            # Nil-safe: on the first poll after apply the controller may not
            # have added the finalizer yet (`finalizers` is nil). Without the
            # `|| `[]`` fallback, JMESPath's `contains()` raises a non-retryable
            # type error and the 5m assert timeout never kicks in.
            (contains(finalizers || `[]`, 'keystone.openstack.c5c3.io/finalizer')): true
            (contains(finalizers || `[]`, 'keystone.openstack.c5c3.io/openbao-finalizer')): true
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    # Pin the ESO adoption-finalizer literal against the deployed ESO version.
    # The operator's openbao-finalizer Pass-0 adoption gate (and its bounded
    # adoption-wait timeout) branch on exactly this string; if an ESO upgrade
    # renames its finalizer, this assertion fails the suite loudly instead of
    # silently turning CR deletion into a WaitingForESOAdoption hang. Chainsaw
    # compares the JMESPath result for equality, so contains() (a bool) is
    # matched against the bool true; the `|| `[]`` fallback lets the assert
    # retry while the finalizers list is still nil (pre-adoption) rather than
    # raising a non-retryable type error.
    - assert:
        resource:
          apiVersion: external-secrets.io/v1alpha1
          kind: PushSecret
          metadata:
            name: keystone-cleanup-fernet-keys-backup
            namespace: openstack
            (contains(finalizers || `[]`, 'pushsecret.externalsecrets.io/finalizer')): true
    catch:
    - script:
        content: |
          echo "=== All pod logs ==="
          for pod in $(kubectl get pods -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 2>&1 || true
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 --previous 2>&1 || true
          done
          echo "=== Failed Job logs ==="
          for job in $(kubectl get jobs -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $job ---"
            kubectl logs -n $NAMESPACE "$job" --all-containers --tail=100 2>&1 || true
          done
          echo "=== Pod describe ==="
          for pod in $(kubectl get pods -n $NAMESPACE -l job-name -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl describe -n $NAMESPACE "$pod" 2>&1 | tail -30 || true
          done
          echo "=== Job status ==="
          kubectl get jobs -n $NAMESPACE -o wide 2>&1 || true
          echo "=== ConfigMap content ==="
          for cm in $(kubectl get cm -n $NAMESPACE -o name 2>/dev/null | grep config-); do
            echo "--- $cm ---"
            kubectl get -n $NAMESPACE "$cm" -o jsonpath='{.data}' 2>&1 || true
          done
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 3: Delete the Keystone CR ─────────────────────────────────────
  # Bounded timeout (<= 2m) to keep deletion responsive;
  # fails the test if the finalizer blocks removal for longer than this.
  - try:
    - delete:
        timeout: 2m
        ref:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          name: keystone-cleanup
          namespace: openstack
  # ── Step 4: Assert all owned resources are deleted ─────────────────────
  - try:
    - error:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keystone-cleanup
            namespace: openstack
    - error:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: keystone-cleanup
            namespace: openstack
    - error:
        resource:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: keystone-cleanup-fernet-rotate
            namespace: openstack
    - error:
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: keystone-cleanup-fernet-keys
            namespace: openstack
    - error:
        resource:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: keystone-cleanup-fernet-rotate
            namespace: openstack
    - error:
        resource:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: keystone-cleanup-fernet-rotate
            namespace: openstack
    - error:
        resource:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: keystone-cleanup-fernet-rotate
            namespace: openstack
    # Both backup PushSecrets are deleted by the openbao-finalizer handler so
    # ESO can purge the corresponding kv-v2 paths.
    - error:
        resource:
          apiVersion: external-secrets.io/v1alpha1
          kind: PushSecret
          metadata:
            name: keystone-cleanup-fernet-keys-backup
            namespace: openstack
    - error:
        resource:
          apiVersion: external-secrets.io/v1alpha1
          kind: PushSecret
          metadata:
            name: keystone-cleanup-credential-keys-backup
            namespace: openstack
    - error:
        resource:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: keystone-cleanup-db-sync
            namespace: openstack
    # MariaDB CRs created by reconcileDatabase in managed mode (clusterRef).
    # Owner references are set on these CRs, so they must be garbage-collected
    # when the Keystone CR is deleted.
    - error:
        resource:
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: Database
          metadata:
            name: keystone-cleanup
            namespace: openstack
    - error:
        resource:
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: User
          metadata:
            name: keystone-cleanup
            namespace: openstack
    - error:
        resource:
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: Grant
          metadata:
            name: keystone-cleanup
            namespace: openstack
  # ── Step 5: Assert dynamically-named ConfigMap deleted ─────────────────
  # The ConfigMap has a content-hash suffix so it cannot use a static error
  # assertion. A script step with an inverted grep verifies no ConfigMap
  # with the expected prefix remains after garbage collection.
  - try:
    - script:
        content: |
          set -eu
          if kubectl get cm -n openstack -o name | grep -q keystone-cleanup-config-; then
            echo "ERROR: ConfigMap matching keystone-cleanup-config-* still exists"
            exit 1
          fi
          echo "OK: No ConfigMap matching keystone-cleanup-config-* found"
  # ── Step 6: Assert OpenBao KV-v2 paths are absent ──────────────────────
  # RemoteKey is scoped per Keystone CR.
  # (boundary 4) further inserts the Keystone CR's NAMESPACE as a
  # path segment, so the operator RemoteKey is now
  # openstack/keystone/{keystone.Namespace}/{keystone.Name}/<leaf>; this step
  # checks the paths under the openstack/keystone-cleanup sub-tree only.
  # Cross-test interference with other chainsaw suites is no longer
  # structurally possible — each test's kv-v2 paths live in a disjoint
  # sub-tree.
  #
  # DECISION: this step is updated under boundary 4 (/) for
  # consistency with the operator's actual write path. Before the namespace
  # segment was added, asserting the non-namespace path returned NotFound;
  # because the operator never writes that path anymore, the check would be
  # a vacuous false-positive (NotFound for a path that was never written).
  # The namespace-segmented path below is the one ESO actually purges.
  #
  # PushSecret deletion with DeletionPolicy=Delete drives
  # ESO to purge the remote kv-v2/openstack/keystone/openstack/keystone-cleanup/
  # {fernet-keys,credential-keys} paths. PushSecret NotFound alone does not
  # guarantee the remote purge succeeded, so this step execs bao-cli inside
  # the openbao-0 pod and asserts both paths return a non-zero exit (path
  # not found / no value).
  #
  # ESO's remote DeleteSecret completes asynchronously
  # after the PushSecret object is garbage-collected — typically 1-3 s, but
  # may lag under workqueue contention. Poll each kv-v2 path every 3 s for
  # up to 30 s (10 iterations) and exit 0 on the first all-clear sweep, so
  # the expected gap between step-4 (PushSecret gone) and the remote purge
  # does not re-flake the test. On timeout, emit one
  # "ERROR: <path> still present after 30s" line per stuck path to stderr
  # and exit non-zero so chainsaw still fails loudly on an operator
  # regression.
  #
  # Namespace note: the OpenBao server runs in openbao-system (see
  # deploy/flux-system/releases/openbao.yaml:14 and
  # deploy/openbao/bootstrap/common.sh:17). The task spec reference to
  # "namespace openbao" is stale — openbao-system is the authoritative
  # target used by the HelmRelease and bootstrap scripts.
  - try:
    - script:
        timeout: 60s
        content: |
          set -u
          BAO_NS="openbao-system"
          POD="openbao-0"
          SECRET="openbao-init-keys"
          BAO_ADDR="https://127.0.0.1:8200"
          VAULT_CACERT="/openbao/tls/ca.crt"

          BAO_TOKEN=$(kubectl get secret "${SECRET}" -n "${BAO_NS}" \
            -o jsonpath='{.data.init-output}' | base64 -d | jq -r '.root_token')
          if [ -z "${BAO_TOKEN}" ] || [ "${BAO_TOKEN}" = "null" ]; then
            echo "ERROR: could not extract root token from ${BAO_NS}/${SECRET}"
            exit 1
          fi

          # Bounded retry: 30 s budget, 3 s interval, 10 iterations max.
          # Exit 0 on the first sweep where every path is absent.
          # Use date +%s (not $SECONDS) — chainsaw runs scripts under
          # /usr/bin/sh (dash), which does not define SECONDS, so with
          # `set -u` the expansion would fail with "parameter not set".
          deadline=$(( $(date +%s) + 30 ))
          still_present=""
          while [ "$(date +%s)" -lt "${deadline}" ]; do
            all_clear=1
            still_present=""
            for path in "kv-v2/openstack/keystone/openstack/keystone-cleanup/fernet-keys" \
                        "kv-v2/openstack/keystone/openstack/keystone-cleanup/credential-keys"; do
              echo "=== bao kv get ${path} (expect not-found) ==="
              out=$(kubectl exec -n "${BAO_NS}" "${POD}" -- \
                env BAO_ADDR="${BAO_ADDR}" BAO_TOKEN="${BAO_TOKEN}" \
                    VAULT_CACERT="${VAULT_CACERT}" \
                    bao kv get "${path}" 2>&1) && get_rc=0 || get_rc=$?
              echo "${out}"
              echo "exit=${get_rc}"
              if [ "${get_rc}" -eq 0 ]; then
                echo "ERROR: ${path} still exists in OpenBao after PushSecret deletion"
                still_present="${still_present} ${path}"
                all_clear=0
              else
                echo "OK: ${path} is absent in OpenBao"
              fi
            done
            if [ "${all_clear}" -eq 1 ]; then
              exit 0
            fi
            sleep 3
          done

          # Timeout: name each still-present path on stderr so chainsaw's
          # failure surface identifies exactly which kv-v2 path leaked
          for path in ${still_present}; do
            echo "ERROR: ${path} still present after 30s" >&2
          done
          exit 1
    catch:
    - script:
        content: |
          echo "=== openbao pods ==="
          kubectl get pods -n openbao-system -l app.kubernetes.io/name=openbao 2>&1 || true
          echo "=== openbao logs (last 100 lines) ==="
          kubectl logs -n openbao-system -l app.kubernetes.io/name=openbao --tail=100 2>&1 || true
          echo "=== external-secrets controller logs (last 200 lines) ==="
          kubectl logs -n external-secrets -l app.kubernetes.io/name=external-secrets --tail=200 2>&1 || true
