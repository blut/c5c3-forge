# Chainsaw E2E test for garbage collection on Keystone CR deletion (CC-0016)
# and finalizer-driven MariaDB CR cleanup (CC-0078). Deploys a Keystone CR,
# waits for Ready=True, asserts the finalizer is present, deletes the CR,
# then asserts all owned resources and MariaDB CRs are absent (NotFound)
# within a bounded deletion window.
#
# REQ-007, REQ-012, REQ-013 (CC-0016)
# REQ-008 (CC-0078)
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-deletion-cleanup
spec:
  namespace: openstack
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Apply Keystone CR ──────────────────────────────────────────
  - try:
    - apply:
        file: 00-keystone-cr.yaml
  # ── Step 2: Wait for Ready=True and assert finalizer present ───────────
  # REQ-008 (CC-0078): The controller adds the finalizer on first reconcile
  # so deletion can trigger MariaDB CR cleanup before the Keystone CR is
  # removed from etcd.
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-cleanup
            namespace: openstack
            (contains(finalizers, 'keystone.openstack.c5c3.io/finalizer')): true
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: |
          echo "=== All pod logs ==="
          for pod in $(kubectl get pods -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 2>&1 || true
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 --previous 2>&1 || true
          done
          echo "=== Failed Job logs ==="
          for job in $(kubectl get jobs -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $job ---"
            kubectl logs -n $NAMESPACE "$job" --all-containers --tail=100 2>&1 || true
          done
          echo "=== Pod describe ==="
          for pod in $(kubectl get pods -n $NAMESPACE -l job-name -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl describe -n $NAMESPACE "$pod" 2>&1 | tail -30 || true
          done
          echo "=== Job status ==="
          kubectl get jobs -n $NAMESPACE -o wide 2>&1 || true
          echo "=== ConfigMap content ==="
          for cm in $(kubectl get cm -n $NAMESPACE -o name 2>/dev/null | grep config-); do
            echo "--- $cm ---"
            kubectl get -n $NAMESPACE "$cm" -o jsonpath='{.data}' 2>&1 || true
          done
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 3: Delete the Keystone CR ─────────────────────────────────────
  # REQ-008 (CC-0078): Bounded timeout (<= 2m) to keep deletion responsive;
  # fails the test if the finalizer blocks removal for longer than this.
  - try:
    - delete:
        timeout: 2m
        ref:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          name: keystone-cleanup
          namespace: openstack
  # ── Step 4: Assert all owned resources are deleted ─────────────────────
  - try:
    - error:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: keystone-cleanup-api
            namespace: openstack
    - error:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: keystone-cleanup-api
            namespace: openstack
    - error:
        resource:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: keystone-cleanup-fernet-rotate
            namespace: openstack
    - error:
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: keystone-cleanup-fernet-keys
            namespace: openstack
    - error:
        resource:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: keystone-cleanup-fernet-rotate
            namespace: openstack
    - error:
        resource:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: keystone-cleanup-fernet-rotate
            namespace: openstack
    - error:
        resource:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: keystone-cleanup-fernet-rotate
            namespace: openstack
    - error:
        resource:
          apiVersion: external-secrets.io/v1alpha1
          kind: PushSecret
          metadata:
            name: keystone-cleanup-fernet-keys-backup
            namespace: openstack
    - error:
        resource:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: keystone-cleanup-db-sync
            namespace: openstack
    # MariaDB CRs created by reconcileDatabase in managed mode (clusterRef).
    # Owner references are set on these CRs, so they must be garbage-collected
    # when the Keystone CR is deleted (CC-0016).
    - error:
        resource:
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: Database
          metadata:
            name: keystone-cleanup
            namespace: openstack
    - error:
        resource:
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: User
          metadata:
            name: keystone-cleanup
            namespace: openstack
    - error:
        resource:
          apiVersion: k8s.mariadb.com/v1alpha1
          kind: Grant
          metadata:
            name: keystone-cleanup
            namespace: openstack
  # ── Step 5: Assert dynamically-named ConfigMap deleted ─────────────────
  # The ConfigMap has a content-hash suffix so it cannot use a static error
  # assertion. A script step with an inverted grep verifies no ConfigMap
  # with the expected prefix remains after garbage collection (CC-0016).
  - try:
    - script:
        content: |
          set -eu
          if kubectl get cm -n openstack -o name | grep -q keystone-cleanup-config-; then
            echo "ERROR: ConfigMap matching keystone-cleanup-config-* still exists"
            exit 1
          fi
          echo "OK: No ConfigMap matching keystone-cleanup-config-* found"
