# PriorityClass fixture for the priority-class E2E test.
# Created before the Keystone CR so the validating webhook can find it.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: openstack-control-plane
globalDefault: false
value: 1000000
preemptionPolicy: PreemptLowerPriority
description: >-
  Priority class for OpenStack control-plane pods. Used in the E2E test.
