# Chainsaw E2E test for fernet key rotation.
# Verifies:
#   - CronJob schedule matches spec.fernet.rotationSchedule
#   - Manual rotation via kubectl create job --from=cronjob changes Secret data
#   - Pod UIDs remain unchanged after rotation (no Deployment rollout)
#   - A fernet token obtained before rotation validates after rotation
#
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-fernet-rotation
spec:
  namespace: openstack
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Apply Keystone CR ──────────────────────────────────────────
  - try:
    - apply:
        file: 00-keystone-cr.yaml
  # ── Step 2: Wait for Ready=True ────────────────────────────────────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-fernet
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: |
          echo "=== All pod logs ==="
          for pod in $(kubectl get pods -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 2>&1 || true
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=60 --previous 2>&1 || true
          done
          echo "=== Failed Job logs ==="
          for job in $(kubectl get jobs -n $NAMESPACE -o name 2>/dev/null); do
            echo "--- $job ---"
            kubectl logs -n $NAMESPACE "$job" --all-containers --tail=100 2>&1 || true
          done
          echo "=== Pod describe ==="
          for pod in $(kubectl get pods -n $NAMESPACE -l job-name -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl describe -n $NAMESPACE "$pod" 2>&1 | tail -30 || true
          done
          echo "=== Job status ==="
          kubectl get jobs -n $NAMESPACE -o wide 2>&1 || true
          echo "=== ConfigMap content ==="
          for cm in $(kubectl get cm -n $NAMESPACE -o name 2>/dev/null | grep config-); do
            echo "--- $cm ---"
            kubectl get -n $NAMESPACE "$cm" -o jsonpath='{.data}' 2>&1 || true
          done
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -30 || true
  # ── Step 3: Assert CronJob schedule matches spec; not suspended by default ─
  - try:
    - assert:
        resource:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: keystone-fernet-fernet-rotate
            namespace: openstack
          spec:
            schedule: "0 0 * * 0"
            suspend: false
  # ── Step 4: Trigger rotation, verify no rollout, validate token ─────────
  - try:
    - script:
        timeout: 180s
        shell: bash
        content: |
          set -euo pipefail

          # Record pre-rotation state: pod UIDs and Secret data hash.
          # The pod-template-hash label is set only on Deployment-owned pods by
          # the ReplicaSet controller, so the selector excludes CronJob-managed
          # rotation pods that share commonLabels with the API pods.
          BEFORE_UIDS=$(kubectl get pods -n openstack \
            -l app.kubernetes.io/name=keystone,app.kubernetes.io/instance=keystone-fernet,pod-template-hash \
            -o jsonpath='{range .items[*]}{.metadata.uid}{"\n"}{end}' | sort)
          BEFORE_HASH=$(kubectl get secret keystone-fernet-fernet-keys -n openstack \
            -o jsonpath='{.data}' | sha256sum | cut -d' ' -f1)

          # Obtain a fernet token before rotation for later validation.
          ADMIN_PASS=$(kubectl get secret keystone-admin -n openstack \
            -o jsonpath='{.data.password}' | base64 -d)
          if [ -z "$ADMIN_PASS" ]; then
            echo "ERROR: keystone-admin Secret has empty or missing password field"
            exit 1
          fi
          POD=$(kubectl get pods -n openstack \
            -l app.kubernetes.io/name=keystone,app.kubernetes.io/instance=keystone-fernet,pod-template-hash \
            -o jsonpath='{.items[0].metadata.name}')
          # The keystone image ships python3 but no curl; use urllib to issue
          # the auth request. The admin password is passed as argv[1] (not
          # stdin) because openbao generates a shell-safe 64-char hex string.
          TOKEN=$(kubectl exec -n openstack "$POD" -- python3 -c '
          import json, sys, urllib.request
          pw = sys.argv[1]
          body = json.dumps({"auth": {"identity": {"methods": ["password"], "password": {"user": {"name": "admin", "domain": {"id": "default"}, "password": pw}}}}}).encode()
          req = urllib.request.Request("http://localhost:5000/v3/auth/tokens", data=body, headers={"Content-Type": "application/json"})
          with urllib.request.urlopen(req) as r:
              sys.stdout.write(r.headers.get("X-Subject-Token", ""))
          ' "$ADMIN_PASS")
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Failed to obtain fernet token before rotation"
            exit 1
          fi
          echo "OK: Obtained fernet token before rotation"

          # Trigger manual fernet key rotation.
          kubectl create job keystone-fernet-manual-rotate \
            --from=cronjob/keystone-fernet-fernet-rotate -n openstack
          kubectl wait --for=condition=complete \
            job/keystone-fernet-manual-rotate -n openstack --timeout=120s

          # The CronJob writes new keys to the staging Secret only; the
          # operator promotes them to the production Secret on the next
          # reconcile triggered by the staging Secret watch. Poll
          # for the production Secret hash to change rather than asserting
          # immediately after Job completion.
          AFTER_HASH="$BEFORE_HASH"
          for _ in $(seq 1 60); do
            AFTER_HASH=$(kubectl get secret keystone-fernet-fernet-keys -n openstack \
              -o jsonpath='{.data}' | sha256sum | cut -d' ' -f1)
            [ "$BEFORE_HASH" != "$AFTER_HASH" ] && break
            sleep 1
          done
          if [ "$BEFORE_HASH" = "$AFTER_HASH" ]; then
            echo "ERROR: Fernet Secret data did not change after rotation"
            exit 1
          fi
          echo "OK: Fernet Secret data changed"

          # No kubelet projection wait needed: the token validation below is the
          # real semantic guarantee that rotated keys are functional.

          # Verify pod UIDs are unchanged (no Deployment rollout).
          AFTER_UIDS=$(kubectl get pods -n openstack \
            -l app.kubernetes.io/name=keystone,app.kubernetes.io/instance=keystone-fernet,pod-template-hash \
            -o jsonpath='{range .items[*]}{.metadata.uid}{"\n"}{end}' | sort)
          if [ "$BEFORE_UIDS" != "$AFTER_UIDS" ]; then
            echo "ERROR: Pod UIDs changed after rotation — rollout occurred"
            echo "Before: $BEFORE_UIDS"
            echo "After:  $AFTER_UIDS"
            exit 1
          fi
          echo "OK: Pod UIDs unchanged after fernet rotation (no rollout)"

          # Validate the pre-rotation token still works (multi-key overlap).
          # Same python-over-stdin pattern: keystone image has no curl, and
          # piping the token avoids embedding it in a quoted -c argument.
          HTTP_CODE=$(printf '%s' "$TOKEN" | kubectl exec -i -n openstack "$POD" -- python3 -c '
          import sys, urllib.request, urllib.error
          tok = sys.stdin.read()
          req = urllib.request.Request("http://localhost:5000/v3/auth/tokens", headers={"X-Auth-Token": tok, "X-Subject-Token": tok})
          try:
              with urllib.request.urlopen(req) as r:
                  sys.stdout.write(str(r.status))
          except urllib.error.HTTPError as e:
              sys.stdout.write(str(e.code))
          ')
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Pre-rotation token validation returned HTTP $HTTP_CODE (expected 200)"
            exit 1
          fi
          echo "OK: Pre-rotation token validates post-rotation (HTTP 200)"
    catch:
    - script:
        content: |
          echo "=== Fernet rotation Job pods ==="
          kubectl get pods -n $NAMESPACE -l job-name=keystone-fernet-manual-rotate -o wide 2>&1 || true
          for pod in $(kubectl get pods -n $NAMESPACE -l job-name=keystone-fernet-manual-rotate -o name 2>/dev/null); do
            echo "--- $pod logs ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=100 2>&1 || true
            echo "--- $pod previous logs ---"
            kubectl logs -n $NAMESPACE "$pod" --all-containers --tail=100 --previous 2>&1 || true
            echo "--- $pod describe ---"
            kubectl describe -n $NAMESPACE "$pod" 2>&1 | tail -30 || true
          done
          echo "=== Keystone API pods ==="
          kubectl get pods -n $NAMESPACE \
            -l app.kubernetes.io/name=keystone,app.kubernetes.io/instance=keystone-fernet \
            -o wide 2>&1 || true
          echo "=== Events ==="
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>&1 | tail -20 || true
  # ── Step 4.5: Assert rotation Role RBAC split ─────────
  # Verifies the `keystone-fernet-fernet-rotate` Role grants `patch` ONLY on
  # the staging Secret (`keystone-fernet-fernet-keys-rotation`) and NEVER on
  # the production Secret (`keystone-fernet-fernet-keys`). This is the
  # regression guard for the split-compute-write architecture.
  - try:
    - script:
        shell: bash
        content: |
          set -euo pipefail

          ROLE_JSON=$(kubectl get role keystone-fernet-fernet-rotate -n openstack -o json)

          # Assertion 1: NO PolicyRule may grant `patch` scoped to the
          # production Secret `keystone-fernet-fernet-keys`.
          PROD_PATCH=$(echo "$ROLE_JSON" | jq '[.rules[] | select(.resourceNames // [] | index("keystone-fernet-fernet-keys")) | select(.verbs // [] | index("patch"))] | length')
          if [ "$PROD_PATCH" != "0" ]; then
            echo "ERROR: Role keystone-fernet-fernet-rotate grants 'patch' on production Secret keystone-fernet-fernet-keys (violation)"
            echo "$ROLE_JSON" | jq '.rules'
            exit 1
          fi
          echo "OK: Role has no 'patch' verb scoped to production Secret keystone-fernet-fernet-keys"

          # Assertion 2: At least ONE PolicyRule must grant `patch` scoped to
          # the staging Secret `keystone-fernet-fernet-keys-rotation`.
          STAGING_PATCH=$(echo "$ROLE_JSON" | jq '[.rules[] | select(.resourceNames // [] | index("keystone-fernet-fernet-keys-rotation")) | select(.verbs // [] | index("patch"))] | length')
          if [ "$STAGING_PATCH" -lt 1 ]; then
            echo "ERROR: Role keystone-fernet-fernet-rotate is missing 'patch' verb on staging Secret keystone-fernet-fernet-keys-rotation (violation)"
            echo "$ROLE_JSON" | jq '.rules'
            exit 1
          fi
          echo "OK: Role has 'patch' verb scoped to staging Secret keystone-fernet-fernet-keys-rotation"

          echo "OK: Rotation Role RBAC split verified (read-only on prod, patch only on staging)"
    catch:
    - script:
        content: |
          echo "=== Role keystone-fernet-fernet-rotate (yaml) ==="
          kubectl get role keystone-fernet-fernet-rotate -n openstack -o yaml 2>&1 || true
          echo "=== Role keystone-fernet-fernet-rotate (json rules) ==="
          kubectl get role keystone-fernet-fernet-rotate -n openstack -o json 2>&1 | jq '.rules' || true
          echo "=== All roles in namespace ==="
          kubectl get roles -n $NAMESPACE -o wide 2>&1 || true
  # ── Step 5: Assert Ready=True maintained after rotation ────────────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-fernet
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
  # ── Step 6: Pause rotation via spec.fernet.suspend: true (escape hatch) ──
  - try:
    - patch:
        file: 01-patch-suspend-fernet.yaml
  # ── Step 7: Assert CronJob preserved, suspended, schedule unchanged ─────
  # suspend pauses rotation without deleting the CronJob and without changing
  # the rotation cadence, so an SRE can resume without churn.
  - try:
    - assert:
        resource:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: keystone-fernet-fernet-rotate
            namespace: openstack
          spec:
            schedule: "0 0 * * 0"
            suspend: true
