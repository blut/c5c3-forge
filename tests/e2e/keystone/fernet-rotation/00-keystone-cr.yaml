# Keystone CR fixture for the fernet-rotation E2E test.
# Managed mode with explicit fernet rotation schedule.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-fernet
  namespace: openstack
spec:
  deployment:
    replicas: 1
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2025.2"
  database:
    clusterRef:
      name: openstack-db
    database: keystone_fernet
    secretRef:
      name: keystone-db
  cache:
    clusterRef:
      name: openstack-memcached
    backend: dogpile.cache.pymemcache
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
  # Disable dogpile.cache for this fixture. The e2e-operator Chainsaw suite
  # runs many Keystone CRs in parallel against a single shared
  # `openstack-memcached`, and every instance caches `admin@default`
  # identity-backend lookups under the same memcached keys. A concurrent
  # instance's cache entry can therefore answer this instance's auth
  # requests, producing a 401 even though the local bootstrap Job created
  # the admin user with the correct password. Tempest does not hit this
  # because it runs in an isolated kind cluster with a single Keystone.
  # TODO(follow-up): namespace keystone cache keys per CR in the
  # operator so shared memcached is safe.
  extraConfig:
    cache:
      enabled: "false"
