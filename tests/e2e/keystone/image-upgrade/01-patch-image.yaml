# Patch to upgrade Keystone image tag (CC-0016).
# DECISION: upgrade tag value
# Ambiguity: which image tag to use for the upgrade target.
# Chose: "2025.2-upgraded" because the CI pipeline must pre-load this tag
# into kind alongside "2025.2" for the E2E test to pass.
# Reviewer: please verify this tag is available in the test environment.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-upgrade
  namespace: openstack
spec:
  image:
    tag: "2025.2-upgraded"
