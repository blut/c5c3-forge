# Brownfield MariaDB Database/User/Grant pre-creation for the PSS-restricted
# E2E test.
#
# The Glance CR lives in the labelled `glance-pss-restricted-test` namespace,
# but `Database.ClusterRef` / `Cache.ClusterRef` are `LocalObjectReference` and
# the shared provisioning flow (`IsClusterReady` in
# internal/common/database/flow.go) only looks up MariaDB CRs in the Glance CR's
# own namespace — cross-namespace lookup is not supported. To reach the
# cluster's existing `openstack/openstack-db` without copying MariaDB CRs into
# the test namespace, the test uses brownfield mode (database.host +
# cache.servers) and pre-creates the Database/User/Grant CRs here, in
# `openstack`.
#
# The User CR manages the canonical `glance` MariaDB user against the existing
# `openstack/glance-db` Secret (synced from OpenBao by the cluster's `glance-db`
# ExternalSecret), so the User's SET PASSWORD lands the same value the
# PSS-namespace `glance-db` Secret carries (copied from the same standalone
# OpenBao path) — no race. `cleanupPolicy: Skip` keeps the user alive when this
# test's User CR is deleted, so a sibling test still managing the same canonical
# user is not stranded mid-flight.
#
# All resource names are prefixed `glance-pss-restricted-` and the database name
# is `glance_pss` so this fixture cannot collide with sibling tests. The Grant
# scopes the `glance` user's privileges to the test-only `glance_pss` database.
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Database
metadata:
  name: glance-pss-restricted-db
  namespace: openstack
spec:
  mariaDbRef:
    name: openstack-db
  cleanupPolicy: Skip
  characterSet: utf8
  collate: utf8_general_ci
  name: glance_pss
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: glance-pss-restricted-user
  namespace: openstack
spec:
  mariaDbRef:
    name: openstack-db
  cleanupPolicy: Skip
  name: glance
  passwordSecretKeyRef:
    name: glance-db
    key: password
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: glance-pss-restricted-grant
  namespace: openstack
spec:
  mariaDbRef:
    name: openstack-db
  cleanupPolicy: Skip
  privileges:
  - "ALL PRIVILEGES"
  database: glance_pss
  table: "*"
  username: glance
