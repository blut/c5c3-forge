# Test namespace + ExternalSecrets fixture for the PSS-restricted E2E test.
#
# The namespace carries both `pod-security.kubernetes.io/enforce=restricted`
# AND `pod-security.kubernetes.io/enforce-version=latest`. Without the
# version label, kube-apiserver pins to the cluster's current PSS baseline,
# which can drift on cluster upgrade and surface as a spurious failure;
# `latest` tracks the newest baseline and is the regression net we want.
#
# `keystone-admin`, `glance-db`, and `garage-s3-credentials` are ESO-managed:
# the operator's `reconcileSecrets` gates SecretsReady on the selected secret
# store and on WaitForExternalSecret-style credential checks, and the
# GlanceBackend controller gates CredentialsReady on the S3 credentials Secret,
# so plain Secrets are not sufficient to reach Ready=True.
#
# The shared cluster store is namespace-restricted, so a foreign namespace like
# this one cannot reach the shared standalone paths through it. All three
# ExternalSecrets therefore authenticate through this namespace's OWN per-tenant
# `openbao-tenant-store` (provisioned by the chainsaw Step-1 script via
# setup-eso-tenant.sh) and read namespace-scoped paths that the eso-tenant
# policy templates to this namespace:
#   - the admin password at `bootstrap/glance-pss-restricted-test/pss/admin`
#   - the `glance` MariaDB user at
#     `openstack/glance/glance-pss-restricted-test/pss/db`
#   - the Garage S3 key pair at `bootstrap/glance-pss-restricted-test/pss/s3`
# The Step-1 script seeds those three paths by COPYING the values from the
# shared `bootstrap/openstack/controlplane-keystone/admin`,
# `openstack/glance/openstack/standalone/db`, and
# `bootstrap/openstack/garage/s3-credentials` paths, so the `glance` MariaDB
# user's password still matches the value the brownfield User CR reconciles onto
# the same shared MariaDB user — no SET PASSWORD race.
---
apiVersion: v1
kind: Namespace
metadata:
  name: glance-pss-restricted-test
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keystone-admin
  namespace: glance-pss-restricted-test
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-tenant-store
    kind: SecretStore
  target:
    name: keystone-admin
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: bootstrap/glance-pss-restricted-test/pss/admin
      property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: glance-db
  namespace: glance-pss-restricted-test
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-tenant-store
    kind: SecretStore
  target:
    name: glance-db
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: openstack/glance/glance-pss-restricted-test/pss/db
      property: username
  - secretKey: password
    remoteRef:
      key: openstack/glance/glance-pss-restricted-test/pss/db
      property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-s3-credentials
  namespace: glance-pss-restricted-test
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-tenant-store
    kind: SecretStore
  target:
    name: garage-s3-credentials
    creationPolicy: Owner
  data:
  - secretKey: access-key-id
    remoteRef:
      key: bootstrap/glance-pss-restricted-test/pss/s3
      property: access-key-id
  - secretKey: secret-access-key
    remoteRef:
      key: bootstrap/glance-pss-restricted-test/pss/s3
      property: secret-access-key
