# Glance CR fixture for the basic-deployment E2E test (2026.1 release).
# Managed mode: database via clusterRef to openstack-db (schema glance_basic_2026),
# cache via clusterRef to openstack-memcached. The database credentials come
# from the ESO-synced glance-db Secret and the service-user password from the
# pre-seeded keystone-admin Secret (both deploy/kind/infrastructure). glance-api
# cannot start without a default image store, so 01-glance-backend.yaml attaches
# one before Ready can settle. From 2026.1 the API launches under uWSGI rather
# than the eventlet glance-api server.
apiVersion: glance.openstack.c5c3.io/v1alpha1
kind: Glance
metadata:
  name: glance-basic-2026
  namespace: openstack
spec:
  openStackRelease: "2026.1"
  deployment:
    replicas: 3
  image:
    repository: ghcr.io/c5c3/glance
    tag: "2026.1"
  database:
    clusterRef:
      name: openstack-db
    database: glance_basic_2026
    secretRef:
      name: glance-db
  cache:
    clusterRef:
      name: openstack-memcached
  keystoneEndpoint: http://keystone.openstack.svc.cluster.local:5000/v3
  serviceUser:
    username: admin
    projectName: admin
    userDomainName: Default
    projectDomainName: Default
    secretRef:
      name: keystone-admin
      key: password
