# type S3 without a spec.s3 block violates the union CEL rule
# ((self.type == 'S3') == has(self.s3)); the webhook mirrors it.
apiVersion: glance.openstack.c5c3.io/v1alpha1
kind: GlanceBackend
metadata:
  name: glancebackend-no-s3
spec:
  glanceRef:
    name: glance
  type: S3
