# Patch: scale the Glance API from 3 to 5 replicas.
apiVersion: glance.openstack.c5c3.io/v1alpha1
kind: Glance
metadata:
  name: glance-scale
  namespace: openstack
spec:
  deployment:
    replicas: 5
