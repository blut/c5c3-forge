# Patch: scale the Glance API down to a single replica (PDB flips to
# maxUnavailable=1 to avoid drain deadlock).
apiVersion: glance.openstack.c5c3.io/v1alpha1
kind: Glance
metadata:
  name: glance-scale
  namespace: openstack
spec:
  deployment:
    replicas: 1
