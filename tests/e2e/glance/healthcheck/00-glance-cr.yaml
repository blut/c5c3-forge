# Glance CR fixture for the healthcheck E2E test (2025.2 release).
# Managed mode: database via clusterRef to openstack-db (schema
# glance_healthcheck), cache via clusterRef to openstack-memcached. A single
# replica is enough to exercise the operator's HTTP probe of the Glance API.
# glance-api cannot start without a default image store, so 01-glance-backend.yaml
# attaches one before Ready can settle.
apiVersion: glance.openstack.c5c3.io/v1alpha1
kind: Glance
metadata:
  name: glance-healthcheck
  namespace: openstack
spec:
  openStackRelease: "2025.2"
  deployment:
    replicas: 1
  image:
    repository: ghcr.io/c5c3/glance
    tag: "2025.2"
  database:
    clusterRef:
      name: openstack-db
    database: glance_healthcheck
    secretRef:
      name: glance-db
  cache:
    clusterRef:
      name: openstack-memcached
  keystoneEndpoint: http://keystone.openstack.svc.cluster.local:5000/v3
  serviceUser:
    username: admin
    projectName: admin
    userDomainName: Default
    projectDomainName: Default
    secretRef:
      name: keystone-admin
      key: password
