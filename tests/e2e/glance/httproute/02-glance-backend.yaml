# Default S3 image store for the glance-httproute CR. glance-api registers no
# store without a default backend, so the CR cannot reach a running Deployment
# (and thus the HTTPRoute sub-reconciler) until this backend is Ready. It points
# at the in-cluster Garage S3 endpoint and the pre-created glance-images bucket.
apiVersion: glance.openstack.c5c3.io/v1alpha1
kind: GlanceBackend
metadata:
  name: glance-httproute-s3
  namespace: openstack
spec:
  glanceRef:
    name: glance-httproute
  type: S3
  isDefault: true
  s3:
    host: http://garage.openstack.svc.cluster.local:3900
    bucket: glance-images
    region: garage
    credentialsSecretRef:
      name: garage-s3-credentials
