# Default S3 image store for the glance-basic CR. It points at the in-cluster
# Garage S3 endpoint (deploy/flux-system/infrastructure/garage.yaml): the
# GarageCluster "garage" listens on port 3900 with SigV4 region "garage", the
# glance-images bucket is pre-created, and the garage-s3-credentials Secret is
# ESO-synced (deploy/kind/infrastructure). glance-api registers no store without
# it, so it must go Ready before the Glance CR can.
apiVersion: glance.openstack.c5c3.io/v1alpha1
kind: GlanceBackend
metadata:
  name: glance-basic-s3
  namespace: openstack
spec:
  glanceRef:
    name: glance-basic
  type: S3
  isDefault: true
  s3:
    host: http://garage.openstack.svc.cluster.local:3900
    bucket: glance-images
    region: garage
    credentialsSecretRef:
      name: garage-s3-credentials
