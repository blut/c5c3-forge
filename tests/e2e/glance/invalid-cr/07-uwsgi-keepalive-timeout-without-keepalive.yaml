# spec.apiServer.uwsgi.httpKeepAliveTimeout set while httpKeepAlive is
# false violates the UWSGISpec CEL rule (the timeout flag is only
# emitted under --http-keepalive). httpKeepAlive is set EXPLICITLY to
# false because the defaulting webhook restores true when it is unset,
# which would satisfy the rule and make this CR admissible.
apiVersion: glance.openstack.c5c3.io/v1alpha1
kind: Glance
metadata:
  name: glance-invalid-uwsgi-keepalive
spec:
  openStackRelease: "2025.2"
  deployment:
    replicas: 1
  image:
    repository: ghcr.io/c5c3/glance
    tag: "2025.2"
  database:
    clusterRef:
      name: openstack-db
    database: glance
    secretRef:
      name: glance-db
  cache:
    clusterRef:
      name: openstack-memcached
  keystoneEndpoint: http://keystone.openstack.svc.cluster.local:5000/v3
  serviceUser:
    secretRef:
      name: glance-service-password
  apiServer:
    uwsgi:
      httpKeepAlive: false
      httpKeepAliveTimeout: 30
