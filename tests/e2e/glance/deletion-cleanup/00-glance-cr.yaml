# Glance CR fixture for the deletion-cleanup E2E test.
# Managed mode: same pattern as basic-deployment, unique name glance-deletion
# (schema glance_deletion). Two backends attach via 01/02; deleting one
# exercises the backend-detach re-render, deleting the CR exercises the
# finalizer-driven MariaDB CR sweep.
apiVersion: glance.openstack.c5c3.io/v1alpha1
kind: Glance
metadata:
  name: glance-deletion
  namespace: openstack
spec:
  openStackRelease: "2025.2"
  deployment:
    replicas: 1
  image:
    repository: ghcr.io/c5c3/glance
    tag: "2025.2"
  database:
    clusterRef:
      name: openstack-db
    database: glance_deletion
    secretRef:
      name: glance-db
  cache:
    clusterRef:
      name: openstack-memcached
  keystoneEndpoint: http://keystone.openstack.svc.cluster.local:5000/v3
  serviceUser:
    username: admin
    projectName: admin
    userDomainName: Default
    projectDomainName: Default
    secretRef:
      name: keystone-admin
      key: password
