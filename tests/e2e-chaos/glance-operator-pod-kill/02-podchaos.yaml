# PodChaos CR to kill a glance-operator pod in glance-system.
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: kill-glance-operator
  namespace: glance-system
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
    - glance-system
    labelSelectors:
      app.kubernetes.io/name: glance-operator
  gracePeriod: 0
