# Glance CR fixture for the chaos test. Unique name (glance-chaos-op) and
# database (glance_chaos_op) to avoid conflicts with other test suites. Managed
# database via clusterRef to openstack-db, cache via clusterRef to
# openstack-memcached. glance-api cannot go Ready without a default image store,
# so 01-glance-backend.yaml attaches one before Ready can settle.
apiVersion: glance.openstack.c5c3.io/v1alpha1
kind: Glance
metadata:
  name: glance-chaos-op
  namespace: openstack
spec:
  openStackRelease: "2025.2"
  deployment:
    replicas: 1
  image:
    repository: ghcr.io/c5c3/glance
    tag: "2025.2"
  database:
    clusterRef:
      name: openstack-db
    database: glance_chaos_op
    secretRef:
      name: glance-db
  cache:
    clusterRef:
      name: openstack-memcached
  keystoneEndpoint: http://keystone.openstack.svc.cluster.local:5000/v3
  serviceUser:
    username: admin
    projectName: admin
    userDomainName: Default
    projectDomainName: Default
    secretRef:
      name: keystone-admin
      key: password
