# Keystone patch to scale replicas from 1 to 2 after operator pod
# failover. Used to verify the new leader can reconcile
# spec changes, proving operational capability beyond just running.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-chaos-opk
  namespace: openstack
spec:
  deployment:
    replicas: 2
