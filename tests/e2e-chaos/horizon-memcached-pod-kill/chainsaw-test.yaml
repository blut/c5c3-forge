# Chainsaw chaos E2E test for Memcached pod kill against Horizon.
# Verifies the Horizon operator maintains Ready=True when a Memcached pod is
# killed, and that the dashboard pods never restart: with signed-cookie
# sessions (design decision D1) Memcached only backs the Django cache, so
# losing it degrades cache hit-rate — it neither logs users out nor flips
# any condition. Recovery-without-restart is therefore the observable
# contract here (deliberate deviation from a "degraded condition" model,
# which would require a dedicated cache-health probe the operator does not
# have).
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: horizon-memcached-pod-kill
spec:
  namespace: openstack
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Apply Horizon CR ───────────────────────────────────────────
  - try:
    - apply:
        file: 00-horizon-cr.yaml
  # ── Step 2: Assert baseline Ready=True before chaos injection ──────────
  - try:
    - assert:
        resource:
          apiVersion: horizon.openstack.c5c3.io/v1alpha1
          kind: Horizon
          metadata:
            name: horizon-chaos-mc
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: ../diagnostics.sh baseline horizon-chaos-mc --cr-kind=horizon
  # ── Step 3: Inject PodChaos to kill a Memcached pod ────────────────────
  - try:
    - apply:
        file: 01-podchaos.yaml
  # ── Step 4: Verify the kill took effect and Memcached recovered ────────
  # Deployment-level polling (readyReplicas) is resilient to Pod replacement;
  # kubectl wait on individual Pods errors with NotFound when Chaos Mesh
  # deletes the Pod (issue #214). Assert absence of the healthy state first
  # so the loop cannot pass vacuously if the selector never matched.
  - try:
    - script:
        # Timeout budget: Phase 1 (15×2s=30s) + Phase 2 (45×2s=90s) = 120s
        # worst case; 150s gives 30s margin.
        timeout: 150s
        content: |
          # NOTE: set -euo pipefail is intentionally omitted. The polling loop
          # uses ${READY:-0} defensive defaults that would fail under set -e
          # when kubectl returns empty output.

          DESIRED=$(kubectl get deployment openstack-memcached -n $NAMESPACE -o jsonpath='{.spec.replicas}')
          if [ -z "$DESIRED" ] || [ "$DESIRED" -lt 1 ]; then
            echo "ERROR: could not determine desired replica count from openstack-memcached Deployment"
            exit 1
          fi
          echo "Desired replicas: ${DESIRED}"

          # Phase 1: poll until readyReplicas drops below DESIRED (chaos took effect).
          for i in $(seq 1 15); do
            READY=$(kubectl get deployment openstack-memcached -n $NAMESPACE -o jsonpath='{.status.readyReplicas}')
            if [ "${READY:-0}" -lt "$DESIRED" ]; then
              break
            fi
            sleep 2
          done
          if [ "${READY:-0}" -ge "$DESIRED" ]; then
            echo "ERROR: readyReplicas never dropped below ${DESIRED} — pod kill did not take effect"
            exit 1
          fi
          echo "Pod kill confirmed: readyReplicas=${READY:-0}"

          # Phase 2: poll until readyReplicas returns to DESIRED (memcached recovered).
          for i in $(seq 1 45); do
            READY=$(kubectl get deployment openstack-memcached -n $NAMESPACE -o jsonpath='{.status.readyReplicas}')
            if [ "${READY:-0}" -eq "$DESIRED" ]; then
              echo "Memcached recovered: readyReplicas=${DESIRED}"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: memcached did not recover — readyReplicas=${READY:-0}, expected ${DESIRED}"
          exit 1
    - assert:
        resource:
          apiVersion: horizon.openstack.c5c3.io/v1alpha1
          kind: Horizon
          metadata:
            name: horizon-chaos-mc
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: ../diagnostics.sh chaos horizon-chaos-mc --cr-kind=horizon --dep-label=app.kubernetes.io/name=memcached
  # ── Step 5: Delete PodChaos ────────────────────────────────────────────
  - try:
    - delete:
        ref:
          apiVersion: chaos-mesh.org/v1alpha1
          kind: PodChaos
          name: kill-memcached-horizon
  # ── Step 6: Assert Ready held and zero dashboard pod restarts ──────────
  # Signed-cookie sessions make Memcached loss non-fatal: every dashboard
  # pod must report restartCount 0 (all pods are checked, not just the
  # first).
  - try:
    - assert:
        resource:
          apiVersion: horizon.openstack.c5c3.io/v1alpha1
          kind: Horizon
          metadata:
            name: horizon-chaos-mc
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    - script:
        content: |
          restarts=$(kubectl get pods -n $NAMESPACE             -l app.kubernetes.io/name=horizon,app.kubernetes.io/instance=horizon-chaos-mc             -o jsonpath='{range .items[*]}{range .status.containerStatuses[*]}{.restartCount}{"\n"}{end}{end}'             | grep -cv '^0$' || true)
          if [ "$restarts" != "0" ]; then
            echo "FAIL: $restarts dashboard container(s) restarted during Memcached loss"
            kubectl get pods -n $NAMESPACE -l app.kubernetes.io/instance=horizon-chaos-mc -o wide
            exit 1
          fi
          echo "PASS: zero dashboard pod restarts during Memcached loss"
    catch:
    - script:
        content: ../diagnostics.sh chaos horizon-chaos-mc --cr-kind=horizon --dep-label=app.kubernetes.io/name=memcached
