# PodChaos CR to kill a Memcached pod.
# One-shot pod-kill action — the Deployment controller will restart the pod.
# Selector targets Memcached pods in the openstack namespace via standard labels.
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: kill-memcached
  namespace: openstack
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
    - openstack
    labelSelectors:
      app.kubernetes.io/name: memcached
  gracePeriod: 0
