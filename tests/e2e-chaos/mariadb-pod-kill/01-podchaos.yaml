# PodChaos CR to kill a MariaDB pod (CC-0047).
# One-shot pod-kill action — the StatefulSet controller will restart the pod.
# Selector targets MariaDB pods in the openstack namespace via standard labels.
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: kill-mariadb
  namespace: openstack
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
    - openstack
    labelSelectors:
      app.kubernetes.io/name: mariadb
  gracePeriod: 0
