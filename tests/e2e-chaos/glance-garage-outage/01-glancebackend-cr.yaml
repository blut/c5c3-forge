# Default S3 image store for the glance-chaos-garage CR. It points at the
# in-cluster Garage S3 endpoint on the pre-created glance-images bucket with
# SigV4 region "garage"; credentials come from the ESO-synced
# garage-s3-credentials Secret. The NetworkChaos partition (02-networkchaos.yaml)
# severs the glance-api -> Garage path so image data writes to this store fail
# closed.
apiVersion: glance.openstack.c5c3.io/v1alpha1
kind: GlanceBackend
metadata:
  name: glance-chaos-garage-s3
  namespace: openstack
spec:
  glanceRef:
    name: glance-chaos-garage
  type: S3
  isDefault: true
  s3:
    host: http://garage.openstack.svc.cluster.local:3900
    bucket: glance-images
    region: garage
    credentialsSecretRef:
      name: garage-s3-credentials
