# PodChaos CR to kill one Keystone API pod (CC-0048).
# One-shot pod-kill action — the Deployment controller will create a
# replacement pod. Selector uses both name and instance labels to target
# only the API pods belonging to the keystone-chaos-api CR instance.
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: kill-keystone-api
  namespace: openstack
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
    - openstack
    labelSelectors:
      app.kubernetes.io/name: keystone
      app.kubernetes.io/instance: keystone-chaos-api
  gracePeriod: 0
