# PodChaos CR to kill the Keystone operator pod.
# One-shot pod-kill action — the Deployment controller will restart the pod.
# the operator pod lives in the dedicated `keystone-system` namespace
# (hack/ci-deploy-operator.sh now invokes `helm install --namespace
# keystone-system --create-namespace`). The PodChaos resource itself stays in
# `openstack` (the test namespace), but its selector targets the operator's namespace.
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: kill-operator
  namespace: openstack
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
    - keystone-system
    labelSelectors:
      app.kubernetes.io/name: keystone-operator
  gracePeriod: 0
