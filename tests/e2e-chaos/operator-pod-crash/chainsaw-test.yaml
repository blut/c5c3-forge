# Chainsaw chaos E2E test for operator pod crash recovery (CC-0048).
# Verifies the Keystone operator self-recovers after its own pod is killed
# and maintains Ready=True throughout — the operator crash should be
# invisible to the Keystone CR conditions since the Deployment controller
# restarts the operator pod and reconciliation resumes.
#
# SC-CHAOS-004, REQ-001, REQ-005, REQ-006, REQ-008 (CC-0048)
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-operator-pod-crash
spec:
  namespace: openstack
  timeouts:
    assert: 5m
  steps:
  # ── Step 1: Apply Keystone CR ──────────────────────────────────────────
  - try:
    - apply:
        file: 00-keystone-cr.yaml
  # ── Step 2: Assert baseline Ready=True before chaos injection ──────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-chaos-op
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: ../diagnostics.sh baseline keystone-chaos-op
  # ── Step 3: Inject chaos and verify one operator pod was replaced ─────
  # Identity-based verification: capture pod UIDs, apply PodChaos, then wait
  # for at least one pre-chaos UID to disappear. Polling readyReplicas for a
  # transient drop is racy because with gracePeriod: 0 and a cached image the
  # kill+reschedule+ready cycle can complete faster than the 2s poll observes
  # (loop then sees readyReplicas=2 throughout). mode: one kills exactly one
  # of the two replicas, so "at least one pre-chaos UID gone" proves the kill
  # took effect. Apply + poll live in one script so the pre-chaos snapshot
  # and the wait share state. Mirrors the CC-0076 fix on operator-pod-kill.
  # NOTE: Operator runs in `default` namespace because hack/ci-deploy-operator.sh
  # invokes `helm install` without `--namespace`. The Deployment name is
  # `keystone-operator` (release name contains the chart name, so fullname
  # == release name).
  - try:
    - script:
        # Timeout budget: Phase 1 (60×2s=120s) + Phase 2 (60×2s=120s) = 240s
        # worst case. 270s gives 30s margin.
        timeout: 270s
        content: |
          # NOTE: set -euo pipefail is intentionally omitted. The polling
          # loops use ${VAR:-0} defensive defaults that would fail under
          # set -e when kubectl returns empty output, and loop exit
          # conditions are checked explicitly rather than via exit codes.

          # Read desired replica count from the Deployment so the test stays
          # valid if the operator replica count changes.
          DESIRED=$(kubectl get deployment keystone-operator -n default -o jsonpath='{.spec.replicas}')
          if [ -z "$DESIRED" ] || [ "$DESIRED" -lt 1 ]; then
            echo "ERROR: could not determine desired replica count from keystone-operator Deployment"
            exit 1
          fi
          echo "Desired replicas: ${DESIRED}"

          # Snapshot pre-chaos pod UIDs. mode: one must replace at least one
          # of these; checking that at least one disappears is race-free.
          OLD_UIDS=$(kubectl get pods -n default -l app.kubernetes.io/name=keystone-operator -o jsonpath='{.items[*].metadata.uid}')
          if [ -z "$OLD_UIDS" ]; then
            echo "ERROR: no operator pods found before chaos injection"
            exit 1
          fi
          echo "Pre-chaos operator pod UIDs: ${OLD_UIDS}"

          # Inject chaos (kill one operator pod).
          kubectl apply -f 01-podchaos.yaml

          # Phase 1: wait until at least one pre-chaos UID is gone, proving
          # mode: one replaced a pod. 60 iterations × 2s = 120s max.
          for i in $(seq 1 60); do
            CURRENT_UIDS=$(kubectl get pods -n default -l app.kubernetes.io/name=keystone-operator -o jsonpath='{.items[*].metadata.uid}')
            REPLACED=0
            for uid in $OLD_UIDS; do
              case " $CURRENT_UIDS " in
                *" $uid "*) ;;
                *) REPLACED=1; break ;;
              esac
            done
            if [ "$REPLACED" -eq 1 ]; then
              echo "At least one pre-chaos operator pod replaced"
              break
            fi
            sleep 2
          done
          if [ "$REPLACED" -ne 1 ]; then
            echo "ERROR: no pre-chaos operator pod was replaced by chaos injection"
            echo "  pre-chaos UIDs: ${OLD_UIDS}"
            echo "  current UIDs:   ${CURRENT_UIDS}"
            exit 1
          fi

          # Phase 2: wait until readyReplicas returns to DESIRED (operator
          # recovered and reconciliation resumed). 60×2s = 120s max.
          for i in $(seq 1 60); do
            READY=$(kubectl get deployment keystone-operator -n default -o jsonpath='{.status.readyReplicas}')
            if [ "${READY:-0}" -eq "${DESIRED}" ]; then
              echo "Operator recovered: readyReplicas=${DESIRED}"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: operator did not recover — readyReplicas=${READY:-0}, desired=${DESIRED}"
          exit 1
    catch:
    - script:
        content: ../diagnostics.sh chaos keystone-chaos-op --dep-label=app.kubernetes.io/name=keystone-operator --dep-ns=default
  # ── Step 4: Delete PodChaos to clean up ────────────────────────────────
  - try:
    - delete:
        ref:
          apiVersion: chaos-mesh.org/v1alpha1
          kind: PodChaos
          name: kill-operator
  # ── Step 5: Assert Ready=True after operator recovery ──────────────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-chaos-op
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: ../diagnostics.sh chaos keystone-chaos-op --dep-label=app.kubernetes.io/name=keystone-operator --dep-ns=default
