# OIDC KeystoneIdentityBackend for the federation chaos test: introspection
# enabled so the bearer-token CLI flow works (the shape both chaos scenarios
# probe federated auth with).
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: KeystoneIdentityBackend
metadata:
  name: keycloak-chaos
  namespace: openstack
spec:
  keystoneRef:
    name: keystone-chaos-fed
  domain:
    name: forge-chaos
    mode: Manage
    deletionPolicy: Delete
    description: Keycloak chaos realm
  type: OIDC
  oidc:
    issuer: http://keycloak-chaos.openstack.svc.cluster.local:8080/realms/forge
    clientID: keystone
    clientSecretRef:
      name: keycloak-chaos-client
    # Explicit discovery: everything speaks the fixture's plain-http listener
    # EXCEPT the introspection endpoint, which mod_auth_openidc requires to
    # be https — the fixture serves it on the self-signed 8443 listener, and
    # tlsVerify opts out of verifying that throwaway certificate.
    endpoints:
      authorizationEndpoint: http://keycloak-chaos.openstack.svc.cluster.local:8080/realms/forge/protocol/openid-connect/auth
      tokenEndpoint: http://keycloak-chaos.openstack.svc.cluster.local:8080/realms/forge/protocol/openid-connect/token
      jwksURI: http://keycloak-chaos.openstack.svc.cluster.local:8080/realms/forge/protocol/openid-connect/certs
      introspectionEndpoint: https://keycloak-chaos.openstack.svc.cluster.local:8443/realms/forge/protocol/openid-connect/token/introspect
    oauth2Introspection:
      enabled: true
      tlsVerify: false
  mappings:
  - remote:
    - type: HTTP_OIDC_ISS
      anyOneOf:
      - http://keycloak-chaos.openstack.svc.cluster.local:8080/realms/forge
    - type: HTTP_OIDC_PREFERRED_USERNAME
    local:
    # {0}, not {1}: the HTTP_OIDC_ISS anyOneOf rule is a condition and is not
    # added to the positional direct-map tuple, so HTTP_OIDC_PREFERRED_USERNAME
    # is index 0 (a "{1}" raises DirectMappingError/IndexError in keystone).
    - user:
        name: "{0}"
      group:
        name: federated-users
        domain:
          name: forge-chaos
  groups:
  - name: federated-users
    description: Federated Keycloak chaos users
    roleAssignments:
    - role: member
      domain: true
