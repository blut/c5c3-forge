# In-suite Keycloak fixture for the keystone-federation chaos test: a single
# start-dev pod importing one realm (the multi-realm proof lives in the
# oidc-federation e2e suite; chaos only needs a working IdP to take away).
# The image pin is tag+digest and Renovate-tracked via the docker-digest
# customManager in renovate.json (shared with the e2e fixture).
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-chaos-realms
  namespace: openstack
data:
  forge-realm.json: |
    {
      "realm": "forge",
      "enabled": true,
      "sslRequired": "none",
      "groups": [{"name": "engineers", "path": "/engineers"}],
      "users": [
        {
          "username": "fry",
          "enabled": true,
          "email": "fry@planetexpress.example",
          "emailVerified": true,
          "firstName": "Philip",
          "lastName": "Fry",
          "credentials": [{"type": "password", "value": "fry-password", "temporary": false}],
          "groups": ["/engineers"]
        }
      ],
      "clients": [
        {
          "clientId": "keystone",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "secret": "keystone-forge-secret",
          "redirectUris": ["http://keystone-chaos-fed.openstack.svc.cluster.local:5000/*"],
          "webOrigins": ["*"],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-chaos
  namespace: openstack
  labels:
    app.kubernetes.io/name: keycloak-chaos
    app.kubernetes.io/instance: keycloak-chaos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak-chaos
      app.kubernetes.io/instance: keycloak-chaos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-chaos
        app.kubernetes.io/instance: keycloak-chaos
    spec:
      # The introspection endpoint must be https (mod_auth_openidc parses
      # OIDCOAuthIntrospectionEndpoint as https-only), so an initContainer
      # generates a throwaway self-signed keypair for Keycloak's https
      # listener. The keystone image is already loaded in kind and ships
      # python3 + cryptography; the key is deliberately world-readable —
      # Keycloak runs under a different UID and this is a test-only cert the
      # backend CR opts out of verifying (tlsVerify: false).
      initContainers:
      - name: gen-cert
        image: ghcr.io/c5c3/keystone:2025.2
        command:
        - python3
        - -c
        - |
          import datetime, os
          from cryptography import x509
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import rsa
          from cryptography.x509.oid import NameOID
          key = rsa.generate_private_key(public_exponent=65537, key_size=2048)
          name = x509.Name([x509.NameAttribute(NameOID.COMMON_NAME, "keycloak-chaos.openstack.svc.cluster.local")])
          san = x509.SubjectAlternativeName([
              x509.DNSName("keycloak-chaos.openstack.svc.cluster.local"),
              x509.DNSName("keycloak-chaos"),
          ])
          now = datetime.datetime.now(datetime.timezone.utc)
          cert = (x509.CertificateBuilder().subject_name(name).issuer_name(name)
                  .public_key(key.public_key()).serial_number(x509.random_serial_number())
                  .not_valid_before(now - datetime.timedelta(minutes=5))
                  .not_valid_after(now + datetime.timedelta(days=1))
                  .add_extension(san, critical=False).sign(key, hashes.SHA256()))
          with open("/certs/tls.crt", "wb") as f:
              f.write(cert.public_bytes(serialization.Encoding.PEM))
          with open("/certs/tls.key", "wb") as f:
              f.write(key.private_bytes(serialization.Encoding.PEM,
                                        serialization.PrivateFormat.PKCS8,
                                        serialization.NoEncryption()))
          os.chmod("/certs/tls.key", 0o644)
        volumeMounts:
        - name: tls
          mountPath: /certs
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:26.6.4@sha256:0aae0de7fca85525f727d3354df17896092de8bb26ae4c12d89c77e5df8cbce4
        args:
        - start-dev
        - --import-realm
        - --https-certificate-file=/certs/tls.crt
        - --https-certificate-key-file=/certs/tls.key
        env:
        - name: KC_BOOTSTRAP_ADMIN_USERNAME
          value: admin
        - name: KC_BOOTSTRAP_ADMIN_PASSWORD
          value: admin-password
        ports:
        - name: http
          containerPort: 8080
        - name: https
          containerPort: 8443
        volumeMounts:
        - name: realms
          mountPath: /opt/keycloak/data/import
          readOnly: true
        - name: tls
          mountPath: /certs
          readOnly: true
        readinessProbe:
          httpGet:
            path: /realms/master
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 30
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1Gi
      volumes:
      - name: tls
        emptyDir: {}
      - name: realms
        configMap:
          name: keycloak-chaos-realms
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-chaos
  namespace: openstack
  labels:
    app.kubernetes.io/name: keycloak-chaos
    app.kubernetes.io/instance: keycloak-chaos
spec:
  selector:
    app.kubernetes.io/name: keycloak-chaos
    app.kubernetes.io/instance: keycloak-chaos
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: https
    port: 8443
    targetPort: 8443
    protocol: TCP
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-chaos-client
  namespace: openstack
type: Opaque
stringData:
  clientSecret: keystone-forge-secret
