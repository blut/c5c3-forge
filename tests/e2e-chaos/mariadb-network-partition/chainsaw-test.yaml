# Chainsaw chaos E2E test for MariaDB network partition (CC-0049).
# The partition severs keystone <-> MariaDB traffic. It is enforced on the
# MariaDB (server) side so it catches the ClusterIP-routed connection keystone
# actually uses (see 01-networkchaos.yaml for why a client-side rule would be a
# no-op). The MariaDB cluster CR stays Ready and the operator cannot observe the
# fault from its own (unpartitioned) vantage point. Detection therefore happens
# at the keystone API pods: their database-aware readiness probe fails while they
# cannot reach MariaDB, the pods are depooled, the Deployment loses its ready
# replica, and the operator reports DeploymentReady=False / Ready=False. When
# the partition is lifted the probe succeeds again and the CR returns to
# Ready=True autonomously.
#
# SC-CHAOS-006, REQ-001, REQ-002, REQ-008 (CC-0049)
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: keystone-mariadb-network-partition
spec:
  namespace: openstack
  timeouts:
    # Detecting a keystone-side partition is slow end to end: the database-aware
    # readiness probe must accumulate three failures (3 x 30s) before the pod is
    # depooled, then the operator must observe the Deployment drop below its
    # ready replicas before it reports DeploymentReady=False. Observed detection
    # latency is ~5m, so the default 5m window left no margin and the assert
    # raced (and lost to) the NetworkChaos auto-expiry. 8m gives detection room;
    # the partition (duration 600s, see 01-networkchaos.yaml) stays active for
    # the whole window and is lifted explicitly in step 6, not by self-heal.
    assert: 8m
  steps:
  # ── Step 1: Apply Keystone CR ──────────────────────────────────────────
  - try:
    - apply:
        file: 00-keystone-cr.yaml
  # ── Step 2: Assert baseline Ready=True before chaos injection ──────────
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-chaos-net-part
            namespace: openstack
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: ../diagnostics.sh baseline keystone-chaos-net-part --dep-label=app.kubernetes.io/name=mariadb
  # ── Step 3: Inject NetworkChaos to partition MariaDB traffic ───────────
  - try:
    - apply:
        file: 01-networkchaos.yaml
  # ── Step 4: Assert NetworkChaos injection is active (CC-0049) ──────────
  # Confirms the fault is actually applied before checking effects. Without
  # this, a mis-targeted selector could allow the CR to be accepted but have
  # no effect, causing the DatabaseReady check to pass vacuously.
  # Uses `kubectl wait --for=condition=AllInjected` instead of a chainsaw
  # resource assert because NetworkChaos.status.conditions is a fixed 4-item
  # list (Selected/AllInjected/AllRecovered/Paused); chainsaw's list-merge
  # rejects any shorter expected slice with "lengths of slices don't match".
  - try:
    - script:
        timeout: 60s
        content: |
          set -eu
          kubectl wait networkchaos/partition-mariadb -n openstack \
            --for=condition=AllInjected --timeout=60s
    catch:
    - script:
        content: kubectl get networkchaos/partition-mariadb -n openstack -o yaml 2>&1 || true
    - script:
        content: ../diagnostics.sh chaos keystone-chaos-net-part --dep-label=app.kubernetes.io/name=mariadb --log-label=app.kubernetes.io/name=keystone-operator
  # ── Step 5: Assert Ready=False after network partition ─────────────────
  # The keystone pods cannot reach MariaDB, so their database-aware readiness
  # probe fails and the pods are depooled. The Deployment drops below its
  # desired ready replicas, so the operator reports DeploymentReady=False and
  # the aggregate Ready=False. DatabaseReady stays True because the unpartitioned
  # operator still sees the MariaDB cluster CR as Ready — the fault is keystone-
  # side, which is exactly what the readiness probe surfaces.
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-chaos-net-part
            namespace: openstack
          status:
            (conditions[?type == 'DeploymentReady']):
            - status: "False"
            (conditions[?type == 'Ready']):
            - status: "False"
    catch:
    - script:
        content: ../diagnostics.sh chaos keystone-chaos-net-part --dep-label=app.kubernetes.io/name=mariadb --log-label=app.kubernetes.io/name=keystone-operator
  # ── Step 6: Delete NetworkChaos to lift partition ──────────────────────
  - try:
    - delete:
        ref:
          apiVersion: chaos-mesh.org/v1alpha1
          kind: NetworkChaos
          name: partition-mariadb
  # ── Step 7: Assert full recovery to Ready=True ─────────────────────────
  # Once the partition is lifted the readiness probe reaches MariaDB again, the
  # pods are re-pooled, the Deployment regains its ready replica, and the
  # aggregate Ready returns to True autonomously.
  - try:
    - assert:
        resource:
          apiVersion: keystone.openstack.c5c3.io/v1alpha1
          kind: Keystone
          metadata:
            name: keystone-chaos-net-part
            namespace: openstack
          status:
            (conditions[?type == 'DeploymentReady']):
            - status: "True"
            (conditions[?type == 'Ready']):
            - status: "True"
              reason: AllReady
    catch:
    - script:
        content: ../diagnostics.sh chaos keystone-chaos-net-part --dep-label=app.kubernetes.io/name=mariadb --log-label=app.kubernetes.io/name=keystone-operator
