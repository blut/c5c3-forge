# Dedicated Keystone CR for Tempest API tests.
# Uses a separate database (keystone_tempest_2026_1) to avoid stale state
# from prior Chainsaw E2E tests that reuse the same kind cluster.
apiVersion: keystone.openstack.c5c3.io/v1alpha1
kind: Keystone
metadata:
  name: keystone-tempest-2026-1
  namespace: openstack
spec:
  replicas: 3
  image:
    repository: ghcr.io/c5c3/keystone
    tag: "2026.1"
  # Override the operator's default resource limits (100m/500m CPU,
  # 256Mi/512Mi memory). The default CPU limit of 500m throttles the
  # keystone-API pod to half a core, which more than doubled the Tempest
  # run-time and pushed the job past its CI timeout. Give the tempest
  # workload headroom so it matches the pre-existing behaviour (no limits).
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi
  database:
    clusterRef:
      name: openstack-db
    database: keystone_tempest_2026_1
    secretRef:
      name: keystone-db
  cache:
    clusterRef:
      name: openstack-memcached
    backend: dogpile.cache.pymemcache
  fernet:
    rotationSchedule: "0 0 * * 0"
    maxActiveKeys: 3
  bootstrap:
    adminUser: admin
    adminPasswordSecretRef:
      name: keystone-admin
    region: RegionOne
