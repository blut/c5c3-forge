# Tempest configuration for Glance image API tests.
# Targets the dedicated glance-tempest-2026-1 image service in the kind cluster
# and authenticates against the keystone-glance-tempest-2026-1 identity service.
# admin_password is injected at runtime from the keystone-admin K8s secret.

[DEFAULT]
log_dir = /tmp/tempest-logs
log_file = tempest.log

[identity]
uri_v3 = http://keystone-glance-tempest-2026-1.openstack.svc:5000/v3

[auth]
use_dynamic_credentials = true
create_isolated_networks = false
admin_username = admin
admin_password = ${KEYSTONE_ADMIN_PASSWORD}
admin_project_name = admin
admin_domain_name = Default

[identity-feature-enabled]
api_v3 = true
enforce_scope = true

[image]
# The image endpoints are registered in RegionOne by the catalog-setup Job; be
# explicit so the image client's catalog lookup does not depend on the identity
# region default.
region = RegionOne

[service_available]
nova = false
cinder = false
glance = true
swift = false
neutron = false
horizon = false
