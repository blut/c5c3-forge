# Tempest configuration for Keystone identity API tests (CC-0035 REQ-003).
# Targets the dedicated keystone-tempest-2025-2-api service in the kind cluster.
# admin_password is injected at runtime from the keystone-admin K8s secret.

[DEFAULT]
log_dir = /tmp/tempest-logs
log_file = tempest.log

[identity]
uri_v3 = http://keystone-tempest-2025-2-api.openstack.svc:5000/v3

[auth]
use_dynamic_credentials = true
create_isolated_networks = false
admin_username = admin
admin_password = ${KEYSTONE_ADMIN_PASSWORD}
admin_project_name = admin
admin_domain_name = Default

[identity-feature-enabled]
api_v3 = true
enforce_scope = true

[service_available]
nova = false
cinder = false
glance = false
swift = false
neutron = false
horizon = false
