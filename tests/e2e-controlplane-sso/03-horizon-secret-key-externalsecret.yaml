# Per-ControlPlane ExternalSecret for the Horizon Django SECRET_KEY, mirroring
# tests/e2e/c5c3/full-controlplane-keystone/02-horizon-secret-key-externalsecret.yaml.
# The projected Horizon child's default secretKeyRef points at the kind shim
# "horizon-secret-key", which reads the DEFAULT identity's OpenBao path — but
# this suite runs against CONTROLPLANE_NAME=controlplane-sso, whose seed lands
# at bootstrap/openstack/controlplane-sso-horizon/secret-key.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: controlplane-sso-horizon-secret-key
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: controlplane-sso-horizon-secret-key
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: bootstrap/openstack/controlplane-sso-horizon/secret-key
        property: secret-key
