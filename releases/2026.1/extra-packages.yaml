# Per-service Python extras, additional pip packages, and runtime system packages.
# pip_extras: bare Python extra names (e.g. ldap, not keystone[ldap]).
#   The CI workflow reads these and passes them as the PIP_EXTRAS build arg to the
#   Dockerfile, which appends them to the package path (e.g. "keystone[ldap,...]").
#   verify_release_config.sh validates the wiring between this file, the Dockerfile,
#   and the CI workflow.
# pip_packages: additional pip packages installed alongside the service (PIP_PACKAGES
#   build arg). Use an empty list when none are needed.
# apt_packages: runtime system packages installed via apt in the final image
#   (EXTRA_APT_PACKAGES build arg).
keystone:
  pip_extras:
    - ldap
  pip_packages: []
  apt_packages:
    - libapache2-mod-wsgi-py3
    - libldap2
    - libsasl2-2
    - libxml2
horizon:
  pip_extras: []
  pip_packages: []
  apt_packages:
    # uWSGI is compiled in venv-builder against the shared libpython; the
    # dashboard is otherwise pure Python. Without this, uwsgi fails to load
    # (python-base ships no libpython3.12.so.1.0).
    - libpython3.12t64
glance:
  pip_extras: []
  pip_packages:
    # The S3 store driver's extra lives on glance_store, not glance — it pulls
    # boto3/botocore/s3transfer, all pinned in upper-constraints.txt.
    - "glance_store[s3]"
  apt_packages:
    # uWSGI is compiled in venv-builder against the shared libpython; glance is
    # otherwise pure Python at runtime. Without this, uwsgi fails to load
    # (python-base ships no libpython3.12.so.1.0).
    - libpython3.12t64
