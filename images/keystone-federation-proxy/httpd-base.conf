# Static Apache scaffold for the keystone-federation-proxy sidecar. Loads the
# modules the operator-rendered proxy.conf depends on and pins every runtime
# path to /tmp (the pod's only writable mount — the root filesystem is
# read-only) or stderr. All deployment-specific configuration — the
# OIDC directives, protected Locations, header stripping, and the reverse
# proxy to the localhost-bound uWSGI — arrives via the IncludeOptional hook
# at the bottom, mounted from the operator-projected federation Secret.
#
# mod_unixd and mod_log_config are compiled into the Debian/Ubuntu apache2
# binary and must not be LoadModule'd again.
LoadModule mpm_event_module /usr/lib/apache2/modules/mod_mpm_event.so
LoadModule authn_core_module /usr/lib/apache2/modules/mod_authn_core.so
LoadModule authz_core_module /usr/lib/apache2/modules/mod_authz_core.so
LoadModule authz_user_module /usr/lib/apache2/modules/mod_authz_user.so
LoadModule headers_module /usr/lib/apache2/modules/mod_headers.so
LoadModule proxy_module /usr/lib/apache2/modules/mod_proxy.so
LoadModule proxy_http_module /usr/lib/apache2/modules/mod_proxy_http.so
LoadModule auth_openidc_module /usr/lib/apache2/modules/mod_auth_openidc.so
LoadModule auth_mellon_module /usr/lib/apache2/modules/mod_auth_mellon.so

ServerName keystone-federation-proxy
Listen 5050

PidFile /tmp/apache2.pid
DefaultRuntimeDir /tmp
Mutex default:/tmp

ErrorLog /dev/stderr
LogLevel warn

DocumentRoot /var/www/html

IncludeOptional /etc/keystone-federation-proxy/conf.d/*.conf
