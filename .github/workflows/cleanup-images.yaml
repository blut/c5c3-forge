---
name: Cleanup Images

"on":
  schedule:
    # Daily at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      older-than:
        description: "Minimum age of images to delete (e.g. '7 days', '1 month')"
        required: false
        default: "7 days"
        type: string
      keep-n-tagged:
        description: "Minimum number of tagged images to keep per package"
        required: false
        default: "10"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  # Packages built by build-images.yaml: python-base, venv-builder, tempest
  # Packages built by ci.yaml:           keystone-operator
  # Packages built by build-images.yaml with composite tags: keystone
  #   (handled separately in cleanup-service-images below)
  cleanup-base-images:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package: [python-base, venv-builder, tempest, keystone-operator]
    steps:
      - name: Delete untagged images
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1
        with:
          package: ${{ matrix.package }}
          delete-untagged: true
          delete-ghost-images: true
          delete-partial-images: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old SHA-tagged images
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1
        with:
          package: ${{ matrix.package }}
          exclude-tags: latest
          keep-n-tagged: ${{ inputs.keep-n-tagged || '10' }}
          older-than: ${{ inputs.older-than || '7 days' }}
          token: ${{ secrets.GITHUB_TOKEN }}

  cleanup-service-images:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package: [keystone]
    steps:
      - name: Delete untagged images
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1
        with:
          package: ${{ matrix.package }}
          delete-untagged: true
          delete-ghost-images: true
          delete-partial-images: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # Target composite CI tags generated by derive-service-tags/action.yaml:
      #   FORMAT: <version>-p<patch-count>-<branch>-<short-sha>
      #   EXAMPLE: 28.0.0-p0-main-77aa16f
      # The glob requires three dots before "-p", so release-only tags
      # like "28.0.0" or "2025.2" are never matched.
      - name: Delete old tagged images
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1
        with:
          package: ${{ matrix.package }}
          delete-tags: "*.*.*-p*-*-*"
          keep-n-tagged: ${{ inputs.keep-n-tagged || '10' }}
          older-than: ${{ inputs.older-than || '7 days' }}
          token: ${{ secrets.GITHUB_TOKEN }}
