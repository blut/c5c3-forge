---
name: Cleanup Images

"on":
  schedule:
    # Daily at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      older-than:
        description: "Minimum age of images to delete (e.g. '7 days', '1 month')"
        required: false
        default: "7 days"
        type: string
      keep-n-tagged:
        description: "Minimum number of tagged images to keep per package"
        required: false
        default: "10"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  # Cleanup order follows the image dependency chain (leaf → root):
  #   1. Service images  (keystone, tempest)  – depend on venv-builder
  #   2. venv-builder                         – depends on python-base
  #   3. python-base                          – base layer
  #   4. Operator images (keystone-operator)  – independent

  # ── 1. Service images (composite tags) ─────────────────────────────
  cleanup-service-images:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package: [keystone]
    steps:
      - uses: actions/checkout@v4

      # Target composite CI tags generated by derive-service-tags/action.yaml:
      #   FORMAT: <version>-p<patch-count>-<branch>-<short-sha>
      #   EXAMPLE: 28.0.0-p0-main-77aa16f
      # The glob requires three dots before "-p", so release-only tags
      # like "28.0.0" or "2025.2" are never matched.
      - name: Cleanup ${{ matrix.package }}
        uses: ./.github/actions/cleanup-ghcr-package
        with:
          package: ${{ matrix.package }}
          delete-tags: "*.*.*-p*-*-*"
          keep-n-tagged: ${{ inputs.keep-n-tagged || '10' }}
          older-than: ${{ inputs.older-than || '7 days' }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── 1. Service images (SHA tags) ───────────────────────────────────
  cleanup-service-sha-images:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup tempest
        uses: ./.github/actions/cleanup-ghcr-package
        with:
          package: tempest
          exclude-tags: latest
          keep-n-tagged: ${{ inputs.keep-n-tagged || '10' }}
          older-than: ${{ inputs.older-than || '7 days' }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. venv-builder (after service images) ─────────────────────────
  cleanup-venv-builder:
    needs: [cleanup-service-images, cleanup-service-sha-images]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup venv-builder
        uses: ./.github/actions/cleanup-ghcr-package
        with:
          package: venv-builder
          exclude-tags: latest
          keep-n-tagged: ${{ inputs.keep-n-tagged || '10' }}
          older-than: ${{ inputs.older-than || '7 days' }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. python-base (after venv-builder) ────────────────────────────
  cleanup-python-base:
    needs: [cleanup-venv-builder]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup python-base
        uses: ./.github/actions/cleanup-ghcr-package
        with:
          package: python-base
          exclude-tags: latest
          keep-n-tagged: ${{ inputs.keep-n-tagged || '10' }}
          older-than: ${{ inputs.older-than || '7 days' }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── 4. Operator images (independent) ───────────────────────────────
  # No `needs` — operator images are built from a separate Dockerfile
  # (not based on python-base/venv-builder) and can be cleaned
  # independently of the service image chain.
  cleanup-operator-images:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package: [keystone-operator]
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup ${{ matrix.package }}
        uses: ./.github/actions/cleanup-ghcr-package
        with:
          package: ${{ matrix.package }}
          exclude-tags: latest
          keep-n-tagged: ${{ inputs.keep-n-tagged || '10' }}
          older-than: ${{ inputs.older-than || '7 days' }}
          token: ${{ secrets.GITHUB_TOKEN }}
