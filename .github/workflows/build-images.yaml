---
name: Build Images
"on":
  workflow_dispatch:
  push:
    branches:
      - main
      - stable/**
    paths:
      - images/**
      - operators/keystone/Dockerfile
      - operators/c5c3/Dockerfile
      - releases/**
      - patches/**
      - scripts/**
      - hack/ci-*
      - .github/actions/**
      - tests/container-images/**
      - .github/workflows/build-images.yaml
      - .hadolint.yaml
  pull_request:
    paths:
      - images/**
      - operators/keystone/Dockerfile
      - operators/c5c3/Dockerfile
      - releases/**
      - patches/**
      - scripts/**
      - hack/ci-*
      - .github/actions/**
      - tests/container-images/**
      - .github/workflows/build-images.yaml
      - .hadolint.yaml

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-dockerfiles:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      matrix:
        dockerfile:
          - images/python-base/Dockerfile
          - images/venv-builder/Dockerfile
          - images/keystone/Dockerfile
          - images/tempest/Dockerfile
          - operators/keystone/Dockerfile
          - operators/c5c3/Dockerfile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Lint ${{ matrix.dockerfile }}
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: warning
          config: .hadolint.yaml

  # CC-0055: Single source for lowercase image owner (REQ-006).
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      image-owner: ${{ steps.owner.outputs.owner }}
    steps:
      - name: Normalize image owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

  # Per-platform builds pushed by digest; merge-base-images assembles manifests.
  build-base-images:
    needs: [lint-dockerfiles, prepare]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Reject fork PRs (CC-0007)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: echo "::error::Fork PRs cannot push to GHCR. Open your PR from a branch in the upstream repository." && exit 1

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Prepare platform pair
        id: platform-pair
        uses: ./.github/actions/platform-pair
        with:
          platform: ${{ matrix.platform }}

      - name: Setup Docker registry
        uses: ./.github/actions/setup-docker-registry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          install-cosign: 'false'

      - name: Resolve ubuntu:noble digest
        id: ubuntu-base
        run: hack/ci-resolve-ubuntu-digest.sh

      - name: Build and push python-base
        id: build-python-base
        uses: ./.github/actions/build-push-image
        with:
          image-name: ghcr.io/${{ needs.prepare.outputs.image-owner }}/python-base
          context: images/python-base
          platform: ${{ matrix.platform }}
          platform-pair: ${{ steps.platform-pair.outputs.value }}
          build-args: |
            APT_MIRROR=http://azure.archive.ubuntu.com
          labels-title: python-base
          labels-description: Python runtime base image for OpenStack services
          extra-labels: |
            org.opencontainers.image.base.name=ubuntu:noble
            org.opencontainers.image.base.digest=${{ steps.ubuntu-base.outputs.digest }}
          cache-scope: python-base
          tags: ghcr.io/${{ needs.prepare.outputs.image-owner }}/python-base
          artifact-name: digests-python-base-${{ steps.platform-pair.outputs.value }}
          digest-dir: /tmp/digests/python-base

      # ghcr.io is eventually consistent: the freshly-pushed python-base digest
      # is occasionally not yet resolvable when venv-builder consumes it as a
      # --build-context source, failing the build with a 404. Wait for it to
      # propagate first (same backoff as ci-merge-manifest.sh).
      - name: Wait for python-base digest to propagate
        env:
          REF: ghcr.io/${{ needs.prepare.outputs.image-owner }}/python-base@${{ steps.build-python-base.outputs.digest }}
        run: hack/ci-wait-for-image.sh

      - name: Build and push venv-builder
        id: build-venv-builder
        uses: ./.github/actions/build-push-image
        with:
          image-name: ghcr.io/${{ needs.prepare.outputs.image-owner }}/venv-builder
          context: images/venv-builder
          build-contexts: |
            python-base=docker-image://ghcr.io/${{ needs.prepare.outputs.image-owner }}/python-base@${{ steps.build-python-base.outputs.digest }}
          platform: ${{ matrix.platform }}
          platform-pair: ${{ steps.platform-pair.outputs.value }}
          labels-title: venv-builder
          labels-description: Python virtualenv builder image for OpenStack services
          extra-labels: |
            org.opencontainers.image.base.name=ghcr.io/${{ needs.prepare.outputs.image-owner }}/python-base
            org.opencontainers.image.base.digest=${{ steps.build-python-base.outputs.digest }}
          cache-scope: venv-builder
          tags: ghcr.io/${{ needs.prepare.outputs.image-owner }}/venv-builder
          artifact-name: digests-venv-builder-${{ steps.platform-pair.outputs.value }}
          digest-dir: /tmp/digests/venv-builder

  # Assembles per-platform digests into multi-arch manifests with attestation.
  merge-base-images:
    needs: [build-base-images, prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write       # CC-0029, CC-0030, CC-0035: Sigstore OIDC signing
      attestations: write   # CC-0029, CC-0035: GitHub Attestations API
      artifact-metadata: write  # gh#108: actions/attest v4.1.0 storage record
      security-events: write  # CC-0032: GitHub Security tab SARIF upload
    outputs:
      python-base-image: ghcr.io/${{ needs.prepare.outputs.image-owner }}/python-base@${{ steps.merge-python-base.outputs.digest }}
      python-base-name: ghcr.io/${{ needs.prepare.outputs.image-owner }}/python-base
      python-base-digest: ${{ steps.merge-python-base.outputs.digest }}
      venv-builder-image: ghcr.io/${{ needs.prepare.outputs.image-owner }}/venv-builder@${{ steps.merge-venv-builder.outputs.digest }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Docker registry
        uses: ./.github/actions/setup-docker-registry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge and attest python-base
        id: merge-python-base
        uses: ./.github/actions/merge-manifest-and-attest
        with:
          image: ghcr.io/${{ needs.prepare.outputs.image-owner }}/python-base
          artifact-pattern: digests-python-base-*
          digest-dir: /tmp/digests/python-base
          tags: ghcr.io/${{ needs.prepare.outputs.image-owner }}/python-base:latest ghcr.io/${{ needs.prepare.outputs.image-owner }}/python-base:${{ github.sha }}
          inspect-tag: ghcr.io/${{ needs.prepare.outputs.image-owner }}/python-base:${{ github.sha }}
          sbom-output-file: sbom-python-base.cyclonedx.json
          grype-category: grype-python-base
          scan-mode: ${{ github.event_name == 'pull_request' && 'image' || 'sbom' }}

      - name: Merge and attest venv-builder
        id: merge-venv-builder
        uses: ./.github/actions/merge-manifest-and-attest
        with:
          image: ghcr.io/${{ needs.prepare.outputs.image-owner }}/venv-builder
          artifact-pattern: digests-venv-builder-*
          digest-dir: /tmp/digests/venv-builder
          tags: ghcr.io/${{ needs.prepare.outputs.image-owner }}/venv-builder:latest ghcr.io/${{ needs.prepare.outputs.image-owner }}/venv-builder:${{ github.sha }}
          inspect-tag: ghcr.io/${{ needs.prepare.outputs.image-owner }}/venv-builder:${{ github.sha }}
          sbom-output-file: sbom-venv-builder.cyclonedx.json
          grype-category: grype-venv-builder
          scan-mode: ${{ github.event_name == 'pull_request' && 'image' || 'sbom' }}

  verify-base-images:
    needs: [merge-base-images]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Docker registry
        uses: ./.github/actions/setup-docker-registry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          install-cosign: 'false'

      - name: Pull and verify base images
        env:
          PYTHON_BASE_IMAGE: ${{ needs.merge-base-images.outputs.python-base-image }}
          VENV_BUILDER_IMAGE: ${{ needs.merge-base-images.outputs.venv-builder-image }}
        run: |
          docker pull "$PYTHON_BASE_IMAGE"
          docker pull "$VENV_BUILDER_IMAGE"
          bash tests/container-images/verify_python_base.sh "$PYTHON_BASE_IMAGE"
          bash tests/container-images/verify_venv_builder.sh "$VENV_BUILDER_IMAGE"

  generate-matrix:
    needs: [merge-base-images, verify-base-images]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      build-matrix: ${{ steps.matrix.outputs.build-matrix }}
      tempest-matrix: ${{ steps.matrix.outputs.tempest-matrix }}
      tempest-release-matrix: ${{ steps.matrix.outputs.tempest-release-matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: mikefarah/yq@1b9b4ac5187171d2e5e3129be0cfa827c7f9d53d # v4.53.3

      - name: Generate service×release matrix
        id: matrix
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: hack/ci-generate-build-matrix.sh

  build-tempest:
    needs: [lint-dockerfiles, merge-base-images, verify-base-images, generate-matrix, prepare]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      security-events: write   # CC-0032: SARIF upload for Grype scan on PR
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.tempest-matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: mikefarah/yq@1b9b4ac5187171d2e5e3129be0cfa827c7f9d53d # v4.53.3

      - name: Resolve Tempest versions
        id: versions
        env:
          MATRIX_RELEASE: ${{ matrix.release }}
        run: |
          echo "tempest=$(hack/resolve-test-ref.sh "releases/${MATRIX_RELEASE}/test-refs.yaml" tempest)" >> "$GITHUB_OUTPUT"
          echo "keystone-tempest-plugin=$(hack/resolve-test-ref.sh "releases/${MATRIX_RELEASE}/test-refs.yaml" keystone-tempest-plugin)" >> "$GITHUB_OUTPUT"

      - name: Prepare platform pair
        id: platform-pair
        uses: ./.github/actions/platform-pair
        with:
          platform: ${{ matrix.platform }}

      - name: Setup Docker registry
        uses: ./.github/actions/setup-docker-registry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          install-cosign: 'false'

      - name: Build Tempest image
        id: build-tempest
        if: github.event_name != 'pull_request' || matrix.platform == 'linux/amd64'  # defense-in-depth: matrix already excludes ARM64 on PRs
        uses: ./.github/actions/build-push-image
        with:
          image-name: ghcr.io/${{ needs.prepare.outputs.image-owner }}/tempest
          context: images/tempest
          platform: ${{ matrix.platform }}
          platform-pair: ${{ steps.platform-pair.outputs.value }}
          build-args: |
            TEMPEST_VERSION=${{ steps.versions.outputs.tempest }}
            KEYSTONE_TEMPEST_PLUGIN_VERSION=${{ steps.versions.outputs.keystone-tempest-plugin }}
          build-contexts: |
            python-base=docker-image://ghcr.io/${{ needs.prepare.outputs.image-owner }}/python-base@${{ needs.merge-base-images.outputs.python-base-digest }}
            venv-builder=docker-image://${{ needs.merge-base-images.outputs.venv-builder-image }}
            upper-constraints=releases/${{ matrix.release }}/
          labels-title: tempest
          labels-description: OpenStack Tempest API testing framework
          cache-scope: tempest-${{ matrix.release }}
          push-by-digest: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
          tags: ${{ github.event_name == 'pull_request' && format('ghcr.io/{0}/tempest:{1}', needs.prepare.outputs.image-owner, matrix.release) || format('ghcr.io/{0}/tempest', needs.prepare.outputs.image-owner) }}
          artifact-name: digests-tempest-${{ matrix.release }}-${{ steps.platform-pair.outputs.value }}
          grype-category: grype-tempest-${{ matrix.release }}-${{ steps.platform-pair.outputs.value }}
          image-ref-for-scan: ghcr.io/${{ needs.prepare.outputs.image-owner }}/tempest:${{ matrix.release }}
          verify-script: tests/container-images/verify_tempest.sh
          verify-image-ref: ghcr.io/${{ needs.prepare.outputs.image-owner }}/tempest:${{ matrix.release }}

  merge-tempest-image:
    if: github.event_name != 'pull_request'
    needs: [build-tempest, generate-matrix, prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write          # CC-0030, CC-0035: Sigstore OIDC signing
      attestations: write      # CC-0029, CC-0035: GitHub Attestations API
      artifact-metadata: write # gh#108: actions/attest v4.1.0 storage record
      security-events: write   # CC-0032: GitHub Security tab SARIF upload
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.tempest-release-matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: mikefarah/yq@1b9b4ac5187171d2e5e3129be0cfa827c7f9d53d # v4.53.3

      - name: Setup Docker registry
        uses: ./.github/actions/setup-docker-registry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tempest tags
        id: tempest-tags
        env:
          IMAGE: ghcr.io/${{ needs.prepare.outputs.image-owner }}/tempest
          MATRIX_RELEASE: ${{ matrix.release }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          TEMPEST_VERSION=$(hack/resolve-test-ref.sh "releases/${MATRIX_RELEASE}/test-refs.yaml" tempest)
          TAGS="${IMAGE}:${MATRIX_RELEASE} ${IMAGE}:${MATRIX_RELEASE}-${COMMIT_SHA}"
          [[ "${GITHUB_REF_NAME}" == "main" ]] && TAGS="${TAGS} ${IMAGE}:${TEMPEST_VERSION}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Merge and attest Tempest
        id: merge-tempest
        uses: ./.github/actions/merge-manifest-and-attest
        with:
          image: ghcr.io/${{ needs.prepare.outputs.image-owner }}/tempest
          artifact-pattern: digests-tempest-${{ matrix.release }}-*
          tags: ${{ steps.tempest-tags.outputs.tags }}
          inspect-tag: ghcr.io/${{ needs.prepare.outputs.image-owner }}/tempest:${{ matrix.release }}-${{ github.sha }}
          sbom-output-file: sbom-tempest-${{ matrix.release }}.cyclonedx.json
          grype-category: grype-tempest-${{ matrix.release }}

  # Per-platform service builds pushed by digest or loaded locally for PR verification.
  build-service-images:
    needs: [merge-base-images, verify-base-images, generate-matrix, prepare]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write       # CC-0029, CC-0030, CC-0035: Sigstore OIDC signing
      attestations: write   # CC-0029, CC-0035: GitHub Attestations API
      artifact-metadata: write  # gh#108: actions/attest v4.1.0 storage record
      security-events: write  # CC-0032: GitHub Security tab SARIF upload
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.build-matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Checkout service source
        id: checkout-source
        uses: ./.github/actions/checkout-service-source
        with:
          service: ${{ matrix.service }}
          release: ${{ matrix.release }}

      - name: Resolve extra packages
        id: extra-pkgs
        env:
          MATRIX_SERVICE: ${{ matrix.service }}
          MATRIX_RELEASE: ${{ matrix.release }}
        run: hack/ci-resolve-extra-packages.sh

      - name: Derive tags
        id: tags
        uses: ./.github/actions/derive-service-tags
        with:
          service: ${{ matrix.service }}
          release: ${{ matrix.release }}
          repository-owner: ${{ github.repository_owner }}

      - name: Prepare platform pair
        id: platform-pair
        uses: ./.github/actions/platform-pair
        with:
          platform: ${{ matrix.platform }}

      - name: Setup Docker registry
        uses: ./.github/actions/setup-docker-registry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          install-cosign: 'false'

      - name: Build service image
        id: build-service
        uses: ./.github/actions/build-push-image
        with:
          image-name: ${{ steps.tags.outputs.image }}
          context: images/${{ matrix.service }}
          platform: ${{ matrix.platform }}
          platform-pair: ${{ steps.platform-pair.outputs.value }}
          build-args: |
            PIP_EXTRAS=${{ steps.extra-pkgs.outputs.pip-extras }}
            PIP_PACKAGES=${{ steps.extra-pkgs.outputs.pip-packages }}
            EXTRA_APT_PACKAGES=${{ steps.extra-pkgs.outputs.apt-packages }}
          build-contexts: |
            python-base=docker-image://${{ needs.merge-base-images.outputs.python-base-image }}
            venv-builder=docker-image://${{ needs.merge-base-images.outputs.venv-builder-image }}
            ${{ matrix.service }}=src/${{ matrix.service }}
            upper-constraints=releases/${{ matrix.release }}/
          labels-title: ${{ matrix.service }}
          labels-description: OpenStack ${{ matrix.service }} service
          metadata-tags: |
            type=raw,value=${{ steps.checkout-source.outputs.source-ref }}
          extra-labels: |
            org.opencontainers.image.base.name=${{ needs.merge-base-images.outputs.python-base-name }}
            org.opencontainers.image.base.digest=${{ needs.merge-base-images.outputs.python-base-digest }}
          cache-scope: ${{ matrix.service }}-${{ matrix.release }}
          push-by-digest: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
          tags: ${{ github.event_name == 'pull_request' && steps.tags.outputs.composite || steps.tags.outputs.image }}
          artifact-name: ${{ github.event_name != 'pull_request' && format('digests-service-{0}-{1}-{2}', matrix.service, matrix.release, steps.platform-pair.outputs.value) || '' }}
          grype-category: ${{ github.event_name == 'pull_request' && format('grype-{0}-{1}', matrix.service, steps.platform-pair.outputs.value) || '' }}
          image-ref-for-scan: ${{ steps.tags.outputs.composite }}
          verify-script: ${{ github.event_name == 'pull_request' && format('tests/container-images/verify_{0}.sh', matrix.service) || '' }}
          verify-image-ref: ${{ steps.tags.outputs.composite }}

  # Assembles per-platform service digests into multi-arch manifests with attestation.
  merge-service-images:
    if: github.event_name != 'pull_request'
    needs: [merge-base-images, build-service-images, generate-matrix, prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write       # CC-0029, CC-0030, CC-0035: Sigstore OIDC signing
      attestations: write   # CC-0029, CC-0035: GitHub Attestations API
      artifact-metadata: write  # gh#108: actions/attest v4.1.0 storage record
      security-events: write  # CC-0032: GitHub Security tab SARIF upload
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Docker registry
        uses: ./.github/actions/setup-docker-registry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: tags
        uses: ./.github/actions/derive-service-tags
        with:
          service: ${{ matrix.service }}
          release: ${{ matrix.release }}
          repository-owner: ${{ github.repository_owner }}

      - name: Build service image tags
        id: service-tags
        env:
          COMPOSITE_TAG: ${{ steps.tags.outputs.composite }}
          SHA_TAG: ${{ steps.tags.outputs.sha }}
          VERSION_TAG: ${{ steps.tags.outputs.version }}
          RELEASE_TAG: ${{ steps.tags.outputs.release }}
        run: |
          TAGS="${COMPOSITE_TAG} ${SHA_TAG}"
          [[ "${GITHUB_REF_NAME}" == "main" ]] && TAGS="${TAGS} ${VERSION_TAG} ${RELEASE_TAG}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Merge and attest service image
        id: merge-service
        uses: ./.github/actions/merge-manifest-and-attest
        with:
          image: ${{ steps.tags.outputs.image }}
          artifact-pattern: digests-service-${{ matrix.service }}-${{ matrix.release }}-*
          tags: ${{ steps.service-tags.outputs.tags }}
          inspect-tag: ${{ steps.tags.outputs.composite }}
          sbom-output-file: sbom-${{ matrix.service }}.cyclonedx.json
          grype-category: grype-${{ matrix.service }}

  test-service-images:
    needs: [merge-base-images, verify-base-images, generate-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
    services:
      mysql:
        image: mysql:9.7
        env: {MYSQL_ROOT_PASSWORD: openstack}
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -popenstack" --health-interval=10s --health-timeout=5s --health-retries=5
      postgres:
        image: postgres:18
        env: {POSTGRES_USER: openstack, POSTGRES_PASSWORD: openstack}
        ports: ['5432:5432']
        options: --health-cmd="pg_isready -U openstack" --health-interval=10s --health-timeout=5s --health-retries=5
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Checkout service source
        id: checkout-source
        uses: ./.github/actions/checkout-service-source
        with:
          service: ${{ matrix.service }}
          release: ${{ matrix.release }}

      - name: Resolve pip extras
        id: pip-extras
        env:
          MATRIX_SERVICE: ${{ matrix.service }}
          MATRIX_RELEASE: ${{ matrix.release }}
        run: |
          extras=$(yq -r ".\"${MATRIX_SERVICE}\".pip_extras // [] | join(\",\")" "releases/${MATRIX_RELEASE}/extra-packages.yaml")
          echo "install_spec=.${extras:+[$extras]}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker registry
        uses: ./.github/actions/setup-docker-registry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          install-cosign: 'false'

      - name: Run tests
        env:
          SERVICE_NAME: ${{ matrix.service }}
          SERVICE_VERSION: ${{ steps.checkout-source.outputs.source-ref }}
          INSTALL_SPEC: ${{ steps.pip-extras.outputs.install_spec }}
          VENV_BUILDER_IMAGE: ${{ needs.merge-base-images.outputs.venv-builder-image }}
          RELEASE: ${{ matrix.release }}
          OS_TEST_DBAPI_ADMIN_CONNECTION: "sqlite://;mysql+pymysql://root:openstack@127.0.0.1/;postgresql+psycopg2://openstack:openstack@127.0.0.1/openstack"
        run: hack/ci-run-unit-tests.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.service }}-${{ matrix.release }}
          path: results/testresults.subunit
          retention-days: 30

  verify-service-images:
    if: github.event_name != 'pull_request'
    needs: [merge-service-images, test-service-images, generate-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Docker registry
        uses: ./.github/actions/setup-docker-registry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          install-cosign: 'false'
      - name: Derive tags
        id: tags
        uses: ./.github/actions/derive-service-tags
        with:
          service: ${{ matrix.service }}
          release: ${{ matrix.release }}
          repository-owner: ${{ github.repository_owner }}

      - name: Pull and verify service image
        env:
          IMAGE_REF: ${{ steps.tags.outputs.composite }}
          SERVICE_NAME: ${{ matrix.service }}
        run: |
          docker pull "$IMAGE_REF"
          bash "tests/container-images/verify_${SERVICE_NAME}.sh" "$IMAGE_REF"
