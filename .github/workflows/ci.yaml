---
name: CI

"on":
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/c5c3
  # CC-0018: Pin tool versions for CI reproducibility (single source of truth).
  CONTROLLER_GEN_VERSION: v0.20.1

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Detect which areas of code changed to avoid running expensive jobs on
  # unrelated changes (e.g. docs edits must not trigger E2E or image builds).
  #
  # The e2e-operators output is a JSON matrix that lists only the operators
  # whose code (or shared code) actually changed, so E2E and image-push jobs
  # run per-operator rather than all-or-nothing.
  #
  # To add a new operator (e.g. glance):
  #   1. Add a filter block below (glance: ...)
  #   2. Add the operator name to ALL_OPERATORS in the "Resolve effective changes" step
  #   3. Add a matching FILTER_glance env var in the same step
  #
  # On tag pushes the full release pipeline must always run, so all areas and
  # all operators are forced active regardless of which files were touched.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go: ${{ steps.result.outputs.go }}
      docs: ${{ steps.result.outputs.docs }}
      helm: ${{ steps.result.outputs.helm }}
      e2e-infra: ${{ steps.result.outputs.e2e-infra }}
      has-e2e-operators: ${{ steps.result.outputs.has-e2e-operators }}
      e2e-operators: ${{ steps.result.outputs.e2e-operators }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            # Shared Go infrastructure — a change here affects every operator.
            go_common:
              - 'internal/**'
              - 'go.work'
              - 'Makefile'
              - '.golangci.yml'
              - 'hack/**'
              - 'scripts/**'
              - 'images/python-base/**'
              - 'images/venv-builder/**'
              - 'images/tempest/**'
              - 'tests/tempest/**'
              - 'releases/**'
              - '.github/workflows/ci.yaml'
            # Per-operator paths — only the relevant E2E job is triggered.
            keystone:
              - 'operators/keystone/**'
              - 'images/keystone/**'
              - 'tests/e2e/keystone/**'
            # glance:                        # uncomment when glance is added
            #   - 'operators/glance/**'
            #   - 'images/glance/**'
            #   - 'tests/e2e/glance/**'
            docs:
              - 'docs/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            # CC-0041: Helm chart changes trigger the helm-validate job.
            helm:
              - 'operators/keystone/helm/**'
            e2e_infra:
              - 'tests/e2e/infrastructure/**'
              - 'hack/**'
              - 'deploy/**'
              - '.github/workflows/ci.yaml'
      - name: Resolve effective changes
        id: result
        env:
          # Single source of truth for all known operators (space-separated).
          # To add a new operator: add it here, add a filter block above,
          # and add a matching FILTER_<operator> line below.
          ALL_OPERATORS: keystone
          # Per-operator filter outputs exposed as env vars for shell indirection.
          FILTER_keystone: ${{ steps.filter.outputs.keystone }}
          # FILTER_glance: ${{ steps.filter.outputs.glance }}
        run: |
          ops=()
          go_changed=false

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tag push: run the full release pipeline for all known operators.
            go_changed=true
            read -ra ops <<< "$ALL_OPERATORS"
            echo "docs=true"      >> "$GITHUB_OUTPUT"
            echo "helm=true"      >> "$GITHUB_OUTPUT"
            echo "e2e-infra=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs=${{ steps.filter.outputs.docs }}"           >> "$GITHUB_OUTPUT"
            echo "helm=${{ steps.filter.outputs.helm }}"           >> "$GITHUB_OUTPUT"
            echo "e2e-infra=${{ steps.filter.outputs.e2e_infra }}" >> "$GITHUB_OUTPUT"

            if [[ "${{ steps.filter.outputs.go_common }}" == "true" ]]; then
              # Shared-code change → all operators are potentially affected.
              go_changed=true
              read -ra ops <<< "$ALL_OPERATORS"
            else
              # Operator-specific change → include only changed operators.
              for op in $ALL_OPERATORS; do
                filter_var="FILTER_${op}"
                if [[ "${!filter_var}" == "true" ]]; then
                  go_changed=true
                  ops+=("$op")
                fi
              done
            fi
          fi

          echo "go=${go_changed}" >> "$GITHUB_OUTPUT"

          # Emit operator matrix — single codepath for both tag and non-tag.
          if [[ ${#ops[@]} -eq 0 ]]; then
            echo "has-e2e-operators=false"                   >> "$GITHUB_OUTPUT"
            # Always emit valid JSON so fromJson() never fails in downstream jobs.
            echo 'e2e-operators={"operator":["__none__"]}'   >> "$GITHUB_OUTPUT"
          else
            matrix=$(printf '%s\n' "${ops[@]}" | jq -Rnc '[inputs] | {operator: .}')
            echo "has-e2e-operators=true"                    >> "$GITHUB_OUTPUT"
            echo "e2e-operators=${matrix}"                   >> "$GITHUB_OUTPUT"
          fi

  lint:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.work
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11.4
          install-only: true
      - name: Run lint
        run: make lint

  # CC-0010: Validate shell scripts with shellcheck to catch scripting issues
  # early.  shellcheck is pre-installed on ubuntu-latest runners.
  # Runs unconditionally — it is fast and hack/ scripts are exercised in E2E.
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run shellcheck on hack/*.sh
        run: shellcheck --severity=warning hack/*.sh

  # CC-0018: Matrix over [common, keystone, c5c3] to deduplicate common coverage
  # into a single leg (review comment #7/#8).
  test:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        target: [common, keystone, c5c3]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.work
      - name: Run unit tests
        run: |
          if [ "${{ matrix.target }}" = "common" ]; then
            make test-common
          else
            make test-operator OPERATOR=${{ matrix.target }}
          fi
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: cover-unit-${{ matrix.target }}.out
          flags: unit-${{ matrix.target }}
          fail_ci_if_error: false

  # CC-0018, REQ-003: Integration tests with envtest, coverage uploaded to Codecov
  # (REQ-004). Includes internal/common to meet 80% codecov target (review comment #5).
  test-integration:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: [common, keystone, c5c3]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.work
      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.23
      - name: Run integration tests
        run: |
          if [ "${{ matrix.target }}" = "common" ]; then
            make test-integration-common
          else
            make test-integration OPERATOR=${{ matrix.target }}
          fi
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: cover-integration-${{ matrix.target }}.out
          flags: integration-${{ matrix.target }}
          fail_ci_if_error: false

  # CC-0018, REQ-009: Verify generated code (CRD manifests, deepcopy) is committed
  # and up-to-date. Fails if make manifests or make generate produces uncommitted diffs.
  verify-codegen:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.work
      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@${{ env.CONTROLLER_GEN_VERSION }}
      - name: Run code generation
        run: |
          make manifests
          make generate
      # CC-0018: Verify Helm chart CRD copies match controller-gen output.
      - name: Verify CRD sync
        run: make verify-crd-sync
      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated code is out of date. Run 'make manifests && make generate' and commit the result."
            exit 1
          fi

  docs:
    needs: [changes]
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build documentation
        run: npm run docs:build

  # CC-0041: Validate Helm chart structure, template rendering, and unit tests.
  # Runs helm lint, helm template with multiple value override scenarios, and
  # helm-unittest to catch chart regressions early without requiring a cluster.
  helm-validate:
    needs: [changes]
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
      - name: Install helm-unittest plugin
        # NOTE: --verify=false because helm-unittest does not publish GPG signatures for plugin releases.
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3 --verify=false
      - name: Helm lint
        run: helm lint operators/keystone/helm/keystone-operator/
      - name: Helm template
        run: |
          CHART=operators/keystone/helm/keystone-operator
          echo "--- Scenario 1: default values ---"
          helm template test "$CHART"
          echo "--- Scenario 2: webhook disabled ---"
          helm template test "$CHART" --set webhook.enabled=false
          echo "--- Scenario 3: external service account ---"
          helm template test "$CHART" --set serviceAccount.create=false --set serviceAccount.name=existing-sa
          echo "--- Scenario 4: custom resources ---"
          helm template test "$CHART" --set resources.limits.cpu=100m --set resources.limits.memory=64Mi
          echo "--- Scenario 5: namespace-scoped RBAC ---"
          helm template test "$CHART" --set rbac.namespaceScoped=true --set webhook.enabled=false
      - name: Helm unittest
        run: helm unittest operators/keystone/helm/keystone-operator/

  # CC-0010, REQ-009: End-to-end infrastructure deployment and Chainsaw test.
  # Deploys the full infrastructure stack to a kind cluster and validates health
  # of all operators, CRs, and ExternalSecrets via Chainsaw assertions.
  e2e-infra:
    needs: [changes]
    if: needs.changes.outputs.e2e-infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.work
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: forge-e2e
      - name: Install Flux CLI
        uses: fluxcd/flux2/action@871be9b40d53627786d3a3835a3ddba1e3234bd2 # v2.8.3
      - name: Install test dependencies
        run: |
          make install-test-deps
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
      - name: Deploy infrastructure stack
        run: make deploy-infra
        env:
          # kind cluster already created by helm/kind-action; skip creation in script.
          SKIP_KIND_CREATE: "true"
      - name: Run Chainsaw E2E tests
        run: |
          mkdir -p _output/reports
          chainsaw test --config tests/e2e/chainsaw-config.yaml tests/e2e/infrastructure/
      - name: Dump diagnostic info
        if: failure()
        run: |
          echo "=== HelmReleases ==="
          kubectl get helmrelease --all-namespaces || true
          echo "=== Pods ==="
          kubectl get pods --all-namespaces || true
          echo "=== DaemonSets ==="
          kubectl get daemonsets --all-namespaces -o wide || true
          echo "=== DaemonSet chaos-daemon detail ==="
          kubectl describe daemonset -n chaos-mesh chaos-daemon 2>/dev/null || true
          echo "=== Events (last 50) ==="
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' | tail -50 || true
          echo "=== Flux logs ==="
          flux logs --all-namespaces || true
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-infra-junit-report
          path: _output/reports/
          retention-days: 14

  # CC-0018, REQ-005: End-to-end operator tests using kind cluster and Chainsaw.
  # Builds the operator image, loads it into kind, deploys via Helm, and runs
  # Chainsaw test suites per operator.
  # Only runs when Go/operator code or E2E test definitions change, and only
  # after all pre-flight checks (lint, tests, shellcheck) have passed.
  e2e-operator:
    needs: [changes, lint, shellcheck, test, test-integration, verify-codegen]
    if: |
      needs.changes.outputs.has-e2e-operators == 'true' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.e2e-operators) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.work
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: forge-e2e
      - name: Build operator image
        run: make docker-build OPERATOR=${{ matrix.operator }} IMG=${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator:dev
      - name: Build service image
        run: |
          # Resolve the upstream source ref for the service image.
          SERVICE_REF=$(yq '."${{ matrix.operator }}"' releases/2025.2/source-refs.yaml)
          # CC-0018: Guard against missing/null source ref (review comment #2).
          if [ -z "$SERVICE_REF" ] || [ "$SERVICE_REF" = "null" ]; then
            echo "::error::SERVICE_REF for '${{ matrix.operator }}' is null or empty in releases/2025.2/source-refs.yaml"
            exit 1
          fi
          PIP_EXTRAS=$(yq -r '."${{ matrix.operator }}".pip_extras // [] | join(",")' releases/2025.2/extra-packages.yaml)
          PIP_PACKAGES=$(yq -r '."${{ matrix.operator }}".pip_packages // [] | join(" ")' releases/2025.2/extra-packages.yaml)
          APT_PACKAGES=$(yq -r '."${{ matrix.operator }}".apt_packages // [] | join(" ")' releases/2025.2/extra-packages.yaml)

          # Clone upstream OpenStack source at the pinned ref.
          git clone --depth 1 --branch "$SERVICE_REF" \
            https://github.com/openstack/${{ matrix.operator }}.git /tmp/${{ matrix.operator }}-src

          # Apply constraint overrides (idempotent, exits 0 if no overrides).
          scripts/apply-constraint-overrides.sh 2025.2

          # Build the image chain: python-base -> venv-builder -> service.
          docker build -t python-base images/python-base/
          docker build -t venv-builder images/venv-builder/
          docker build -t ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}:2025.2 \
            --build-arg PIP_EXTRAS="$PIP_EXTRAS" \
            --build-arg PIP_PACKAGES="$PIP_PACKAGES" \
            --build-arg EXTRA_APT_PACKAGES="$APT_PACKAGES" \
            --build-context ${{ matrix.operator }}=/tmp/${{ matrix.operator }}-src \
            --build-context upper-constraints=releases/2025.2 \
            images/${{ matrix.operator }}/
      - name: Load images into kind
        run: |
          # Tag the service image with the upgrade tag used by the image-upgrade E2E test.
          docker tag ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}:2025.2 \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}:2025.2-upgraded
          kind load docker-image ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator:dev --name forge-e2e
          kind load docker-image ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}:2025.2 --name forge-e2e
          kind load docker-image ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}:2025.2-upgraded --name forge-e2e
      - name: Install Flux CLI
        uses: fluxcd/flux2/action@871be9b40d53627786d3a3835a3ddba1e3234bd2 # v2.8.3
      - name: Install test dependencies
        run: |
          make install-test-deps
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
      - name: Deploy infrastructure stack
        run: make deploy-infra
        env:
          SKIP_KIND_CREATE: "true"
      # CC-0018: Install CRDs before the operator so the API server's CRD
      # watch cache is fully initialized by the time the controller starts.
      # Helm installs CRDs and the operator simultaneously; the informer may
      # miss initial watch events if the watch cache hasn't stabilized.
      - name: Install operator CRDs
        run: |
          kubectl apply -f operators/${{ matrix.operator }}/helm/${{ matrix.operator }}-operator/crds/
          kubectl wait crd --all --for condition=Established --timeout=60s
      - name: Deploy operator
        run: |
          helm install ${{ matrix.operator }}-operator \
            operators/${{ matrix.operator }}/helm/${{ matrix.operator }}-operator/ \
            --set image.repository=${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator \
            --set image.tag=dev \
            --set image.pullPolicy=Never \
            --wait --timeout 120s
      - name: Run E2E tests
        run: |
          mkdir -p _output/reports
          chainsaw test --config tests/e2e/chainsaw-config.yaml tests/e2e/${{ matrix.operator }}/
      - name: Dump diagnostic info
        if: always()
        run: |
          echo "=== Operator pods ==="
          kubectl get pods -l app.kubernetes.io/name=${{ matrix.operator }}-operator || true
          echo "=== All pods ==="
          kubectl get pods --all-namespaces || true
          echo "=== Events (last 50) ==="
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' | tail -50 || true
          echo "=== Operator logs ==="
          kubectl logs -l app.kubernetes.io/name=${{ matrix.operator }}-operator --tail=100 || true
          echo "=== Job descriptions ==="
          for job in $(kubectl get jobs -n openstack -o name 2>/dev/null); do
            echo "--- describe $job ---"
            kubectl describe -n openstack "$job" 2>&1 | tail -30 || true
          done
          echo "=== Failed Job logs ==="
          for job in $(kubectl get jobs -n openstack -o name 2>/dev/null); do
            echo "--- logs for $job ---"
            kubectl logs -n openstack "$job" --all-containers --tail=50 2>&1 || true
          done
          echo "=== All pod logs in openstack ==="
          for pod in $(kubectl get pods -n openstack -o name 2>/dev/null); do
            echo "--- $pod (current) ---"
            kubectl logs -n openstack "$pod" --all-containers --tail=30 2>&1 || true
            echo "--- $pod (previous) ---"
            kubectl logs -n openstack "$pod" --all-containers --tail=30 --previous 2>&1 || true
          done
          echo "=== Operator CR status ==="
          kubectl get ${{ matrix.operator }} -n openstack -o yaml 2>/dev/null | grep -A5 "conditions:" || true
          echo "=== ConfigMaps in openstack namespace ==="
          kubectl get cm -n openstack 2>/dev/null || true
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-${{ matrix.operator }}-junit-report
          path: _output/reports/
          retention-days: 14

  # CC-0035: Tempest API integration tests.
  # Deploys services into a kind cluster and runs the OpenStack Tempest test
  # suite against them.  Currently tests Keystone; designed so additional
  # services can be added to this single job without needing separate runs.
  tempest:
    needs: [changes, lint, shellcheck, test, test-integration, verify-codegen]
    if: |
      needs.changes.outputs.has-e2e-operators == 'true' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.work
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: forge-e2e
      # -- Keystone --------------------------------------------------------
      - name: Build operator image (keystone)
        run: make docker-build OPERATOR=keystone IMG=${{ env.IMAGE_PREFIX }}/keystone-operator:dev
      - name: Build service image (keystone)
        run: |
          SERVICE_REF=$(yq '.keystone' releases/2025.2/source-refs.yaml)
          if [ -z "$SERVICE_REF" ] || [ "$SERVICE_REF" = "null" ]; then
            echo "::error::SERVICE_REF for 'keystone' is null or empty in releases/2025.2/source-refs.yaml"
            exit 1
          fi
          PIP_EXTRAS=$(yq -r '.keystone.pip_extras // [] | join(",")' releases/2025.2/extra-packages.yaml)
          PIP_PACKAGES=$(yq -r '.keystone.pip_packages // [] | join(" ")' releases/2025.2/extra-packages.yaml)
          APT_PACKAGES=$(yq -r '.keystone.apt_packages // [] | join(" ")' releases/2025.2/extra-packages.yaml)
          git clone --depth 1 --branch "$SERVICE_REF" \
            https://github.com/openstack/keystone.git /tmp/keystone-src
          scripts/apply-constraint-overrides.sh 2025.2
          docker build -t python-base images/python-base/
          docker build -t venv-builder images/venv-builder/
          docker build -t ${{ env.IMAGE_PREFIX }}/keystone:2025.2 \
            --build-arg PIP_EXTRAS="$PIP_EXTRAS" \
            --build-arg PIP_PACKAGES="$PIP_PACKAGES" \
            --build-arg EXTRA_APT_PACKAGES="$APT_PACKAGES" \
            --build-context keystone=/tmp/keystone-src \
            --build-context upper-constraints=releases/2025.2 \
            images/keystone/
      - name: Build Tempest image
        run: |
          TEMPEST_VERSION=$(hack/resolve-test-ref.sh releases/2025.2/test-refs.yaml tempest)
          KTP_VERSION=$(hack/resolve-test-ref.sh releases/2025.2/test-refs.yaml keystone-tempest-plugin)
          echo "Building Tempest image (tempest=${TEMPEST_VERSION}, keystone-tempest-plugin=${KTP_VERSION})"
          docker build \
            -t c5c3/tempest:local \
            -f images/tempest/Dockerfile \
            --build-arg "TEMPEST_VERSION=${TEMPEST_VERSION}" \
            --build-arg "KEYSTONE_TEMPEST_PLUGIN_VERSION=${KTP_VERSION}" \
            --build-context upper-constraints=releases/2025.2/ \
            images/tempest/
      - name: Load images into kind
        run: |
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone-operator:dev --name forge-e2e
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone:2025.2 --name forge-e2e
      # -- Infrastructure ---------------------------------------------------
      - name: Install Flux CLI
        uses: fluxcd/flux2/action@871be9b40d53627786d3a3835a3ddba1e3234bd2 # v2.8.3
      - name: Install test dependencies
        run: |
          make install-test-deps
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
      - name: Deploy infrastructure stack
        run: make deploy-infra
        env:
          SKIP_KIND_CREATE: "true"
      # -- Deploy Keystone operator -----------------------------------------
      - name: Install operator CRDs (keystone)
        run: |
          kubectl apply -f operators/keystone/helm/keystone-operator/crds/
          kubectl wait crd --all --for condition=Established --timeout=60s
      - name: Deploy operator (keystone)
        run: |
          helm install keystone-operator \
            operators/keystone/helm/keystone-operator/ \
            --set image.repository=${{ env.IMAGE_PREFIX }}/keystone-operator \
            --set image.tag=dev \
            --set image.pullPolicy=Never \
            --wait --timeout 120s
      - name: Deploy Keystone CR for Tempest
        run: |
          kubectl apply -f tests/tempest/keystone/00-keystone-cr.yaml
          kubectl wait keystone/keystone-tempest -n openstack \
            --for=condition=Ready --timeout=300s
      # -- Tempest run -------------------------------------------------------
      - name: Run Tempest API tests
        run: |
          mkdir -p _output/tempest _output/tempest/config
          chmod o+w _output/tempest
          CONFIG_DIR="tests/tempest/keystone"

          ADMIN_PASSWORD=$(kubectl get secret keystone-admin -n openstack \
            -o jsonpath='{.data.password}' | base64 -d)

          kubectl port-forward svc/keystone-tempest-api -n openstack 5000:5000 >/dev/null 2>&1 &
          PF_PID=$!
          trap 'kill "${PF_PID}" 2>/dev/null || true' EXIT
          ready=false
          for i in $(seq 1 10); do
            if curl -sf http://localhost:5000/ >/dev/null 2>&1; then
              ready=true
              break
            fi
            sleep 1
          done
          if [ "${ready}" != "true" ]; then
            echo "::error::Keystone API at http://localhost:5000 did not become reachable after 10 attempts"
            exit 1
          fi

          sed -e 's|keystone-tempest-api\.openstack\.svc:5000|localhost:5000|' \
              -e "s|\${KEYSTONE_ADMIN_PASSWORD}|${ADMIN_PASSWORD}|" \
              "${CONFIG_DIR}/tempest.conf" > _output/tempest/config/tempest.conf
          [[ -f "${CONFIG_DIR}/include-tests.txt" ]] && cp "${CONFIG_DIR}/include-tests.txt" _output/tempest/config/
          [[ -f "${CONFIG_DIR}/exclude-tests.txt" ]] && cp "${CONFIG_DIR}/exclude-tests.txt" _output/tempest/config/

          TEMPEST_CMD="tempest run"
          [[ -f "_output/tempest/config/include-tests.txt" ]] && TEMPEST_CMD+=" --include-list /etc/tempest/include-tests.txt"
          [[ -f "_output/tempest/config/exclude-tests.txt" ]] && TEMPEST_CMD+=" --exclude-list /etc/tempest/exclude-tests.txt"
          TEMPEST_CMD+=" --concurrency 1 --subunit"

          CATALOG_SVC="keystone-tempest-api.openstack.svc.cluster.local"
          docker run --rm \
            --network host \
            --add-host "${CATALOG_SVC}:127.0.0.1" \
            --add-host "keystone-tempest-api.openstack.svc:127.0.0.1" \
            -v "${GITHUB_WORKSPACE}/_output/tempest/config:/etc/tempest:ro" \
            -v "${GITHUB_WORKSPACE}/_output/tempest:/output" \
            c5c3/tempest:local \
            bash -c "
              set -euo pipefail
              export HOME=/tmp
              mkdir -p /tmp/tempest-workspace /tmp/tempest-logs
              cd /tmp/tempest-workspace
              tempest init .
              cp /etc/tempest/tempest.conf etc/tempest.conf
              set +e
              ${TEMPEST_CMD} | tee /output/tempest.subunit | subunit2pyunit 2>&1 | grep --line-buffered -E '\.\.\. '
              rc=\${PIPESTATUS[0]}
              set -e
              if [[ -f /output/tempest.subunit ]]; then
                subunit2junitxml < /output/tempest.subunit > /output/tempest-results.xml 2>/dev/null || true
              fi
              # Guard against tempest run --subunit exiting 0 on test failures:
              # check the JUnit XML for reported failures or errors.
              if [[ \${rc} -eq 0 && -f /output/tempest-results.xml ]]; then
                if grep -qE 'failures=\"[1-9]|errors=\"[1-9]' /output/tempest-results.xml; then
                  echo '::error::Tempest reported test failures.'
                  rc=1
                fi
              fi
              exit \${rc}
            "
      - name: Upload Tempest results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tempest-results
          path: _output/tempest/
          retention-days: 14
      - name: Dump diagnostic info
        if: always()
        run: |
          echo "=== Operator pods (keystone) ==="
          kubectl get pods -l app.kubernetes.io/name=keystone-operator || true
          echo "=== All pods ==="
          kubectl get pods --all-namespaces || true
          echo "=== Events (last 50) ==="
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' | tail -50 || true
          echo "=== Operator logs (keystone) ==="
          kubectl logs -l app.kubernetes.io/name=keystone-operator --tail=100 || true
          echo "=== Keystone Tempest CR status ==="
          kubectl get keystone keystone-tempest -n openstack -o yaml 2>/dev/null | grep -A5 "conditions:" || true
          echo "=== All pod logs in openstack ==="
          for pod in $(kubectl get pods -n openstack -o name 2>/dev/null); do
            echo "--- $pod (current) ---"
            kubectl logs -n openstack "$pod" --all-containers --tail=30 2>&1 || true
          done

  # CC-0018, REQ-006: Build operator container images per platform on native runners.
  # Each platform is pushed by digest; merge-operator-images assembles the manifest list.
  # Runs only on push events (main branch or v* tags) after E2E passed.
  build-and-push:
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 15
    needs: [changes, e2e-operator]
    if: github.event_name == 'push' && needs.e2e-operator.result == 'success'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        operator: ${{ fromJson(needs.changes.outputs.e2e-operators).operator }}
        platform:
          - name: linux/amd64
            runner: ubuntu-latest
          - name: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare platform pair
        id: platform-pair
        uses: ./.github/actions/platform-pair
        with:
          platform: ${{ matrix.platform.name }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # CC-0018: Generate OCI annotations consistent with the two-layer OCI annotation
      # pattern in build-images.yaml. type=semver strips the v prefix (v0.1.0 -> 0.1.0).
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
          labels: |
            org.opencontainers.image.title=${{ matrix.operator }}-operator
            org.opencontainers.image.description=Kubernetes operator for OpenStack ${{ matrix.operator }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=SAP SE

      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        id: build
        with:
          context: .
          file: operators/${{ matrix.operator }}/Dockerfile
          platforms: ${{ matrix.platform.name }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.operator }}-operator-${{ steps.platform-pair.outputs.value }}
          cache-to: type=gha,mode=max,scope=${{ matrix.operator }}-operator-${{ steps.platform-pair.outputs.value }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digests-operator-${{ matrix.operator }}-${{ steps.platform-pair.outputs.value }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # CC-0018, REQ-006: Assemble per-platform digests into multi-arch manifest lists
  # and push with final tags (SHA, latest, semver).
  merge-operator-images:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes, build-and-push]
    if: github.event_name == 'push' && needs.build-and-push.result == 'success'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.e2e-operators) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # CC-0018: Generate OCI tags via docker/metadata-action.
      # type=semver strips the v prefix (v0.1.0 -> 0.1.0).
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=${{ matrix.operator }}-operator
            org.opencontainers.image.description=Kubernetes operator for OpenStack ${{ matrix.operator }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=SAP SE

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-operator-${{ matrix.operator }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create and push manifest list
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
        run: |
          cd /tmp/digests
          [[ $(ls | wc -l) -ge 1 ]] || { echo "::error::No digests found for ${{ matrix.operator }}-operator"; exit 1; }
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

  # CC-0018, REQ-007: Package and push operator Helm charts to GHCR OCI registry.
  # Runs only on push events after E2E passed. Uses versioned chart packaging
  # for v* tag pushes.
  helm-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes, e2e-operator]
    if: github.event_name == 'push' && needs.e2e-operator.result == 'success'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.e2e-operators) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin
      - name: Package and push Helm chart
        env:
          OPERATOR: ${{ matrix.operator }}
        run: |
          # Remove stale chart tarballs to prevent glob ambiguity (CC-0018).
          rm -f "${OPERATOR}"-operator-*.tgz
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            make helm-package OPERATOR="${OPERATOR}" CHART_VERSION="${GITHUB_REF_NAME#v}"
          else
            make helm-package OPERATOR="${OPERATOR}"
          fi
          helm push "${OPERATOR}"-operator-*.tgz oci://${{ env.REGISTRY }}/c5c3/charts

  # CC-0018, REQ-008: Create GitHub release with auto-generated release notes
  # on v* tag pushes, after images and charts are published.
  github-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes, merge-operator-images, helm-push]
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.merge-operator-images.result == 'success' &&
      needs.helm-push.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
      # CC-0018: Package Helm chart tarballs to attach as release assets.
      - name: Package Helm charts
        run: |
          for op in $(echo '${{ needs.changes.outputs.e2e-operators }}' | jq -r '.operator[]'); do
            make helm-package OPERATOR="${op}" CHART_VERSION="${GITHUB_REF_NAME#v}"
          done
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          files: "*-operator-*.tgz"
