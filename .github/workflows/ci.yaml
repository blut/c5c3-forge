---
name: CI

"on":
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/c5c3
  # CC-0018: Pin tool versions for CI reproducibility (single source of truth).
  CONTROLLER_GEN_VERSION: v0.20.1
  GOFUMPT_VERSION: v0.9.2  # CC-0053
  GOLANGCI_LINT_VERSION: v2.11.4

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Detect which areas of code changed to avoid running expensive jobs on
  # unrelated changes (e.g. docs edits must not trigger E2E or image builds).
  #
  # The e2e-operators output is a JSON matrix that lists only the operators
  # whose code (or shared code) actually changed, so E2E and image-push jobs
  # run per-operator rather than all-or-nothing.
  #
  # To add a new operator: see hack/ci-resolve-changes.sh for full instructions.
  #
  # On tag pushes the full release pipeline must always run, so all areas and
  # all operators are forced active regardless of which files were touched.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go: ${{ steps.result.outputs.go }}
      docs: ${{ steps.result.outputs.docs }}
      helm: ${{ steps.result.outputs.helm }}
      e2e-infra: ${{ steps.result.outputs.e2e-infra }}
      e2e-chaos: ${{ steps.result.outputs.e2e-chaos }}
      e2e-prometheus: ${{ steps.result.outputs.e2e-prometheus }}
      has-e2e-operators: ${{ steps.result.outputs.has-e2e-operators }}
      e2e-operators: ${{ steps.result.outputs.e2e-operators }}
      tempest-releases: ${{ steps.tempest-matrix.outputs.tempest-releases }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            # Shared Go infrastructure — a change here affects every operator.
            go_common:
              - 'internal/**'
              - 'go.work'
              - 'Makefile'
              - '.golangci.yml'
              - 'hack/**'
              - 'scripts/**'
              - 'images/python-base/**'
              - 'images/venv-builder/**'
              - 'images/tempest/**'
              - 'releases/**'
              - '.github/workflows/ci.yaml'
            # Per-operator paths — only the relevant E2E job is triggered.
            # Test-definition paths (tests/e2e/<op>/**) are covered by
            # tests_e2e_operator so they run the full E2E suite without also
            # pulling in lint/unit/format jobs.
            keystone:
              - 'operators/keystone/**'
              - 'images/keystone/**'
            # glance:                        # uncomment when glance is added
            #   - 'operators/glance/**'
            #   - 'images/glance/**'
            docs:
              - 'docs/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            # CC-0041: Helm chart changes trigger the helm-validate job.
            helm:
              - 'operators/keystone/helm/**'
            e2e_infra:
              - 'tests/e2e/infrastructure/**'
              - 'hack/**'
              - 'deploy/**'
              - '.github/workflows/ci.yaml'
            # CC-0054: Chaos E2E tests — separate from e2e_infra to allow independent gating.
            e2e_chaos:
              - 'tests/e2e-chaos/**'
              - 'hack/**'
              - 'deploy/**'
              - '.github/workflows/ci.yaml'
              - '.github/actions/**'
            # CC-0100, REQ-010: Prometheus stack E2E tests — separate filter so
            # the e2e-prometheus job runs only when the kind-only monitoring
            # stack, the keystone-operator ServiceMonitor wiring, the operator
            # values surface that toggles it, the dashboard JSON consumed by
            # the overlay, the deploy script that opts in, the composite
            # action that threads WITH_PROMETHEUS, the workflow file, or the
            # Makefile target that mirrors the CI invocation actually change.
            e2e_prometheus:
              - 'deploy/kind/prometheus/**'
              - 'tests/e2e/keystone/prometheus-stack/**'
              - 'hack/deploy-infra.sh'
              - 'operators/keystone/helm/keystone-operator/templates/servicemonitor.yaml'
              - 'operators/keystone/helm/keystone-operator/values.yaml'
              - 'operators/keystone/dashboards/keystone-operator.json'
              - '.github/actions/setup-e2e-infra/action.yaml'
              - '.github/workflows/ci.yaml'
              - 'Makefile'
            # CC-0054 follow-up: Any E2E test-definition change forces all E2E
            # jobs to run. Kept separate from go_common so pure test edits do
            # not also trigger lint/unit/format/vuln jobs.
            tests_e2e_operator:
              - 'tests/e2e/**'
            tests_tempest:
              - 'tests/tempest/**'
      # CC-0050: Extracted to hack/ci-resolve-changes.sh (review #2 comment 3).
      - name: Resolve effective changes
        id: result
        env:
          ALL_OPERATORS: keystone
          FILTER_keystone: ${{ steps.filter.outputs.keystone }}
          # FILTER_glance: ${{ steps.filter.outputs.glance }}
          FILTER_docs: ${{ steps.filter.outputs.docs }}
          FILTER_helm: ${{ steps.filter.outputs.helm }}
          FILTER_e2e_infra: ${{ steps.filter.outputs.e2e_infra }}
          FILTER_e2e_chaos: ${{ steps.filter.outputs.e2e_chaos }}
          FILTER_e2e_prometheus: ${{ steps.filter.outputs.e2e_prometheus }}
          FILTER_tests_e2e_operator: ${{ steps.filter.outputs.tests_e2e_operator }}
          FILTER_tests_tempest: ${{ steps.filter.outputs.tests_tempest }}
          FILTER_go_common: ${{ steps.filter.outputs.go_common }}
        run: hack/ci-resolve-changes.sh
      # CC-0051: Derive Tempest release matrix from releases/ directories (review #1).
      # Avoids hardcoding releases in the workflow — adding or removing a release
      # only requires updating releases/ and tests/tempest/, not this file.
      - name: Generate Tempest release matrix
        id: tempest-matrix
        run: hack/ci-generate-tempest-matrix.sh

  lint:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        id: setup-go
        with:
          go-version-file: go.work
      # Cache golangci-lint result cache — golangci-lint-action with install-only:true
      # does not manage the analysis cache itself, so we persist it explicitly.
      # Include Go and golangci-lint versions so upgrades automatically invalidate.
      - uses: actions/cache@v5
        with:
          path: $HOME/.cache/golangci-lint
          key: ${{ runner.os }}-go${{ steps.setup-go.outputs.go-version }}-golangci-${{ env.GOLANGCI_LINT_VERSION }}-${{ hashFiles('.golangci.yml', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go${{ steps.setup-go.outputs.go-version }}-golangci-${{ env.GOLANGCI_LINT_VERSION }}-
            ${{ runner.os }}-go${{ steps.setup-go.outputs.go-version }}-golangci-
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-only: true
      - name: Run lint
        run: make lint

  # CC-0053: Verify all Go files conform to gofumpt formatting.
  # Runs gofumpt -l to detect non-conforming files, then prints a unified
  # diff (gofumpt -d) on failure so developers can see exactly what to fix.
  format-check:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        id: setup-go
        with:
          go-version-file: go.work
      - uses: actions/cache@v5
        id: gofumpt-cache
        with:
          path: $HOME/go/bin/gofumpt
          key: ${{ runner.os }}-go${{ steps.setup-go.outputs.go-version }}-gofumpt-${{ env.GOFUMPT_VERSION }}
      - name: Install gofumpt
        if: steps.gofumpt-cache.outputs.cache-hit != 'true'
        run: go install mvdan.cc/gofumpt@${{ env.GOFUMPT_VERSION }}
      # CC-0053: Only check git-tracked Go files to skip generated, vendored,
      # or tooling code that may not follow gofumpt conventions (review #1).
      - name: Check formatting
        run: |
          unformatted=$(git ls-files '*.go' | xargs -r gofumpt -l)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted with gofumpt:"
            echo "$unformatted"
            git ls-files '*.go' | xargs -r gofumpt -d
            exit 1
          fi

  # CC-0010: Validate shell scripts with shellcheck to catch scripting issues
  # early.  shellcheck is pre-installed on ubuntu-latest runners.
  # Runs unconditionally — it is fast and hack/ scripts are exercised in E2E.
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run shellcheck on hack/*.sh and operator rotation scripts
        run: make shellcheck

  # CC-0100, REQ-010: Run the CC-0100 shell unit tests in CI.
  #
  # Why a sibling job and not `make test-shell`:
  #   `make test-shell` globs every shell test under tests/unit/, including
  #   tests/unit/docs/reference_cross_links_test.sh which currently
  #   references the pre-PR-293 location of docs/reference/keystone-crd.md
  #   (the file was moved to docs/reference/keystone/keystone-crd.md by
  #   the docs-grouping commit dd583904). Wiring `make test-shell` into
  #   CI would fail every PR on that pre-existing breakage — fixing the
  #   docs-cross-links test belongs to the docs-grouping follow-up, not
  #   CC-0100, per the rule-4 minimal-changes constraint. Once the
  #   unrelated docs-test bug is fixed, this job can be replaced with
  #   `make test-shell` to cover every shell test in tests/unit/. The
  #   decision is recorded as a CC-0100 follow-up in the progress JSON.
  #
  # The tests below read repo files only (no untrusted input consumed),
  # so this adds no injection surface and is sub-second on a cold runner.
  shell-unit-tests-cc-0100:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run CC-0100 deploy-infra prometheus-flag unit test
        run: bash tests/unit/hack/deploy_infra_prometheus_flag_test.sh
      - name: Run CC-0100 CI path-filter completeness lint
        run: bash tests/unit/ci/ci_path_filters_e2e_prometheus_test.sh

  # CC-0094: Enforce the canonical-scaffold contract for the invalid-CR
  # Chainsaw fixtures (sourcery-ai review #1, FC1 from review #2). Runs
  # `_generate.py --check` (drift mode) and the test_generate.py unit suite
  # (FIXTURES count + chainsaw-test.yaml cross-reference) so a hand-edit to
  # any 02-…/03-…/…/12-*.yaml fixture, or a rename/removal that desynchs
  # FIXTURES from chainsaw-test.yaml, fails the build before the heavy
  # cluster-bound e2e-operator job runs. Always-on because the check is
  # sub-second and python3 is preinstalled on ubuntu-latest runners — no
  # untrusted GitHub event input is read, so no injection surface is added.
  verify-invalid-cr-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Verify CC-0094 invalid-CR fixture drift and structure
        run: make verify-invalid-cr-fixtures

  # Schema-lint every Chainsaw test (tests/**/chainsaw-test.yaml) and config
  # (tests/{e2e,e2e-chaos}/chainsaw-config.yaml) via `chainsaw lint` so typos,
  # removed fields, or schema drift after a chainsaw version bump fail fast —
  # before the cluster-bound e2e-operator/e2e-chaos jobs spin up a kind cluster.
  # Always-on: no cluster needed; chainsaw is restored from the shared testdeps
  # cache via the same composite action setup-e2e-infra uses internally.
  chainsaw-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-test-deps
      - name: Run chainsaw lint
        run: make chainsaw-lint

  # CC-0018: Matrix over [common, keystone, c5c3] to deduplicate common coverage
  # into a single leg (review comment #7/#8).
  test:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        target: [common, keystone, c5c3]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.work
      - name: Run unit tests
        run: |
          if [ "${{ matrix.target }}" = "common" ]; then
            make test-common
          else
            make test-operator OPERATOR=${{ matrix.target }}
          fi
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: cover-unit-${{ matrix.target }}.out
          flags: unit-${{ matrix.target }}
          fail_ci_if_error: false

  # CC-0018, REQ-003: Integration tests with envtest, coverage uploaded to Codecov
  # (REQ-004). Includes internal/common to meet 80% codecov target (review comment #5).
  test-integration:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: [common, keystone, c5c3]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.work
      # Derive the envtest k8s version from the Makefile (single source of truth).
      - name: Get envtest k8s version
        id: envtest-ver
        run: echo "version=$(awk '/ENVTEST_K8S_VERSION/ {print $NF; exit}' Makefile)" >> "$GITHUB_OUTPUT"
      # Cache kubebuilder envtest assets (etcd, kube-apiserver binaries).
      # Key on the k8s version — invalidates automatically when Makefile changes it.
      - uses: actions/cache@v5
        with:
          path: $HOME/.local/share/kubebuilder-envtest
          key: ${{ runner.os }}-envtest-${{ steps.envtest-ver.outputs.version }}
      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.23
      - name: Run integration tests
        run: |
          if [ "${{ matrix.target }}" = "common" ]; then
            make test-integration-common
          else
            make test-integration OPERATOR=${{ matrix.target }}
          fi
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: cover-integration-${{ matrix.target }}.out
          flags: integration-${{ matrix.target }}
          fail_ci_if_error: false

  # CC-0052: Race condition detection for Go tests.
  # Runs all unit tests with -race to catch data races in concurrent operator code
  # (reconcilers, watches, informer caches). Separate from the main test job because
  # the race detector adds 2-5x overhead. Uses -count=1 to disable test caching —
  # race conditions are non-deterministic, so cached results could mask real races.
  test-race:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.work
      - name: Run race-detected tests
        run: make test-race RACE_FLAGS="-count=1"

  # CC-0061: Scan Go modules for reachable vulnerabilities using govulncheck.
  # govulncheck is the official Go vulnerability scanner maintained by the Go
  # team — it detects actually reachable vulnerable code paths, not just
  # dependency list matches.  Uses @latest intentionally (not pinned) because
  # the vulnerability database is updated frequently and pinning an old version
  # defeats the purpose of vulnerability scanning.
  govulncheck:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.work
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: make govulncheck

  # CC-0018, REQ-009: Verify generated code (CRD manifests, deepcopy) is committed
  # and up-to-date. Fails if make manifests or make generate produces uncommitted diffs.
  verify-codegen:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        id: setup-go
        with:
          go-version-file: go.work
      - uses: actions/cache@v5
        id: controller-gen-cache
        with:
          path: $HOME/go/bin/controller-gen
          key: ${{ runner.os }}-go${{ steps.setup-go.outputs.go-version }}-controller-gen-${{ env.CONTROLLER_GEN_VERSION }}
      - name: Install controller-gen
        if: steps.controller-gen-cache.outputs.cache-hit != 'true'
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@${{ env.CONTROLLER_GEN_VERSION }}
      - name: Run code generation
        run: |
          make manifests
          make generate
      # CC-0018: Verify Helm chart CRD copies match controller-gen output.
      - name: Verify CRD sync
        run: make verify-crd-sync
      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated code is out of date. Run 'make manifests && make generate' and commit the result."
            exit 1
          fi

  docs:
    needs: [changes]
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build documentation
        run: npm run docs:build

  # CC-0041: Validate Helm chart structure, template rendering, and unit tests.
  # Runs helm lint, helm template with multiple value override scenarios, and
  # helm-unittest to catch chart regressions early without requiring a cluster.
  helm-validate:
    needs: [changes]
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
      - name: Install helm-unittest plugin
        # NOTE: --verify=false because helm-unittest does not publish GPG signatures for plugin releases.
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3 --verify=false
      - name: Helm lint
        run: helm lint operators/keystone/helm/keystone-operator/
      - name: Helm template
        run: |
          CHART=operators/keystone/helm/keystone-operator
          echo "--- Scenario 1: default values ---"
          helm template test "$CHART"
          echo "--- Scenario 2: webhook disabled ---"
          helm template test "$CHART" --set webhook.enabled=false
          echo "--- Scenario 3: external service account ---"
          helm template test "$CHART" --set serviceAccount.create=false --set serviceAccount.name=existing-sa
          echo "--- Scenario 4: custom resources ---"
          helm template test "$CHART" --set resources.limits.cpu=100m --set resources.limits.memory=64Mi
          echo "--- Scenario 5: namespace-scoped RBAC ---"
          helm template test "$CHART" --set rbac.namespaceScoped=true --set webhook.enabled=false
      - name: Helm unittest
        run: helm unittest operators/keystone/helm/keystone-operator/

  # CC-0010, REQ-009: End-to-end infrastructure deployment and Chainsaw test.
  # Deploys the full infrastructure stack to a kind cluster and validates health
  # of all operators, CRs, and ExternalSecrets via Chainsaw assertions.
  e2e-infra:
    needs: [changes]
    if: needs.changes.outputs.e2e-infra == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.work
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: forge-e2e
      # CC-0050: Use composite action for shared Flux CLI + test deps + deploy-infra sequence (REQ-005).
      - name: Setup E2E infrastructure
        uses: ./.github/actions/setup-e2e-infra
      - name: Run Chainsaw E2E tests
        run: |
          mkdir -p _output/reports
          chainsaw test --config tests/e2e/chainsaw-config.yaml tests/e2e/infrastructure/
      # CC-0050: Use shared diagnostic dump script (REQ-001).
      - name: Dump diagnostic info
        if: failure()
        run: hack/ci-dump-diagnostics.sh
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-infra-junit-report
          path: _output/reports/
          retention-days: 14

  # Centralized image build for E2E test jobs.
  # Builds all Docker images (operator, service, tempest) once and pushes them
  # to GHCR with run-scoped tags (e2e-${run_id}-<tag>).  e2e-operator,
  # e2e-chaos and tempest pull from GHCR via load-e2e-images instead of
  # rebuilding, saving ~5-10 min per CI run.
  #
  # GH-310: Replaces the previous docker-save → zstd → upload-artifact path.
  # Layer-level pull retries plus the GHCR CDN avoid the 5-minute
  # download-artifact timeouts that flaked the artifact-based transport.
  build-e2e-images:
    needs: [changes, lint, shellcheck, test, test-integration, verify-codegen, verify-invalid-cr-fixtures, chainsaw-lint]
    # always(): allow the job to run when upstream Go jobs are skipped
    # (e.g. pure E2E test-definition PRs where go=false). The explicit
    # failure/cancelled guard still blocks if any upstream actually failed.
    #
    # Fork guard: push to GHCR requires a writable GITHUB_TOKEN, which forks
    # do not get on pull_request events. The downstream consumer jobs
    # (e2e-operator, e2e-chaos, tempest) all gate on
    # `needs.build-e2e-images.result == 'success'` and pull from GHCR via
    # `load-e2e-images`, so without the push there is nothing for them to
    # consume. We explicitly skip the whole E2E pipeline for fork PRs and
    # accept the tradeoff: forks still get full pre-flight signal (lint,
    # format-check, shellcheck, test, test-integration, test-race,
    # govulncheck, verify-codegen, helm-validate, e2e-infra), and a
    # maintainer can run E2E by pushing the change to a same-repo branch.
    # Reintroducing an artifact-based fallback for forks would bring back
    # the 5-minute download-artifact timeouts that GH-310 fixed.
    if: |
      always() &&
      (needs.changes.outputs.has-e2e-operators == 'true' || needs.changes.outputs.e2e-chaos == 'true' || needs.changes.outputs.e2e-prometheus == 'true') &&
      github.event.pull_request.head.repo.fork != true &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      RUN_TAG: e2e-${{ github.run_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Enable BuildKit (required for type=gha cache) as the default builder.
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tempest always tests keystone, so keystone must be built regardless
      # of which operator triggered the pipeline.  Union the changed-operator
      # list with a fixed "keystone" entry so the dependency is explicit.
      - name: Resolve build operators
        run: |
          ops=$(echo '${{ needs.changes.outputs.e2e-operators }}' | jq -r '.operator[]')
          if ! printf '%s\n' $ops | grep -qx keystone; then
            ops=$(printf '%s\nkeystone' "$ops")
          fi
          {
            echo "BUILD_OPERATORS<<EOF"
            echo "$ops"
            echo "EOF"
          } >> "$GITHUB_ENV"

      # Build base images once — all subsequent service and tempest builds
      # reuse them via the skip-if-exists guard in ci-build-service-image.sh.
      # GHA cache scopes are shared across branches; these images rarely change.
      - name: Build base images
        run: |
          docker build -t python-base \
            --cache-from type=gha,scope=e2e-python-base \
            --cache-to type=gha,mode=max,scope=e2e-python-base \
            --build-arg APT_MIRROR=http://azure.archive.ubuntu.com \
            images/python-base/
          docker build -t venv-builder \
            --cache-from type=gha,scope=e2e-venv-builder \
            --cache-to type=gha,mode=max,scope=e2e-venv-builder \
            images/venv-builder/

      # Build operator images for all resolved operators (changed + keystone).
      - name: Build operator images
        run: |
          for op in $BUILD_OPERATORS; do
            echo "::group::Building ${op}-operator:dev"
            make docker-build OPERATOR="${op}" IMG="${IMAGE_PREFIX}/${op}-operator:dev" \
              DOCKER_CACHE_FROM="type=gha,scope=e2e-${op}-operator" \
              DOCKER_CACHE_TO="type=gha,mode=max,scope=e2e-${op}-operator"
            echo "::endgroup::"
          done

      # Build service images for every operator × release combination.
      # Iterates releases/*/ directories which is the single source of truth
      # for both e2e-operator (2025.2, 2026.1) and tempest matrix releases.
      - name: Build service images
        run: |
          for op in $BUILD_OPERATORS; do
            for release_dir in releases/*/; do
              release="${release_dir%/}"
              release="${release##*/}"
              echo "::group::Building ${op}:${release}"
              OPERATOR="${op}" IMAGE_PREFIX="${IMAGE_PREFIX}" RELEASE="${release}" \
                DOCKER_BUILD_CACHE_FROM="type=gha,scope=e2e-${op}-${release}" \
                DOCKER_BUILD_CACHE_TO="type=gha,mode=max,scope=e2e-${op}-${release}" \
                hack/ci-build-service-image.sh
              echo "::endgroup::"
            done
          done

      # Build Tempest images for all releases.
      - name: Build Tempest images
        run: |
          for release_dir in releases/*/; do
            release="${release_dir%/}"
            release="${release##*/}"
            echo "::group::Building tempest:${release}"
            RELEASE="${release}" TEMPEST_IMAGE="${IMAGE_PREFIX}/tempest:${release}" \
              DOCKER_BUILD_CACHE_FROM="type=gha,scope=e2e-tempest-${release}" \
              DOCKER_BUILD_CACHE_TO="type=gha,mode=max,scope=e2e-tempest-${release}" \
              hack/ci-build-tempest-image.sh
            echo "::endgroup::"
          done

      # GH-310: Push every E2E image to GHCR under a run-scoped tag so consumer
      # jobs can `docker pull` instead of downloading a 355 MB single-blob
      # artifact (which intermittently times out at the 5-minute mark).
      # Tags use the form e2e-${run_id}-<original-tag>; cleanup-e2e-tags
      # prunes them at the end of the run, with a nightly safety net for
      # cancelled workflows in cleanup-images.yaml.
      - name: Push E2E images to GHCR
        run: |
          push_image() {
            local local_ref="$1"     # e.g. ghcr.io/c5c3/keystone:2025.2
            local repo="${local_ref%:*}"
            local tag="${local_ref##*:}"
            local run_ref="${repo}:${RUN_TAG}-${tag}"
            echo "::group::Push ${run_ref}"
            docker tag "${local_ref}" "${run_ref}"
            docker push "${run_ref}"
            echo "::endgroup::"
          }
          for op in $BUILD_OPERATORS; do
            push_image "${IMAGE_PREFIX}/${op}-operator:dev"
            for release_dir in releases/*/; do
              release="${release_dir%/}"
              release="${release##*/}"
              push_image "${IMAGE_PREFIX}/${op}:${release}"
            done
          done
          for release_dir in releases/*/; do
            release="${release_dir%/}"
            release="${release##*/}"
            push_image "${IMAGE_PREFIX}/tempest:${release}"
          done

  # CC-0018, REQ-005: End-to-end operator tests using kind cluster and Chainsaw.
  # Loads pre-built images from the build-e2e-images artifact, deploys via Helm,
  # and runs Chainsaw test suites per operator.
  # Only runs when Go/operator code or E2E test definitions change, and only
  # after all pre-flight checks (lint, tests, shellcheck) have passed.
  e2e-operator:
    needs: [changes, build-e2e-images]
    if: |
      always() &&
      needs.changes.outputs.has-e2e-operators == 'true' &&
      needs.build-e2e-images.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.e2e-operators) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.work
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: forge-e2e
      # GH-310: Pull pre-built images from GHCR (run-scoped tag).
      - name: Load E2E images
        uses: ./.github/actions/load-e2e-images
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator:dev
            ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}:2025.2
            ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}:2026.1
      - name: Load images into kind
        run: |
          # Tag the service image with the upgrade tag used by the image-upgrade E2E test.
          docker tag ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}:2025.2 \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}:2025.2-upgraded
          kind load docker-image ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator:dev --name forge-e2e
          kind load docker-image ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}:2025.2 --name forge-e2e
          kind load docker-image ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}:2025.2-upgraded --name forge-e2e
          kind load docker-image ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}:2026.1 --name forge-e2e
      # CC-0050: Use composite action for shared Flux CLI + test deps + deploy-infra sequence (REQ-005).
      - name: Setup E2E infrastructure
        uses: ./.github/actions/setup-e2e-infra
      # CC-0050: Use shared operator deployment script (REQ-003).
      - name: Deploy operator
        run: hack/ci-deploy-operator.sh
        env:
          OPERATOR: ${{ matrix.operator }}
          IMAGE_REPO: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
      - name: Run E2E tests
        env:
          OPERATOR: ${{ matrix.operator }}
        run: |
          mkdir -p _output/reports
          # CC-0090, REQ-010: Operator-chart-level tests (e.g. network-policy-egress)
          # live under tests/e2e/<operator>-operator/ to keep them separate from
          # the per-CR tests under tests/e2e/<operator>/. Include the directory
          # only when it exists so operators without chart-level tests still run.
          test_dirs=("tests/e2e/${OPERATOR}/")
          if [ -d "tests/e2e/${OPERATOR}-operator/" ]; then
            test_dirs+=("tests/e2e/${OPERATOR}-operator/")
          fi
          chainsaw test --config tests/e2e/chainsaw-config.yaml "${test_dirs[@]}"
      # CC-0050: Use shared diagnostic dump script (REQ-001).
      - name: Dump diagnostic info
        if: always()
        run: hack/ci-dump-diagnostics.sh
        env:
          OPERATOR: ${{ matrix.operator }}
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-${{ matrix.operator }}-junit-report
          path: _output/reports/
          retention-days: 14

  # CC-0054, REQ-001: End-to-end chaos tests using kind cluster, Chaos Mesh,
  # and Chainsaw.  Builds the keystone operator image, deploys it with Chaos
  # Mesh infrastructure, and runs chaos test suites (MariaDB pod kill,
  # Memcached pod kill, OpenBao pod kill, network partition, network latency).
  # Only runs when Go/operator code or chaos test definitions change (or when
  # the run-chaos PR label is applied), and only after all pre-flight checks
  # have passed or been skipped.
  #
  # CC-0049, REQ-006: timeout reduced to 45m and e2e-operator dependency
  # removed so e2e-chaos runs in parallel with e2e-operator.
  #
  # CC-0049, REQ-007: run-chaos PR label trigger added for on-demand chaos
  # validation of operator code changes.
  #
  # CC-0054, REQ-004: Non-blocking (continue-on-error: true) while chaos test
  # stability is being proven in CI.  Revisit after 2-4 weeks of successful CI
  # runs to consider making this job blocking and adding it to publish
  # dependencies.
  e2e-chaos:
    needs: [changes, lint, shellcheck, test, test-integration, verify-codegen, chainsaw-lint, build-e2e-images]
    # always(): allow the job to run when upstream Go jobs are skipped
    # (e.g. pure E2E test-definition PRs where go=false). The explicit
    # failure/cancelled guard still blocks if any upstream actually failed.
    if: |
      always() &&
      (needs.changes.outputs.e2e-chaos == 'true' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-chaos'))) &&
      needs.build-e2e-images.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    # CC-0049: Split into two matrix entries to work around the Blacksmith
    # Firecracker microVM kernel, which ships without ip_set/xt_set/sch_netem
    # modules and has no matching linux-modules-extra package. PodChaos runs
    # on Blacksmith for speed; NetworkChaos runs on a GitHub-hosted ubuntu
    # runner where linux-modules-extra-$(uname -r) is resolvable.
    #
    # test_dirs lists the per-suite test directories explicitly. chainsaw
    # v0.2.14 accepts --{include,exclude}-test-regex flags but does not apply
    # them in the runner (the config field is set but never read), so regex
    # filtering is a no-op and a new test directory must be added to the
    # appropriate suite below when introduced.
    strategy:
      fail-fast: false
      matrix:
        include:
          # CC-0097: tests/e2e/infrastructure/chaos-mesh-health is included in
          # both matrix entries so the kind-only chaos-mesh installation is
          # health-checked against the cluster each runner spins up. Both
          # runners set WITH_CHAOS_MESH=true via setup-e2e-infra (env block
          # below), so the test's runtime presence guard never SKIPs here.
          - suite: pod
            runner: blacksmith-4vcpu-ubuntu-2404
            test_dirs: >-
              tests/e2e/infrastructure/chaos-mesh-health
              tests/e2e-chaos/api-pod-kill-pdb
              tests/e2e-chaos/cronjob-rotation-failure
              tests/e2e-chaos/mariadb-pod-kill
              tests/e2e-chaos/memcached-pod-kill
              tests/e2e-chaos/openbao-pod-kill
              tests/e2e-chaos/operator-pod-crash
              tests/e2e-chaos/operator-pod-kill
          - suite: network
            runner: ubuntu-24.04
            test_dirs: >-
              tests/e2e/infrastructure/chaos-mesh-health
              tests/e2e-chaos/mariadb-network-latency
              tests/e2e-chaos/mariadb-network-partition
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    continue-on-error: true
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: forge-e2e
      # GH-310: Pull pre-built images from GHCR (run-scoped tag).
      - name: Load E2E images
        uses: ./.github/actions/load-e2e-images
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/keystone-operator:dev
            ${{ env.IMAGE_PREFIX }}/keystone:2025.2
      - name: Load images into kind
        run: |
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone-operator:dev --name forge-e2e
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone:2025.2 --name forge-e2e
      # CC-0050: Use composite action for shared Flux CLI + test deps + deploy-infra sequence (REQ-005).
      # CC-0097: Opt in to Chaos Mesh - required for the chaos suites; covers both matrix entries.
      - name: Setup E2E infrastructure
        uses: ./.github/actions/setup-e2e-infra
        env:
          WITH_CHAOS_MESH: "true"
      # CC-0050: Use shared operator deployment script (REQ-003).
      - name: Deploy operator
        run: hack/ci-deploy-operator.sh
        env:
          OPERATOR: keystone
          IMAGE_REPO: ${{ env.IMAGE_PREFIX }}/keystone-operator
      - name: Run chaos E2E tests
        run: |
          mkdir -p _output/reports
          chainsaw test --config tests/e2e-chaos/chainsaw-config.yaml \
            ${{ matrix.test_dirs }}
      # CC-0050: Use shared diagnostic dump script (REQ-001).
      - name: Dump diagnostic info
        if: always()
        run: hack/ci-dump-diagnostics.sh
        env:
          OPERATOR: keystone
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-chaos-junit-report-${{ matrix.suite }}
          path: _output/reports/
          retention-days: 14

  # CC-0100, REQ-010: End-to-end Prometheus stack tests using kind cluster,
  # kube-prometheus-stack, and Chainsaw.  Builds the keystone operator image,
  # deploys it with the monitoring stack (WITH_PROMETHEUS=true on the shared
  # composite action), enables the keystone-operator ServiceMonitor via the
  # post-deploy patch baked into hack/deploy-infra.sh, and runs the
  # prometheus-stack chainsaw suite (HelmRelease readiness, ServiceMonitor
  # presence in openstack, Prometheus target health for keystone-operator,
  # Grafana dashboard presence).
  #
  # CC-0100, REQ-011: Single matrix entry on the Blacksmith runner — the
  # kube-prometheus stack is deterministic, so unlike e2e-chaos this job runs
  # `continue-on-error: false`.  Inherits the e2e-chaos `needs:` chain so the
  # same upstream Go gate applies and an operator code change re-runs the
  # prometheus suite alongside e2e-chaos.
  e2e-prometheus:
    needs: [changes, lint, shellcheck, test, test-integration, verify-codegen, chainsaw-lint, build-e2e-images]
    # always(): allow the job to run when upstream Go jobs are skipped
    # (e.g. pure E2E test-definition PRs where go=false). The explicit
    # failure/cancelled guard still blocks if any upstream actually failed.
    if: |
      always() &&
      needs.changes.outputs.e2e-prometheus == 'true' &&
      needs.build-e2e-images.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    continue-on-error: false
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: forge-e2e
      # GH-310: Pull pre-built images from GHCR (run-scoped tag).
      - name: Load E2E images
        uses: ./.github/actions/load-e2e-images
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/keystone-operator:dev
            ${{ env.IMAGE_PREFIX }}/keystone:2025.2
      - name: Load images into kind
        run: |
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone-operator:dev --name forge-e2e
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone:2025.2 --name forge-e2e
      # CC-0050: Use composite action for shared Flux CLI + test deps + deploy-infra sequence.
      # CC-0100: Opt in to kube-prometheus-stack — required for the prometheus suite.
      - name: Setup E2E infrastructure
        uses: ./.github/actions/setup-e2e-infra
        env:
          WITH_PROMETHEUS: "true"
      # CC-0050: Use shared operator deployment script.
      # CC-0100: WITH_PROMETHEUS=true gates --set monitoring.serviceMonitor.enabled=true
      # on the helm install. Without it, the chart's gated ServiceMonitor template
      # renders nothing and chainsaw step 2 (servicemonitor-exists) plus step 3
      # (prometheus-target-up) cascade-fail. The kind/base kustomization keeps the
      # keystone-operator HelmRelease suspended, so the patch in deploy-infra.sh
      # cannot enable the ServiceMonitor reactively (CC-0100, REQ-001).
      - name: Deploy operator
        run: hack/ci-deploy-operator.sh
        env:
          OPERATOR: keystone
          IMAGE_REPO: ${{ env.IMAGE_PREFIX }}/keystone-operator
          WITH_PROMETHEUS: "true"
      - name: Run prometheus E2E tests
        run: |
          mkdir -p _output/reports
          chainsaw test --config tests/e2e/chainsaw-config.yaml \
            tests/e2e/keystone/prometheus-stack/
      # CC-0050: Use shared diagnostic dump script.
      - name: Dump diagnostic info
        if: always()
        run: hack/ci-dump-diagnostics.sh
        env:
          OPERATOR: keystone
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-prometheus-junit-report
          path: _output/reports/
          retention-days: 14

  # CC-0035: Tempest API integration tests.
  # Deploys services into a kind cluster and runs the OpenStack Tempest test
  # suite against them.  Currently tests Keystone; designed so additional
  # services can be added to this single job without needing separate runs.
  # CC-0051: Matrix over OpenStack releases to validate each release independently.
  tempest:
    needs: [changes, build-e2e-images]
    if: |
      always() &&
      needs.changes.outputs.has-e2e-operators == 'true' &&
      needs.build-e2e-images.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.tempest-releases) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.work
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: forge-e2e
      # -- Keystone --------------------------------------------------------
      # GH-310: Pull pre-built images from GHCR (run-scoped tag).
      - name: Load E2E images
        uses: ./.github/actions/load-e2e-images
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/keystone-operator:dev
            ${{ env.IMAGE_PREFIX }}/keystone:${{ matrix.release }}
            ${{ env.IMAGE_PREFIX }}/tempest:${{ matrix.release }}
      - name: Load images into kind
        run: |
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone-operator:dev --name forge-e2e
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone:${{ matrix.release }} --name forge-e2e
      # CC-0050: Use composite action for shared Flux CLI + test deps + deploy-infra sequence (REQ-005).
      - name: Setup E2E infrastructure
        uses: ./.github/actions/setup-e2e-infra
      # CC-0050: Use shared operator deployment script (REQ-003).
      - name: Deploy operator (keystone)
        run: hack/ci-deploy-operator.sh
        env:
          OPERATOR: keystone
          IMAGE_REPO: ${{ env.IMAGE_PREFIX }}/keystone-operator
      - name: Deploy Keystone CR for Tempest
        run: |
          kubectl apply -f ${{ matrix.config-dir }}/00-keystone-cr.yaml
          kubectl wait keystone/${{ matrix.cr-name }} -n openstack \
            --for=condition=Ready --timeout=300s
      # CC-0050: Use shared Tempest wrapper script (REQ-004).
      - name: Run Tempest API tests
        run: hack/ci-run-tempest.sh
        env:
          CONFIG_DIR: ${{ matrix.config-dir }}
          TEMPEST_IMAGE: ${{ env.IMAGE_PREFIX }}/tempest:${{ matrix.release }}
          SERVICE_K8S_NAME: ${{ matrix.service-k8s-name }}
      - name: Upload Tempest results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tempest-${{ matrix.release }}-results
          path: _output/tempest/
          retention-days: 14
      # CC-0050: Use shared diagnostic dump script (REQ-001).
      - name: Dump diagnostic info
        if: always()
        run: hack/ci-dump-diagnostics.sh
        env:
          OPERATOR: keystone

  # GH-310: Prune the run-scoped GHCR tags pushed by build-e2e-images.
  # Runs as soon as every consumer that might still pull the images has
  # finished (success, failure, cancelled, or skipped) so leftover
  # e2e-${run_id}-* tags don't accumulate on the package page. The
  # nightly cleanup-images workflow has a safety-net job that catches
  # tags that survive a cancelled run before this one fires.
  cleanup-e2e-tags:
    needs: [build-e2e-images, e2e-operator, e2e-chaos, tempest]
    if: |
      always() &&
      needs.build-e2e-images.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package: [keystone-operator, keystone, tempest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Delete run-scoped tags for ${{ matrix.package }}
        uses: ./.github/actions/cleanup-ghcr-package
        with:
          package: ${{ matrix.package }}
          delete-tags: "e2e-${{ github.run_id }}-*"
          keep-n-tagged: "0"
          older-than: "0 seconds"
          token: ${{ secrets.GITHUB_TOKEN }}

  # CC-0018, REQ-006: Build operator container images per platform on native runners.
  # Each platform is pushed by digest; merge-operator-images assembles the manifest list.
  # Runs only on push events (main branch or v* tags) after E2E passed.
  build-and-push:
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 15
    needs: [changes, e2e-operator]
    if: github.event_name == 'push' && needs.e2e-operator.result == 'success'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        operator: ${{ fromJson(needs.changes.outputs.e2e-operators).operator }}
        platform:
          - name: linux/amd64
            runner: ubuntu-latest
          - name: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare platform pair
        id: platform-pair
        uses: ./.github/actions/platform-pair
        with:
          platform: ${{ matrix.platform.name }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # CC-0018: Generate OCI annotations consistent with the two-layer OCI annotation
      # pattern in build-images.yaml. type=semver strips the v prefix (v0.1.0 -> 0.1.0).
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
          labels: |
            org.opencontainers.image.title=${{ matrix.operator }}-operator
            org.opencontainers.image.description=Kubernetes operator for OpenStack ${{ matrix.operator }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=SAP SE

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        id: build
        with:
          context: .
          file: operators/${{ matrix.operator }}/Dockerfile
          platforms: ${{ matrix.platform.name }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.operator }}-operator-${{ steps.platform-pair.outputs.value }}
          cache-to: type=gha,mode=max,scope=${{ matrix.operator }}-operator-${{ steps.platform-pair.outputs.value }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-operator-${{ matrix.operator }}-${{ steps.platform-pair.outputs.value }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # CC-0018, REQ-006: Assemble per-platform digests into multi-arch manifest lists
  # and push with final tags (SHA, latest, semver).
  merge-operator-images:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes, build-and-push]
    if: github.event_name == 'push' && needs.build-and-push.result == 'success'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.e2e-operators) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # CC-0018: Generate OCI tags via docker/metadata-action.
      # type=semver strips the v prefix (v0.1.0 -> 0.1.0).
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=${{ matrix.operator }}-operator
            org.opencontainers.image.description=Kubernetes operator for OpenStack ${{ matrix.operator }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=SAP SE

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-operator-${{ matrix.operator }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create and push manifest list
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
        run: |
          cd /tmp/digests
          [[ $(ls | wc -l) -ge 1 ]] || { echo "::error::No digests found for ${{ matrix.operator }}-operator"; exit 1; }
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

  # CC-0018, REQ-007: Package and push operator Helm charts to GHCR OCI registry.
  # Runs only on push events after E2E passed. Uses versioned chart packaging
  # for v* tag pushes.
  helm-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes, e2e-operator]
    if: github.event_name == 'push' && needs.e2e-operator.result == 'success'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.e2e-operators) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin
      - name: Package and push Helm chart
        env:
          OPERATOR: ${{ matrix.operator }}
        run: |
          # Remove stale chart tarballs to prevent glob ambiguity (CC-0018).
          rm -f "${OPERATOR}"-operator-*.tgz
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            make helm-package OPERATOR="${OPERATOR}" CHART_VERSION="${GITHUB_REF_NAME#v}"
          else
            make helm-package OPERATOR="${OPERATOR}"
          fi
          helm push "${OPERATOR}"-operator-*.tgz oci://${{ env.REGISTRY }}/c5c3/charts

  # CC-0018, REQ-008: Create GitHub release with auto-generated release notes
  # on v* tag pushes, after images and charts are published.
  github-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes, merge-operator-images, helm-push]
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.merge-operator-images.result == 'success' &&
      needs.helm-push.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
      # CC-0018: Package Helm chart tarballs to attach as release assets.
      - name: Package Helm charts
        run: |
          for op in $(echo '${{ needs.changes.outputs.e2e-operators }}' | jq -r '.operator[]'); do
            make helm-package OPERATOR="${op}" CHART_VERSION="${GITHUB_REF_NAME#v}"
          done
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          generate_release_notes: true
          files: "*-operator-*.tgz"
