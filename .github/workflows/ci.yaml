---
name: CI

"on":
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/c5c3
  # Kind cluster name — single source of truth for every e2e job's
  # helm/kind-action cluster_name and `kind load --name`. Mirrors the
  # CLUSTER_NAME default in hack/deploy-infra.sh.
  KIND_CLUSTER: forge
  # Pin tool versions for CI reproducibility (single source of truth).
  CONTROLLER_GEN_VERSION: v0.21.0
  GOFUMPT_VERSION: v0.10.0
  GOLANGCI_LINT_VERSION: v2.12.2

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Detect which areas of code changed to avoid running expensive jobs on
  # unrelated changes (e.g. docs edits must not trigger E2E or image builds).
  #
  # The e2e-operators output is a JSON matrix that lists only the operators
  # whose code (or shared code) actually changed, so E2E and image-push jobs
  # run per-operator rather than all-or-nothing.
  #
  # To add a new operator: see hack/ci-resolve-changes.sh for full instructions.
  #
  # On tag pushes the full release pipeline must always run, so all areas and
  # all operators are forced active regardless of which files were touched.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go: ${{ steps.result.outputs.go }}
      docs: ${{ steps.result.outputs.docs }}
      helm: ${{ steps.result.outputs.helm }}
      e2e-infra: ${{ steps.result.outputs.e2e-infra }}
      e2e-chaos: ${{ steps.result.outputs.e2e-chaos }}
      e2e-prometheus: ${{ steps.result.outputs.e2e-prometheus }}
      e2e-controlplane: ${{ steps.result.outputs.e2e-controlplane }}
      has-e2e-operators: ${{ steps.result.outputs.has-e2e-operators }}
      e2e-operators: ${{ steps.result.outputs.e2e-operators }}
      tempest-releases: ${{ steps.tempest-matrix.outputs.tempest-releases }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            # Shared Go infrastructure — a change here affects every operator.
            go_common:
              - 'internal/**'
              - 'go.work'
              - 'Makefile'
              - '.golangci.yml'
              - 'hack/**'
              - 'scripts/**'
              - 'images/python-base/**'
              - 'images/venv-builder/**'
              - 'images/tempest/**'
              - 'releases/**'
              - '.github/workflows/ci.yaml'
            # Per-operator paths — only the relevant E2E job is triggered.
            # Test-definition paths (tests/e2e/<op>/**) are covered by
            # tests_e2e_operator so they run the full E2E suite without also
            # pulling in lint/unit/format jobs.
            keystone:
              - 'operators/keystone/**'
              - 'operators/Dockerfile'
              - 'images/keystone/**'
            # c5c3 orchestration operator. K-ORC is deployed from an
            # upstream Helm chart (there is no images/k-orc/ to build), so only
            # the operator source path triggers the c5c3 unit/integration/E2E
            # and image-build/push jobs.
            c5c3:
              - 'operators/c5c3/**'
              - 'operators/Dockerfile'
            horizon:
              - 'operators/horizon/**'
              - 'operators/Dockerfile'
              - 'images/horizon/**'
            # glance:                        # uncomment when glance is added
            #   - 'operators/glance/**'
            #   - 'images/glance/**'
            docs:
              - 'docs/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yaml'
            # Helm chart changes trigger the helm-validate job. Both
            # operator charts share the operator-library library chart and a
            # values.schema.json generator, so a change to either chart, the
            # shared library, the generator, or the Makefile targets it backs
            # must re-run Helm validation.
            helm:
              - 'operators/keystone/helm/**'
              - 'operators/c5c3/helm/**'
              - 'operators/horizon/helm/**'
              - 'operators/shared/helm/**'
              - 'hack/gen-helm-values-schema.py'
              - 'Makefile'
            e2e_infra:
              - 'tests/e2e/infrastructure/**'
              - 'hack/**'
              - 'deploy/**'
              - '.github/workflows/ci.yaml'
            # Chaos E2E tests — separate from e2e_infra to allow independent gating.
            e2e_chaos:
              - 'tests/e2e-chaos/**'
              - 'hack/**'
              - 'deploy/**'
              - '.github/workflows/ci.yaml'
              - '.github/actions/**'
            # Prometheus stack E2E tests — separate filter so
            # the e2e-prometheus job runs only when the kind-only monitoring
            # stack, the keystone-operator ServiceMonitor wiring, the operator
            # values surface that toggles it, the dashboard JSON consumed by
            # the overlay, the deploy script that opts in, the composite
            # action that threads WITH_PROMETHEUS, the workflow file, or the
            # Makefile target that mirrors the CI invocation actually change.
            e2e_prometheus:
              - 'deploy/kind/prometheus/**'
              - 'tests/e2e/keystone/prometheus-stack/**'
              - 'hack/deploy-infra.sh'
              - 'operators/keystone/helm/keystone-operator/templates/servicemonitor.yaml'
              - 'operators/keystone/helm/keystone-operator/values.yaml'
              # The ServiceMonitor's labels render via the operator-library helper.
              - 'operators/shared/helm/**'
              - 'operators/keystone/dashboards/keystone-operator.json'
              - '.github/actions/setup-e2e-infra/action.yaml'
              - '.github/workflows/ci.yaml'
              - 'Makefile'
            # Full ControlPlane -> Keystone chain E2E job — separate filter so
            # the resource-heavy e2e-controlplane job runs only when the c5c3 or
            # keystone operator code, the full-chain suite, the deploy stack, the
            # hack scripts (deploy-infra, ci-deploy-korc, ci-deploy-operator), or
            # the composite actions it uses actually change.
            e2e_controlplane:
              - 'operators/c5c3/**'
              - 'operators/keystone/**'
              - 'operators/horizon/**'
              - 'tests/e2e/c5c3/**'
              - 'deploy/**'
              - 'hack/**'
              - '.github/actions/**'
              - '.github/workflows/ci.yaml'
            # follow-up: Any E2E test-definition change forces all E2E
            # jobs to run. Kept separate from go_common so pure test edits do
            # not also trigger lint/unit/format/vuln jobs.
            tests_e2e_operator:
              - 'tests/e2e/**'
              - 'tests/e2e-operator-upgrade/**'
            tests_tempest:
              - 'tests/tempest/**'
      # Extracted to hack/ci-resolve-changes.sh (review #2 comment 3).
      - name: Resolve effective changes
        id: result
        env:
          ALL_OPERATORS: keystone c5c3 horizon
          FILTER_keystone: ${{ steps.filter.outputs.keystone }}
          FILTER_c5c3: ${{ steps.filter.outputs.c5c3 }}
          FILTER_horizon: ${{ steps.filter.outputs.horizon }}
          # FILTER_glance: ${{ steps.filter.outputs.glance }}
          FILTER_docs: ${{ steps.filter.outputs.docs }}
          FILTER_helm: ${{ steps.filter.outputs.helm }}
          FILTER_e2e_infra: ${{ steps.filter.outputs.e2e_infra }}
          FILTER_e2e_chaos: ${{ steps.filter.outputs.e2e_chaos }}
          FILTER_e2e_prometheus: ${{ steps.filter.outputs.e2e_prometheus }}
          FILTER_e2e_controlplane: ${{ steps.filter.outputs.e2e_controlplane }}
          FILTER_tests_e2e_operator: ${{ steps.filter.outputs.tests_e2e_operator }}
          FILTER_tests_tempest: ${{ steps.filter.outputs.tests_tempest }}
          FILTER_go_common: ${{ steps.filter.outputs.go_common }}
        run: hack/ci-resolve-changes.sh
      # Derive Tempest release matrix from releases/ directories (review #1).
      # Avoids hardcoding releases in the workflow — adding or removing a release
      # only requires updating releases/ and tests/tempest/, not this file.
      - name: Generate Tempest release matrix
        id: tempest-matrix
        run: hack/ci-generate-tempest-matrix.sh

  lint:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        id: setup-go
        with:
          go-version-file: go.work
      # Cache golangci-lint result cache — golangci-lint-action with install-only:true
      # does not manage the analysis cache itself, so we persist it explicitly.
      # Include Go and golangci-lint versions so upgrades automatically invalidate.
      - uses: actions/cache@v5
        with:
          path: $HOME/.cache/golangci-lint
          key: ${{ runner.os }}-go${{ steps.setup-go.outputs.go-version }}-golangci-${{ env.GOLANGCI_LINT_VERSION }}-${{ hashFiles('.golangci.yml', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go${{ steps.setup-go.outputs.go-version }}-golangci-${{ env.GOLANGCI_LINT_VERSION }}-
            ${{ runner.os }}-go${{ steps.setup-go.outputs.go-version }}-golangci-
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-only: true
      - name: Run lint
        run: make lint

  # Verify all Go files conform to gofumpt formatting.
  # Runs gofumpt -l to detect non-conforming files, then prints a unified
  # diff (gofumpt -d) on failure so developers can see exactly what to fix.
  format-check:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        id: setup-go
        with:
          go-version-file: go.work
      - uses: actions/cache@v5
        id: gofumpt-cache
        with:
          path: $HOME/go/bin/gofumpt
          key: ${{ runner.os }}-go${{ steps.setup-go.outputs.go-version }}-gofumpt-${{ env.GOFUMPT_VERSION }}
      - name: Install gofumpt
        if: steps.gofumpt-cache.outputs.cache-hit != 'true'
        run: go install mvdan.cc/gofumpt@${{ env.GOFUMPT_VERSION }}
      # Only check git-tracked Go files to skip generated, vendored,
      # or tooling code that may not follow gofumpt conventions (review #1).
      - name: Check formatting
        run: |
          unformatted=$(git ls-files '*.go' | xargs -r gofumpt -l)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted with gofumpt:"
            echo "$unformatted"
            git ls-files '*.go' | xargs -r gofumpt -d
            exit 1
          fi

  # Validate shell scripts with shellcheck to catch scripting issues
  # early.  shellcheck is pre-installed on ubuntu-latest runners.
  # Runs unconditionally — it is fast and hack/ scripts are exercised in E2E.
  shellcheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Run shellcheck on hack/*.sh and operator rotation scripts
        run: make shellcheck

  # Always-on gate: the whole tracked tree (code, tests, CI, scripts, docs)
  # must be free of internal feature/requirement IDs (CC-NNNN / REQ-NNN). Runs
  # unconditionally on every PR — not path-filtered — so a stray ID added
  # anywhere is caught. Folds in the former docs-only check.
  feature-ids:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check the tree is free of internal feature/requirement IDs
        run: make check-feature-ids

  # Always-on gate: no NEW unresolved reviewer markers ("Reviewer: please …"
  # questions committed instead of answered) may land anywhere in the tracked
  # tree. Pre-existing markers are tolerated via the per-file baseline in
  # scripts/review-markers-baseline.txt and are expected to shrink over time;
  # the gate fails only when a file exceeds its baselined count.
  review-markers:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check no new unresolved reviewer markers were introduced
        run: make check-review-markers

  # Run every shell unit test under tests/unit/ (hack/, deploy/, docs/,
  # renovate/). Repo files only — adds no injection surface. ubuntu-latest
  # preinstalls bash, jq, mikefarah/yq, perl, npx; kustomize is installed
  # explicitly so deploy/ overlay tests run the full assertion set instead
  # of skipping their kustomize-build checks. The renovate/ tests pull
  # renovate-config-validator via npx, taking ~30s on a cold runner.
  test-shell:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION=v5.4.3
          curl -fsSL -o /tmp/kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin
      - name: Run shell unit tests
        run: make test-shell

  # Enforce the canonical-scaffold contract for the invalid-CR
  # Chainsaw fixtures (sourcery-ai review #1, FC1 from review #2). Runs
  # `_generate.py --check` (drift mode) and the test_generate.py unit suite
  # (FIXTURES count + chainsaw-test.yaml cross-reference) so a hand-edit to
  # any 02-…/03-…/…/12-*.yaml fixture, or a rename/removal that desynchs
  # FIXTURES from chainsaw-test.yaml, fails the build before the heavy
  # cluster-bound e2e-operator job runs. Always-on because the check is
  # sub-second and python3 is preinstalled on ubuntu-latest runners — no
  # untrusted GitHub event input is read, so no injection surface is added.
  verify-invalid-cr-fixtures:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Verify invalid-CR fixture drift and structure
        run: make verify-invalid-cr-fixtures

  # Schema-lint every Chainsaw test (tests/**/chainsaw-test.yaml) and config
  # (tests/{e2e,e2e-chaos}/chainsaw-config.yaml) via `chainsaw lint` so typos,
  # removed fields, or schema drift after a chainsaw version bump fail fast —
  # before the cluster-bound e2e-operator/e2e-chaos jobs spin up a kind cluster.
  # Always-on: no cluster needed; chainsaw is restored from the shared testdeps
  # cache via the same composite action setup-e2e-infra uses internally.
  chainsaw-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-test-deps
      - name: Run chainsaw lint
        run: make chainsaw-lint

  # Matrix over [common, keystone, c5c3] to deduplicate common coverage
  # into a single leg (review comment #7/#8).
  test:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        target: [common, keystone, c5c3, horizon]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.work
      - name: Run unit tests
        run: |
          if [ "${{ matrix.target }}" = "common" ]; then
            make test-common
          else
            make test-operator OPERATOR=${{ matrix.target }}
          fi
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: cover-unit-${{ matrix.target }}.out
          flags: unit-${{ matrix.target }}
          fail_ci_if_error: false

  # Integration tests with envtest, coverage uploaded to Codecov
  # Includes internal/common to meet 80% codecov target (review comment #5).
  test-integration:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.go == 'true'
    # 4 vCPU (was 2): the keystone envtest leg sat at ~14m on a 2-vCPU runner
    # against the 15m timeout, and the password-rotation integration
    # tests tipped it over. envtest is CPU-bound, so the larger runner pulls the
    # wall-clock back down. Even so the keystone controller envtest
    # suite alone runs ~14m and intermittently brushed the 15m job wall (a 15m07s
    # run was cancelled), so the limit is raised to 20m for headroom.
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target: [common, keystone, c5c3, horizon]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.work
      # Derive the envtest k8s version from the Makefile (single source of truth).
      - name: Get envtest k8s version
        id: envtest-ver
        run: echo "version=$(awk '/ENVTEST_K8S_VERSION/ {print $NF; exit}' Makefile)" >> "$GITHUB_OUTPUT"
      # Cache kubebuilder envtest assets (etcd, kube-apiserver binaries).
      # Key on the k8s version — invalidates automatically when Makefile changes it.
      - uses: actions/cache@v5
        with:
          path: $HOME/.local/share/kubebuilder-envtest
          key: ${{ runner.os }}-envtest-${{ steps.envtest-ver.outputs.version }}
      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.23
      - name: Run integration tests
        run: |
          if [ "${{ matrix.target }}" = "common" ]; then
            make test-integration-common
          else
            make test-integration OPERATOR=${{ matrix.target }}
          fi
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: cover-integration-${{ matrix.target }}.out
          flags: integration-${{ matrix.target }}
          fail_ci_if_error: false

  # Race condition detection for Go tests.
  # Runs all unit tests with -race to catch data races in concurrent operator code
  # (reconcilers, watches, informer caches). Separate from the main test job because
  # the race detector adds 2-5x overhead. Uses -count=1 to disable test caching —
  # race conditions are non-deterministic, so cached results could mask real races.
  test-race:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.work
      - name: Run race-detected tests
        run: make test-race RACE_FLAGS="-count=1"

  # Scan Go modules for reachable vulnerabilities using govulncheck.
  # govulncheck is the official Go vulnerability scanner maintained by the Go
  # team — it detects actually reachable vulnerable code paths, not just
  # dependency list matches.  Uses @latest intentionally (not pinned) because
  # the vulnerability database is updated frequently and pinning an old version
  # defeats the purpose of vulnerability scanning.
  govulncheck:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.work
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: make govulncheck

  # Verify generated code (CRD manifests, deepcopy) is committed
  # and up-to-date. Fails if make manifests or make generate produces uncommitted diffs.
  verify-codegen:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        id: setup-go
        with:
          go-version-file: go.work
      - uses: actions/cache@v5
        id: controller-gen-cache
        with:
          path: $HOME/go/bin/controller-gen
          key: ${{ runner.os }}-go${{ steps.setup-go.outputs.go-version }}-controller-gen-${{ env.CONTROLLER_GEN_VERSION }}
      - name: Install controller-gen
        if: steps.controller-gen-cache.outputs.cache-hit != 'true'
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@${{ env.CONTROLLER_GEN_VERSION }}
      - name: Run code generation
        run: |
          make manifests
          make generate
      # Verify Helm chart CRD copies match controller-gen output.
      - name: Verify CRD sync
        run: make verify-crd-sync
      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated code is out of date. Run 'make manifests && make generate' and commit the result."
            exit 1
          fi

  docs:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build documentation
        run: npm run docs:build

  # Validate Helm chart structure, template rendering, and unit tests.
  # Runs helm lint, helm template with multiple value override scenarios, and
  # helm-unittest for both operator charts to catch regressions early without a
  # cluster. Both charts share the operator-library subchart and a generated
  # values.schema.json, so the job verifies the schema is in sync and vendors
  # the subchart (make helm-deps) before rendering.
  helm-validate:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
      - name: Install helm-unittest plugin
        # NOTE: --verify=false because helm-unittest does not publish GPG signatures for plugin releases.
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3 --verify=false
      - name: Verify values.schema.json is generated from the shared source
        run: make verify-helm-schema
      - name: Build chart dependencies (vendor operator-library)
        run: make helm-deps
      - name: Helm lint
        run: |
          for chart in operators/keystone/helm/keystone-operator operators/c5c3/helm/c5c3-operator operators/horizon/helm/horizon-operator; do
            echo "--- lint $chart ---"
            helm lint "$chart"
          done
      - name: Helm template
        run: |
          for chart in operators/keystone/helm/keystone-operator operators/c5c3/helm/c5c3-operator operators/horizon/helm/horizon-operator; do
            echo "=== $chart ==="
            echo "--- Scenario 1: default values ---"
            helm template test "$chart"
            echo "--- Scenario 2: webhook disabled ---"
            helm template test "$chart" --set webhook.enabled=false
            echo "--- Scenario 3: external service account ---"
            helm template test "$chart" --set serviceAccount.create=false --set serviceAccount.name=existing-sa
            echo "--- Scenario 4: custom resources ---"
            helm template test "$chart" --set resources.limits.cpu=100m --set resources.limits.memory=64Mi
            echo "--- Scenario 5: namespace-scoped RBAC ---"
            helm template test "$chart" --set rbac.namespaceScoped=true --set webhook.enabled=false
          done
      - name: Helm unittest
        run: |
          for chart in operators/keystone/helm/keystone-operator operators/c5c3/helm/c5c3-operator operators/horizon/helm/horizon-operator; do
            echo "--- unittest $chart ---"
            helm unittest "$chart"
          done

  # End-to-end infrastructure deployment and Chainsaw test.
  # Deploys the full infrastructure stack to a kind cluster and validates health
  # of all operators, CRs, and ExternalSecrets via Chainsaw assertions.
  e2e-infra:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.e2e-infra == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.work
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: ${{ env.KIND_CLUSTER }}
      # Use composite action for shared Flux CLI + test deps + deploy-infra sequence.
      - name: Setup E2E infrastructure
        uses: ./.github/actions/setup-e2e-infra
      - name: Run Chainsaw E2E tests
        run: |
          mkdir -p _output/reports
          chainsaw test --config tests/e2e/chainsaw-config.yaml tests/e2e/infrastructure/
      # Use shared diagnostic dump script.
      - name: Dump diagnostic info
        if: failure()
        run: hack/ci-dump-diagnostics.sh
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-infra-junit-report
          path: _output/reports/
          retention-days: 14

  # Centralized image build for E2E test jobs.
  # Builds all Docker images (operator, service, tempest) once and pushes them
  # to GHCR with run-scoped tags (e2e-${run_id}-<tag>).  e2e-operator,
  # e2e-chaos and tempest pull from GHCR via load-e2e-images instead of
  # rebuilding, saving ~5-10 min per CI run.
  #
  # GH-310: Replaces the previous docker-save → zstd → upload-artifact path.
  # Layer-level pull retries plus the GHCR CDN avoid the 5-minute
  # download-artifact timeouts that flaked the artifact-based transport.
  build-e2e-images:
    needs: [changes, lint, shellcheck, test, test-integration, verify-codegen, verify-invalid-cr-fixtures, chainsaw-lint]
    # always(): allow the job to run when upstream Go jobs are skipped
    # (e.g. pure E2E test-definition PRs where go=false). The explicit
    # failure/cancelled guard still blocks if any upstream actually failed.
    #
    # Fork guard: push to GHCR requires a writable GITHUB_TOKEN, which forks
    # do not get on pull_request events. The downstream consumer jobs
    # (e2e-operator, e2e-chaos, tempest) all gate on
    # `needs.build-e2e-images.result == 'success'` and pull from GHCR via
    # `load-e2e-images`, so without the push there is nothing for them to
    # consume. We explicitly skip the whole E2E pipeline for fork PRs and
    # accept the tradeoff: forks still get full pre-flight signal (lint,
    # format-check, shellcheck, test, test-integration, test-race,
    # govulncheck, verify-codegen, helm-validate, e2e-infra), and a
    # maintainer can run E2E by pushing the change to a same-repo branch.
    # Reintroducing an artifact-based fallback for forks would bring back
    # the 5-minute download-artifact timeouts that GH-310 fixed.
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.has-e2e-operators == 'true' || needs.changes.outputs.e2e-chaos == 'true' || needs.changes.outputs.e2e-prometheus == 'true' || needs.changes.outputs.e2e-controlplane == 'true') &&
      github.event.pull_request.head.repo.fork != true &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      RUN_TAG: e2e-${{ github.run_id }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Enable BuildKit (required for type=gha cache) as the default builder.
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: ./.github/actions/registry-login
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tempest always tests keystone, so keystone must be built regardless
      # of which operator triggered the pipeline.  Union the changed-operator
      # list with a fixed "keystone" entry so the dependency is explicit.
      - name: Resolve build operators
        run: |
          ops=$(echo '${{ needs.changes.outputs.e2e-operators }}' | jq -r '.operator[]')
          if ! printf '%s\n' $ops | grep -qx keystone; then
            ops=$(printf '%s\nkeystone' "$ops")
          fi
          # The e2e-controlplane job runs the full chain from local dev images, so
          # keystone-operator:dev, c5c3-operator:dev, and horizon-operator:dev
          # must all be built when it runs — even if only the full-chain test
          # definition changed (the ControlPlane projects a Horizon child once
          # KeystoneReady).
          if [ '${{ needs.changes.outputs.e2e-controlplane }}' = 'true' ]; then
            for extra in c5c3 horizon; do
              if ! printf '%s\n' $ops | grep -qx "$extra"; then
                ops=$(printf '%s\n%s' "$ops" "$extra")
              fi
            done
          fi
          {
            echo "BUILD_OPERATORS<<EOF"
            echo "$ops"
            echo "EOF"
          } >> "$GITHUB_ENV"

      # Build base images once — all subsequent service and tempest builds
      # reuse them via the skip-if-exists guard in ci-build-service-image.sh.
      # GHA cache scopes are shared across branches; these images rarely change.
      - name: Build base images
        run: |
          docker build -t python-base \
            --cache-from type=gha,scope=e2e-python-base \
            --cache-to type=gha,mode=max,scope=e2e-python-base \
            --build-arg APT_MIRROR=http://azure.archive.ubuntu.com \
            images/python-base/
          docker build -t venv-builder \
            --cache-from type=gha,scope=e2e-venv-builder \
            --cache-to type=gha,mode=max,scope=e2e-venv-builder \
            images/venv-builder/

      # The keystone oidc-federation e2e projects the mod_auth_openidc
      # sidecar. The image is release-independent and keystone is always in
      # BUILD_OPERATORS (tempest unions it in), so build it unconditionally.
      - name: Build federation proxy image
        run: |
          docker build -t "${IMAGE_PREFIX}/keystone-federation-proxy:dev" \
            --cache-from type=gha,scope=e2e-keystone-federation-proxy \
            --cache-to type=gha,mode=max,scope=e2e-keystone-federation-proxy \
            --build-arg APT_MIRROR=http://azure.archive.ubuntu.com \
            images/keystone-federation-proxy/

      # Build operator images for all resolved operators (changed + keystone).
      - name: Build operator images
        run: |
          for op in $BUILD_OPERATORS; do
            echo "::group::Building ${op}-operator:dev"
            make docker-build OPERATOR="${op}" IMG="${IMAGE_PREFIX}/${op}-operator:dev" \
              DOCKER_CACHE_FROM="type=gha,scope=e2e-${op}-operator" \
              DOCKER_CACHE_TO="type=gha,mode=max,scope=e2e-${op}-operator"
            echo "::endgroup::"
          done

      # Build service images for every operator × release combination.
      # ci-service-image-releases.sh derives the release list per operator from
      # releases/<release>/source-refs.yaml (the single source of truth, also
      # used by ci-generate-build-matrix.sh). Orchestration operators without a
      # service image — e.g. c5c3, which deploys K-ORC via an upstream
      # Helm chart — yield no releases and are skipped, so a changed c5c3 no
      # longer fails this step on a missing source-ref.
      - name: Build service images
        run: |
          for op in $BUILD_OPERATORS; do
            for release in $(OPERATOR="${op}" hack/ci-service-image-releases.sh); do
              echo "::group::Building ${op}:${release}"
              OPERATOR="${op}" IMAGE_PREFIX="${IMAGE_PREFIX}" RELEASE="${release}" \
                DOCKER_BUILD_CACHE_FROM="type=gha,scope=e2e-${op}-${release}" \
                DOCKER_BUILD_CACHE_TO="type=gha,mode=max,scope=e2e-${op}-${release}" \
                hack/ci-build-service-image.sh
              echo "::endgroup::"
            done
          done

      # Build Tempest images for all releases.
      - name: Build Tempest images
        run: |
          for release_dir in releases/*/; do
            release="${release_dir%/}"
            release="${release##*/}"
            echo "::group::Building tempest:${release}"
            RELEASE="${release}" TEMPEST_IMAGE="${IMAGE_PREFIX}/tempest:${release}" \
              DOCKER_BUILD_CACHE_FROM="type=gha,scope=e2e-tempest-${release}" \
              DOCKER_BUILD_CACHE_TO="type=gha,mode=max,scope=e2e-tempest-${release}" \
              hack/ci-build-tempest-image.sh
            echo "::endgroup::"
          done

      # GH-310: Push every E2E image to GHCR under a run-scoped tag so consumer
      # jobs can `docker pull` instead of downloading a 355 MB single-blob
      # artifact (which intermittently times out at the 5-minute mark).
      # Tags use the form e2e-${run_id}-<original-tag>; cleanup-e2e-tags
      # prunes them at the end of the run, with a nightly safety net for
      # cancelled workflows in cleanup-images.yaml.
      - name: Push E2E images to GHCR
        run: |
          # docker push has no built-in retry, so a transient ghcr.io timeout
          # ("Client.Timeout exceeded while awaiting headers") fails the whole
          # job even though login already succeeded. Mirror the bounded
          # retry/backoff of the registry-login action so push flakes no
          # longer break CI.
          MAX_ATTEMPTS=5
          BASE_DELAY=5
          push_with_retry() {
            local run_ref="$1"
            for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
              if docker push "${run_ref}"; then
                return 0
              fi
              if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                local delay=$((attempt * BASE_DELAY))
                echo "::warning::docker push ${run_ref} failed (attempt ${attempt}/${MAX_ATTEMPTS}); retrying in ${delay}s"
                sleep "$delay"
              fi
            done
            echo "::error::docker push ${run_ref} failed after ${MAX_ATTEMPTS} attempts"
            return 1
          }
          push_image() {
            local local_ref="$1"     # e.g. ghcr.io/c5c3/keystone:2025.2
            local repo="${local_ref%:*}"
            local tag="${local_ref##*:}"
            local run_ref="${repo}:${RUN_TAG}-${tag}"
            echo "::group::Push ${run_ref}"
            docker tag "${local_ref}" "${run_ref}"
            push_with_retry "${run_ref}"
            echo "::endgroup::"
          }
          push_image "${IMAGE_PREFIX}/keystone-federation-proxy:dev"
          for op in $BUILD_OPERATORS; do
            push_image "${IMAGE_PREFIX}/${op}-operator:dev"
            # Only push service images that were actually built — operators
            # without a source-ref (e.g. c5c3) build none, so push none.
            for release in $(OPERATOR="${op}" hack/ci-service-image-releases.sh); do
              push_image "${IMAGE_PREFIX}/${op}:${release}"
            done
          done
          for release_dir in releases/*/; do
            release="${release_dir%/}"
            release="${release##*/}"
            push_image "${IMAGE_PREFIX}/tempest:${release}"
          done

  # End-to-end operator tests using kind cluster and Chainsaw.
  # Loads pre-built images from the build-e2e-images artifact, deploys via Helm,
  # and runs Chainsaw test suites per operator.
  # Only runs when Go/operator code or E2E test definitions change, and only
  # after all pre-flight checks (lint, tests, shellcheck) have passed.
  e2e-operator:
    needs: [changes, build-e2e-images]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.changes.outputs.has-e2e-operators == 'true' &&
      needs.build-e2e-images.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.e2e-operators) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.work
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: ${{ env.KIND_CLUSTER }}
      # Resolve which images this operator needs: always its operator image,
      # plus one service image per release that ships one. The release list
      # comes from source-refs.yaml (ci-service-image-releases.sh), so an
      # orchestration operator without a service image — e.g. c5c3 —
      # loads only its operator image instead of failing to pull a
      # non-existent c5c3:<release>.
      - name: Resolve E2E images
        id: e2e-images
        env:
          OPERATOR: ${{ matrix.operator }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          releases="$(OPERATOR="${OPERATOR}" hack/ci-service-image-releases.sh)"
          refs="${IMAGE_PREFIX}/${OPERATOR}-operator:dev"
          for release in ${releases}; do
            refs="${refs}"$'\n'"${IMAGE_PREFIX}/${OPERATOR}:${release}"
          done
          # The oidc-federation suite projects the mod_auth_openidc sidecar,
          # so the keystone leg also pulls the federation proxy image.
          if [ "${OPERATOR}" = "keystone" ]; then
            refs="${refs}"$'\n'"${IMAGE_PREFIX}/keystone-federation-proxy:dev"
          fi
          {
            echo "releases<<EOF"; echo "${releases}"; echo "EOF"
            echo "refs<<EOF"; echo "${refs}"; echo "EOF"
          } >> "$GITHUB_OUTPUT"
      # GH-310: Pull pre-built images from GHCR (run-scoped tag).
      - name: Load E2E images
        uses: ./.github/actions/load-e2e-images
        with:
          images: ${{ steps.e2e-images.outputs.refs }}
      - name: Load images into kind
        env:
          OPERATOR: ${{ matrix.operator }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          SERVICE_RELEASES: ${{ steps.e2e-images.outputs.releases }}
          KIND_CLUSTER: ${{ env.KIND_CLUSTER }}
        run: |
          kind load docker-image "${IMAGE_PREFIX}/${OPERATOR}-operator:dev" --name "${KIND_CLUSTER}"
          for release in ${SERVICE_RELEASES}; do
            kind load docker-image "${IMAGE_PREFIX}/${OPERATOR}:${release}" --name "${KIND_CLUSTER}"
          done
          if [ "${OPERATOR}" = "keystone" ]; then
            kind load docker-image "${IMAGE_PREFIX}/keystone-federation-proxy:dev" --name "${KIND_CLUSTER}"
          fi
          # The image-upgrade E2E test re-tags the 2025.2 service image; only
          # operators that ship a 2025.2 service image need it loaded.
          if printf '%s\n' ${SERVICE_RELEASES} | grep -qx 2025.2; then
            docker tag "${IMAGE_PREFIX}/${OPERATOR}:2025.2" \
              "${IMAGE_PREFIX}/${OPERATOR}:2025.2-upgraded"
            kind load docker-image "${IMAGE_PREFIX}/${OPERATOR}:2025.2-upgraded" --name "${KIND_CLUSTER}"
          fi
      # Use composite action for shared Flux CLI + test deps + deploy-infra sequence.
      - name: Setup E2E infrastructure
        uses: ./.github/actions/setup-e2e-infra
      # Use shared operator deployment script.
      - name: Deploy operator
        run: hack/ci-deploy-operator.sh
        env:
          OPERATOR: ${{ matrix.operator }}
          IMAGE_REPO: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
      - name: Run E2E tests
        env:
          OPERATOR: ${{ matrix.operator }}
        run: |
          mkdir -p _output/reports
          # Operator-chart-level tests (e.g. network-policy-egress)
          # live under tests/e2e/<operator>-operator/ to keep them separate from
          # the per-CR tests under tests/e2e/<operator>/. Include the directory
          # only when it exists so operators without chart-level tests still run.
          test_dirs=("tests/e2e/${OPERATOR}/")
          if [ -d "tests/e2e/${OPERATOR}-operator/" ]; then
            test_dirs+=("tests/e2e/${OPERATOR}-operator/")
          fi
          chainsaw test --config tests/e2e/chainsaw-config.yaml "${test_dirs[@]}"
      # Use shared diagnostic dump script.
      - name: Dump diagnostic info
        if: always()
        run: hack/ci-dump-diagnostics.sh
        env:
          OPERATOR: ${{ matrix.operator }}
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-${{ matrix.operator }}-junit-report
          path: _output/reports/
          retention-days: 14

  # Operator helm-upgrade-in-place E2E: installs the last released
  # keystone-operator chart+image from GHCR as the baseline, brings a Keystone
  # CR to Ready, then `helm upgrade`s to the locally built chart+CRDs and asserts
  # the deployed Keystone survives the operator upgrade (Ready persists,
  # status.installedRelease unchanged, no re-bootstrap). Given the cross-release
  # bootstrap history this is the highest-risk untested path. The suite manages
  # the operator release itself, so it lives outside tests/e2e/ and runs in its
  # own job rather than the per-CR e2e-operator matrix.
  e2e-operator-upgrade:
    needs: [changes, build-e2e-images]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.changes.outputs.has-e2e-operators == 'true' &&
      needs.build-e2e-images.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # setup-helm guarantees `helm` (registry login + pull) regardless of the
      # runner image, matching the helm-push job.
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: ${{ env.KIND_CLUSTER }}
      # Pull the run-scoped images from GHCR: the locally built operator (:dev,
      # the upgrade target) and the 2025.2 service image the CR fixture uses.
      # This step also `docker login`s GHCR, which the baseline image pull below
      # reuses.
      - name: Load E2E images
        uses: ./.github/actions/load-e2e-images
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/keystone-operator:dev
            ${{ env.IMAGE_PREFIX }}/keystone:2025.2
      - name: Load images into kind
        run: |
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone-operator:dev --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone:2025.2 --name ${{ env.KIND_CLUSTER }}
      # `helm registry login` is separate from the `docker login` that
      # load-e2e-images performs; the released chart is pulled via `helm pull`.
      - name: Log in to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin
      # Fetch the last released operator chart+image (the upgrade baseline) and
      # load the released image into kind.
      - name: Fetch released operator baseline
        id: baseline
        run: hack/ci-fetch-released-operator.sh
        env:
          KIND_CLUSTER: ${{ env.KIND_CLUSTER }}
      # Use composite action for shared Flux CLI + test deps + deploy-infra sequence.
      - name: Setup E2E infrastructure
        uses: ./.github/actions/setup-e2e-infra
      # Install the RELEASED operator (pulled chart + :latest image) as the
      # upgrade baseline. CHART_DIR points at the untarred pulled chart so
      # ci-deploy-operator.sh installs the released chart, not the in-repo one.
      - name: Deploy released operator (baseline)
        run: hack/ci-deploy-operator.sh
        env:
          OPERATOR: keystone
          IMAGE_REPO: ${{ env.IMAGE_PREFIX }}/keystone-operator
          IMAGE_TAG: latest
          CHART_DIR: ${{ steps.baseline.outputs.chart_dir }}
      - name: Run operator upgrade E2E
        env:
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          mkdir -p _output/reports
          chainsaw test --config tests/e2e-operator-upgrade/chainsaw-config.yaml tests/e2e-operator-upgrade/
      # Use shared diagnostic dump script.
      - name: Dump diagnostic info
        if: always()
        run: hack/ci-dump-diagnostics.sh
        env:
          OPERATOR: keystone
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-operator-upgrade-junit-report
          path: _output/reports/
          retention-days: 14

  # End-to-end chaos tests using kind cluster, Chaos Mesh,
  # and Chainsaw.  Builds the keystone operator image, deploys it with Chaos
  # Mesh infrastructure, and runs chaos test suites (MariaDB pod kill,
  # Memcached pod kill, OpenBao pod kill, network partition, network latency).
  # Only runs when Go/operator code or chaos test definitions change (or when
  # the run-chaos PR label is applied), and only after all pre-flight checks
  # have passed or been skipped.
  #
  # Chaos tests run only after every e2e-operator matrix leg has finished
  # without failure: a failed e2e-operator run skips e2e-chaos, a
  # path-filter-skipped one does not block it (always() + the
  # failure/cancelled guards below). This supersedes,
  # which had removed the dependency to run both jobs in parallel.
  #
  # run-chaos PR label trigger added for on-demand chaos
  # validation of operator code changes.
  #
  # Gating is split by matrix leg (see continue-on-error below): the pod-chaos
  # leg is blocking — an operator-restart/PDB/rotation regression fails the
  # build — while the network-chaos leg stays non-blocking because its
  # ip_set/xt_set/sch_netem dependency is resolvable only on the GitHub-hosted
  # runner and remains prone to environment flakiness. On-demand pre-validation
  # of either leg is available via the run-chaos PR label.
  e2e-chaos:
    needs: [changes, lint, shellcheck, test, test-integration, verify-codegen, chainsaw-lint, build-e2e-images, e2e-operator]
    # always(): allow the job to run when upstream Go jobs are skipped
    # (e.g. pure E2E test-definition PRs where go=false). The explicit
    # failure/cancelled guard still blocks if any upstream actually failed.
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.e2e-chaos == 'true' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-chaos'))) &&
      needs.build-e2e-images.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    # Split into two matrix entries to work around the Blacksmith
    # Firecracker microVM kernel, which ships without ip_set/xt_set/sch_netem
    # modules and has no matching linux-modules-extra package. PodChaos runs
    # on Blacksmith for speed; NetworkChaos runs on a GitHub-hosted ubuntu
    # runner where linux-modules-extra-$(uname -r) is resolvable.
    #
    # test_dirs lists the per-suite test directories explicitly. chainsaw
    # v0.2.14 accepts --{include,exclude}-test-regex flags but does not apply
    # them in the runner (the config field is set but never read), so regex
    # filtering is a no-op and a new test directory must be added to the
    # appropriate suite below when introduced.
    strategy:
      fail-fast: false
      matrix:
        include:
          # tests/e2e/infrastructure/chaos-mesh-health is included in
          # both matrix entries so the kind-only chaos-mesh installation is
          # health-checked against the cluster each runner spins up. Both
          # runners set WITH_CHAOS_MESH=true via setup-e2e-infra (env block
          # below), so the test's runtime presence guard never SKIPs here.
          - suite: pod
            runner: blacksmith-4vcpu-ubuntu-2404
            test_dirs: >-
              tests/e2e/infrastructure/chaos-mesh-health
              tests/e2e-chaos/api-pod-kill-pdb
              tests/e2e-chaos/cronjob-rotation-failure
              tests/e2e-chaos/deletion-stuck-finalizer
              tests/e2e-chaos/mariadb-pod-kill
              tests/e2e-chaos/memcached-pod-kill
              tests/e2e-chaos/horizon-memcached-pod-kill
              tests/e2e-chaos/horizon-operator-pod-kill
              tests/e2e-chaos/openbao-pod-kill
              tests/e2e-chaos/keystone-federation
              tests/e2e-chaos/operator-pod-crash
              tests/e2e-chaos/operator-pod-kill
          - suite: network
            runner: ubuntu-24.04
            test_dirs: >-
              tests/e2e/infrastructure/chaos-mesh-health
              tests/e2e-chaos/mariadb-network-latency
              tests/e2e-chaos/mariadb-network-partition
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    # Pod-chaos is blocking; network-chaos stays non-blocking (its kernel-module
    # dependency is only resolvable on the GitHub-hosted runner and remains
    # flakiness-prone). See the gating note above the job.
    continue-on-error: ${{ matrix.suite == 'network' }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: ${{ env.KIND_CLUSTER }}
      # GH-310: Pull pre-built images from GHCR (run-scoped tag).
      - name: Load E2E images
        uses: ./.github/actions/load-e2e-images
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/keystone-operator:dev
            ${{ env.IMAGE_PREFIX }}/keystone:2025.2
            ${{ env.IMAGE_PREFIX }}/keystone-federation-proxy:dev
            ${{ env.IMAGE_PREFIX }}/horizon-operator:dev
            ${{ env.IMAGE_PREFIX }}/horizon:2025.2
      - name: Load images into kind
        run: |
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone-operator:dev --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone:2025.2 --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone-federation-proxy:dev --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.IMAGE_PREFIX }}/horizon-operator:dev --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.IMAGE_PREFIX }}/horizon:2025.2 --name ${{ env.KIND_CLUSTER }}
      # Use composite action for shared Flux CLI + test deps + deploy-infra sequence.
      # Opt in to Chaos Mesh - required for the chaos suites; covers both matrix entries.
      - name: Setup E2E infrastructure
        uses: ./.github/actions/setup-e2e-infra
        env:
          WITH_CHAOS_MESH: "true"
      # Use shared operator deployment script.
      - name: Deploy operator
        run: hack/ci-deploy-operator.sh
        env:
          OPERATOR: keystone
          IMAGE_REPO: ${{ env.IMAGE_PREFIX }}/keystone-operator
      # The horizon chaos suites (horizon-operator-pod-kill,
      # horizon-memcached-pod-kill) need the horizon-operator too. It must land
      # in its own dedicated horizon-system namespace (not the script's
      # keystone-system default) because horizon-operator-pod-kill selects and
      # kills the operator pod by `-n horizon-system` — the same namespace the
      # Flux/deploy-infra path installs it into — and its PodChaos targets
      # horizon-system. Without this the operator installs into keystone-system,
      # the pod selector finds nothing, and the recovery assertion fails.
      - name: Deploy horizon operator
        run: hack/ci-deploy-operator.sh
        env:
          OPERATOR: horizon
          IMAGE_REPO: ${{ env.IMAGE_PREFIX }}/horizon-operator
          NAMESPACE: horizon-system
      - name: Run chaos E2E tests
        run: |
          mkdir -p _output/reports
          chainsaw test --config tests/e2e-chaos/chainsaw-config.yaml \
            ${{ matrix.test_dirs }}
      # Use shared diagnostic dump script.
      - name: Dump diagnostic info
        if: always()
        run: hack/ci-dump-diagnostics.sh
        env:
          OPERATOR: keystone
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-chaos-junit-report-${{ matrix.suite }}
          path: _output/reports/
          retention-days: 14

  # End-to-end Prometheus stack tests using kind cluster,
  # kube-prometheus-stack, and Chainsaw.  Builds the keystone operator image,
  # deploys it with the monitoring stack (WITH_PROMETHEUS=true on the shared
  # composite action), enables the keystone-operator ServiceMonitor via the
  # post-deploy patch baked into hack/deploy-infra.sh, and runs the
  # prometheus-stack chainsaw suite (HelmRelease readiness, ServiceMonitor
  # presence in openstack, Prometheus target health for keystone-operator,
  # Grafana dashboard presence).
  #
  # Single matrix entry on the Blacksmith runner — the
  # kube-prometheus stack is deterministic, so unlike e2e-chaos this job runs
  # `continue-on-error: false`.  Inherits the e2e-chaos `needs:` chain so the
  # same upstream Go gate applies and an operator code change re-runs the
  # prometheus suite alongside e2e-chaos.
  e2e-prometheus:
    needs: [changes, lint, shellcheck, test, test-integration, verify-codegen, chainsaw-lint, build-e2e-images]
    # always(): allow the job to run when upstream Go jobs are skipped
    # (e.g. pure E2E test-definition PRs where go=false). The explicit
    # failure/cancelled guard still blocks if any upstream actually failed.
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.changes.outputs.e2e-prometheus == 'true' &&
      needs.build-e2e-images.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    continue-on-error: false
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: ${{ env.KIND_CLUSTER }}
      # GH-310: Pull pre-built images from GHCR (run-scoped tag).
      - name: Load E2E images
        uses: ./.github/actions/load-e2e-images
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/keystone-operator:dev
            ${{ env.IMAGE_PREFIX }}/keystone:2025.2
      - name: Load images into kind
        run: |
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone-operator:dev --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone:2025.2 --name ${{ env.KIND_CLUSTER }}
      # Use composite action for shared Flux CLI + test deps + deploy-infra sequence.
      # Opt in to kube-prometheus-stack — required for the prometheus suite.
      - name: Setup E2E infrastructure
        uses: ./.github/actions/setup-e2e-infra
        env:
          WITH_PROMETHEUS: "true"
      # Use shared operator deployment script.
      # WITH_PROMETHEUS=true gates --set monitoring.serviceMonitor.enabled=true
      # on the helm install. Without it, the chart's gated ServiceMonitor template
      # renders nothing and chainsaw step 2 (servicemonitor-exists) plus step 3
      # (prometheus-target-up) cascade-fail. The kind/base kustomization keeps the
      # keystone-operator HelmRelease suspended, so the patch in deploy-infra.sh
      # cannot enable the ServiceMonitor reactively.
      - name: Deploy operator
        run: hack/ci-deploy-operator.sh
        env:
          OPERATOR: keystone
          IMAGE_REPO: ${{ env.IMAGE_PREFIX }}/keystone-operator
          WITH_PROMETHEUS: "true"
      - name: Run prometheus E2E tests
        run: |
          mkdir -p _output/reports
          chainsaw test --config tests/e2e/chainsaw-config.yaml \
            tests/e2e/keystone/prometheus-stack/
      # Use shared diagnostic dump script.
      - name: Dump diagnostic info
        if: always()
        run: hack/ci-dump-diagnostics.sh
        env:
          OPERATOR: keystone
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-prometheus-junit-report
          path: _output/reports/
          retention-days: 14

  # Full ControlPlane -> Keystone chain E2E on kind. Deploys keystone-operator +
  # K-ORC + c5c3-operator as local dev images (the GHCR-published Flux chart path
  # is bypassed via CONTROLPLANE_OPERATORS=external) and runs the
  # full-controlplane-keystone Chainsaw suite with the presence guard set to fail
  # loudly (E2E_REQUIRE_CONTROLPLANE_STACK=true), so broken wiring in the live
  # chain fails the build instead of SKIPping.
  #
  # A real MariaDB + Memcached + Keystone + three operators + OpenBao + ESO +
  # K-ORC + cert-manager + Envoy on one node is heavy, so this is a dedicated job
  # with an extended timeout on the larger runner (matching tempest).
  e2e-controlplane:
    needs: [changes, lint, shellcheck, test, test-integration, verify-codegen, chainsaw-lint, build-e2e-images]
    # always(): allow the job to run when upstream Go jobs are skipped
    # (e.g. pure E2E test-definition PRs where go=false). The explicit
    # failure/cancelled guard still blocks if any upstream actually failed.
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork != true &&
      needs.changes.outputs.e2e-controlplane == 'true' &&
      needs.build-e2e-images.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 60
    continue-on-error: false
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: ${{ env.KIND_CLUSTER }}
      # Pull the pre-built dev operator images plus the Keystone service image
      # and the OpenStack-client (tempest) image the verify Job uses.
      - name: Load E2E images
        uses: ./.github/actions/load-e2e-images
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/keystone-operator:dev
            ${{ env.IMAGE_PREFIX }}/c5c3-operator:dev
            ${{ env.IMAGE_PREFIX }}/horizon-operator:dev
            ${{ env.IMAGE_PREFIX }}/keystone:2025.2
            ${{ env.IMAGE_PREFIX }}/horizon:2025.2
            ${{ env.IMAGE_PREFIX }}/tempest:2025.2
      - name: Load images into kind
        run: |
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone-operator:dev --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.IMAGE_PREFIX }}/c5c3-operator:dev --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.IMAGE_PREFIX }}/horizon-operator:dev --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone:2025.2 --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.IMAGE_PREFIX }}/horizon:2025.2 --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.IMAGE_PREFIX }}/tempest:2025.2 --name ${{ env.KIND_CLUSTER }}
      # Prepare the shared infra (TLS, OpenBao + per-CR seeding, ESO store) and
      # suspend the Flux ControlPlane stack; the operators are deployed below.
      # CONTROLPLANE_NAME must match the fixture CR (controlplane-keystone) so the
      # OpenBao bootstrap seeds the per-CR admin-password path the chain reads.
      - name: Setup E2E infrastructure
        uses: ./.github/actions/setup-e2e-infra
        env:
          WITH_CONTROLPLANE: "true"
          CONTROLPLANE_OPERATORS: external
          CONTROLPLANE_NAME: controlplane-keystone
          WITH_CONTROLPLANE_CR: "false"
      # Deploy K-ORC (CRDs + controller) from the upstream installer at the tag
      # pinned in deploy/flux-system/sources/k-orc.yaml.
      - name: Deploy K-ORC
        run: hack/ci-deploy-korc.sh
      # keystone-operator first so its CRD exists before c5c3-operator projects
      # Keystone CRs.
      - name: Deploy keystone-operator
        run: hack/ci-deploy-operator.sh
        env:
          OPERATOR: keystone
          IMAGE_REPO: ${{ env.IMAGE_PREFIX }}/keystone-operator
          NAMESPACE: keystone-system
      # horizon-operator before c5c3-operator so the Horizon CRD exists
      # before c5c3-operator projects the Horizon child.
      - name: Deploy horizon-operator
        run: hack/ci-deploy-operator.sh
        env:
          OPERATOR: horizon
          IMAGE_REPO: ${{ env.IMAGE_PREFIX }}/horizon-operator
          NAMESPACE: horizon-system
      - name: Deploy c5c3-operator
        run: hack/ci-deploy-operator.sh
        env:
          OPERATOR: c5c3
          IMAGE_REPO: ${{ env.IMAGE_PREFIX }}/c5c3-operator
          NAMESPACE: c5c3-system
      # E2E_REQUIRE_CONTROLPLANE_STACK=true flips the suite's presence guard from
      # SKIP to a hard failure, so missing wiring cannot go green.
      - name: Run full ControlPlane chain E2E test
        run: |
          mkdir -p _output/reports
          chainsaw test --config tests/e2e/chainsaw-config.yaml \
            tests/e2e/c5c3/full-controlplane-keystone/
        env:
          E2E_REQUIRE_CONTROLPLANE_STACK: "true"
      - name: Dump diagnostic info
        if: always()
        run: hack/ci-dump-diagnostics.sh
        env:
          OPERATOR: c5c3
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-controlplane-junit-report
          path: _output/reports/
          retention-days: 14

  # Tempest API integration tests.
  # Deploys services into a kind cluster and runs the OpenStack Tempest test
  # suite against them.  Currently tests Keystone; designed so additional
  # services can be added to this single job without needing separate runs.
  # Matrix over OpenStack releases to validate each release independently.
  #
  # Runs only after every E2E job has finished without failure: a failed
  # E2E job skips tempest, a path-filter-skipped one does not block it
  # (always() + the failure/cancelled guards below). The e2e-chaos network
  # leg is continue-on-error, so its result is always 'success' and merely
  # delays tempest. The e2e-chaos pod leg is blocking, so a pod-chaos failure
  # surfaces as a job 'failure' and blocks tempest via the guard below.
  tempest:
    needs: [changes, build-e2e-images, e2e-infra, e2e-operator, e2e-chaos, e2e-prometheus]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.changes.outputs.has-e2e-operators == 'true' &&
      needs.build-e2e-images.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.tempest-releases) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.work
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: hack/kind-config.yaml
          cluster_name: ${{ env.KIND_CLUSTER }}
      # -- Keystone --------------------------------------------------------
      # GH-310: Pull pre-built images from GHCR (run-scoped tag).
      - name: Load E2E images
        uses: ./.github/actions/load-e2e-images
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/keystone-operator:dev
            ${{ env.IMAGE_PREFIX }}/keystone:${{ matrix.release }}
            ${{ env.IMAGE_PREFIX }}/tempest:${{ matrix.release }}
      - name: Load images into kind
        run: |
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone-operator:dev --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.IMAGE_PREFIX }}/keystone:${{ matrix.release }} --name ${{ env.KIND_CLUSTER }}
      # Use composite action for shared Flux CLI + test deps + deploy-infra sequence.
      - name: Setup E2E infrastructure
        uses: ./.github/actions/setup-e2e-infra
      # Use shared operator deployment script.
      - name: Deploy operator (keystone)
        run: hack/ci-deploy-operator.sh
        env:
          OPERATOR: keystone
          IMAGE_REPO: ${{ env.IMAGE_PREFIX }}/keystone-operator
      - name: Deploy Keystone CR for Tempest
        run: |
          kubectl apply -f ${{ matrix.config-dir }}/00-keystone-cr.yaml
          kubectl wait keystone/${{ matrix.cr-name }} -n openstack \
            --for=condition=Ready --timeout=300s
      # Use shared Tempest wrapper script.
      - name: Run Tempest API tests
        run: hack/ci-run-tempest.sh
        env:
          CONFIG_DIR: ${{ matrix.config-dir }}
          TEMPEST_IMAGE: ${{ env.IMAGE_PREFIX }}/tempest:${{ matrix.release }}
          SERVICE_K8S_NAME: ${{ matrix.service-k8s-name }}
      - name: Upload Tempest results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tempest-${{ matrix.release }}-results
          # The rendered tempest.conf carries the cleartext Keystone admin
          # password substituted by hack/ci-run-tempest.sh; keep it out of the
          # retained artifact. The JUnit/subunit results carry no secrets.
          path: |
            _output/tempest/
            !_output/tempest/config/tempest.conf
          retention-days: 14
      # Use shared diagnostic dump script.
      - name: Dump diagnostic info
        if: always()
        run: hack/ci-dump-diagnostics.sh
        env:
          OPERATOR: keystone

  # GH-310: Prune the run-scoped GHCR tags pushed by build-e2e-images.
  # Runs as soon as every consumer that might still pull the images has
  # finished (success, failure, cancelled, or skipped) so leftover
  # e2e-${run_id}-* tags don't accumulate on the package page. The
  # nightly cleanup-images workflow has a safety-net job that catches
  # tags that survive a cancelled run before this one fires.
  cleanup-e2e-tags:
    needs: [build-e2e-images, e2e-operator, e2e-operator-upgrade, e2e-chaos, tempest]
    if: |
      always() &&
      needs.build-e2e-images.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Pruning run-scoped tags is best-effort housekeeping — a failure must not
    # fail the PR. A brand-new package (e.g. c5c3-operator before it is first
    # published to main) has only the run-scoped e2e tag, and GHCR refuses to
    # delete the last tagged version of a package ("You must delete the package
    # instead"), so this leg errors until a persistent tag exists. The nightly
    # cleanup-images workflow is the safety net for any leaked e2e-* tags.
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package: [keystone-operator, keystone, c5c3-operator, horizon-operator, horizon, tempest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # GH-312: do NOT pass delete-untagged here. This job runs in
      # parallel with build-and-push, which uploads per-platform
      # manifests via push-by-digest=true (i.e. untagged) and relies on
      # merge-operator-images to assemble them into a tagged manifest
      # list. Pruning untagged images mid-flight removes those digests
      # and breaks the merge step.
      - name: Delete run-scoped tags for ${{ matrix.package }}
        uses: ./.github/actions/cleanup-ghcr-package
        with:
          package: ${{ matrix.package }}
          delete-tags: "e2e-${{ github.run_id }}-*"
          keep-n-tagged: "0"
          older-than: "0 seconds"
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build operator container images per platform on native runners.
  # Each platform is pushed by digest; merge-operator-images assembles the manifest list.
  # Runs only on push events (main branch or v* tags) after E2E passed.
  build-and-push:
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 15
    # Publish-only-on-merge: the merged commit's PR was already green, so we do
    # not re-run the E2E suite on push. This job depends only on `changes` (for
    # the operator matrix) and builds the image from its own cache scope,
    # independent of build-e2e-images.
    needs: [changes]
    if: github.event_name == 'push' && needs.changes.outputs.has-e2e-operators == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        operator: ${{ fromJson(needs.changes.outputs.e2e-operators).operator }}
        platform:
          - name: linux/amd64
            runner: ubuntu-latest
          - name: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Prepare platform pair
        id: platform-pair
        uses: ./.github/actions/platform-pair
        with:
          platform: ${{ matrix.platform.name }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: ./.github/actions/registry-login
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate OCI annotations consistent with the two-layer OCI annotation
      # pattern in build-images.yaml. type=semver strips the v prefix (v0.1.0 -> 0.1.0).
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
          labels: |
            org.opencontainers.image.title=${{ matrix.operator }}-operator
            org.opencontainers.image.description=Kubernetes operator for OpenStack ${{ matrix.operator }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=SAP SE

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        id: build
        with:
          context: .
          file: operators/Dockerfile
          build-args: |
            OPERATOR=${{ matrix.operator }}
          platforms: ${{ matrix.platform.name }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.operator }}-operator-${{ steps.platform-pair.outputs.value }}
          cache-to: type=gha,mode=max,scope=${{ matrix.operator }}-operator-${{ steps.platform-pair.outputs.value }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-operator-${{ matrix.operator }}-${{ steps.platform-pair.outputs.value }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble per-platform digests into multi-arch manifest lists
  # and push with final tags (SHA, latest, semver).
  merge-operator-images:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes, build-and-push]
    if: github.event_name == 'push' && needs.build-and-push.result == 'success'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.e2e-operators) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: ./.github/actions/registry-login
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate OCI tags via docker/metadata-action.
      # type=semver strips the v prefix (v0.1.0 -> 0.1.0).
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=${{ matrix.operator }}-operator
            org.opencontainers.image.description=Kubernetes operator for OpenStack ${{ matrix.operator }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=SAP SE

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-operator-${{ matrix.operator }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create and push manifest list
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}/${{ matrix.operator }}-operator
        run: |
          cd /tmp/digests
          [[ $(ls | wc -l) -ge 1 ]] || { echo "::error::No digests found for ${{ matrix.operator }}-operator"; exit 1; }
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

  # Package and push operator Helm charts to GHCR OCI registry.
  # Runs only on push events after E2E passed. Uses versioned chart packaging
  # for v* tag pushes.
  helm-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Publish-only-on-merge: see build-and-push. The chart is packaged and pushed
    # for every changed operator on push without re-running the E2E suite.
    needs: [changes]
    if: github.event_name == 'push' && needs.changes.outputs.has-e2e-operators == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.e2e-operators) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin
      - name: Package and push Helm chart
        env:
          OPERATOR: ${{ matrix.operator }}
        run: |
          # Remove stale chart tarballs to prevent glob ambiguity.
          rm -f "${OPERATOR}"-operator-*.tgz
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            make helm-package OPERATOR="${OPERATOR}" CHART_VERSION="${GITHUB_REF_NAME#v}"
          else
            make helm-package OPERATOR="${OPERATOR}"
          fi
          helm push "${OPERATOR}"-operator-*.tgz oci://${{ env.REGISTRY }}/c5c3/charts

  # Create GitHub release with auto-generated release notes
  # on v* tag pushes, after images and charts are published.
  github-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes, merge-operator-images, helm-push]
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.merge-operator-images.result == 'success' &&
      needs.helm-push.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
      # Package Helm chart tarballs to attach as release assets.
      - name: Package Helm charts
        run: |
          for op in $(echo '${{ needs.changes.outputs.e2e-operators }}' | jq -r '.operator[]'); do
            make helm-package OPERATOR="${op}" CHART_VERSION="${GITHUB_REF_NAME#v}"
          done
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          generate_release_notes: true
          files: "*-operator-*.tgz"
