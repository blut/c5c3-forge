---
name: Verify Container Images

# Pure static-verification/test jobs that emit no artifact, so they add no value
# after merge — the PR that introduced the change already ran them green. Run on
# pull_request only; the build-images workflow still verifies the images it
# actually publishes on push.
"on":
  pull_request:
    paths:
      - images/**
      - releases/**
      - patches/**
      - scripts/**
      - hack/tempest/**
      - tests/container-images/**
      - tests/scripts/**
      - tests/tempest/test_retry_helpers.py
      - .github/workflows/build-images.yaml
      - .github/workflows/verify-container-images.yaml

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify-static-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install yq
        env:
          YQ_VERSION: v4.45.1
          YQ_SHA256: 654d2943ca1d3be2024089eb4f270f4070f491a0610481d128509b2834870049
        run: |
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          echo "${YQ_SHA256}  /usr/local/bin/yq" | sha256sum --check --strict
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Verify build-images workflow structure
        run: bash tests/container-images/verify_build_images_workflow.sh

      - name: Verify deviation comments
        run: bash tests/container-images/verify_deviation_comments.sh

      - name: Verify release config
        run: bash tests/container-images/verify_release_config.sh

      - name: Verify SPDX headers
        run: bash tests/container-images/verify_spdx_headers.sh

      - name: Test apply-constraint-overrides
        run: bash tests/scripts/test_apply_constraint_overrides.sh

      - name: Install tempest retry helper test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-defusedxml

      - name: Test tempest retry helpers
        run: python3 tests/tempest/test_retry_helpers.py
