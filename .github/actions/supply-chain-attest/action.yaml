# CC-0055: Composite action encapsulating the supply chain security sequence
# (SBOM generation, vulnerability scanning, SARIF upload, attestation, and
# cosign signing) repeated across python-base, venv-builder, tempest, and
# service image build jobs.

name: Supply chain attest
description: >
  Run the full supply chain security pipeline for a container image: generate
  an SBOM, scan for vulnerabilities with Grype, upload SARIF results, attest
  the SBOM and build provenance, and sign with cosign.

inputs:
  image-name:
    description: Bare image name without tag/digest (e.g. ghcr.io/c5c3/python-base)
    required: true
  image-digest:
    description: Image digest (sha256:...) — required when scan-mode=sbom, unused in image mode
    required: false
    default: ''
  sbom-output-file:
    description: SBOM output filename (e.g. sbom-python-base.cyclonedx.json) — required when scan-mode=sbom
    required: false
    default: ''
  grype-category:
    description: SARIF category for GitHub Security tab (e.g. grype-python-base)
    required: true
  scan-mode:
    description: "'sbom' for full supply chain (non-PR) or 'image' for scan-only (PR)"
    required: false
    default: 'sbom'
  image-ref-for-scan:
    description: Full image ref for image-mode scan (only needed when scan-mode=image)
    required: false
    default: ''

runs:
  using: composite
  steps:
    # CC-0055: Fail fast when sbom mode is missing required inputs — GitHub Actions
    # does not enforce required:false at runtime, so without this guard a misconfigured
    # caller would get cryptic downstream errors from anchore/sbom-action.
    - name: Validate inputs for sbom mode
      if: inputs.scan-mode == 'sbom'
      shell: bash
      env:
        IMAGE_DIGEST: ${{ inputs.image-digest }}
        SBOM_OUTPUT_FILE: ${{ inputs.sbom-output-file }}
      run: |
        if [[ -z "${IMAGE_DIGEST}" ]]; then
          echo "::error::image-digest is required when scan-mode=sbom"
          exit 1
        fi
        if [[ -z "${SBOM_OUTPUT_FILE}" ]]; then
          echo "::error::sbom-output-file is required when scan-mode=sbom"
          exit 1
        fi

    - name: Generate SBOM
      if: inputs.scan-mode == 'sbom'
      uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
      with:
        image: ${{ inputs.image-name }}@${{ inputs.image-digest }}
        format: cyclonedx-json
        output-file: ${{ inputs.sbom-output-file }}
        upload-artifact: false

    - name: Scan for vulnerabilities (SBOM)
      if: inputs.scan-mode == 'sbom'
      id: grype-sbom
      uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
      with:
        sbom: ${{ inputs.sbom-output-file }}
        severity-cutoff: high
        fail-build: false
        output-format: sarif

    - name: Scan for vulnerabilities (image)
      if: inputs.scan-mode == 'image'
      id: grype-image
      uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
      with:
        image: ${{ inputs.image-ref-for-scan }}
        severity-cutoff: high
        fail-build: false
        output-format: sarif

    - name: Upload SARIF
      if: >-
        always() &&
        (steps.grype-sbom.outputs.sarif != '' ||
         steps.grype-image.outputs.sarif != '')
      uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
      with:
        sarif_file: ${{ steps.grype-sbom.outputs.sarif || steps.grype-image.outputs.sarif }}
        category: ${{ inputs.grype-category }}

    - name: Attest SBOM
      if: inputs.scan-mode == 'sbom'
      uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
      with:
        subject-name: ${{ inputs.image-name }}
        subject-digest: ${{ inputs.image-digest }}
        sbom-path: ${{ inputs.sbom-output-file }}
        push-to-registry: true

    - name: Attest build provenance
      if: inputs.scan-mode == 'sbom'
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
      with:
        subject-name: ${{ inputs.image-name }}
        subject-digest: ${{ inputs.image-digest }}
        push-to-registry: true

    - name: Sign with cosign
      if: inputs.scan-mode == 'sbom'
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_DIGEST: ${{ inputs.image-digest }}
      run: cosign sign --yes "${IMAGE_NAME}@${IMAGE_DIGEST}"
