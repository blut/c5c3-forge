---
name: Cleanup GHCR package
description: >
  Delete old images for a single GHCR package.
  Supports two modes for selecting old tagged images: either a glob
  pattern (delete-tags) or a keep-list (exclude-tags). Untagged-image
  pruning is opt-in via delete-untagged (default false).

inputs:
  package:
    description: GHCR package name
    required: true
  delete-tags:
    description: >
      Glob pattern for tags to delete (e.g. '*.*.*-p*-*-*').
      Mutually exclusive with exclude-tags.
    required: false
    default: ""
  exclude-tags:
    description: >
      Comma-separated tags to keep (e.g. 'latest').
      Mutually exclusive with delete-tags.
    required: false
    default: ""
  keep-n-tagged:
    description: Minimum number of tagged images to keep
    required: false
    default: "10"
  older-than:
    description: "Minimum age of images to delete (e.g. '7 days')"
    required: false
    default: "7 days"
  delete-untagged:
    description: >
      Also delete untagged / ghost / partial images. Opt-in because a
      multi-arch `push-by-digest` flow (build-and-push →
      merge-operator-images) leaves the per-platform manifests untagged
      until the manifest list is assembled; pruning untagged images
      while such a push is in flight removes the digests imagetools
      needs and breaks the merge step (GH-312). Safe to enable from
      the nightly cleanup workflow where no parallel push runs.
    required: false
    default: "false"
  token:
    description: GitHub token with packages:write scope
    required: true

runs:
  using: composite
  steps:
    - name: Delete untagged images
      if: inputs.delete-untagged == 'true'
      uses: dataaxiom/ghcr-cleanup-action@374e2028c8fb93b7219f3771cd405fab95d3dec4 # v1
      with:
        package: ${{ inputs.package }}
        delete-untagged: true
        delete-ghost-images: true
        delete-partial-images: true
        token: ${{ inputs.token }}

    - name: Delete old tagged images (by pattern)
      if: inputs.delete-tags != ''
      uses: dataaxiom/ghcr-cleanup-action@374e2028c8fb93b7219f3771cd405fab95d3dec4 # v1
      with:
        package: ${{ inputs.package }}
        delete-tags: ${{ inputs.delete-tags }}
        keep-n-tagged: ${{ inputs.keep-n-tagged }}
        older-than: ${{ inputs.older-than }}
        token: ${{ inputs.token }}

    - name: Delete old tagged images (by exclusion)
      if: inputs.exclude-tags != ''
      uses: dataaxiom/ghcr-cleanup-action@374e2028c8fb93b7219f3771cd405fab95d3dec4 # v1
      with:
        package: ${{ inputs.package }}
        exclude-tags: ${{ inputs.exclude-tags }}
        keep-n-tagged: ${{ inputs.keep-n-tagged }}
        older-than: ${{ inputs.older-than }}
        token: ${{ inputs.token }}
