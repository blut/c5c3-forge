# Composite action encapsulating the Flux CLI + test deps + deploy-infra
# sequence shared across e2e-infra, e2e-operator, and tempest jobs.
#
# WITH_CHAOS_MESH is threaded from the calling job's env context
# into the `Deploy infrastructure stack` step's env so callers (e.g. the
# e2e-chaos job) can opt in to installing Chaos Mesh on top of the otherwise
# minimal Quick Start. When the calling job leaves WITH_CHAOS_MESH unset,
# `${{ env.WITH_CHAOS_MESH }}` resolves to an empty string and
# hack/deploy-infra.sh's `${WITH_CHAOS_MESH:-false}` default keeps Chaos
# Mesh out of the install.
#
# WITH_PROMETHEUS is threaded the same way as WITH_CHAOS_MESH so
# callers (e.g. the e2e-prometheus job) can opt in to installing the
# kube-prometheus-stack on top of the otherwise minimal Quick Start. When
# the calling job leaves WITH_PROMETHEUS unset, `${{ env.WITH_PROMETHEUS }}`
# resolves to an empty string and hack/deploy-infra.sh's
# `${WITH_PROMETHEUS:-false}` default keeps the monitoring stack out of
# the install.
#
# WITH_CONTROLPLANE, CONTROLPLANE_OPERATORS, CONTROLPLANE_NAME, and
# WITH_CONTROLPLANE_CR are threaded the same way so the e2e-controlplane job can
# provision the shared infra for the c5c3 ControlPlane chain and provide the
# operator stack out of band (CONTROLPLANE_OPERATORS=external). Unset by every
# other caller, so deploy-infra.sh's defaults keep the ControlPlane stack out of
# the install.

name: Setup E2E infrastructure
description: >
  Install E2E test dependencies and deploy the full infrastructure stack to
  the current kind cluster. The Flux CLI is no longer required for bootstrap
  (handled by flux-operator + FluxInstance) and is installed here
  solely so `hack/ci-dump-diagnostics.sh` can call `flux logs` on failed
  runs. Assumes a kind cluster already exists (SKIP_KIND_CREATE is set
  automatically). Set WITH_CHAOS_MESH=true on the calling step to opt in to
  Chaos Mesh installation; default is to skip it. Set
  WITH_PROMETHEUS=true on the calling step to opt in to kube-prometheus-stack
  installation; default is to skip it.

runs:
  using: composite
  steps:
    # Retained for `flux logs` diagnostics only after FluxInstance migration.
    - name: Install Flux CLI
      uses: fluxcd/flux2/action@dcc7def046cba2fe8d15d9737a4c250100f62fe0 # v2.9.0

    # Cache + `make install-test-deps` is shared with the lightweight
    # chainsaw-lint job — keeping it in one composite action ensures the cache
    # key/path stay in lockstep across consumers.
    - uses: ./.github/actions/setup-test-deps

    - name: Deploy infrastructure stack
      shell: bash
      env:
        SKIP_KIND_CREATE: "true"
        # opt-in flag — empty when caller does not set it; deploy-infra.sh defaults to false.
        WITH_CHAOS_MESH: ${{ env.WITH_CHAOS_MESH }}
        # opt-in flag — empty when caller does not set it; deploy-infra.sh defaults to false.
        WITH_PROMETHEUS: ${{ env.WITH_PROMETHEUS }}
        # ControlPlane opt-in flags — empty when caller does not set them;
        # deploy-infra.sh defaults keep the ControlPlane stack out of the install.
        WITH_CONTROLPLANE: ${{ env.WITH_CONTROLPLANE }}
        CONTROLPLANE_OPERATORS: ${{ env.CONTROLPLANE_OPERATORS }}
        CONTROLPLANE_NAME: ${{ env.CONTROLPLANE_NAME }}
        WITH_CONTROLPLANE_CR: ${{ env.WITH_CONTROLPLANE_CR }}
      run: make deploy-infra
