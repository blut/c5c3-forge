# CC-0050: Composite action encapsulating the Flux CLI + test deps + deploy-infra
# sequence shared across e2e-infra, e2e-operator, and tempest jobs.

name: Setup E2E infrastructure
description: >
  Install E2E test dependencies and deploy the full infrastructure stack to
  the current kind cluster. The Flux CLI is no longer required for bootstrap
  (handled by flux-operator + FluxInstance, CC-0085) and is installed here
  solely so `hack/ci-dump-diagnostics.sh` can call `flux logs` on failed
  runs. Assumes a kind cluster already exists (SKIP_KIND_CREATE is set
  automatically).

runs:
  using: composite
  steps:
    # Retained for `flux logs` diagnostics only after FluxInstance migration (CC-0085, REQ-004).
    - name: Install Flux CLI
      uses: fluxcd/flux2/action@871be9b40d53627786d3a3835a3ddba1e3234bd2 # v2.8.3

    # Cache test tool binaries installed by hack/install-test-deps.sh (chainsaw,
    # flux, kind, kubectl). The script has skip-if-correct-version logic, so a
    # cache hit makes install-test-deps a no-op. Key on the script hash so the
    # cache auto-invalidates when any pinned version changes.
    - name: Cache test dependency binaries
      uses: actions/cache@v4
      with:
        path: $HOME/.local/bin
        key: ${{ runner.os }}-testdeps-${{ hashFiles('hack/install-test-deps.sh') }}
        restore-keys: ${{ runner.os }}-testdeps-

    - name: Install test dependencies
      shell: bash
      run: |
        make install-test-deps
        echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

    - name: Deploy infrastructure stack
      shell: bash
      env:
        SKIP_KIND_CREATE: "true"
      run: make deploy-infra
