# Composite action encapsulating the digest export + artifact upload
# pattern shared across base image, tempest, and service image build jobs.

name: Export digest
description: >
  Write a digest file to a staging directory and upload it as a GitHub Actions
  artifact. Used to pass per-platform digests to the merge job that assembles
  multi-arch manifest lists.

inputs:
  digest:
    description: Image digest (sha256:...)
    required: true
  artifact-name:
    description: Name for the uploaded artifact
    required: true
  digest-dir:
    description: Directory for digest files
    required: false
    default: /tmp/digests

runs:
  using: composite
  steps:
    - name: Validate digest
      shell: bash
      env:
        DIGEST: ${{ inputs.digest }}
      run: |
        if [[ -z "${DIGEST}" ]]; then
          echo "::error::Digest input must not be empty"
          exit 1
        fi

    - name: Write digest file
      shell: bash
      env:
        DIGEST: ${{ inputs.digest }}
        DIGEST_DIR: ${{ inputs.digest-dir }}
      run: |
        mkdir -p "${DIGEST_DIR}"
        touch "${DIGEST_DIR}/${DIGEST#sha256:}"

    - name: Upload digest artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.digest-dir }}/*
        if-no-files-found: error
        retention-days: 1
