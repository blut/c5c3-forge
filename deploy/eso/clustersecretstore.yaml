# ClusterSecretStore connecting ESO to the OpenBao instance running in the
# Management cluster (openbao-system namespace).
# Authentication uses the Kubernetes auth method mounted at
# "kubernetes/management", with the "eso-management" role bound to the
# external-secrets ServiceAccount in the external-secrets namespace.
# The TLS CA certificate is sourced from the "openbao-tls" Secret created
# by cert-manager (see deploy/flux-system/infrastructure/openbao-tls-cert.yaml).
# Feature: CC-0009
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: openbao-cluster-store
spec:
  provider:
    vault:
      server: "https://openbao.openbao-system.svc:8200"
      path: "kv-v2"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes/management"
          role: "eso-management"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
      caProvider:
        type: "Secret"
        name: "openbao-tls"
        namespace: "openbao-system"
        key: "ca.crt"
