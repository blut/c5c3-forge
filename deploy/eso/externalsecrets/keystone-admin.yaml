# ExternalSecret for the Keystone admin credentials.
# Pulls the admin password from the OpenBao path "bootstrap/keystone-admin"
# and materialises it as a Kubernetes Secret named "keystone-admin" in the
# openstack namespace.
# Feature: CC-0009
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keystone-admin
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: keystone-admin
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: bootstrap/keystone-admin
        property: password
