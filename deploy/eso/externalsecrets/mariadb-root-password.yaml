# ExternalSecret for the MariaDB root password.
# Pulls the root password from the OpenBao path "infrastructure/mariadb"
# and materialises it as a Kubernetes Secret named "mariadb-root-password"
# in the openstack namespace.
# Feature: CC-0009
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mariadb-root-password
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: mariadb-root-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: infrastructure/mariadb
        property: root-password
