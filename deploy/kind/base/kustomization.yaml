# Kustomize overlay for kind cluster — base FluxCD manifests.
# References the production flux-system kustomization and patches
# the OpenBao HelmRelease to standalone mode (1 replica, HA disabled,
# no retry_join peers, standard storage class) suitable for a
# single-node kind cluster.
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../flux-system
  # Headlamp UI — kind-only demo addon (see headlamp.yaml header).
  - headlamp.yaml
  # Flux Web UI — kind-only demo addon (see flux-web.yaml header).
  - flux-web.yaml
  # Envoy Gateway controller + EnvoyProxy NodePort config (kind-only).
  - envoy-gateway.yaml
  # GatewayClass/envoy + Certificate + Gateway/openstack-gw (kind-only).
  - openstack-gateway.yaml

patches:
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: openbao
      namespace: openbao-system
    patch: |
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: openbao
        namespace: openbao-system
      spec:
        values:
          server:
            ha:
              enabled: false
              replicas: 1
            standalone:
              enabled: true
              config: |
                # kind-only — production keeps ui = false
                ui = true

                listener "tcp" {
                  tls_disable     = 0
                  address         = "[::]:8200"
                  cluster_address = "[::]:8201"
                  tls_cert_file   = "/openbao/tls/tls.crt"
                  tls_key_file    = "/openbao/tls/tls.key"
                  # kind matches production mTLS posture
                  tls_client_ca_file               = "/openbao/tls/ca.crt"
                  tls_require_and_verify_client_cert = true
                }

                storage "raft" {
                  path = "/openbao/data"
                }

                service_registration "kubernetes" {}
            dataStorage:
              storageClass: standard

  # Memcached operator: disable webhooks in kind to avoid cert-manager
  # webhook TLS provisioning issues (liveness probe kills the container
  # after ~2.5min when the webhook server cannot bind its TLS port).
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: memcached-operator
      namespace: memcached-system
    patch: |
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: memcached-operator
        namespace: memcached-system
      spec:
        values:
          webhook:
            enabled: false

  # keystone-operator: suspend Flux management in kind so that the e2e CI
  # job can install it manually with a locally built dev image. Both Flux
  # and the CI's `helm install` now target the keystone-system Namespace
  # so the historical ownership-annotation conflict
  # caused by the prior openstack-vs-default-namespace mismatch (fix-001)
  # no longer applies. The suspend is still required because the published
  # chart and the locally built dev image cannot share the same release
  # name without one overwriting the other.
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: keystone-operator
      namespace: keystone-system
    patch: |
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: keystone-operator
        namespace: keystone-system
      spec:
        suspend: true

  # The Chaos Mesh kind-tuning patch (containerd runtime, dashboard disabled,
  # reduced resource requests) lives in the opt-in deploy/kind/chaos-mesh/
  # overlay. It cannot stay here because Chaos Mesh is no longer in the base
  # resource list — kustomize would refuse to render with a missing patch
  # target.
