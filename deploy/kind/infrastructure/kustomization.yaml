# Kustomize overlay for kind cluster — CRD-dependent infrastructure resources.
# References the production flux-system/infrastructure kustomization and
# patches MariaDB CR (1 replica, Galera disabled, MaxScale disabled,
# standard storage class) and Memcached CR (1 replica) for single-node
# kind cluster resource constraints.
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../flux-system/infrastructure
  # Gateway API Quick Start: CRD-dependent CRs whose CRDs are shipped
  # by the cert-manager / envoy-gateway HelmReleases in Phase 1.
  - envoy-nodeport.yaml
  - keystone-nip-io-tls-certificate.yaml
  # TLS for the second Gateway listener the ControlPlane Quick Start's Horizon
  # dashboard is exposed through (deploy/kind/base/openstack-gateway.yaml).
  - horizon-nip-io-tls-certificate.yaml
  # kind-only: standalone Keystone CRs (Quick Start, keystone e2e/tempest/
  # chaos suites) reference the Secret "keystone-db"; ControlPlane-based
  # deployments use the operator-projected per-ControlPlane ExternalSecret
  # instead, so the production stack ships none.
  #
  # keystone-admin and mariadb-root-password are likewise kind-only shims for
  # standalone flows; production deploy/eso ships none of the three. The admin
  # password is operator-projected per-ControlPlane by the c5c3 operator
  # (reconcileAdminPassword); the MariaDB root password is expected
  # from a non-kind Flux MariaDB baseline.
  - keystone-db-externalsecret.yaml
  - keystone-admin-externalsecret.yaml
  - mariadb-root-password-externalsecret.yaml
  # horizon-secret-key is the Django SECRET_KEY shim for standalone Horizon
  # flows (per-CR OpenBao path; survives the WITH_CONTROLPLANE shim drop).
  - horizon-secret-key-externalsecret.yaml
  # kind-only: materialize the Garage admin token and the imported S3 key pair
  # (seeded in OpenBao) so the GarageCluster/GarageKey can consume them. Both
  # sit in the openstack namespace and survive the WITH_CONTROLPLANE shim drop
  # (they are not among the keystone-admin/keystone-db/mariadb-root-password
  # names that hack/deploy-infra.sh filters out on the ControlPlane path).
  - garage-admin-token-externalsecret.yaml
  - garage-s3-credentials-externalsecret.yaml

patches:
  # MariaDB: single replica, no Galera, no MaxScale, standard storage.
  #
  # Intentional divergence the kind overlay disables
  # spec.tls. The production base (deploy/flux-system/infrastructure/
  # mariadb.yaml) enables TLS via serverCertIssuerRef/clientCertIssuerRef
  # because mariadb-operator v0.38.1 issues per-Galera-node server certs and
  # MaxScale terminates client TLS. In the kind overlay we patch out Galera
  # AND MaxScale to fit a single-node cluster — leaving spec.tls.enabled=true
  # would force a single-replica mariadbd to terminate TLS without the
  # listener Galera/MaxScale provides, a posture that has not been verified
  # in this environment. Disabling TLS in kind keeps the Quick Start path
  # green; the production TLS posture is exercised by the
  # tests/e2e/keystone/database-tls/ chainsaw suite on a full Galera+MaxScale
  # cluster. To exercise the mTLS path against kind,
  # remove this spec.tls override and re-enable Galera/MaxScale in this
  # patch.
  - target:
      group: k8s.mariadb.com
      version: v1alpha1
      kind: MariaDB
      name: openstack-db
      namespace: openstack
    patch: |
      apiVersion: k8s.mariadb.com/v1alpha1
      kind: MariaDB
      metadata:
        name: openstack-db
        namespace: openstack
      spec:
        replicas: 1
        galera:
          enabled: false
        maxScale:
          enabled: false
        storage:
          size: 1Gi
          storageClassName: standard
        tls:
          enabled: false
          required: false

  # Memcached: single replica
  - target:
      group: memcached.c5c3.io
      version: v1beta1
      kind: Memcached
      name: openstack-memcached
      namespace: openstack
    patch: |
      apiVersion: memcached.c5c3.io/v1beta1
      kind: Memcached
      metadata:
        name: openstack-memcached
        namespace: openstack
      spec:
        replicas: 1

  # Garage: single storage node with small PVCs on the kind default storage
  # class (mirrors the MariaDB/Memcached single-node kind footprint).
  - target:
      group: garage.rajsingh.info
      version: v1beta2
      kind: GarageCluster
      name: garage
      namespace: openstack
    patch: |
      apiVersion: garage.rajsingh.info/v1beta2
      kind: GarageCluster
      metadata:
        name: garage
        namespace: openstack
      spec:
        storage:
          replicas: 1
          metadata:
            size: 512Mi
            storageClassName: standard
          data:
            size: 2Gi
            storageClassName: standard
