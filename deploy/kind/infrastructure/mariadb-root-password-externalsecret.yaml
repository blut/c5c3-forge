# kind-only ExternalSecret for the MariaDB root password.
#
# The MariaDB CR in standalone/kind flows (the Quick Start, the infrastructure
# e2e suite) needs a Secret named "mariadb-root-password" in the openstack
# namespace for its root password. The static production ExternalSecret has been
# removed — a non-kind Flux MariaDB baseline is expected to provide
# the mariadb-root-password Secret itself — which is why the production stack
# (deploy/eso/, included by deploy/flux-system/) ships no mariadb-root-password
# ExternalSecret.
#
# This kind overlay keeps the single-node kind Quick Start green: it pulls the
# root password from the OpenBao path "infrastructure/mariadb" and materialises
# it as the Secret "mariadb-root-password".
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mariadb-root-password
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: mariadb-root-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: infrastructure/mariadb
        property: root-password
