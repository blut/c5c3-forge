# kind-only ExternalSecret for the Keystone admin credentials.
#
# Standalone Keystone flows (the Quick Start, the keystone e2e/tempest/chaos
# suites) reference a Secret named "keystone-admin" in the openstack namespace.
# In ControlPlane-based deployments this Secret is NOT needed — the c5c3
# operator projects a per-ControlPlane "{name}-keystone-admin-credentials"
# ExternalSecret instead (reconcileAdminPassword) — which is why the
# production stack (deploy/eso/, included by deploy/flux-system/) ships no
# keystone-admin ExternalSecret.
#
# This kind overlay keeps the standalone flows working: it pulls the admin
# password from the default ControlPlane identity's per-CR OpenBao path
# "bootstrap/openstack/controlplane-keystone/admin" (the path
# deploy/openbao/bootstrap/write-bootstrap-secrets.sh seeds for the default
# identity) and materialises it as the Secret "keystone-admin".
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keystone-admin
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: keystone-admin
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: bootstrap/openstack/controlplane-keystone/admin
        property: password
