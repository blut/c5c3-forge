# kind-only ExternalSecret for Keystone database credentials.
#
# Standalone Keystone CRs (the Quick Start, the keystone e2e/tempest/chaos
# suites) reference a Secret named "keystone-db" in the openstack namespace.
# In ControlPlane-based deployments this Secret is NOT needed — the c5c3
# operator projects a per-ControlPlane "{name}-keystone-db-credentials"
# ExternalSecret instead (reconcileDBCredentials) — which is why the
# production stack (deploy/eso/, included by deploy/flux-system/) ships no
# keystone-db ExternalSecret.
#
# This kind overlay keeps the standalone flows working: it pulls username and
# password from the dedicated standalone OpenBao path
# (openstack/keystone/standalone/db, seeded by write-bootstrap-secrets.sh) and
# materialises them as the Secret "keystone-db". The stage-(a) per-ControlPlane
# static path (openstack/keystone/{ns}/{cp}/db) is retired (#439): managed-mode
# ControlPlanes now use engine-issued credentials, so the standalone shim reads
# its own dedicated static path instead.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keystone-db
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: keystone-db
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: openstack/keystone/standalone/db
        property: username
    - secretKey: password
      remoteRef:
        key: openstack/keystone/standalone/db
        property: password
