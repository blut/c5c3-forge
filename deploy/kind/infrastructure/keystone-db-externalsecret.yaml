# kind-only ExternalSecret for Keystone database credentials.
#
# Standalone Keystone CRs (the Quick Start, the keystone e2e/tempest/chaos
# suites) reference a Secret named "keystone-db" in the openstack namespace.
# In ControlPlane-based deployments this Secret is NOT needed — the c5c3
# operator projects a per-ControlPlane "{name}-keystone-db-credentials"
# ExternalSecret instead (reconcileDBCredentials) — which is why the
# production stack (deploy/eso/, included by deploy/flux-system/) ships no
# keystone-db ExternalSecret.
#
# This kind overlay keeps the standalone flows working: it pulls username and
# password from the per-ControlPlane OpenBao path of the DEFAULT identity
# "openstack/controlplane" (openstack/keystone/openstack/controlplane/db, the
# path write-bootstrap-secrets.sh seeds; the flat openstack/keystone/db path
# is no longer seeded) and materialises them as the Secret "keystone-db".
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keystone-db
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: keystone-db
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: openstack/keystone/openstack/controlplane/db
        property: username
    - secretKey: password
      remoteRef:
        key: openstack/keystone/openstack/controlplane/db
        property: password
