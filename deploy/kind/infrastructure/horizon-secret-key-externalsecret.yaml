# kind-only ExternalSecret for the Horizon Django SECRET_KEY.
#
# Standalone Horizon flows (the horizon e2e/chaos suites) reference a Secret
# named "horizon-secret-key" in the openstack namespace. The key is pulled
# from the default ControlPlane identity's per-CR OpenBao path
# "bootstrap/openstack/controlplane-horizon/secret-key" (the path
# deploy/openbao/bootstrap/write-bootstrap-secrets.sh seeds for the default
# identity) — per-CR like keystone-admin, so the shim also survives the
# WITH_CONTROLPLANE standalone-shim drop in hack/deploy-infra.sh, which
# removes only keystone-admin/keystone-db/mariadb-root-password.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: horizon-secret-key
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: horizon-secret-key
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: bootstrap/openstack/controlplane-horizon/secret-key
        property: secret-key
