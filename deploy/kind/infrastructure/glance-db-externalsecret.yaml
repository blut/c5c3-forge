# kind-only ExternalSecret for Glance database credentials.
#
# Standalone Glance CRs (the glance e2e/multistore suites) reference a Secret
# named "glance-db" in the openstack namespace through the Glance CR's
# database.secretRef. In ControlPlane-based deployments this standalone shim is
# NOT used — per-service DB credentials are operator-projected there — which is
# why the production stack (deploy/eso/, included by deploy/flux-system/) ships
# no glance-db ExternalSecret.
#
# This kind overlay keeps the standalone flows working: it pulls username and
# password from the dedicated standalone OpenBao path
# (openstack/glance/openstack/standalone/db, seeded by write-bootstrap-secrets.sh)
# and materialises them as the Secret "glance-db".
#
# It authenticates through the per-tenant openbao-tenant-store — the enforced
# default since #606, the same store the keystone-db shim uses — rather than the
# shared cluster store. On the standalone path hack/deploy-infra.sh provisions
# that store via setup-eso-tenant.sh openstack; the store's eso-tenant identity
# scopes reads to openstack/glance/openstack/*, which is why the remote key
# carries the openstack namespace segment.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: glance-db
  namespace: openstack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-tenant-store
    kind: SecretStore
  target:
    name: glance-db
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: openstack/glance/openstack/standalone/db
        property: username
    - secretKey: password
      remoteRef:
        key: openstack/glance/openstack/standalone/db
        property: password
