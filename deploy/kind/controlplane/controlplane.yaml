# ControlPlane CR for the kind ControlPlane Quick Start. Apply it by
# hand (`kubectl apply -f deploy/kind/controlplane/controlplane.yaml`) once the
# operator stack from `WITH_CONTROLPLANE=true make deploy-infra` is up, or re-run
# deploy-infra with WITH_CONTROLPLANE_CR=true to have it applied automatically.
#
# Managed mode: the c5c3-operator provisions the MariaDB ("openstack-db") and
# Memcached ("openstack-memcached") itself — which is why deploy-infra does NOT
# create them when WITH_CONTROLPLANE=true (hack/deploy-infra.sh). The c5c3-operator
# then projects a {name}-keystone Keystone CR and a {name}-horizon Horizon CR,
# mints the K-ORC admin Application Credential from the admin password, mirrors
# it to OpenBao, and registers the identity catalog.
#
# this CR is intentionally minimal. The c5c3-operator defaulting webhook
# fills the omitted infrastructure/korc references with well-known defaults, so the
# managed-mode references above no longer need to be spelled out here:
#   region                                  -> RegionOne
#   infrastructure.database.clusterRef.name -> openstack-db (managed MariaDB)
#   infrastructure.database.database        -> keystone
#   infrastructure.database.secretRef.name  -> keystone-db
#   infrastructure.cache.clusterRef.name    -> openstack-memcached (managed Memcached)
#   infrastructure.cache.backend            -> dogpile.cache.pymemcache
#   korc ... passwordSecretRef              -> keystone-admin / key "password"
#   korc ... cloudCredentialsRef.cloudName  -> admin (secretName k-orc-clouds-yaml)
#
# keystone replicas are pinned to 1 to fit the single-node kind cluster; the
# MariaDB and Memcached topology is pinned the same way via
# spec.infrastructure.{database,cache}.replicas below. The CRD default for both is
# 3 (a 3-node Galera cluster plus 3 Memcached pods, matching the production
# baseline), which OOM-kills a laptop-sized single-node kind, so kind pins them to
# 1: database.replicas:1 yields a single-instance non-Galera MariaDB (the operator
# derives Galera from replicas>1) and cache.replicas:1 a single Memcached pod.
# deploy-infra makes these deploy-time configurable via CONTROLPLANE_DB_REPLICAS /
# CONTROLPLANE_CACHE_REPLICAS (e.g. =3 for a Galera HA cluster on a bigger box; 2 is
# rejected — Galera needs a quorum). database.replicas is immutable after creation.
#
# database.storageSize is pinned to 512Mi for the same reason: the CRD default is
# 100Gi (the production volume in deploy/flux-system/infrastructure/mariadb.yaml),
# which a kind/CI run never fills, so the projected MariaDB requests a test-sized
# volume instead. deploy-infra makes it configurable via CONTROLPLANE_DB_STORAGE
# (e.g. =100Gi to mirror production on a bigger box). Like replicas, storageSize is
# immutable after creation (the mariadb-operator rejects resizing a live volume).
#
# The projected Keystone is exposed externally via the shared Envoy Gateway
# (services.keystone.gateway), so it is reachable from the host at
# https://keystone.127-0-0-1.nip.io:<KIND_HOST_PORT>/v3 — the same path the
# per-service Quick Start uses — not just in-cluster.
apiVersion: c5c3.io/v1alpha1
kind: ControlPlane
metadata:
  name: controlplane
  namespace: openstack
spec:
  openStackRelease: "2025.2"
  # Pin the projected backing services to a single instance for the single-node
  # kind cluster (see the note above). Only replicas is set here; the c5c3-operator
  # defaulting webhook fills database.clusterRef/database/secretRef and
  # cache.clusterRef/backend, exactly as it does for the omitted fields listed
  # above. deploy-infra overrides these from CONTROLPLANE_DB_REPLICAS /
  # CONTROLPLANE_CACHE_REPLICAS when WITH_CONTROLPLANE_CR=true.
  infrastructure:
    database:
      replicas: 1
      storageSize: 512Mi
    cache:
      replicas: 1
  services:
    keystone:
      replicas: 1
      # Expose the projected Keystone externally through the shared Envoy Gateway,
      # exactly like the per-service Quick Start's Keystone CR. The keystone-operator
      # attaches an HTTPRoute to Gateway/openstack-gw for this hostname; combined with
      # the kind host-port mapping the API is reachable from the host at
      # https://keystone.127-0-0-1.nip.io:<KIND_HOST_PORT>/v3.
      gateway:
        parentRef:
          name: openstack-gw
        hostname: keystone.127-0-0-1.nip.io
        path: /
      # publicEndpoint is intentionally omitted: with the default KIND_HOST_PORT=443
      # the operator derives https://keystone.127-0-0-1.nip.io/v3 from the gateway
      # hostname. When KIND_HOST_PORT is overridden (e.g. 8443 on macOS) deploy-infra
      # injects spec.services.keystone.publicEndpoint carrying the host port so
      # Keystone advertises the reachable URL in its catalog.
    # Horizon: the c5c3-operator projects a Horizon CR once the Keystone child is
    # Ready (HorizonReady joins the aggregate chain after KeystoneReady). replicas
    # is pinned to 1 for the single-node kind cluster. The dashboard is exposed
    # externally through the SAME shared Envoy Gateway as Keystone via a second
    # HTTPS listener the kind overlay adds for horizon.127-0-0-1.nip.io
    # (deploy/kind/base/openstack-gateway.yaml); the horizon-operator attaches an
    # HTTPRoute for that hostname, reachable from the host at
    # https://horizon.127-0-0-1.nip.io:<KIND_HOST_PORT>/. secretKeyRef is omitted:
    # this default-identity ControlPlane ("controlplane") inherits the kind shim
    # Secret "horizon-secret-key" (seeded per the default identity by
    # deploy/openbao/bootstrap/write-bootstrap-secrets.sh); additional
    # ControlPlanes MUST set services.horizon.secretKeyRef to their own Secret.
    horizon:
      replicas: 1
      gateway:
        parentRef:
          name: openstack-gw
        hostname: horizon.127-0-0-1.nip.io
