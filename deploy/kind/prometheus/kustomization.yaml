# Opt-in kind overlay for kube-prometheus-stack — applied only when the
# operator explicitly requests it (WITH_PROMETHEUS=true make deploy-infra).
#
# Bundles everything needed to render a working observability stack on a
# kind cluster:
#   1. The monitoring Namespace (declared inline so the overlay is self-contained — production overlays do NOT install kube-prometheus-stack, so the Namespace lives here, not in deploy/flux-system/namespaces.yaml).
#   2. The kube-prometheus-stack HelmRelease with kind-tuned values baked
#      directly into release.yaml (no separate patch file — the production
#      stack never references this release, so there is no upstream values
#      template to patch). The HelmRepository source is the existing
#      prometheus-community entry under deploy/flux-system/sources/ and is
#      reused as-is.
#   3. A configMapGenerator-produced ConfigMap that wraps the Keystone
#      Operator Grafana dashboard JSON for sidecar discovery
#     .
#
# All resource references are local to this overlay (no parent-directory
# `../../` paths). The overlay therefore renders cleanly under kustomize's
# default `LoadRestrictionsRootOnly` security check, which means
# `kubectl apply -k deploy/kind/prometheus` works without `--load-restrictor`.
# kubectl's embedded kustomize does NOT expose `--load-restrictor`
# (kubernetes/kubectl#948), so keeping the overlay self-contained is the
# only way to ship `kubectl apply -k` as the production caller in
# hack/deploy-infra.sh — same constraint that drove the chaos-mesh overlay
# in.
#
# Single-source-of-truth note for the dashboard JSON: the canonical file
# lives at operators/keystone/dashboards/keystone-operator.json and is
# owned by the operator code tree. This overlay does NOT fork it. Instead,
# hack/deploy-infra.sh copies the file into this directory at deploy time
# (gated on WITH_PROMETHEUS=true), and the staged keystone-operator.json
# here is git-ignored — see .gitignore. That keeps the dashboard JSON in
# exactly one tracked location while still letting kustomize's
# LoadRestrictionsRootOnly check pass.
#
# Production overlays (deploy/flux-system/kustomization.yaml) do not list
# any of the resources in this directory — kube-prometheus-stack is a
# kind-only convenience for the Quick Start observability story
#
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Top-level namespace propagates to every namespaced resource emitted by
# this overlay (HelmRelease, generated ConfigMap) without each one having
# to repeat the field.
namespace: monitoring

resources:
  # Namespace declared inline so the overlay is self-contained and the
  # monitoring namespace exists before the HelmRelease tries to render
  # workloads into it.
  - namespace.yaml
  # HelmRelease for kube-prometheus-stack with kind-tuned values baked in
  # (retention=6h, alertmanager/nodeExporter/kubeStateMetrics disabled,
  # cross-namespace ServiceMonitor selector). Reuses the prometheus-community
  # HelmRepository from deploy/flux-system/sources/ — no source.yaml here
  - release.yaml

configMapGenerator:
  # Wraps the Keystone Operator dashboard JSON in a ConfigMap so the
  # Grafana sidecar (kiwigrid/k8s-sidecar, shipped with kube-prometheus-stack)
  # auto-loads it at boot. The sidecar discovers ConfigMaps cluster-wide
  # via the `grafana_dashboard=1` label; the `app.kubernetes.io/part-of`
  # label keeps the resource grouped with the rest of the stack for
  # `kubectl get -l` queries. The `keystone-operator.json` path is a local
  # sibling staged at deploy time by hack/deploy-infra.sh — the file is
  # NOT tracked in git (see .gitignore); the canonical source lives at
  # operators/keystone/dashboards/keystone-operator.json.
  - name: keystone-operator-dashboard
    namespace: monitoring
    files:
      - keystone-operator.json
    options:
      # disableNameSuffixHash keeps the ConfigMap name stable
      # (`keystone-operator-dashboard` instead of `…-<hash>`) so the
      # chainsaw assertions in can reference it by a fixed name.
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: kube-prometheus-stack
