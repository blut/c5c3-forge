# Chaos Mesh HelmRelease — fault injection platform for chaos engineering.
# Deployed to chaos-mesh namespace, depends on cert-manager for webhook TLS certificates.
# See architecture/docs/09-implementation/10-chaos-e2e-testing.md for design rationale.
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chaos-mesh
  namespace: chaos-mesh
spec:
  interval: 30m
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  chart:
    spec:
      chart: chaos-mesh
      version: ">=2.6.0 <3.0.0"
      sourceRef:
        kind: HelmRepository
        name: chaos-mesh
        namespace: flux-system
  install:
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
