# Kustomization for FluxCD base infrastructure manifests.
# Includes Namespace resources, the FluxInstance CR that drives the
# ControlPlane flux-operator, HelmRepository sources, and HelmRelease
# operators. CRD-dependent infrastructure custom resources are in a
# separate kustomization at infrastructure/kustomization.yaml.
# FluxInstance CR spec consumed by the flux-operator.
#
# To add a new operator (e.g., OpenBao):
#   1. Add a new source file in sources/ (e.g., sources/openbao.yaml)
#   2. Add a new release file in releases/ (e.g., releases/openbao.yaml)
#   3. Add both paths to the resources list below
#   4. Add the operator namespace to namespaces.yaml (e.g., openbao-system)
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespace resources (applied first by kustomize resource ordering)
  - namespaces.yaml

  # FluxInstance CR consumed by the flux-operator
  - fluxinstance.yaml

  # HelmRepository sources (FluxCD chart registries).
  # Chaos Mesh is intentionally absent: the developer-only fault-injection
  # platform is opt-in via the deploy/kind/chaos-mesh/ overlay (which carries its own source.yaml / release.yaml).
  - sources/cert-manager.yaml
  - sources/mariadb-operator.yaml
  - sources/external-secrets.yaml
  - sources/openbao.yaml
  - sources/c5c3-charts.yaml
  - sources/k-orc.yaml
  - sources/prometheus-community.yaml

  # HelmRelease operators (deployed via FluxCD).
  # Chaos Mesh is intentionally absent: opt-in via deploy/kind/chaos-mesh/
  - releases/cert-manager.yaml
  - releases/prometheus-operator-crds.yaml
  - releases/mariadb-operator-crds.yaml
  - releases/mariadb-operator.yaml
  - releases/external-secrets.yaml
  - releases/memcached-operator.yaml
  - releases/openbao.yaml
  - releases/keystone-operator.yaml
  - releases/horizon-operator.yaml
  - releases/k-orc.yaml
  - releases/c5c3-operator.yaml
