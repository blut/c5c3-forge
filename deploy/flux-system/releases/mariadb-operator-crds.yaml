# MariaDB Operator CRDs — separate chart required since mariadb-operator v0.35.0.
# Must be installed before mariadb-operator so CRDs are available for the operator
# and for infrastructure CRs (e.g., MariaDB Galera cluster).
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb-operator-crds
  namespace: mariadb-system
spec:
  interval: 30m
  chart:
    spec:
      chart: mariadb-operator-crds
      version: ">=0.30.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: mariadb-operator
        namespace: flux-system
  install:
    crds: CreateReplace
    createNamespace: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
