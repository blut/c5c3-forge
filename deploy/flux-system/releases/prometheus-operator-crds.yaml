# Prometheus Operator CRDs (ServiceMonitor, PodMonitor, PrometheusRule, etc.).
# Required by the memcached-operator controller which unconditionally watches
# monitoring.coreos.com/v1 ServiceMonitor resources via Owns().
# Feature: CC-0010
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator-crds
  namespace: monitoring-system
spec:
  interval: 30m
  chart:
    spec:
      chart: prometheus-operator-crds
      version: ">=17.0.0 <20.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
