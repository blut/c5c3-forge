---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 30m
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  chart:
    spec:
      chart: external-secrets
      version: ">=0.10.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  values:
    installCRDs: true
    webhook:
      port: 9443
    certController:
      enabled: true
  install:
    crds: CreateReplace
    createNamespace: true
    # Under the heavier WITH_PROMETHEUS e2e deploy the chart's install
    # (CRDs + webhook + cert-controller) can transiently fail before its
    # webhook is reachable. Without install remediation Flux marks the release
    # InstallFailed on the first miss and goes terminal ("cannot remediate
    # failed release"), failing deploy-infra. Retry the install so a transient
    # miss self-heals (CC-0110).
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
