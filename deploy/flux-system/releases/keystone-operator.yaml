# the keystone-operator controller runs in its
# own dedicated keystone-system Namespace; the Keystone CR and the
# operator-managed payload (Deployment, Secrets, HTTPRoute, NetworkPolicy)
# remain in the openstack tenant Namespace. dependsOn entries are
# unchanged and continue to reference each operator in its existing
# Namespace.
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keystone-operator
  namespace: keystone-system
spec:
  interval: 30m
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
    - name: mariadb-operator
      namespace: mariadb-system
    - name: memcached-operator
      namespace: memcached-system
    - name: external-secrets
      namespace: external-secrets
  chart:
    spec:
      chart: keystone-operator
      # Floor 0.8.0: the first chart whose values schema accepts image.digest.
      # Older published charts reject the digest injected via valuesFrom
      # (additionalProperties: false), so resolving them would fail Helm's
      # values validation once the image-digest ConfigMap exists.
      version: ">=0.8.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: c5c3-charts
        namespace: flux-system
  values:
    replicas: 2
    leaderElection:
      enabled: true
    image:
      # Use latest until a versioned release (v* git tag) publishes a semver image tag.
      # The chart default (appVersion) only works once 0.1.0 has been released.
      tag: latest
  # image.digest is injected from a ConfigMap that
  # hack/refresh-operator-image-digests.sh (re)applies at deploy time on the
  # WITH_CONTROLPLANE flux path, pinning the mutable :latest tag to the digest
  # current at deploy. optional: true — when the ConfigMap is absent (default
  # Quick Start and CI paths) the release renders exactly as before. Flux
  # merges valuesFrom first, then spec.values on top per-key (deep merge), so
  # image.tag stays from spec.values and image.digest comes only from here.
  valuesFrom:
    - kind: ConfigMap
      name: keystone-operator-image-digest
      valuesKey: values.yaml
      optional: true
  install:
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
