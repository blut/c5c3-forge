# Feature: CC-0105, REQ-001 — the keystone-operator controller runs in its
# own dedicated keystone-system Namespace; the Keystone CR and the
# operator-managed payload (Deployment, Secrets, HTTPRoute, NetworkPolicy)
# remain in the openstack tenant Namespace. dependsOn entries are
# unchanged and continue to reference each operator in its existing
# Namespace.
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keystone-operator
  namespace: keystone-system
spec:
  interval: 30m
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
    - name: mariadb-operator
      namespace: mariadb-system
    - name: memcached-operator
      namespace: memcached-system
    - name: external-secrets
      namespace: external-secrets
  chart:
    spec:
      chart: keystone-operator
      version: ">=0.1.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: c5c3-charts
        namespace: flux-system
  values:
    replicas: 2
    leaderElection:
      enabled: true
    image:
      # Use latest until a versioned release (v* git tag) publishes a semver image tag.
      # The chart default (appVersion) only works once 0.1.0 has been released.
      tag: latest
  install:
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
