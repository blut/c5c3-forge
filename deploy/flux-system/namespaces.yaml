# Namespace resources for all infrastructure components.
# Applied before any namespaced resources to ensure target namespaces exist.
# Feature: CC-0008, CC-0009
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---
apiVersion: v1
kind: Namespace
metadata:
  name: mariadb-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: memcached-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: openstack
---
apiVersion: v1
kind: Namespace
metadata:
  name: openbao-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: chaos-mesh
  labels:
    # Chaos Mesh chaos-daemon requires privileged containers with host PID,
    # network, and the containerd socket mounted. Without this label, the
    # Pod Security admission controller may silently prevent the DaemonSet
    # controller from reconciling pod status.
    pod-security.kubernetes.io/enforce: privileged
