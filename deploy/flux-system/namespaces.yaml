  name: cert-manager
---
apiVersion: v1
kind: Namespace
metadata:
  name: mariadb-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: memcached-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: openstack
---
apiVersion: v1
kind: Namespace
metadata:
  name: openbao-system
