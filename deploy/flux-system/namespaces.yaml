# Namespace resources for all infrastructure components.
# Applied before any namespaced resources to ensure target namespaces exist.
# Feature: CC-0008, CC-0009, CC-0105, CC-0110
#
# CC-0105 (REQ-002, REQ-003, REQ-004): keystone-system is added so the
# keystone-operator HelmRelease can run in its own dedicated Namespace
# instead of co-tenanting with the Keystone workload in openstack; the
# dead monitoring-system Namespace is dropped after the
# prometheus-operator-crds and memcached-operator releases were repointed
# at the live monitoring Namespace, which the flux base now owns directly
# (previously only declared in the kind overlay).
#
# CC-0110 (REQ-023): c5c3-system hosts the c5c3-operator controller in its own
# dedicated Namespace (mirroring keystone-system), and orc-system hosts the
# K-ORC (OpenStack Resource Controller) manager that provides the declarative
# Keystone resource CRDs the c5c3-operator drives.
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---
apiVersion: v1
kind: Namespace
metadata:
  name: mariadb-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: Namespace
metadata:
  name: memcached-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: openstack
---
apiVersion: v1
kind: Namespace
metadata:
  name: openbao-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: keystone-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: c5c3-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: orc-system
# The chaos-mesh Namespace lives in the opt-in overlay deploy/kind/chaos-mesh/,
# not here, so the privileged PodSecurity label is created only when Chaos Mesh
# is actually deployed (CC-0097, REQ-001).
