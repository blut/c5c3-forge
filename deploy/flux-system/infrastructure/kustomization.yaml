# Kustomization for CRD-dependent infrastructure resources.
# These resources require their operator CRDs to be installed first.
# Apply AFTER the base kustomization (deploy/flux-system/) and operator
# CRDs are available. See docs/reference/infrastructure-manifests.md for
# deployment instructions.
# Feature: CC-0008, CC-0009, CC-0106
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - cluster-issuer.yaml
  - db-ca-issuer.yaml
  - mariadb.yaml
  - memcached.yaml
  - openbao-tls-cert.yaml
  - ../../eso
