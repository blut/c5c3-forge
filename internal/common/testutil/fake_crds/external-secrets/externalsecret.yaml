# Minimal fake CRD for External Secrets Operator's ExternalSecret resource.
# Used by envtest only — NOT a production-grade schema.
# Feature: CC-0002
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: externalsecrets.external-secrets.io
spec:
  group: external-secrets.io
  names:
    plural: externalsecrets
    singular: externalsecret
    kind: ExternalSecret
    listKind: ExternalSecretList
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                refreshInterval:
                  type: string
                secretStoreRef:
                  type: object
                  properties:
                    name:
                      type: string
                    kind:
                      type: string
                target:
                  type: object
                  properties:
                    name:
                      type: string
                    creationPolicy:
                      type: string
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      secretKey:
                        type: string
                      remoteRef:
                        type: object
                        properties:
                          key:
                            type: string
                          property:
                            type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                refreshTime:
                  type: string
