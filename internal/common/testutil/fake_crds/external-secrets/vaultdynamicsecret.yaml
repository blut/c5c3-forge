# Minimal fake CRD for External Secrets Operator's VaultDynamicSecret generator.
# Used by envtest only — NOT a production-grade schema. Covers the fields the
# c5c3 operator's dbCredentialVaultDynamicSecret builder sets so integration
# tests can assert on them without the apiserver pruning unknown fields.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vaultdynamicsecrets.generators.external-secrets.io
spec:
  group: generators.external-secrets.io
  names:
    plural: vaultdynamicsecrets
    singular: vaultdynamicsecret
    kind: VaultDynamicSecret
    listKind: VaultDynamicSecretList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                path:
                  type: string
                method:
                  type: string
                resultType:
                  type: string
                provider:
                  type: object
                  properties:
                    server:
                      type: string
                    # Mirrors the real ESO CRD's enum: the Go field has no
                    # omitempty, so a builder that leaves Version unset
                    # serializes "" and MUST be rejected here exactly like in a
                    # real cluster (caught live in #553's e2e-controlplane run).
                    version:
                      type: string
                      enum: ["v1", "v2"]
                      default: v2
                    caProvider:
                      type: object
                      properties:
                        type:
                          type: string
                        name:
                          type: string
                        key:
                          type: string
                        namespace:
                          type: string
                    tls:
                      type: object
                      properties:
                        certSecretRef:
                          type: object
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                            namespace:
                              type: string
                        keySecretRef:
                          type: object
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                            namespace:
                              type: string
                    auth:
                      type: object
                      properties:
                        kubernetes:
                          type: object
                          properties:
                            mountPath:
                              type: string
                            role:
                              type: string
                            serviceAccountRef:
                              type: object
                              properties:
                                name:
                                  type: string
                                namespace:
                                  type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
