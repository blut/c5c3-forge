# Minimal fake CRD for External Secrets Operator's ClusterSecretStore resource.
# Used by envtest only — NOT a production-grade schema.
# Feature: CC-0002
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clustersecretstores.external-secrets.io
spec:
  group: external-secrets.io
  names:
    plural: clustersecretstores
    singular: clustersecretstore
    kind: ClusterSecretStore
    listKind: ClusterSecretStoreList
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                provider:
                  type: object
                  properties:
                    vault:
                      type: object
                      properties:
                        server:
                          type: string
                        path:
                          type: string
                        version:
                          type: string
                        auth:
                          type: object
                          properties:
                            kubernetes:
                              type: object
                              properties:
                                mountPath:
                                  type: string
                                role:
                                  type: string
                                serviceAccountRef:
                                  type: object
                                  properties:
                                    name:
                                      type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
