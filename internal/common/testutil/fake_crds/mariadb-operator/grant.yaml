# Minimal fake CRD for MariaDB Operator's Grant resource.
# Used by envtest only — NOT a production-grade schema.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: grants.k8s.mariadb.com
spec:
  group: k8s.mariadb.com
  names:
    plural: grants
    singular: grant
    kind: Grant
    listKind: GrantList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                mariaDbRef:
                  type: object
                  properties:
                    name:
                      type: string
                privileges:
                  type: array
                  items:
                    type: string
                database:
                  type: string
                table:
                  type: string
                username:
                  type: string
                host:
                  type: string
                grantOption:
                  type: boolean
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
