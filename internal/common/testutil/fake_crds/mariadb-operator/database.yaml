# Minimal fake CRD for MariaDB Operator's Database resource.
# Used by envtest only — NOT a production-grade schema.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: databases.k8s.mariadb.com
spec:
  group: k8s.mariadb.com
  names:
    plural: databases
    singular: database
    kind: Database
    listKind: DatabaseList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              # Tolerate the non-omitempty struct fields the operator's typed
              # Server-Side Apply emits without declaring every field of the
              # production schema.
              x-kubernetes-preserve-unknown-fields: true
              properties:
                mariaDbRef:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  properties:
                    name:
                      type: string
                characterSet:
                  type: string
                collate:
                  type: string
                name:
                  type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
