# Minimal fake CRD for MariaDB Operator's User resource.
# Used by envtest only — NOT a production-grade schema.
# Feature: CC-0002
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: users.k8s.mariadb.com
spec:
  group: k8s.mariadb.com
  names:
    plural: users
    singular: user
    kind: User
    listKind: UserList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                mariaDbRef:
                  type: object
                  properties:
                    name:
                      type: string
                passwordSecretKeyRef:
                  type: object
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                maxUserConnections:
                  type: integer
                name:
                  type: string
                host:
                  type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
