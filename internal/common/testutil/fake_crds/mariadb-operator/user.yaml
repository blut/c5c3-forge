# Minimal fake CRD for MariaDB Operator's User resource.
# Used by envtest only — NOT a production-grade schema.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: users.k8s.mariadb.com
spec:
  group: k8s.mariadb.com
  names:
    plural: users
    singular: user
    kind: User
    listKind: UserList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              # Tolerate the non-omitempty struct fields the operator's typed
              # Server-Side Apply emits (e.g. passwordPlugin) without declaring
              # every field of the production schema.
              x-kubernetes-preserve-unknown-fields: true
              properties:
                mariaDbRef:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  properties:
                    name:
                      type: string
                passwordSecretKeyRef:
                  type: object
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                maxUserConnections:
                  type: integer
                  # Mirrors the real CRD's +kubebuilder:default=10 so envtest
                  # exercises the server-default convergence the operator relies
                  # on (the builder never sets maxUserConnections).
                  default: 10
                name:
                  type: string
                host:
                  type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
