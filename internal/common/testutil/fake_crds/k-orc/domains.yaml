# Minimal fake CRD for the K-ORC (OpenStack Resource Controller) Domain
# resource (group openstack.k-orc.cloud). Used by envtest only — NOT a
# production-grade schema. See applicationcredentials.yaml for the rationale.
# The c5c3 reconciler imports the admin Domain as an UNMANAGED resource before
# minting the admin ApplicationCredential (ensureKORCAdminImports), so envtest
# must serve this kind or the K-ORC reconcile aborts with a no-match error.
# Feature: CC-0110
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: domains.openstack.k-orc.cloud
spec:
  group: openstack.k-orc.cloud
  names:
    plural: domains
    singular: domain
    kind: Domain
    listKind: DomainList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                id:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64
                resource:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
