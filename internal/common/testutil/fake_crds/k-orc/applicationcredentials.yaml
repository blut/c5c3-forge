# Minimal fake CRD for the K-ORC (OpenStack Resource Controller)
# ApplicationCredential resource (group openstack.k-orc.cloud).
# Used by envtest only — NOT a production-grade schema. The real CRD carries
# strict CEL / x-kubernetes-validations rules that the c5c3 integration test's
# status-set fixtures would otherwise have to satisfy; this fake keeps envtest
# forgiving so the test can drive the reconciler chain to Ready.
# Feature: CC-0110
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: applicationcredentials.openstack.k-orc.cloud
spec:
  group: openstack.k-orc.cloud
  names:
    plural: applicationcredentials
    singular: applicationcredential
    kind: ApplicationCredential
    listKind: ApplicationCredentialList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              # Permissive spec: the reconciler sets managementPolicy,
              # cloudCredentialsRef and a nested resource block whose exact shape
              # is owned by K-ORC. A fake CRD does not re-validate it.
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                id:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64
                # resource mirrors K-ORC's observed-state block; kept permissive
                # so the test can set status.resource.unrestricted inline.
                resource:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
