# Minimal fake CRD for the K-ORC (OpenStack Resource Controller) RoleAssignment
# resource (group openstack.k-orc.cloud). Used by envtest only — NOT a
# production-grade schema. See applicationcredentials.yaml for the rationale.
# The ControlPlane controller Owns this kind for the service-account role
# projection (Role imports + RoleAssignments), so envtest must serve it or the
# manager cache fails to start with a no-match error.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: roleassignments.openstack.k-orc.cloud
spec:
  group: openstack.k-orc.cloud
  names:
    plural: roleassignments
    singular: roleassignment
    kind: RoleAssignment
    listKind: RoleAssignmentList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                id:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64
                resource:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
