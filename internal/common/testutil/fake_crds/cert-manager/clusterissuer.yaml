# Minimal fake CRD for cert-manager's ClusterIssuer resource.
# Used by envtest only — NOT a production-grade schema.
# Feature: CC-0002
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterissuers.cert-manager.io
spec:
  group: cert-manager.io
  names:
    plural: clusterissuers
    singular: clusterissuer
    kind: ClusterIssuer
    listKind: ClusterIssuerList
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                selfSigned:
                  type: object
                ca:
                  type: object
                  properties:
                    secretName:
                      type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
