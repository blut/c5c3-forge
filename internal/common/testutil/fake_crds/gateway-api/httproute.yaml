# Minimal fake CRD for Gateway API HTTPRoute resource.
# Used by envtest only — NOT a production-grade schema.
# The spec and status sub-trees use x-kubernetes-preserve-unknown-fields so the
# Keystone reconciler can create HTTPRoutes with full ParentRef/Hostnames/Rules
# structure without replicating the 6000-line upstream schema (CC-0065, REQ-010).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: httproutes.gateway.networking.k8s.io
  annotations:
    # Required because gateway.networking.k8s.io is a Kubernetes-protected API
    # group. Points to the upstream approval PR for the real CRD so reviewers
    # see this is not an ad-hoc approval.
    api-approved.kubernetes.io: https://github.com/kubernetes-sigs/gateway-api/pull/2997
spec:
  group: gateway.networking.k8s.io
  names:
    plural: httproutes
    singular: httproute
    kind: HTTPRoute
    listKind: HTTPRouteList
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
