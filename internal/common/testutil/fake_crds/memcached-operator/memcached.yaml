# Minimal fake CRD for Memcached Operator's Memcached resource.
# Used by envtest only — NOT a production-grade schema.
# Feature: CC-0002
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: memcacheds.cache.c5c3.io
spec:
  group: cache.c5c3.io
  names:
    plural: memcacheds
    singular: memcached
    kind: Memcached
    listKind: MemcachedList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicas:
                  type: integer
                image:
                  type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                readyReplicas:
                  type: integer
                serverList:
                  type: array
                  items:
                    type: string
