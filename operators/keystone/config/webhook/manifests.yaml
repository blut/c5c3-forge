  failurePolicy: Fail
  name: vkeystone.kb.io
  rules:
  - apiGroups:
    - keystone.openstack.c5c3.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - keystones
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-keystone-openstack-c5c3-io-v1alpha1-keystoneidentitybackend
  failurePolicy: Fail
  name: vkeystoneidentitybackend.kb.io
  rules:
  - apiGroups:
    - keystone.openstack.c5c3.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - keystoneidentitybackends
  sideEffects: None
