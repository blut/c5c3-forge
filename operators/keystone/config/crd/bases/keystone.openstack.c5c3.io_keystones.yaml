          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KeystoneSpec defines the desired state of Keystone.
            properties:
              autoscaling:
                description: |-
                  Autoscaling configures horizontal pod autoscaling for the Keystone API deployment.
                  When set, a HorizontalPodAutoscaler is created targeting the deployment.
                  When removed, the HPA is deleted.
                properties:
                  maxReplicas:
