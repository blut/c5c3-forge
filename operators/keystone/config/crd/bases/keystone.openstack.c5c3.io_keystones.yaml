                    type: array
                required:
                - backend
                type: object
                x-kubernetes-validations:
                - message: exactly one of clusterRef or servers must be set
                  rule: has(self.clusterRef) != (has(self.servers) && size(self.servers)
                    > 0)
              credentialKeys:
                description: CredentialKeys configures credential key rotation.
                properties:
                  maxActiveKeys:
                    default: 3
                    description: MaxActiveKeys is the maximum number of active credential
