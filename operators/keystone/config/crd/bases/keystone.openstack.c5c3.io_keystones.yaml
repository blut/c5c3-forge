                    format: int32
                    minimum: 3
                    type: integer
                  rotationSchedule:
                    default: 0 0 * * 0
                    description: RotationSchedule is a cron expression for credential
                      key rotation.
                    type: string
                type: object
              database:
                description: |-
                  Database defines the MariaDB connection parameters.
