---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: keystoneidentitybackends.keystone.openstack.c5c3.io
spec:
  group: keystone.openstack.c5c3.io
  names:
    kind: KeystoneIdentityBackend
    listKind: KeystoneIdentityBackendList
    plural: keystoneidentitybackends
    singular: keystoneidentitybackend
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .spec.domain.name
      name: Domain
      type: string
    - jsonPath: .spec.keystoneRef.name
      name: Keystone
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          KeystoneIdentityBackend is the Schema for the keystoneidentitybackends API.
          One CR attaches to a Keystone CR via spec.keystoneRef and describes one
          external identity backend (Phase 1: an LDAP/AD-backed domain). A dedicated
          controller owns the backend lifecycle — finalizer, domain provisioning,
          per-backend conditions — while the keystone-side identitybackends
          sub-reconciler aggregates all attached, DomainReady backends into one
          content-hashed domains Secret mounted at /etc/keystone/domains/.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              KeystoneIdentityBackendSpec defines the desired state of
              KeystoneIdentityBackend.

              The keystoneRef transition rule (evaluated only on UPDATE) makes the
              attachment immutable: re-pointing a backend at a different Keystone would
              leave the old deployment with a provisioned domain nothing manages anymore
              and race the config projection on the new one. Delete and recreate instead.
              The type/ldap union rule enforces "exactly one backend block per type" at
              the schema layer so it holds even when the validating webhook is down.
            properties:
              domain:
                description: Domain describes the Keystone domain this backend provides.
                properties:
                  deletionPolicy:
                    default: Retain
                    description: |-
                      DeletionPolicy controls what happens to a managed domain when this CR
                      is deleted: Retain (default) leaves it in place, Delete disables it and
                      then deletes it. Adopted domains are always retained regardless of this
                      field. Mutable so operators can decide at teardown time.
                    enum:
                    - Retain
                    - Delete
                    type: string
                  description:
                    description: Description is projected onto the Keystone domain
                      in Manage mode.
                    type: string
                  mode:
                    default: Manage
                    description: |-
                      Mode selects Manage (controller creates the domain) or Adopt
                      (controller resolves a pre-existing domain by name and never mutates
                      it). Immutable after create: flipping the mode would change deletion
                      semantics for a domain that was provisioned under the old contract.
                    enum:
                    - Manage
                    - Adopt
                    type: string
                    x-kubernetes-validations:
                    - message: domain.mode is immutable
                      rule: self == oldSelf
                  name:
                    description: |-
                      Name is the Keystone domain name. Immutable after create: renaming
                      would strand the provisioned domain and its per-domain config file.
                      "default" (any case) is rejected — the Default domain hosts the
                      SQL-backed service users and the bootstrap admin (BootstrapSpec has no
                      domain knob, so the bootstrap admin always lives in Default) and must
                      never be re-pointed at an external directory, which could lock out
                      every service account.
                    maxLength: 64
                    minLength: 1
                    type: string
                    x-kubernetes-validations:
                    - message: domain.name is immutable
                      rule: self == oldSelf
                    - message: the Default domain hosts the SQL-backed service users
                        and the bootstrap admin and must never be backed by an external
                        identity backend
                      rule: self.lowerAscii() != 'default'
                required:
                - name
                type: object
              extraOptions:
                additionalProperties:
                  type: string
                description: |-
                  ExtraOptions provides free-form [ldap] section options not covered by
                  the typed fields, keyed by bare option name (e.g. "page_size"). Options
                  rendered from typed fields, the driver/domain-config wiring, and — when
                  readOnly is true — the write-enabling user_allow_*/group_allow_* options
                  are rejected by the validating webhook so the escape hatch cannot
                  silently contradict the typed spec.
                type: object
              keystoneRef:
                description: |-
                  KeystoneRef names the Keystone CR in the same namespace this backend
                  attaches to. The referenced CR does not have to exist at admission time
                  (GitOps ordering: the backend may be applied before the Keystone CR);
                  a dangling reference surfaces as DomainReady=False/KeystoneNotFound.
                properties:
                  name:
                    description: Name is the referenced Keystone CR's name.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              ldap:
                description: |-
                  LDAP configures the LDAP/AD connection, tree layout, and attribute
                  mapping. Required exactly when type is LDAP (union rule above).
                properties:
                  bindCredentialsSecretRef:
                    description: |-
                      BindCredentialsSecretRef references the Secret holding the bind
                      credentials under the fixed data keys "username" (the bind DN) and
                      "password". The key field must stay empty — the two data keys are
                      fixed by contract (webhook-enforced).
                    properties:
                      key:
                        type: string
                      name:
                        description: |-
                          Name is the referenced Secret's name. It must be a non-empty DNS-1123
                          subdomain (the Kubernetes object-name grammar). Tightening the shared type
                          fixes every consumer at once — keystone adminPasswordSecretRef /
                          database.secretRef / messaging / TLS cert refs and the c5c3
                          passwordSecretRef — so an empty name no longer slips through "required".
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                        type: string
                    required:
                    - name
                    type: object
                  groups:
                    description: |-
                      Groups optionally describes the group tree layout and attribute
                      mapping. When nil, no group_* options are rendered and keystone's
                      defaults apply.
                    properties:
                      filter:
                        description: Filter is an additional LDAP filter applied to
                          group searches.
                        type: string
                      idAttribute:
                        description: 'IDAttribute maps the keystone group ID (keystone
                          default: cn).'
                        type: string
                      memberAttribute:
                        description: 'MemberAttribute maps group membership (keystone
                          default: member).'
                        type: string
                      nameAttribute:
                        description: 'NameAttribute maps the keystone group name (keystone
                          default: ou).'
                        type: string
                      objectClass:
                        description: |-
                          ObjectClass is the LDAP objectClass for groups (keystone default:
                          groupOfNames).
                        type: string
                      treeDN:
                        description: TreeDN is the search base for groups.
                        minLength: 1
                        type: string
                    required:
                    - treeDN
                    type: object
                  pool:
                    description: Pool configures the keystone-side LDAP connection
                      pool.
                    properties:
                      enabled:
                        description: Enabled turns the pool on (renders use_pool =
                          true).
                        type: boolean
                      size:
                        description: Size is the pool size (renders pool_size); only
                          rendered when set.
                        format: int32
                        minimum: 1
                        type: integer
                    type: object
                  readOnly:
                    default: true
                    description: |-
                      ReadOnly forces user_allow_create/update/delete and
                      group_allow_create/update/delete to false so keystone can never write
                      into the corporate directory. Defaults to true; setting it to false is
                      an explicit opt-in to a writable backend.
                    type: boolean
                  suffix:
                    description: Suffix is the LDAP suffix (base DN), e.g. "dc=example,dc=com".
                    minLength: 1
                    type: string
                  tls:
                    description: |-
                      TLS configures certificate verification for ldaps:// / STARTTLS
                      connections.
                    properties:
                      caBundleSecretRef:
                        description: |-
                          CABundleSecretRef references the Secret holding the CA bundle under
                          the fixed data key "ca.crt" (the canonical cert-manager file name,
                          mirroring the database TLS contract). The projection writes the PEM to
                          /etc/keystone/domains/<domain>-ca.pem and points tls_cacertfile at it.
                        properties:
                          key:
                            type: string
                          name:
                            description: |-
                              Name is the referenced Secret's name. It must be a non-empty DNS-1123
                              subdomain (the Kubernetes object-name grammar). Tightening the shared type
                              fixes every consumer at once — keystone adminPasswordSecretRef /
                              database.secretRef / messaging / TLS cert refs and the c5c3
                              passwordSecretRef — so an empty name no longer slips through "required".
                            minLength: 1
                            pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - caBundleSecretRef
                    type: object
                  url:
                    description: URL is the LDAP server URL (ldap:// or ldaps://).
                    pattern: ^ldaps?://
                    type: string
                  users:
                    description: Users describes the user tree layout and attribute
                      mapping.
                    properties:
                      filter:
                        description: Filter is an additional LDAP filter applied to
                          user searches.
                        type: string
                      idAttribute:
                        description: 'IDAttribute maps the keystone user ID (keystone
                          default: cn).'
                        type: string
                      mailAttribute:
                        description: 'MailAttribute maps the keystone user email (keystone
                          default: mail).'
                        type: string
                      nameAttribute:
                        description: 'NameAttribute maps the keystone user name (keystone
                          default: sn).'
                        type: string
                      objectClass:
                        description: |-
                          ObjectClass is the LDAP objectClass for users (keystone default:
                          inetOrgPerson).
                        type: string
                      treeDN:
                        description: TreeDN is the search base for users, e.g. "ou=people,dc=example,dc=com".
                        minLength: 1
                        type: string
                    required:
                    - treeDN
                    type: object
                required:
                - bindCredentialsSecretRef
                - suffix
                - url
                - users
                type: object
              type:
                description: Type selects the backend driver. Phase 1 supports LDAP
                  only.
                enum:
                - LDAP
                type: string
            required:
            - domain
            - keystoneRef
            - type
            type: object
            x-kubernetes-validations:
            - message: keystoneRef is immutable
              rule: self.keystoneRef.name == oldSelf.keystoneRef.name
            - message: type is immutable
              rule: self.type == oldSelf.type
            - message: exactly one backend block matching spec.type must be set (type
                LDAP requires spec.ldap)
              rule: (self.type == 'LDAP') == has(self.ldap)
          status:
            description: |-
              KeystoneIdentityBackendStatus defines the observed state of
              KeystoneIdentityBackend. The dedicated KeystoneIdentityBackend controller
              is the single writer of this status; the keystone-side sub-reconciler only
              reads it (DomainReady gates config projection) and writes the aggregated
              IdentityBackendsReady condition onto the Keystone CR instead.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the backend
                  state: DomainReady (the referenced domain exists / was provisioned),
                  ConfigProjected (the rendered per-domain config is wired into the
                  running Keystone Deployment), and the aggregate Ready.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              domainID:
                description: |-
                  DomainID is the Keystone domain ID this backend provisioned (Manage)
                  or resolved (Adopt). Empty until DomainReady first turns True. The
                  deletion path uses it to disable+delete exactly the domain this CR
                  created, never a same-named foreign one.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the .metadata.generation the controller last
                  reconciled, so a stale status is distinguishable from a current one.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
