                    format: int32
                    type: integer
                  secretRef:
                    description: SecretRef references the K8s Secret with credentials.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - name
                    type: object
                  tls:
                    description: |-
                      TLS optionally enables TLS/mTLS for the database connection. The pointer keeps the field opt-in and non-mutating: a nil
                      TLS means plaintext TCP, preserving the pre-existing behavior for all
                      existing DatabaseSpec consumers.
                    properties:
                      caBundleSecretRef:
                        description: |-
                          CABundleSecretRef references the K8s Secret holding the server CA
                          bundle the client trusts when verifying the database endpoint.
                        properties:
                          key:
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      clientCertSecretRef:
                        description: |-
                          ClientCertSecretRef references the K8s Secret holding the client
                          keypair presented to the database for mutual TLS.
                        properties:
                          key:
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      enabled:
                        description: |-
                          Enabled turns on TLS for the database connection. When true the
                          operator provisions the client certificate, appends the ssl_* DSN
