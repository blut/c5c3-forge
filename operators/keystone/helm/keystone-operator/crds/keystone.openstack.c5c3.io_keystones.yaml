                      TrustFlushSpec.Suspend semantics.
                    type: boolean
                type: object
              database:
                description: |-
                  Database defines the MariaDB connection parameters.
                  Supports managed (clusterRef) and brownfield (host/port) modes.
                  TLS/mTLS is opt-in via database.tls when enabled, both the
                  CA bundle and client keypair Secret references must be supplied so the
                  reconciler can establish a verified, mutually-authenticated connection.

                  DECISION no CEL rule is added for tls.mode — the out-of-enum
                  case is already rejected by the leaf +kubebuilder:validation:Enum marker
                  on DatabaseTLSSpec.Mode (disabled;prefer;require;verify-ca;verify-full).
                  Adding a mode CEL here would be redundant with that schema-level enum and
                  risks drifting from it. TLS is enabled exactly when mode is neither empty
                  nor "disabled" (DatabaseTLSSpec.IsEnabled).

                  The clusterRef/host mutual-exclusivity rule lives on commonv1.DatabaseSpec
                  itself, so it is inherited here without per-field duplication. The TLS
                  rule below stays field-level because it is keystone-specific.

                  The database name and the connection mode are immutable after create.
                  Renaming spec.database.database re-points db_sync at a fresh, empty schema:
                  Keystone silently "loses" every user/project while the old data is orphaned
                  (data-loss class). Flipping the managed (clusterRef) ↔ brownfield (host) mode
                  likewise re-targets the whole connection. The transition rules below
                  (self == oldSelf, evaluated only on UPDATE) are enforced by the API server
                  itself, so they keep protecting the field even when the validating webhook
                  is unavailable (#466).
                properties:
                  clusterRef:
                    description: ClusterRef references a MariaDB CR in the cluster
                      (managed mode).
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  credentialsMode:
                    description: |-
                      CredentialsMode selects how the service DB credential in SecretRef is
                      provisioned. "Static" (the default when empty) has the operator manage
                      the MariaDB User/Grant CRs with a long-lived password from SecretRef.
                      "Dynamic" has an external secrets engine issue short-lived credentials on
                      demand: SecretRef then carries both a username and password, no User/Grant
                      CRs are managed, and no long-lived DB password remains at rest. Dynamic is
                      only valid in managed mode (ClusterRef set).
                    enum:
                    - Static
                    - Dynamic
                    type: string
                  database:
                    description: |-
                      Database is the database name within the cluster. Constrained to the MySQL
                      identifier character set and the 64-character identifier limit.
                    maxLength: 64
                    minLength: 1
                    pattern: ^[A-Za-z0-9_]+$
                    type: string
                  host:
                    description: |-
                      Host is the database hostname (brownfield mode). The pattern is a
                      permissive host matcher that accepts DNS names, IPv4, and IPv6 literals
                      while rejecting empty strings and shell/path metacharacters; it is not a
                      strict RFC-1123 validator, deliberately, so airgapped/mirror endpoints are
                      not rejected at admission.
                    minLength: 1
                    pattern: ^[a-zA-Z0-9._:-]+$
                    type: string
                  port:
                    description: |-
                      Port is the database port (brownfield mode, default 3306). Omitted (managed
                      mode) leaves it unset; an explicit value must be a valid TCP port.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  replicas:
                    default: 3
                    description: |-
                      Replicas is the number of managed MariaDB replicas provisioned in
                      fresh-create mode. It mirrors CacheSpec.Replicas: only the c5c3 operator's
                      managed-mode projection honours it (a single replica yields a
                      single-instance non-Galera MariaDB, three or more yield a Galera cluster),
                      so a constrained cluster such as a single-node kind can schedule the
                      fresh-create path. Operators that adopt an existing MariaDB (the c5c3 adopted-infra path,
                      and every service operator) ignore it. Only meaningful when ClusterRef is
                      set.
                    format: int32
                    minimum: 1
                    type: integer
                  secretRef:
                    description: SecretRef references the K8s Secret with credentials.
                    properties:
                      key:
                        type: string
                      name:
                        description: |-
                          Name is the referenced Secret's name. It must be a non-empty DNS-1123
                          subdomain (the Kubernetes object-name grammar). Tightening the shared type
                          fixes every consumer at once — a service operator adminPasswordSecretRef /
                          database.secretRef / messaging / TLS cert refs and the c5c3
                          passwordSecretRef — so an empty name no longer slips through "required".
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                        type: string
                    required:
                    - name
                    type: object
                  storageSize:
                    default: 100Gi
                    description: |-
                      StorageSize is the persistent-volume size requested for each managed
                      MariaDB replica in fresh-create mode. Like Replicas, only the c5c3
                      operator's managed-mode projection honours it (it is written to the owned
                      MariaDB's spec.storage.size); operators that adopt an existing MariaDB
                      (the c5c3 adopted-infra path, and every service operator) ignore it. The default 100Gi
                      mirrors the production baseline (deploy/flux-system/infrastructure/
                      mariadb.yaml); a constrained cluster such as a single-node kind can pin a
                      far smaller value (e.g. 512Mi) so CI does not request a 100Gi volume it
                      never fills. Immutable after creation: the mariadb-operator rejects
                      changing spec.storage.size on a live CR, so the ControlPlane validating
                      webhook freezes it too. Only meaningful when ClusterRef is set. The pattern
                      admits binary IEC units (Mi/Gi/Ti) matching the Kubernetes quantity grammar
                      the operator parses with resource.ParseQuantity.
                    pattern: ^[0-9]+(Mi|Gi|Ti)$
                    type: string
                  tls:
                    description: |-
                      TLS optionally enables TLS/mTLS for the database connection. The pointer keeps the field opt-in and non-mutating: a nil
                      TLS means plaintext TCP, preserving the pre-existing behavior for all
                      existing DatabaseSpec consumers.
                    properties:
                      caBundleSecretRef:
                        description: |-
                          CABundleSecretRef references the K8s Secret holding the server CA
                          bundle the client trusts when verifying the database endpoint.
                        properties:
                          key:
                            type: string
                          name:
                            description: |-
                              Name is the referenced Secret's name. It must be a non-empty DNS-1123
                              subdomain (the Kubernetes object-name grammar). Tightening the shared type
                              fixes every consumer at once — a service operator adminPasswordSecretRef /
                              database.secretRef / messaging / TLS cert refs and the c5c3
                              passwordSecretRef — so an empty name no longer slips through "required".
                            minLength: 1
                            pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                            type: string
                        required:
                        - name
                        type: object
                      clientCertSecretRef:
                        description: |-
                          ClientCertSecretRef references the K8s Secret holding the client
                          keypair presented to the database for mutual TLS.
                        properties:
                          key:
                            type: string
                          name:
                            description: |-
                              Name is the referenced Secret's name. It must be a non-empty DNS-1123
                              subdomain (the Kubernetes object-name grammar). Tightening the shared type
                              fixes every consumer at once — a service operator adminPasswordSecretRef /
                              database.secretRef / messaging / TLS cert refs and the c5c3
                              passwordSecretRef — so an empty name no longer slips through "required".
                            minLength: 1
                            pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                            type: string
                        required:
                        - name
                        type: object
                      mode:
                        description: |-
                          Mode selects the TLS verification strength applied to the connection:
                            - disabled:       TLS is off; certificate references are ignored.
                            - prefer/require: encrypt the connection only (no peer verification).
                            - verify-ca:      additionally verify the server certificate chain
                                               against the trusted CA bundle.
                            - verify-full:    additionally verify the server certificate chain
                                               and that the server hostname matches the
                                               certificate identity.
                        enum:
                        - disabled
                        - prefer
                        - require
                        - verify-ca
                        - verify-full
                        type: string
                    required:
                    - caBundleSecretRef
                    - clientCertSecretRef
                    type: object
                required:
                - database
                - secretRef
                type: object
                x-kubernetes-validations:
                - message: when database.tls is enabled (mode is neither empty nor
                    'disabled'), both database.tls.caBundleSecretRef.name and database.tls.clientCertSecretRef.name
                    must be set
                  rule: '!has(self.tls) || self.tls.mode == '''' || self.tls.mode
                    == ''disabled'' || (self.tls.caBundleSecretRef.name != '''' &&
                    self.tls.clientCertSecretRef.name != '''')'
                - message: database name is immutable
                  rule: self.database == oldSelf.database
                - message: database mode (managed clusterRef vs brownfield host) is
                    immutable
                  rule: has(self.clusterRef) == has(oldSelf.clusterRef)
                - message: exactly one of clusterRef or host must be set
                  rule: has(self.clusterRef) != has(self.host)
                - message: credentialsMode Dynamic requires clusterRef (managed mode)
                  rule: '!has(self.credentialsMode) || self.credentialsMode != ''Dynamic''
                    || has(self.clusterRef)'
              deployment:
                description: |-
                  Deployment groups the pod-level knobs for the Keystone API Deployment
                  (replicas, resources, rollout strategy, graceful-termination timings, and
                  scheduling constraints). Future affinity/tolerations/nodeSelector knobs
                  land here too, keeping the spec root legible.
                properties:
                  preStopSleepSeconds:
                    description: |-
                      PreStopSleepSeconds is the sleep duration (seconds) of the preStop
                      lifecycle hook, configured independently of the overall grace period
                      This covers the window between EndpointSlice removal and
                      kube-proxy/ingress-controller propagation so new requests stop arriving
                      before SIGTERM reaches the API process. When nil, the reconciler applies a default
                      of 5s. Zero is permitted to disable the sleep. The cross-field rule
                      preStopSleepSeconds < terminationGracePeriodSeconds is enforced by the
                      validating webhook to guarantee a non-zero drain window.
                    format: int64
                    minimum: 0
                    type: integer
                  priorityClassName:
                    description: |-
                      PriorityClassName sets the priority class for service API pods.
                      When set, the operator passes the value through to the PodSpec, allowing
                      cluster administrators to control scheduling priority and preemption.
                      When unset, no priority class is configured and the cluster default applies.
                    type: string
                  replicas:
                    default: 3
                    description: Replicas is the desired number of service API pods.
                    format: int32
                    minimum: 1
                    type: integer
                  resources:
                    description: |-
                      Resources defines the CPU and memory requests and limits for the service API
                      container. When unset, the defaulting webhook injects sensible defaults
                      (256Mi/512Mi memory, 100m/500m CPU) to ensure Burstable QoS class and
                      enable HPA utilization calculations.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  strategy:
                    description: |-
                      Strategy overrides the Deployment rollout strategy for the service API
                      Deployment. When nil, the reconciler applies RollingUpdate
                      with MaxUnavailable=0 and MaxSurge=1 to guarantee surge-before-remove
                      behavior — available capacity never dips below spec.deployment.replicas
                      during an image-tag patch. Set this to customize maxSurge/maxUnavailable,
                      or to switch the type to Recreate for site-specific rollout policies.
                    properties:
                      rollingUpdate:
                        description: |-
                          Rolling update config params. Present only if DeploymentStrategyType =
                          RollingUpdate.
                        properties:
                          maxSurge:
                            anyOf:
                            - type: integer
                            - type: string
                            description: |-
                              The maximum number of pods that can be scheduled above the desired number of
                              pods.
                              Value can be an absolute number (ex: 5) or a percentage of desired pods (ex: 10%).
                              This can not be 0 if MaxUnavailable is 0.
                              Absolute number is calculated from percentage by rounding up.
                              Defaults to 25%.
                              Example: when this is set to 30%, the new ReplicaSet can be scaled up immediately when
                              the rolling update starts, such that the total number of old and new pods do not exceed
                              130% of desired pods. Once old pods have been killed,
                              new ReplicaSet can be scaled up further, ensuring that total number of pods running
                              at any time during the update is at most 130% of desired pods.
                            x-kubernetes-int-or-string: true
                          maxUnavailable:
                            anyOf:
                            - type: integer
                            - type: string
                            description: |-
                              The maximum number of pods that can be unavailable during the update.
                              Value can be an absolute number (ex: 5) or a percentage of desired pods (ex: 10%).
                              Absolute number is calculated from percentage by rounding down.
                              This can not be 0 if MaxSurge is 0.
                              Defaults to 25%.
                              Example: when this is set to 30%, the old ReplicaSet can be scaled down to 70% of desired pods
                              immediately when the rolling update starts. Once new pods are ready, old ReplicaSet
                              can be scaled down further, followed by scaling up the new ReplicaSet, ensuring
                              that the total number of pods available at all times during the update is at
                              least 70% of desired pods.
                            x-kubernetes-int-or-string: true
                        type: object
                      type:
                        description: Type of deployment. Can be "Recreate" or "RollingUpdate".
                          Default is RollingUpdate.
                        type: string
                    type: object
                  terminationGracePeriodSeconds:
                    description: |-
                      TerminationGracePeriodSeconds is the grace period (seconds) granted to
                      service API pods between SIGTERM and SIGKILL during rolling updates
                      Extend this to cover slow upstream token validation (LDAP/DB)
                      so in-flight requests finish before the kubelet forcibly kills the API process.
                      When nil, the reconciler omits the field from the pod template and the
                      Kubernetes default of 30s applies. Must be at least 10s when set.
                    format: int64
                    minimum: 10
                    type: integer
                  topologySpreadConstraints:
                    description: |-
                      TopologySpreadConstraints describes how pods should be spread across
                      topology domains (zones, nodes) to achieve high availability.
                      When nil (unset), the operator injects two default constraints:
                      zone-spread (topology.kubernetes.io/zone) and hostname-spread
                      (kubernetes.io/hostname), both MaxSkew=1 with ScheduleAnyway.
                      When set to a non-nil value (including an empty slice), the user-provided
                      constraints are used verbatim — an empty slice disables defaults.
                    items:
                      description: TopologySpreadConstraint specifies how to spread
                        matching pods among the given topology.
                      properties:
                        labelSelector:
                          description: |-
                            LabelSelector is used to find matching pods.
                            Pods that match this label selector are counted to determine the number of pods
                            in their corresponding topology domain.
                          properties:
                            matchExpressions:
                              description: matchExpressions is a list of label selector
                                requirements. The requirements are ANDed.
                              items:
                                description: |-
                                  A label selector requirement is a selector that contains values, a key, and an operator that
                                  relates the key and values.
                                properties:
                                  key:
                                    description: key is the label key that the selector
                                      applies to.
                                    type: string
                                  operator:
                                    description: |-
                                      operator represents a key's relationship to a set of values.
                                      Valid operators are In, NotIn, Exists and DoesNotExist.
                                    type: string
                                  values:
                                    description: |-
                                      values is an array of string values. If the operator is In or NotIn,
                                      the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                      the values array must be empty. This array is replaced during a strategic
                                      merge patch.
                                    items:
                                      type: string
                                    type: array
                                    x-kubernetes-list-type: atomic
                                required:
                                - key
                                - operator
                                type: object
                              type: array
                              x-kubernetes-list-type: atomic
                            matchLabels:
                              additionalProperties:
                                type: string
                              description: |-
                                matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                map is equivalent to an element of matchExpressions, whose key field is "key", the
                                operator is "In", and the values array contains only "value". The requirements are ANDed.
                              type: object
                          type: object
                          x-kubernetes-map-type: atomic
                        matchLabelKeys:
                          description: |-
