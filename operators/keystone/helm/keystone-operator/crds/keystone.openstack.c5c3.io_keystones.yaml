                type: object
              cache:
                description: |-
                  Cache defines the Memcached cache configuration.
                  Supports managed (clusterRef) and brownfield (servers) modes.
                properties:
                  backend:
                    description: Backend is the cache backend (e.g. dogpile.cache.pymemcache).
                    type: string
                  clusterRef:
                    description: ClusterRef references a Memcached CR in the cluster
