            type: string
          metadata:
            type: object
          spec:
            description: KeystoneSpec defines the desired state of Keystone.
            properties:
              autoscaling:
                description: |-
                  Autoscaling configures horizontal pod autoscaling for the Keystone API deployment.
                  When set, a HorizontalPodAutoscaler is created targeting the deployment.
                  When removed, the HPA is deleted.
                properties:
                  maxReplicas:
                    description: MaxReplicas is the upper bound for the number of
                      replicas.
                    format: int32
                    minimum: 1
                    type: integer
                  minReplicas:
                    description: |-
