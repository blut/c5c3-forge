                    format: int32
                    maximum: 100
                    minimum: 1
                    type: integer
                required:
                - maxReplicas
                type: object
                x-kubernetes-validations:
                - message: at least one of targetCPUUtilization or targetMemoryUtilization
                    must be set
                  rule: has(self.targetCPUUtilization) || has(self.targetMemoryUtilization)
              bootstrap:
                description: Bootstrap configures the initial Keystone bootstrap.
                properties:
                  adminPasswordSecretRef:
                    description: AdminPasswordSecretRef references the Secret containing
                      the admin password.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - name
                    type: object
                  adminUser:
                    default: admin
                    description: AdminUser is the admin username for the bootstrap.
                    type: string
                  passwordRotation:
                    description: |-
                      PasswordRotation optionally enables scheduled rotation of the admin
                      password. Nil (the default) leaves the feature off and the
                      sub-reconciler is a clean no-op. See PasswordRotationSpec for the opt-in
                      and per-CR semantics.
                    properties:
                      enabled:
                        default: false
                        description: |-
                          Enabled turns on scheduled admin-password rotation. Default false: the
                          feature is opt-in, and disabling it tears down every Model B resource.
                        type: boolean
                      passwordLength:
                        default: 32
                        description: |-
                          PasswordLength is the length of the generated password. The kubebuilder
                          default literal below must stay in sync with DefaultPasswordRotationLength
                          in keystone_webhook.go.
                        format: int32
                        minimum: 24
                        type: integer
                      schedule:
                        default: 0 0 1 * *
                        description: |-
                          Schedule is a cron expression controlling when a new admin password is
                          generated. Defaults to monthly at midnight on the 1st.
                        type: string
                      suspend:
                        default: false
                        description: |-
                          Suspend pauses the CronJob without deleting it or any sibling resource,
