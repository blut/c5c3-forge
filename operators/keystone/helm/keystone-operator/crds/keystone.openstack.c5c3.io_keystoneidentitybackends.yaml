apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: keystoneidentitybackends.keystone.openstack.c5c3.io
spec:
  group: keystone.openstack.c5c3.io
  names:
    kind: KeystoneIdentityBackend
    listKind: KeystoneIdentityBackendList
    plural: keystoneidentitybackends
    singular: keystoneidentitybackend
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
