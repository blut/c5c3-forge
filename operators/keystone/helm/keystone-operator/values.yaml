# Default values for keystone-operator.

image:
  repository: ghcr.io/c5c3/keystone-operator
  # tag defaults to .Chart.AppVersion when left empty; set explicitly to override (e.g. tag: "latest" for local dev)
  tag: ""
  pullPolicy: IfNotPresent

replicas: 2

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

leaderElection:
  enabled: true

webhook:
  enabled: true

metrics:
  port: 8080

serviceAccount:
  create: true
  name: ""
