{{- if .Values.webhook.enabled -}}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "operator-library.fullname" . }}-mutating
  labels:
    {{- include "operator-library.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "operator-library.fullname" . }}-webhook
webhooks:
  - name: mkeystone.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "operator-library.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-keystone-openstack-c5c3-io-v1alpha1-keystone
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - keystone.openstack.c5c3.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - keystones
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "operator-library.fullname" . }}-validating
  labels:
    {{- include "operator-library.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "operator-library.fullname" . }}-webhook
webhooks:
  - name: vkeystone.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "operator-library.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-keystone-openstack-c5c3-io-v1alpha1-keystone
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - keystone.openstack.c5c3.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
          - DELETE
        resources:
          - keystones
{{- end }}
