{{- if .Values.webhook.enabled -}}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "keystone-operator.fullname" . }}-selfsigned
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keystone-operator.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "keystone-operator.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keystone-operator.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "keystone-operator.fullname" . }}.{{ .Release.Namespace }}.svc
    - {{ include "keystone-operator.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ include "keystone-operator.fullname" . }}-selfsigned
  secretName: {{ include "keystone-operator.fullname" . }}-webhook-cert
{{- end }}
