# CC-0043: Role RBAC tests for namespace-scoped mode.
# Individual rule verification tests mirror clusterrole_test.yaml structure
# to catch regressions in apiGroups, resources, or verbs (CC-0043).
suite: Role
templates:
  - templates/role.yaml
tests:
  - it: should render Role when rbac.namespaceScoped is true
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: Role
      - equal:
          path: metadata.name
          value: RELEASE-NAME-keystone-operator
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: keystone-operator
            app.kubernetes.io/instance: RELEASE-NAME

  - it: should fail when rbac.namespaceScoped is true and webhook.enabled is true
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "rbac.namespaceScoped=true requires webhook.enabled=false — namespace-scoped operators cannot manage cluster-scoped webhook configurations"

  - it: should not render Role when rbac.namespaceScoped is false
    asserts:
      - hasDocuments:
          count: 0

  - it: should have 16 rules matching ClusterRole
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - lengthEqual:
          path: rules
          count: 16

  - it: should grant full CRUD on keystones
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - keystone.openstack.c5c3.io
            resources:
              - keystones
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant get/update/patch on keystones/status
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - keystone.openstack.c5c3.io
            resources:
              - keystones/status
            verbs:
              - get
              - update
              - patch

  - it: should grant update on keystones/finalizers
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - keystone.openstack.c5c3.io
            resources:
              - keystones/finalizers
            verbs:
              - update

  - it: should grant full CRUD on apps/deployments
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - deployments
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant full CRUD on core resources
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - services
              - configmaps
              - secrets
              - serviceaccounts
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should restrict events to create and patch only
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - events
            verbs:
              - create
              - patch

  - it: should grant full CRUD on batch resources
