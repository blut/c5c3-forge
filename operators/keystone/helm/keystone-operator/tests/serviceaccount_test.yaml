# CC-0041, REQ-011: ServiceAccount conditional creation unit tests.
suite: ServiceAccount
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should create a ServiceAccount by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-keystone-operator

  - it: should not create a ServiceAccount when serviceAccount.create is false
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use custom name when serviceAccount.name is set
    set:
      serviceAccount:
        create: true
        name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should set standard labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: keystone-operator
            app.kubernetes.io/instance: RELEASE-NAME
