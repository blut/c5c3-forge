              - list
              - watch

  - it: should grant get/update/patch on glancebackends/status
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - glance.openstack.c5c3.io
            resources:
              - glancebackends/status
            verbs:
              - get
              - update
              - patch

  - it: should grant full CRUD on apps/deployments
