# Role RBAC tests for namespace-scoped mode.
# Individual rule verification tests mirror clusterrole_test.yaml structure
# to catch regressions in apiGroups, resources, or verbs.
suite: Role
templates:
  - templates/role.yaml
tests:
  - it: should render Role when rbac.namespaceScoped is true
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: Role
      - equal:
          path: metadata.name
          value: RELEASE-NAME-glance-operator
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: glance-operator
            app.kubernetes.io/instance: RELEASE-NAME

  - it: should fail when rbac.namespaceScoped is true and webhook.enabled is true
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "webhook/enabled"

  - it: should not render Role when rbac.namespaceScoped is false
    asserts:
      - hasDocuments:
          count: 0

  - it: should have 20 rules matching ClusterRole
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - lengthEqual:
          path: rules
          count: 20

  - it: should grant full CRUD on glances
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - glance.openstack.c5c3.io
            resources:
              - glances
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant get/update/patch on glances/status
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - glance.openstack.c5c3.io
            resources:
              - glances/status
            verbs:
              - get
              - update
              - patch

  - it: should grant update on glances/finalizers
    set:
      rbac:
        namespaceScoped: true
      webhook:
