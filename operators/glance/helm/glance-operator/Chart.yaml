apiVersion: v2
name: glance-operator
description: A Helm chart for deploying the Glance OpenStack image service operator
type: application
version: 0.1.0
appVersion: "0.1.0"
# The shared naming/label helpers and the Deployment skeleton live in the
# operator-library library chart so they are defined once for all operator
# charts. It is vendored into charts/ at package time (helm dependency build).
dependencies:
  - name: operator-library
    version: 0.4.0
    repository: "file://../../../shared/helm/operator-library"
# Helm validates values against values.schema.json automatically.
annotations:
  artifacthub.io/prerelease: "true"
  artifacthub.io/changes: |
    - kind: added
      description: Optional image.digest value pins the operator image by immutable digest (rendered as repository:tag@digest)
    - kind: added
      description: Initial glance-operator chart on the shared operator-library (deployment, Glance and GlanceBackend admission webhooks, RBAC, PDB, ServiceMonitor, opt-in NetworkPolicy)
