  failurePolicy: Fail
  name: vglance.kb.io
  rules:
  - apiGroups:
    - glance.openstack.c5c3.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - glances
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-glance-openstack-c5c3-io-v1alpha1-glancebackend
  failurePolicy: Fail
  name: vglancebackend.kb.io
  rules:
  - apiGroups:
    - glance.openstack.c5c3.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - glancebackends
  sideEffects: None
