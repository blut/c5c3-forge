---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: horizons.horizon.openstack.c5c3.io
spec:
  group: horizon.openstack.c5c3.io
  names:
    kind: Horizon
    listKind: HorizonList
    plural: horizons
    singular: horizon
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .status.endpoint
      name: Endpoint
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Horizon is the Schema for the horizons API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              HorizonSpec defines the desired state of Horizon.

              Horizon is deliberately the thin profile among the service operators:
              a stateless Django/WSGI dashboard with no message bus, no service-catalog
              endpoints of its own, and no db-sync/fernet/bootstrap/upgrade machinery.
              Sessions use Django signed cookies; Memcached only backs the Django cache,
              so losing it degrades cache hit-rate without logging users out.
            properties:
              autoscaling:
                description: |-
                  Autoscaling configures horizontal pod autoscaling for the dashboard
                  deployment. When set, a HorizontalPodAutoscaler is created targeting the
                  deployment. When removed, the HPA is deleted.
                properties:
                  maxReplicas:
                    description: MaxReplicas is the upper bound for the number of
                      replicas.
                    format: int32
                    minimum: 1
                    type: integer
                  minReplicas:
                    description: |-
                      MinReplicas is the lower bound for the number of replicas.
                      Defaults to the current spec.replicas value if unset.
                    format: int32
                    minimum: 1
                    type: integer
                  targetCPUUtilization:
                    description: TargetCPUUtilization is the target average CPU utilization
                      (percentage).
                    format: int32
                    maximum: 100
                    minimum: 1
                    type: integer
                  targetMemoryUtilization:
                    description: TargetMemoryUtilization is the target average memory
                      utilization (percentage).
                    format: int32
                    maximum: 100
                    minimum: 1
                    type: integer
                required:
                - maxReplicas
                type: object
                x-kubernetes-validations:
                - message: at least one of targetCPUUtilization or targetMemoryUtilization
                    must be set
                  rule: has(self.targetCPUUtilization) || has(self.targetMemoryUtilization)
                - message: minReplicas must not exceed maxReplicas
                  rule: '!has(self.minReplicas) || self.minReplicas <= self.maxReplicas'
              cache:
                description: |-
                  Cache defines the Memcached configuration backing the Django cache.
                  Supports managed (clusterRef) and brownfield (servers) modes; the
                  clusterRef/servers mutual-exclusivity rule lives on commonv1.CacheSpec.
                  Backend is a Django cache backend path (defaulted to PyMemcacheCache),
                  not an oslo.cache dogpile path.
                properties:
                  backend:
                    description: Backend is the cache backend (e.g. dogpile.cache.pymemcache).
                    type: string
                  clusterRef:
                    description: ClusterRef references a Memcached CR in the cluster
                      (managed mode).
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  replicas:
                    default: 3
                    description: |-
                      Replicas is the number of Memcached pod replicas in the referenced cluster
                      (managed mode). Used to generate the correct number of StatefulSet pod
                      endpoints. Only used when ClusterRef is set.
                    format: int32
                    minimum: 1
                    type: integer
                  servers:
                    description: Servers is the list of cache server endpoints (brownfield
                      mode).
                    items:
                      type: string
                    type: array
                required:
                - backend
                type: object
                x-kubernetes-validations:
                - message: exactly one of clusterRef or servers must be set
                  rule: has(self.clusterRef) != (has(self.servers) && size(self.servers)
                    > 0)
              deployment:
                description: |-
                  Deployment groups the pod-level knobs for the Horizon dashboard
                  Deployment (replicas, resources, rollout strategy, graceful-termination
                  timings, and scheduling constraints).
                properties:
                  preStopSleepSeconds:
                    description: |-
                      PreStopSleepSeconds is the sleep duration (seconds) of the preStop
                      lifecycle hook, configured independently of the overall grace period
                      This covers the window between EndpointSlice removal and
                      kube-proxy/ingress-controller propagation so new requests stop arriving
                      before SIGTERM reaches uWSGI. When nil, the reconciler applies a default
                      of 5s. Zero is permitted to disable the sleep. The cross-field rule
                      preStopSleepSeconds < terminationGracePeriodSeconds is enforced by the
                      validating webhook to guarantee a non-zero drain window.
                    format: int64
                    minimum: 0
                    type: integer
                  priorityClassName:
                    description: |-
                      PriorityClassName sets the priority class for Keystone API pods.
                      When set, the operator passes the value through to the PodSpec, allowing
                      cluster administrators to control scheduling priority and preemption.
                      When unset, no priority class is configured and the cluster default applies.
                    type: string
                  replicas:
                    default: 3
                    description: Replicas is the desired number of Keystone API pods.
                    format: int32
                    minimum: 1
                    type: integer
                  resources:
                    description: |-
                      Resources defines the CPU and memory requests and limits for the Keystone API
                      container. When unset, the defaulting webhook injects sensible defaults
                      (256Mi/512Mi memory, 100m/500m CPU) to ensure Burstable QoS class and
                      enable HPA utilization calculations.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  strategy:
                    description: |-
                      Strategy overrides the Deployment rollout strategy for the Keystone API
                      Deployment. When nil, the reconciler applies RollingUpdate
                      with MaxUnavailable=0 and MaxSurge=1 to guarantee surge-before-remove
                      behavior — available capacity never dips below spec.deployment.replicas
                      during an image-tag patch. Set this to customize maxSurge/maxUnavailable,
                      or to switch the type to Recreate for site-specific rollout policies.
                    properties:
                      rollingUpdate:
                        description: |-
                          Rolling update config params. Present only if DeploymentStrategyType =
                          RollingUpdate.
                        properties:
                          maxSurge:
                            anyOf:
                            - type: integer
                            - type: string
                            description: |-
                              The maximum number of pods that can be scheduled above the desired number of
                              pods.
                              Value can be an absolute number (ex: 5) or a percentage of desired pods (ex: 10%).
                              This can not be 0 if MaxUnavailable is 0.
                              Absolute number is calculated from percentage by rounding up.
                              Defaults to 25%.
                              Example: when this is set to 30%, the new ReplicaSet can be scaled up immediately when
                              the rolling update starts, such that the total number of old and new pods do not exceed
                              130% of desired pods. Once old pods have been killed,
                              new ReplicaSet can be scaled up further, ensuring that total number of pods running
                              at any time during the update is at most 130% of desired pods.
                            x-kubernetes-int-or-string: true
                          maxUnavailable:
                            anyOf:
                            - type: integer
                            - type: string
                            description: |-
                              The maximum number of pods that can be unavailable during the update.
                              Value can be an absolute number (ex: 5) or a percentage of desired pods (ex: 10%).
                              Absolute number is calculated from percentage by rounding down.
                              This can not be 0 if MaxSurge is 0.
                              Defaults to 25%.
                              Example: when this is set to 30%, the old ReplicaSet can be scaled down to 70% of desired pods
                              immediately when the rolling update starts. Once new pods are ready, old ReplicaSet
                              can be scaled down further, followed by scaling up the new ReplicaSet, ensuring
                              that the total number of pods available at all times during the update is at
                              least 70% of desired pods.
                            x-kubernetes-int-or-string: true
                        type: object
                      type:
                        description: Type of deployment. Can be "Recreate" or "RollingUpdate".
                          Default is RollingUpdate.
                        type: string
                    type: object
                  terminationGracePeriodSeconds:
                    description: |-
                      TerminationGracePeriodSeconds is the grace period (seconds) granted to
                      Keystone API pods between SIGTERM and SIGKILL during rolling updates
                      Extend this to cover slow upstream token validation (LDAP/DB)
                      so in-flight requests finish before the kubelet forcibly kills uWSGI.
                      When nil, the reconciler omits the field from the pod template and the
                      Kubernetes default of 30s applies. Must be at least 10s when set.
                    format: int64
                    minimum: 10
                    type: integer
                  topologySpreadConstraints:
                    description: |-
                      TopologySpreadConstraints describes how pods should be spread across
                      topology domains (zones, nodes) to achieve high availability.
                      When nil (unset), the operator injects two default constraints:
                      zone-spread (topology.kubernetes.io/zone) and hostname-spread
                      (kubernetes.io/hostname), both MaxSkew=1 with ScheduleAnyway.
                      When set to a non-nil value (including an empty slice), the user-provided
                      constraints are used verbatim — an empty slice disables defaults.
                    items:
                      description: TopologySpreadConstraint specifies how to spread
                        matching pods among the given topology.
                      properties:
                        labelSelector:
                          description: |-
                            LabelSelector is used to find matching pods.
                            Pods that match this label selector are counted to determine the number of pods
                            in their corresponding topology domain.
                          properties:
                            matchExpressions:
                              description: matchExpressions is a list of label selector
                                requirements. The requirements are ANDed.
                              items:
                                description: |-
                                  A label selector requirement is a selector that contains values, a key, and an operator that
                                  relates the key and values.
                                properties:
                                  key:
                                    description: key is the label key that the selector
                                      applies to.
                                    type: string
                                  operator:
                                    description: |-
                                      operator represents a key's relationship to a set of values.
                                      Valid operators are In, NotIn, Exists and DoesNotExist.
                                    type: string
                                  values:
                                    description: |-
                                      values is an array of string values. If the operator is In or NotIn,
                                      the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                      the values array must be empty. This array is replaced during a strategic
                                      merge patch.
                                    items:
                                      type: string
                                    type: array
                                    x-kubernetes-list-type: atomic
                                required:
                                - key
                                - operator
                                type: object
                              type: array
                              x-kubernetes-list-type: atomic
                            matchLabels:
                              additionalProperties:
                                type: string
                              description: |-
                                matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                map is equivalent to an element of matchExpressions, whose key field is "key", the
                                operator is "In", and the values array contains only "value". The requirements are ANDed.
                              type: object
                          type: object
                          x-kubernetes-map-type: atomic
                        matchLabelKeys:
                          description: |-
                            MatchLabelKeys is a set of pod label keys to select the pods over which
                            spreading will be calculated. The keys are used to lookup values from the
                            incoming pod labels, those key-value labels are ANDed with labelSelector
                            to select the group of existing pods over which spreading will be calculated
                            for the incoming pod. The same key is forbidden to exist in both MatchLabelKeys and LabelSelector.
                            MatchLabelKeys cannot be set when LabelSelector isn't set.
                            Keys that don't exist in the incoming pod labels will
                            be ignored. A null or empty list means only match against labelSelector.

                            This is a beta field and requires the MatchLabelKeysInPodTopologySpread feature gate to be enabled (enabled by default).
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                        maxSkew:
                          description: |-
                            MaxSkew describes the degree to which pods may be unevenly distributed.
                            When `whenUnsatisfiable=DoNotSchedule`, it is the maximum permitted difference
                            between the number of matching pods in the target topology and the global minimum.
                            The global minimum is the minimum number of matching pods in an eligible domain
                            or zero if the number of eligible domains is less than MinDomains.
                            For example, in a 3-zone cluster, MaxSkew is set to 1, and pods with the same
                            labelSelector spread as 2/2/1:
                            In this case, the global minimum is 1.
                            | zone1 | zone2 | zone3 |
                            |  P P  |  P P  |   P   |
                            - if MaxSkew is 1, incoming pod can only be scheduled to zone3 to become 2/2/2;
                            scheduling it onto zone1(zone2) would make the ActualSkew(3-1) on zone1(zone2)
                            violate MaxSkew(1).
                            - if MaxSkew is 2, incoming pod can be scheduled onto any zone.
                            When `whenUnsatisfiable=ScheduleAnyway`, it is used to give higher precedence
                            to topologies that satisfy it.
                            It's a required field. Default value is 1 and 0 is not allowed.
                          format: int32
                          type: integer
                        minDomains:
                          description: |-
                            MinDomains indicates a minimum number of eligible domains.
                            When the number of eligible domains with matching topology keys is less than minDomains,
                            Pod Topology Spread treats "global minimum" as 0, and then the calculation of Skew is performed.
                            And when the number of eligible domains with matching topology keys equals or greater than minDomains,
                            this value has no effect on scheduling.
                            As a result, when the number of eligible domains is less than minDomains,
                            scheduler won't schedule more than maxSkew Pods to those domains.
                            If value is nil, the constraint behaves as if MinDomains is equal to 1.
                            Valid values are integers greater than 0.
                            When value is not nil, WhenUnsatisfiable must be DoNotSchedule.

                            For example, in a 3-zone cluster, MaxSkew is set to 2, MinDomains is set to 5 and pods with the same
                            labelSelector spread as 2/2/2:
                            | zone1 | zone2 | zone3 |
                            |  P P  |  P P  |  P P  |
                            The number of domains is less than 5(MinDomains), so "global minimum" is treated as 0.
                            In this situation, new pod with the same labelSelector cannot be scheduled,
                            because computed skew will be 3(3 - 0) if new Pod is scheduled to any of the three zones,
                            it will violate MaxSkew.
                          format: int32
                          type: integer
                        nodeAffinityPolicy:
                          description: |-
                            NodeAffinityPolicy indicates how we will treat Pod's nodeAffinity/nodeSelector
                            when calculating pod topology spread skew. Options are:
                            - Honor: only nodes matching nodeAffinity/nodeSelector are included in the calculations.
                            - Ignore: nodeAffinity/nodeSelector are ignored. All nodes are included in the calculations.

                            If this value is nil, the behavior is equivalent to the Honor policy.
                          type: string
                        nodeTaintsPolicy:
                          description: |-
                            NodeTaintsPolicy indicates how we will treat node taints when calculating
                            pod topology spread skew. Options are:
                            - Honor: nodes without taints, along with tainted nodes for which the incoming pod
                            has a toleration, are included.
                            - Ignore: node taints are ignored. All nodes are included.

                            If this value is nil, the behavior is equivalent to the Ignore policy.
                          type: string
                        topologyKey:
                          description: |-
                            TopologyKey is the key of node labels. Nodes that have a label with this key
                            and identical values are considered to be in the same topology.
                            We consider each <key, value> as a "bucket", and try to put balanced number
                            of pods into each bucket.
                            We define a domain as a particular instance of a topology.
                            Also, we define an eligible domain as a domain whose nodes meet the requirements of
                            nodeAffinityPolicy and nodeTaintsPolicy.
                            e.g. If TopologyKey is "kubernetes.io/hostname", each Node is a domain of that topology.
                            And, if TopologyKey is "topology.kubernetes.io/zone", each zone is a domain of that topology.
                            It's a required field.
                          type: string
                        whenUnsatisfiable:
                          description: |-
                            WhenUnsatisfiable indicates how to deal with a pod if it doesn't satisfy
                            the spread constraint.
                            - DoNotSchedule (default) tells the scheduler not to schedule it.
                            - ScheduleAnyway tells the scheduler to schedule the pod in any location,
                              but giving higher precedence to topologies that would help reduce the
                              skew.
                            A constraint is considered "Unsatisfiable" for an incoming pod
                            if and only if every possible node assignment for that pod would violate
                            "MaxSkew" on some topology.
                            For example, in a 3-zone cluster, MaxSkew is set to 1, and pods with the same
                            labelSelector spread as 3/1/1:
                            | zone1 | zone2 | zone3 |
                            | P P P |   P   |   P   |
                            If WhenUnsatisfiable is set to DoNotSchedule, incoming pod can only be scheduled
                            to zone2(zone3) to become 3/2/1(3/1/2) as ActualSkew(2-1) on zone2(zone3) satisfies
                            MaxSkew(1). In other words, the cluster can still be imbalanced, but scheduler
                            won't make it *more* imbalanced.
                            It's a required field.
                          type: string
                      required:
                      - maxSkew
                      - topologyKey
                      - whenUnsatisfiable
                      type: object
                    type: array
                type: object
                x-kubernetes-validations:
                - message: preStopSleepSeconds must be strictly less than terminationGracePeriodSeconds
                  rule: '(has(self.preStopSleepSeconds) ? self.preStopSleepSeconds
                    : 5) < (has(self.terminationGracePeriodSeconds) ? self.terminationGracePeriodSeconds
                    : 30)'
              extraConfig:
                additionalProperties:
                  x-kubernetes-preserve-unknown-fields: true
                description: |-
                  ExtraConfig provides free-form Django settings rendered verbatim into
                  local_settings.py after the operator defaults, so user values win.
                  Keys are Django setting names (e.g. SESSION_TIMEOUT); values are
                  arbitrary JSON converted structurally to Python literals.
                  A CEL rule over the keys is not expressible here — the API server
                  cannot build CEL type information for preserve-unknown-fields map
                  values — so the empty-key and SECRET_KEY guards are enforced by the
                  validating webhook only.
                type: object
              gateway:
                description: |-
                  Gateway configures external exposure of the dashboard via a Gateway API
                  HTTPRoute. When set, the operator creates an HTTPRoute targeting the
                  {name} Service on port 8080 and attaches it to the referenced
                  pre-existing Gateway. When removed (nil), the HTTPRoute is deleted.
                  The Gateway and GatewayClass are infrastructure concerns managed outside
                  this operator.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: |-
                      Annotations are passed through to the generated HTTPRoute metadata
                      verbatim, allowing implementation-specific configuration (rate limits,
                      timeouts, CORS) without extending the CRD.
                    type: object
                  hostname:
                    description: |-
                      Hostname is the externally reachable host (SNI / Host header) that the
                      HTTPRoute matches. Required.
                    minLength: 1
                    type: string
                  parentRef:
                    description: |-
                      ParentRef identifies the pre-existing Gateway that the HTTPRoute attaches
                      to.
                    properties:
                      name:
                        description: Name is the Gateway resource name. Required.
                        minLength: 1
                        type: string
                      namespace:
                        description: |-
                          Namespace is the namespace of the referenced Gateway. When empty, the
                          Gateway is assumed to live in the referencing CR's namespace.
                        type: string
                      sectionName:
                        description: |-
                          SectionName targets a specific listener on the Gateway (e.g. "https") when
                          the Gateway defines multiple listeners. When empty, the HTTPRoute attaches
                          to all compatible listeners.
                        type: string
                    required:
                    - name
                    type: object
                  path:
                    description: |-
                      Path is the URL path prefix matched by the HTTPRoute. Defaults to "/" when
                      empty.
                    type: string
                required:
                - hostname
                - parentRef
                type: object
              image:
                description: |-
                  Image defines the Horizon container image reference. Like keystone's,
                  the field carries no immutability rule — image upgrades are routine.
                properties:
                  digest:
                    description: |-
                      Digest pins the image by immutable content digest (e.g.
                      "sha256:<64 hex chars>"). Optional: exactly one of Tag or Digest must be
                      set. A pinned digest closes the supply-chain gap where a mutable tag can be
                      re-pushed behind a stable name, at the cost of disabling release tracking.
                    pattern: ^sha256:[a-f0-9]{64}$
                    type: string
                  repository:
                    description: |-
                      Repository is the OCI image repository, optionally including the registry
                      host (e.g. "ghcr.io/c5c3/keystone" or "c5c3/keystone"). The pattern is a
                      permissive OCI reference — lowercase alphanumeric components separated by
                      ".", "_", "-", "/", or ":" (registry port) — so mirror and host:port forms
                      are accepted while an empty string (which "required" alone admits) and
                      obvious garbage are rejected.
                    minLength: 1
                    pattern: ^[a-z0-9]+([._:/-][a-z0-9]+)*$
                    type: string
                  tag:
                    description: |-
                      Tag is the OCI image tag (e.g. "2025.2"). It follows the OCI tag grammar:
                      up to 128 characters of word characters, dots, and dashes, and must not
                      begin with a dot or dash. Optional: exactly one of Tag or Digest must be
                      set. The pattern is enforced only when a tag is present.
                    pattern: ^[a-zA-Z0-9_][a-zA-Z0-9._-]{0,127}$
                    type: string
                required:
                - repository
                type: object
                x-kubernetes-validations:
                - message: exactly one of image.tag or image.digest must be set
                  rule: has(self.tag) != has(self.digest)
              keystoneEndpoint:
                description: |-
                  KeystoneEndpoint is the Keystone public endpoint URL the dashboard
                  authenticates against (OPENSTACK_KEYSTONE_URL). A plain URL field keeps
                  the operator decoupled from the keystone-operator; the c5c3 ControlPlane
                  operator projects it from its Keystone child by naming convention.
                minLength: 1
                pattern: ^https?://
                type: string
              logging:
                description: |-
                  Logging configures Django log output for the dashboard container.
                  When unset, the defaulting webhook materializes a LoggingSpec with
                  Format=text, Level=INFO, Debug=false.
                properties:
                  debug:
                    description: |-
                      Debug toggles oslo.log [DEFAULT] debug=true. Independent of Level
                      because oslo.log gates several extra-verbose code paths on the
                      debug flag specifically (SQL echo, auth-backend tracing). It is a
                      nil-preserving pointer so "unset" is representable: the defaulting webhook
                      restores the documented default (false) when the pointer is nil, and the
                      reconciler falls back to the same default for CRs that bypass the webhook.
                    type: boolean
                  format:
                    default: text
                    description: |-
                      Format selects the on-wire layout of oslo.log records.
                      "text" emits the standard oslo.log line format; "json" emits one
                      JSON object per record for direct ingest by Loki/OpenSearch.
                    enum:
                    - text
                    - json
                    type: string
                  level:
                    default: INFO
                    description: Level is the root logger level applied to oslo.log.
                    enum:
                    - DEBUG
                    - INFO
                    - WARNING
                    - ERROR
                    - CRITICAL
                    type: string
                  perLoggerLevels:
                    additionalProperties:
                      type: string
                    description: |-
                      PerLoggerLevels overrides the level of named loggers, mirroring
                      oslo.log's `default_log_levels`. Example:
                      {"sqlalchemy.engine": "WARNING", "keystone.middleware": "DEBUG"}.
                      Each value must be one of DEBUG/INFO/WARNING/ERROR/CRITICAL and every
                      logger name must be non-empty. These are now enforced by the CRD CEL
                      XValidation rules below as well as by the validating webhook (a plain
                      enum on additionalProperties is still not expressible in CRD v1, so the
                      value constraint is written as an `in [...]` CEL rule rather than an enum).
                    type: object
                    x-kubernetes-validations:
                    - message: logger name must not be empty
