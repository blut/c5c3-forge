---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-horizon-openstack-c5c3-io-v1alpha1-horizon
  failurePolicy: Fail
  name: mhorizon.kb.io
  rules:
  - apiGroups:
    - horizon.openstack.c5c3.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - horizons
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-horizon-openstack-c5c3-io-v1alpha1-horizon
  failurePolicy: Fail
  name: vhorizon.kb.io
  rules:
  - apiGroups:
    - horizon.openstack.c5c3.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - horizons
  sideEffects: None
