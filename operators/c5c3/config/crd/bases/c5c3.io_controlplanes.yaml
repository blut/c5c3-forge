---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: controlplanes.c5c3.io
spec:
  group: c5c3.io
  names:
    kind: ControlPlane
    listKind: ControlPlaneList
    plural: controlplanes
    singular: controlplane
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .spec.openStackRelease
      name: Release
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ControlPlane is the Schema for the controlplanes API. It is the
          top-level aggregate that projects an OpenStack control plane: it owns shared
          infrastructure references (database, cache) and a curated set of service
          specs (today: keystone) that the reconciler (L2) materializes into the
          per-service CRs.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ControlPlaneSpec defines the desired state of a ControlPlane.
            properties:
              globalPolicyOverrides:
                description: |-
                  GlobalPolicyOverrides defines oslo.policy overrides applied across every
                  service in the control plane. Named to parallel
                  services.keystone.policyOverrides, whose per-service rules take precedence
                  over these global rules when both are set.
                properties:
                  configMapRef:
                    description: |-
                      ConfigMapRef references a user-provided ConfigMap containing a
                      "policy.yaml" key with rule overrides.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  rules:
                    additionalProperties:
                      type: string
                    description: |-
                      Rules contains inline policy rule overrides.
                      Keys are oslo.policy rule names (e.g., "compute:create").
                      Values are oslo.policy rule definitions (e.g., "role:admin").
                      Inline rules take precedence over ConfigMap rules.
                    type: object
                type: object
                x-kubernetes-validations:
                - message: policy rule name must not be empty
                  rule: '!has(self.rules) || self.rules.all(k, size(k) > 0)'
                - message: policy rule value must not be empty
                  rule: '!has(self.rules) || self.rules.all(k, size(self.rules[k])
                    > 0)'
              infrastructure:
                description: |-
                  Infrastructure declares the shared backing services (database, cache)
                  that the control plane's services connect to.
                properties:
                  cache:
                    description: |-
                      Cache defines the Memcached configuration shared by the control plane.
                      Supports managed (clusterRef) and brownfield (servers) modes; exactly one
                      must be set. That invariant is carried by the embedded commonv1.CacheSpec
                      type-level CEL rule (and the validating webhook), mirroring keystone — no
                      field-level marker is needed here, and duplicating it would emit the rule twice.
                    properties:
                      backend:
                        description: Backend is the cache backend (e.g. dogpile.cache.pymemcache).
                        type: string
                      clusterRef:
                        description: ClusterRef references a Memcached CR in the cluster
                          (managed mode).
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      replicas:
                        default: 3
                        description: |-
                          Replicas is the number of Memcached pod replicas in the referenced cluster
                          (managed mode). Used to generate the correct number of StatefulSet pod
                          endpoints. Only used when ClusterRef is set.
                        format: int32
                        minimum: 1
                        type: integer
                      servers:
                        description: Servers is the list of cache server endpoints
                          (brownfield mode).
                        items:
                          type: string
                        type: array
                    required:
                    - backend
                    type: object
                    x-kubernetes-validations:
                    - message: exactly one of clusterRef or servers must be set
                      rule: has(self.clusterRef) != (has(self.servers) && size(self.servers)
                        > 0)
                  database:
                    description: |-
                      Database defines the MariaDB connection parameters shared by the control
                      plane. Supports managed (clusterRef) and brownfield (host) modes; exactly
                      one must be set. That invariant is carried by the embedded commonv1.DatabaseSpec
                      type-level CEL rule (and the validating webhook), mirroring keystone — no
                      field-level marker is needed here, and duplicating it would emit the rule twice.
                    properties:
                      clusterRef:
                        description: ClusterRef references a MariaDB CR in the cluster
                          (managed mode).
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      credentialsMode:
                        description: |-
                          CredentialsMode selects how the service DB credential in SecretRef is
                          provisioned. "Static" (the default when empty) has the operator manage
                          the MariaDB User/Grant CRs with a long-lived password from SecretRef.
                          "Dynamic" has an external secrets engine issue short-lived credentials on
                          demand: SecretRef then carries both a username and password, no User/Grant
                          CRs are managed, and no long-lived DB password remains at rest. Dynamic is
                          only valid in managed mode (ClusterRef set).
                        enum:
                        - Static
                        - Dynamic
                        type: string
                      database:
                        description: |-
                          Database is the database name within the cluster. Constrained to the MySQL
                          identifier character set and the 64-character identifier limit.
                        maxLength: 64
                        minLength: 1
                        pattern: ^[A-Za-z0-9_]+$
                        type: string
                      host:
                        description: |-
                          Host is the database hostname (brownfield mode). The pattern is a
                          permissive host matcher that accepts DNS names, IPv4, and IPv6 literals
                          while rejecting empty strings and shell/path metacharacters; it is not a
                          strict RFC-1123 validator, deliberately, so airgapped/mirror endpoints are
                          not rejected at admission.
                        minLength: 1
                        pattern: ^[a-zA-Z0-9._:-]+$
                        type: string
                      port:
                        description: |-
                          Port is the database port (brownfield mode, default 3306). Omitted (managed
                          mode) leaves it unset; an explicit value must be a valid TCP port.
                        format: int32
                        maximum: 65535
                        minimum: 1
                        type: integer
                      replicas:
                        default: 3
                        description: |-
                          Replicas is the number of managed MariaDB replicas provisioned in
                          fresh-create mode. It mirrors CacheSpec.Replicas: only the c5c3 operator's
                          managed-mode projection honours it (a single replica yields a
                          single-instance non-Galera MariaDB, three or more yield a Galera cluster),
                          so a constrained cluster such as a single-node kind can schedule the
                          fresh-create path. Operators that adopt an existing MariaDB (keystone, and
                          the c5c3 adopted-infra path) ignore it. Only meaningful when ClusterRef is
                          set.
                        format: int32
                        minimum: 1
                        type: integer
                      secretRef:
                        description: SecretRef references the K8s Secret with credentials.
                        properties:
                          key:
                            type: string
                          name:
                            description: |-
                              Name is the referenced Secret's name. It must be a non-empty DNS-1123
                              subdomain (the Kubernetes object-name grammar). Tightening the shared type
                              fixes every consumer at once — keystone adminPasswordSecretRef /
                              database.secretRef / messaging / TLS cert refs and the c5c3
                              passwordSecretRef — so an empty name no longer slips through "required".
                            minLength: 1
                            pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                            type: string
                        required:
                        - name
                        type: object
                      storageSize:
                        default: 100Gi
                        description: |-
                          StorageSize is the persistent-volume size requested for each managed
                          MariaDB replica in fresh-create mode. Like Replicas, only the c5c3
                          operator's managed-mode projection honours it (it is written to the owned
                          MariaDB's spec.storage.size); operators that adopt an existing MariaDB
                          (keystone, and the c5c3 adopted-infra path) ignore it. The default 100Gi
                          mirrors the production baseline (deploy/flux-system/infrastructure/
                          mariadb.yaml); a constrained cluster such as a single-node kind can pin a
                          far smaller value (e.g. 512Mi) so CI does not request a 100Gi volume it
                          never fills. Immutable after creation: the mariadb-operator rejects
                          changing spec.storage.size on a live CR, so the ControlPlane validating
                          webhook freezes it too. Only meaningful when ClusterRef is set. The pattern
                          admits binary IEC units (Mi/Gi/Ti) matching the Kubernetes quantity grammar
                          the operator parses with resource.ParseQuantity.
                        pattern: ^[0-9]+(Mi|Gi|Ti)$
                        type: string
                      tls:
                        description: |-
                          TLS optionally enables TLS/mTLS for the database connection. The pointer keeps the field opt-in and non-mutating: a nil
                          TLS means plaintext TCP, preserving the pre-existing behavior for all
                          existing DatabaseSpec consumers.
                        properties:
                          caBundleSecretRef:
                            description: |-
                              CABundleSecretRef references the K8s Secret holding the server CA
                              bundle the client trusts when verifying the database endpoint.
                            properties:
                              key:
                                type: string
                              name:
                                description: |-
                                  Name is the referenced Secret's name. It must be a non-empty DNS-1123
                                  subdomain (the Kubernetes object-name grammar). Tightening the shared type
                                  fixes every consumer at once — keystone adminPasswordSecretRef /
                                  database.secretRef / messaging / TLS cert refs and the c5c3
                                  passwordSecretRef — so an empty name no longer slips through "required".
                                minLength: 1
                                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                                type: string
                            required:
                            - name
                            type: object
                          clientCertSecretRef:
                            description: |-
                              ClientCertSecretRef references the K8s Secret holding the client
                              keypair presented to the database for mutual TLS.
                            properties:
                              key:
                                type: string
                              name:
                                description: |-
                                  Name is the referenced Secret's name. It must be a non-empty DNS-1123
                                  subdomain (the Kubernetes object-name grammar). Tightening the shared type
                                  fixes every consumer at once — keystone adminPasswordSecretRef /
                                  database.secretRef / messaging / TLS cert refs and the c5c3
                                  passwordSecretRef — so an empty name no longer slips through "required".
                                minLength: 1
                                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                                type: string
                            required:
                            - name
                            type: object
                          mode:
                            description: |-
                              Mode selects the TLS verification strength applied to the connection:
                                - disabled:       TLS is off; certificate references are ignored.
                                - prefer/require: encrypt the connection only (no peer verification).
                                - verify-ca:      additionally verify the server certificate chain
                                                   against the trusted CA bundle.
                                - verify-full:    additionally verify the server certificate chain
                                                   and that the server hostname matches the
                                                   certificate identity.
                            enum:
                            - disabled
                            - prefer
                            - require
                            - verify-ca
                            - verify-full
                            type: string
                        required:
                        - caBundleSecretRef
                        - clientCertSecretRef
                        type: object
                    required:
                    - database
                    - secretRef
                    type: object
                    x-kubernetes-validations:
                    - message: exactly one of clusterRef or host must be set
                      rule: has(self.clusterRef) != has(self.host)
                    - message: credentialsMode Dynamic requires clusterRef (managed
                        mode)
                      rule: '!has(self.credentialsMode) || self.credentialsMode !=
                        ''Dynamic'' || has(self.clusterRef)'
                required:
                - cache
                - database
                type: object
              korc:
                description: |-
                  KORC configures the K-ORC (OpenStack Resource Controller) integration used
                  to bootstrap and rotate the admin application credential and any declared
                  bootstrap resources.
                properties:
                  adminCredential:
                    description: |-
                      AdminCredential declares the admin OpenStack credential K-ORC uses to
                      reconcile resources, plus the application-credential rotation policy.
                    properties:
                      applicationCredential:
                        description: |-
                          ApplicationCredential declares the policy for the K-ORC admin application
                          credential (restriction, access rules, rotation mode).
                        properties:
                          accessRules:
                            description: |-
                              AccessRules optionally narrows the application credential to a specific set
                              of service/method/path rules. When empty the credential is not constrained
                              by access rules.
                            items:
                              description: |-
                                AccessRule narrows an application credential to a specific service endpoint
                                and method, mirroring the Keystone application-credential access
                                rule shape (service / method / path).
                              properties:
                                method:
                                  description: |-
                                    Method is the HTTP method the rule allows (e.g. "GET", "POST"). Optional:
                                    projectAccessRules omits it from the projected K-ORC rule when empty. The
                                    enum mirrors K-ORC's HTTPMethod type (the value is cast to it), so a value
                                    the downstream ApplicationCredentialAccessRule would reject is caught at
                                    admission instead.
                                  enum:
                                  - CONNECT
                                  - DELETE
                                  - GET
                                  - HEAD
                                  - OPTIONS
                                  - PATCH
                                  - POST
                                  - PUT
                                  - TRACE
                                  type: string
                                path:
                                  description: |-
                                    Path is the request path the rule allows (e.g. "/v2.1/servers"). Optional:
                                    projectAccessRules omits it when empty. When set it must be an absolute
                                    path (leading slash).
                                  pattern: ^/
                                  type: string
                                service:
                                  description: Service is the OpenStack service type
                                    the rule applies to (e.g. "compute").
                                  type: string
                              required:
                              - service
                              type: object
                            type: array
                          restricted:
                            default: true
                            description: |-
                              Restricted controls whether the application credential is unrestricted
                              (able to create further application credentials) or restricted. Defaults
                              to true (the safe, least-privilege baseline) via both the CRD schema default
                              and the defaulting webhook.
                            type: boolean
                          rotation:
                            description: Rotation declares how the application credential
                              is rotated.
                            properties:
                              mode:
                                default: PasswordDriven
                                description: |-
                                  Mode selects the rotation strategy. Defaults to PasswordDriven via both the
                                  CRD schema default and the defaulting webhook.
                                enum:
                                - PasswordDriven
                                - Scheduled
                                - Manual
                                type: string
                            type: object
                        required:
                        - rotation
                        type: object
                      bootstrapResources:
                        description: |-
                          BootstrapResources declares the OpenStack resources K-ORC bootstraps
                          alongside the admin credential (e.g. the projects/roles a fresh control
                          plane needs). The element shape is intentionally minimal at L1; the
                          reconciler (L2) interprets it.
                        items:
                          description: |-
                            BootstrapResourceSpec declares an OpenStack resource K-ORC bootstraps with
                            the control plane. The shape is intentionally minimal at L1 — the
                            reconciler (L2) interprets the kind/name and applies it.
                          properties:
                            kind:
                              description: |-
                                Kind is the K-ORC resource kind to bootstrap. Constrained to the kinds the
                                control plane bootstraps today; widen the enum when the L2 reconciler
                                learns to interpret additional kinds.
                              enum:
                              - Project
                              - Role
                              type: string
                            name:
                              description: Name is the name of the bootstrapped resource.
                              type: string
                          required:
                          - kind
                          - name
                          type: object
                        type: array
                      cloudCredentialsRef:
                        description: |-
                          CloudCredentialsRef references the clouds.yaml Secret K-ORC reads the
                          admin cloud entry from.
                        properties:
                          cloudName:
                            default: admin
                            description: |-
                              CloudName is the entry in clouds.yaml K-ORC authenticates as.
                              DECISION defaults to "admin" via both the CRD schema default and
                              the defaulting webhook (for callers that bypass the CRD default), mirroring
                              the sibling SecretName field. The webhook is the load-bearing mechanism when
                              the whole korc block is omitted (the marker only fires when the parent
                              cloudCredentialsRef object is present), so cloudName is safe to drop from the
                              CRD's required list.
                            type: string
                          secretName:
                            default: k-orc-clouds-yaml
                            description: |-
                              SecretName is the name of the Secret holding the clouds.yaml document.
                              DECISION defaults to "k-orc-clouds-yaml" via both the CRD schema
                              default and the defaulting webhook (for callers that bypass the CRD default),
                              mirroring the region defaulting discipline.
                            type: string
                        type: object
                      domainName:
                        default: Default
                        description: |-
                          DomainName is the OpenStack admin domain name. Defaults to "Default" via
                          both the CRD schema default and the defaulting webhook. Valid in both
                          modes. Phase-1 nuance: the single DomainName sets BOTH user_domain_name
                          and project_domain_name in the generated clouds.yaml (exactly what the
                          K-ORC clouds.yaml builder does today), so the admin user and project must
                          live in the same domain; a later userDomainName/projectDomainName split is
                          a compatible extension.
                        type: string
                      passwordSecretRef:
                        description: |-
                          PasswordSecretRef references the Secret holding the admin password used to
                          (re-)mint the application credential. Reuses the canonical commonv1 shape.
                        properties:
                          key:
                            type: string
                          name:
                            description: |-
                              Name is the referenced Secret's name. It must be a non-empty DNS-1123
                              subdomain (the Kubernetes object-name grammar). Tightening the shared type
                              fixes every consumer at once — keystone adminPasswordSecretRef /
                              database.secretRef / messaging / TLS cert refs and the c5c3
                              passwordSecretRef — so an empty name no longer slips through "required".
                            minLength: 1
                            pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                            type: string
                        required:
                        - name
                        type: object
                      projectName:
                        default: admin
                        description: |-
                          ProjectName is the OpenStack admin project name. Defaults to "admin" via
                          both the CRD schema default and the defaulting webhook. Valid in both
                          modes.
                        type: string
                      userName:
                        default: admin
                        description: |-
                          UserName is the OpenStack admin user name the control plane authenticates
                          as. Defaults to "admin" via both the CRD schema default and the defaulting
                          webhook. Valid in both Managed and External modes; consumed by the K-ORC
                          clouds.yaml builders and the admin import filters (that consumption lands
                          with the K-ORC clouds.yaml work).
                        type: string
                    required:
                    - applicationCredential
                    - cloudCredentialsRef
                    - passwordSecretRef
                    type: object
                required:
                - adminCredential
                type: object
              openStackRelease:
                description: |-
                  OpenStackRelease is the OpenStack release the control plane targets,
                  e.g. "2025.2". The reconciler (L2) projects this into each service CR's
                  image tag. The pattern matches the OpenStack date-based release scheme
                  (YYYY.N where N is 1 or 2 — the two-releases-per-year cadence, e.g.
                  2024.1, 2025.2). The [12] minor class keeps this CRD pattern, the
                  webhook's controlPlaneReleaseRegexp, and release.ParseRelease in agreement
                  so a non-cadence minor (e.g. 2025.9) is rejected at every layer.

                  The field stays required in both keystone modes. In External mode it is
                  ADVISORY: no images are deployed, so the value only needs to match the
                  external installation's release at the phase-3 managed takeover — until
                  then it is recorded but unused by the External-mode reconciler.
                pattern: ^\d{4}\.[12]$
                type: string
              region:
                default: RegionOne
                description: |-
                  Region is the OpenStack region name applied across the control plane.
                  DECISION (plan decision #4): defaults to "RegionOne" via both the
                  CRD schema default (normal admission path) and the defaulting webhook
                  (callers that bypass the CRD default), mirroring BootstrapSpec.Region in the
                  keystone operator.
                type: string
              services:
                description: |-
                  Services declares the per-service configuration projected into the
                  individual service CRs.
                properties:
                  horizon:
                    description: |-
                      Horizon configures the Horizon dashboard projected by the reconciler.
                      Optional: a ControlPlane with services.horizon unset manages no dashboard
                      and the reconciler reports HorizonReady as not-managed. The projection is
                      gated on KeystoneReady — the dashboard authenticates against the
                      ControlPlane's Keystone child, so it is only created once that child is
                      ready.
                    properties:
                      gateway:
                        description: |-
                          Gateway optionally exposes the projected dashboard externally via a
                          Gateway API HTTPRoute. When nil (the default) the reconciler does NOT
                          project a gateway and the dashboard is reachable in-cluster only.
                        properties:
                          annotations:
                            additionalProperties:
                              type: string
                            description: |-
                              Annotations are passed through to the generated HTTPRoute metadata
                              verbatim, allowing implementation-specific configuration (rate limits,
                              timeouts, CORS) without extending the CRD.
                            type: object
                          hostname:
                            description: |-
                              Hostname is the externally reachable host (SNI / Host header) that the
                              HTTPRoute matches. Required.
                            minLength: 1
                            type: string
                          parentRef:
                            description: |-
                              ParentRef identifies the pre-existing Gateway that the HTTPRoute attaches
                              to.
                            properties:
                              name:
                                description: Name is the Gateway resource name. Required.
                                minLength: 1
                                type: string
                              namespace:
                                description: |-
                                  Namespace is the namespace of the referenced Gateway. When empty, the
                                  Gateway is assumed to live in the referencing CR's namespace.
                                type: string
                              sectionName:
                                description: |-
                                  SectionName targets a specific listener on the Gateway (e.g. "https") when
                                  the Gateway defines multiple listeners. When empty, the HTTPRoute attaches
                                  to all compatible listeners.
                                type: string
                            required:
                            - name
                            type: object
                          path:
                            description: |-
                              Path is the URL path prefix matched by the HTTPRoute. Defaults to "/" when
                              empty.
                            type: string
                        required:
                        - hostname
                        - parentRef
                        type: object
                      image:
                        description: |-
                          Image optionally overrides the Horizon container image. When nil the
                          reconciler derives the image from spec.openStackRelease.
                        properties:
                          digest:
                            description: |-
                              Digest pins the image by immutable content digest (e.g.
                              "sha256:<64 hex chars>"). Optional: exactly one of Tag or Digest must be
                              set. A pinned digest closes the supply-chain gap where a mutable tag can be
                              re-pushed behind a stable name, at the cost of disabling release tracking.
                            pattern: ^sha256:[a-f0-9]{64}$
                            type: string
                          repository:
                            description: |-
                              Repository is the OCI image repository, optionally including the registry
                              host (e.g. "ghcr.io/c5c3/keystone" or "c5c3/keystone"). The pattern is a
                              permissive OCI reference — lowercase alphanumeric components separated by
                              ".", "_", "-", "/", or ":" (registry port) — so mirror and host:port forms
                              are accepted while an empty string (which "required" alone admits) and
                              obvious garbage are rejected.
                            minLength: 1
                            pattern: ^[a-z0-9]+([._:/-][a-z0-9]+)*$
                            type: string
                          tag:
                            description: |-
                              Tag is the OCI image tag (e.g. "2025.2"). It follows the OCI tag grammar:
                              up to 128 characters of word characters, dots, and dashes, and must not
                              begin with a dot or dash. Optional: exactly one of Tag or Digest must be
                              set. The pattern is enforced only when a tag is present.
                            pattern: ^[a-zA-Z0-9_][a-zA-Z0-9._-]{0,127}$
                            type: string
                        required:
                        - repository
                        type: object
                        x-kubernetes-validations:
                        - message: exactly one of image.tag or image.digest must be
                            set
                          rule: has(self.tag) != has(self.digest)
                      replicas:
                        description: |-
                          Replicas overrides the number of dashboard replicas. When nil the
                          reconciler applies the Horizon operator's own default (3).
                        format: int32
                        minimum: 1
                        type: integer
                      secretKeyRef:
                        description: |-
                          SecretKeyRef optionally overrides the Secret holding the Django
                          SECRET_KEY the dashboard replicas share. When nil the reconciler defaults
                          to the kind-infrastructure shim Secret "horizon-secret-key" (key
                          "secret-key"), which is pinned to the default ControlPlane identity —
                          multi-ControlPlane deployments MUST set this field explicitly so each
                          dashboard reads its own key material.
                        properties:
                          key:
                            type: string
                          name:
