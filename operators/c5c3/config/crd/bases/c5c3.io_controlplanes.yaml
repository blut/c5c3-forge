---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: controlplanes.c5c3.io
spec:
  group: c5c3.io
  names:
    kind: ControlPlane
    listKind: ControlPlaneList
    plural: controlplanes
    singular: controlplane
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .spec.openStackRelease
      name: Release
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ControlPlane is the Schema for the controlplanes API (CC-0110). It is the
          top-level aggregate that projects an OpenStack control plane: it owns shared
          infrastructure references (database, cache) and a curated set of service
          specs (today: keystone) that the reconciler (L2) materializes into the
          per-service CRs.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ControlPlaneSpec defines the desired state of a ControlPlane
              (CC-0110).
            properties:
              global:
                description: |-
                  Global defines oslo.policy overrides applied across every service in the
                  control plane. Per-service overrides (e.g. services.keystone.policyOverrides)
                  take precedence over these global rules when both are set.
                properties:
                  configMapRef:
                    description: |-
                      ConfigMapRef references a user-provided ConfigMap containing a
                      "policy.yaml" key with rule overrides.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  rules:
                    additionalProperties:
                      type: string
                    description: |-
                      Rules contains inline policy rule overrides.
                      Keys are oslo.policy rule names (e.g., "compute:create").
                      Values are oslo.policy rule definitions (e.g., "role:admin").
                      Inline rules take precedence over ConfigMap rules.
                    type: object
                type: object
              infrastructure:
                description: |-
                  Infrastructure declares the shared backing services (database, cache)
                  that the control plane's services connect to.
                properties:
                  cache:
                    description: |-
                      Cache defines the Memcached configuration shared by the control plane.
                      Supports managed (clusterRef) and brownfield (servers) modes; exactly one
                      must be set (enforced by the validating webhook, mirroring keystone).
                    properties:
                      backend:
                        description: Backend is the cache backend (e.g. dogpile.cache.pymemcache).
                        type: string
                      clusterRef:
                        description: ClusterRef references a Memcached CR in the cluster
                          (managed mode).
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      replicas:
                        default: 3
                        description: |-
                          Replicas is the number of Memcached pod replicas in the referenced cluster
                          (managed mode). Used to generate the correct number of StatefulSet pod
                          endpoints. Only used when ClusterRef is set.
                        format: int32
                        minimum: 1
                        type: integer
                      servers:
                        description: Servers is the list of cache server endpoints
                          (brownfield mode).
                        items:
                          type: string
                        type: array
                    required:
                    - backend
                    type: object
                  database:
                    description: |-
                      Database defines the MariaDB connection parameters shared by the control
                      plane. Supports managed (clusterRef) and brownfield (host) modes; exactly
                      one must be set (enforced by the validating webhook, mirroring keystone).
                    properties:
                      clusterRef:
                        description: ClusterRef references a MariaDB CR in the cluster
                          (managed mode).
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      database:
                        description: Database is the database name within the cluster.
                        type: string
                      host:
                        description: Host is the database hostname (brownfield mode).
                        type: string
                      port:
                        description: Port is the database port (brownfield mode, default
                          3306).
                        format: int32
                        type: integer
                      secretRef:
                        description: SecretRef references the K8s Secret with credentials.
                        properties:
                          key:
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      tls:
                        description: |-
                          TLS optionally enables TLS/mTLS for the database connection (CC-0106,
                          REQ-001). The pointer keeps the field opt-in and non-mutating: a nil
                          TLS means plaintext TCP, preserving the pre-CC-0106 behavior for all
                          existing DatabaseSpec consumers.
                        properties:
                          caBundleSecretRef:
                            description: |-
                              CABundleSecretRef references the K8s Secret holding the server CA
                              bundle the client trusts when verifying the database endpoint.
                            properties:
                              key:
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          clientCertSecretRef:
                            description: |-
                              ClientCertSecretRef references the K8s Secret holding the client
                              keypair presented to the database for mutual TLS.
                            properties:
                              key:
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          enabled:
                            description: |-
                              Enabled turns on TLS for the database connection. When true the
                              operator provisions the client certificate, appends the ssl_* DSN
                              parameters, and mounts the certificate material into the workloads
                              that open a connection. Opt-in; defaults to false.
                            type: boolean
                          mode:
                            description: |-
                              Mode selects the TLS verification strength applied to the connection:
                                - prefer/require: encrypt the connection only (no peer verification).
                                - verify-ca:      additionally verify the server certificate chain
                                                   against the trusted CA bundle.
                                - verify-full:    additionally verify the server certificate chain
                                                   and that the server hostname matches the
                                                   certificate identity.
                            enum:
                            - prefer
                            - require
                            - verify-ca
                            - verify-full
                            type: string
                        required:
                        - caBundleSecretRef
                        - clientCertSecretRef
                        - enabled
                        type: object
                    required:
                    - database
                    - secretRef
                    type: object
                required:
                - cache
                - database
                type: object
              korc:
                description: |-
                  KORC configures the K-ORC (OpenStack Resource Controller) integration used
                  to bootstrap and rotate the admin application credential and any declared
                  bootstrap resources.
                properties:
                  adminCredential:
                    description: |-
                      AdminCredential declares the admin OpenStack credential K-ORC uses to
                      reconcile resources, plus the application-credential rotation policy.
                    properties:
                      applicationCredential:
                        description: |-
                          ApplicationCredential declares the policy for the K-ORC admin application
                          credential (restriction, access rules, rotation mode).
                        properties:
                          accessRules:
                            description: |-
                              AccessRules optionally narrows the application credential to a specific set
                              of service/method/path rules. When empty the credential is not constrained
                              by access rules.
                            items:
                              description: |-
                                AccessRule narrows an application credential to a specific service endpoint
                                and method (CC-0110), mirroring the Keystone application-credential access
                                rule shape (service / method / path).
                              properties:
                                method:
                                  description: Method is the HTTP method the rule
                                    allows (e.g. "GET", "POST").
                                  type: string
                                path:
                                  description: Path is the request path the rule allows
                                    (e.g. "/v2.1/servers").
                                  type: string
                                service:
                                  description: Service is the OpenStack service type
                                    the rule applies to (e.g. "compute").
                                  type: string
                              required:
                              - method
                              - path
                              - service
                              type: object
                            type: array
                          restricted:
                            default: true
                            description: |-
                              Restricted controls whether the application credential is unrestricted
                              (able to create further application credentials) or restricted. Defaults
                              to true (the safe, least-privilege baseline) via both the CRD schema default
                              and the defaulting webhook.
                            type: boolean
                          rotation:
                            description: Rotation declares how the application credential
                              is rotated.
                            properties:
                              mode:
                                default: PasswordDriven
                                description: |-
                                  Mode selects the rotation strategy. Defaults to PasswordDriven via both the
                                  CRD schema default and the defaulting webhook.
                                enum:
                                - PasswordDriven
                                - Scheduled
                                - Manual
                                type: string
                            type: object
                        required:
                        - rotation
                        type: object
                      bootstrapResources:
                        description: |-
                          BootstrapResources declares the OpenStack resources K-ORC bootstraps
                          alongside the admin credential (e.g. the projects/roles a fresh control
                          plane needs). The element shape is intentionally minimal at L1; the
                          reconciler (L2) interprets it.
                        items:
                          description: |-
                            BootstrapResourceSpec declares an OpenStack resource K-ORC bootstraps with
                            the control plane (CC-0110). The shape is intentionally minimal at L1 — the
                            reconciler (L2) interprets the kind/name and applies it.
                          properties:
                            kind:
                              description: Kind is the K-ORC resource kind to bootstrap
                                (e.g. "Project", "Role").
                              type: string
                            name:
                              description: Name is the name of the bootstrapped resource.
                              type: string
                          required:
                          - kind
                          - name
                          type: object
                        type: array
                      cloudCredentialsRef:
                        description: |-
                          CloudCredentialsRef references the clouds.yaml Secret K-ORC reads the
                          admin cloud entry from.
                        properties:
                          cloudName:
                            description: CloudName is the entry in clouds.yaml K-ORC
                              authenticates as.
                            type: string
                          secretName:
                            default: k-orc-clouds-yaml
                            description: |-
                              SecretName is the name of the Secret holding the clouds.yaml document.
                              DECISION (CC-0110): defaults to "k-orc-clouds-yaml" via both the CRD schema
                              default and the defaulting webhook (for callers that bypass the CRD default),
                              mirroring the region defaulting discipline.
                            type: string
                        required:
                        - cloudName
                        type: object
                      passwordSecretRef:
                        description: |-
                          PasswordSecretRef references the Secret holding the admin password used to
                          (re-)mint the application credential. Reuses the canonical commonv1 shape.
                        properties:
                          key:
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - applicationCredential
                    - cloudCredentialsRef
                    - passwordSecretRef
                    type: object
                required:
                - adminCredential
                type: object
              openStackRelease:
                description: |-
                  OpenStackRelease is the OpenStack release the control plane targets,
                  e.g. "2025.2". The reconciler (L2) projects this into each service CR's
                  image tag. The pattern matches the OpenStack date-based release scheme
                  (YYYY.N, e.g. 2024.1, 2025.2).
                pattern: ^\d{4}\.\d$
                type: string
              region:
                default: RegionOne
                description: |-
                  Region is the OpenStack region name applied across the control plane.
                  DECISION (CC-0110, plan decision #4): defaults to "RegionOne" via both the
                  CRD schema default (normal admission path) and the defaulting webhook
                  (callers that bypass the CRD default), mirroring BootstrapSpec.Region in the
                  keystone operator.
                type: string
              services:
                description: |-
                  Services declares the per-service configuration projected into the
                  individual service CRs.
                properties:
                  keystone:
                    description: Keystone configures the Keystone service projected
                      by the reconciler.
                    properties:
                      gateway:
                        description: |-
                          Gateway optionally exposes the projected Keystone API externally via a
                          Gateway API HTTPRoute. When nil (the default) the reconciler does NOT
                          project a gateway and the Keystone API is reachable in-cluster only (its
                          ClusterIP Service); when set, the reconciler projects this onto the Keystone
                          CR's spec.gateway so the keystone-operator attaches an HTTPRoute to the
                          referenced Gateway.
                        properties:
                          annotations:
                            additionalProperties:
                              type: string
                            description: |-
                              Annotations are passed through to the generated HTTPRoute metadata verbatim,
                              allowing implementation-specific configuration (rate limits, timeouts, CORS)
                              without extending the CRD.
                            type: object
                          hostname:
                            description: |-
                              Hostname is the externally reachable host (SNI / Host header) the HTTPRoute
                              matches, e.g. "keystone.127-0-0-1.nip.io". Required.
                            minLength: 1
                            type: string
                          parentRef:
                            description: |-
                              ParentRef identifies the pre-existing Gateway that the HTTPRoute attaches
                              to. The Gateway (and GatewayClass) are platform-team infrastructure managed
                              outside this CR.
                            properties:
                              name:
                                description: Name is the Gateway resource name. Required.
                                minLength: 1
                                type: string
                              namespace:
                                description: |-
                                  Namespace is the namespace of the referenced Gateway. When empty, the
                                  Gateway is assumed to live in the projected Keystone CR's namespace.
                                type: string
                              sectionName:
                                description: |-
                                  SectionName targets a specific listener on the Gateway (e.g. "https") when
                                  the Gateway defines multiple listeners. When empty, the HTTPRoute attaches
                                  to all compatible listeners.
                                type: string
                            required:
                            - name
                            type: object
                          path:
                            description: |-
                              Path is the URL path prefix matched by the HTTPRoute. Defaults to "/" in the
                              keystone operator when empty.
                            type: string
                        required:
                        - hostname
                        - parentRef
                        type: object
                      image:
                        description: |-
                          Image optionally overrides the Keystone container image. When nil the
                          reconciler derives the image from spec.openStackRelease.
                        properties:
                          repository:
                            type: string
                          tag:
                            type: string
                        required:
                        - repository
                        - tag
                        type: object
                      policyOverrides:
                        description: |-
                          PolicyOverrides defines per-service oslo.policy overrides for Keystone.
                          When set, these take precedence over spec.global for the Keystone service.
                        properties:
                          configMapRef:
                            description: |-
                              ConfigMapRef references a user-provided ConfigMap containing a
                              "policy.yaml" key with rule overrides.
                            properties:
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                            type: object
                            x-kubernetes-map-type: atomic
                          rules:
                            additionalProperties:
                              type: string
                            description: |-
                              Rules contains inline policy rule overrides.
                              Keys are oslo.policy rule names (e.g., "compute:create").
                              Values are oslo.policy rule definitions (e.g., "role:admin").
                              Inline rules take precedence over ConfigMap rules.
                            type: object
                        type: object
                      publicEndpoint:
                        description: |-
                          PublicEndpoint is the externally routable Keystone identity endpoint URL
                          (e.g. "https://keystone.127-0-0-1.nip.io:8443/v3"). The reconciler projects
                          it into the Keystone bootstrap (--bootstrap-public-url) and uses it for the
                          K-ORC identity catalog Endpoint, so external clients resolve the same URL
                          Keystone advertises. When empty and Gateway is set, the reconciler derives
                          "https://{gateway.hostname}/v3" (the default-443 form); set it explicitly
                          when the externally reachable port differs (e.g. a kind host-port mapping
                          like :8443), since the port cannot be derived from the hostname alone.
                        type: string
                      replicas:
                        description: |-
                          Replicas overrides the number of Keystone API replicas. When nil the
                          reconciler applies the Keystone operator's own default (3).
                        format: int32
                        minimum: 1
                        type: integer
                      rotationInterval:
                        description: |-
                          RotationInterval optionally overrides the Fernet key rotation interval the
                          reconciler derives for the projected Keystone CR. When nil the reconciler
                          derives a default schedule.
                        type: string
                    type: object
                required:
                - keystone
                type: object
            required:
            - infrastructure
            - korc
            - openStackRelease
            - services
            type: object
          status:
            description: ControlPlaneStatus defines the observed state of a ControlPlane
              (CC-0110).
            properties:
              adminApplicationCredential:
                description: |-
                  AdminApplicationCredential reports the observed state of the K-ORC admin
                  application credential.
                properties:
                  id:
                    description: ID is the OpenStack application-credential ID currently
                      in use.
                    type: string
                  lastRotation:
                    description: LastRotation is the timestamp of the last successful
                      rotation.
                    format: date-time
                    type: string
                  restricted:
                    description: Restricted reports whether the active credential
                      is restricted.
                    type: boolean
                type: object
              catalogReady:
                description: |-
                  CatalogReady reports whether the OpenStack service catalog has been
                  observed as fully populated for the control plane.
                type: boolean
              conditions:
                description: |-
                  Conditions represent the latest available observations of the control
                  plane state. Each condition carries an ObservedGeneration so consumers can
                  tell a stale condition from one reflecting the current spec; use the
                  conditions helper (internal/common/conditions) to upsert them.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the .metadata.generation the controller last
                  reconciled, so a stale status is distinguishable from a current one.
                format: int64
                type: integer
              services:
                additionalProperties:
                  description: |-
                    ServiceStatus reports the observed readiness of a single projected service
                    CR (CC-0110).
                  properties:
                    ready:
                      description: Ready reports whether the projected service CR
                        is Ready.
                      type: boolean
                    release:
                      description: Release is the OpenStack release the service currently
                        reports installed.
                      type: string
                  required:
                  - ready
                  type: object
                description: |-
                  Services reports the per-service readiness of the projected service CRs,
                  keyed by service name (e.g. "keystone").
                type: object
              updatePhase:
                description: UpdatePhase is the current phase of a control-plane release
                  update.
                enum:
                - Idle
                - Updating
                - UpdatingServices
                - Verifying
                - RollingBack
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
