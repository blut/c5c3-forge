# ClusterRole RBAC rules unit tests.
# Rules mirror the +kubebuilder:rbac markers on the ControlPlane and
# CredentialRotation reconcilers (deduplicated), plus the leases rule for
# leader election — 20 rules total.
suite: ClusterRole
templates:
  - templates/clusterrole.yaml
tests:
  - it: should have the correct number of rules
    asserts:
      - lengthEqual:
          path: rules
          count: 20

  - it: should grant full CRUD on controlplanes
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - c5c3.io
            resources:
              - controlplanes
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant get/update/patch on controlplanes/status
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - c5c3.io
            resources:
              - controlplanes/status
            verbs:
              - get
              - update
              - patch

  - it: should grant update on controlplanes/finalizers
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - c5c3.io
            resources:
              - controlplanes/finalizers
            verbs:
              - update

  - it: should grant full CRUD on credentialrotations
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - c5c3.io
            resources:
              - credentialrotations
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant get/update/patch on credentialrotations/status
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - c5c3.io
            resources:
              - credentialrotations/status
            verbs:
              - get
              - update
              - patch

  - it: should grant read-only on secretaggregates
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - c5c3.io
            resources:
              - secretaggregates
            verbs:
              - get
              - list
              - watch

  - it: should grant full CRUD on mariadbs
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - k8s.mariadb.com
            resources:
              - mariadbs
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant full CRUD on memcacheds
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - memcached.c5c3.io
            resources:
              - memcacheds
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant full CRUD on keystones
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - keystone.openstack.c5c3.io
            resources:
              - keystones
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant read-only access on keystoneidentitybackends
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - keystone.openstack.c5c3.io
            resources:
              - keystoneidentitybackends
            verbs:
              - get
              - list
              - watch
      # The reconciler only WATCHES the backends; the write verbs would be an
      # unnecessary privilege grant on a resource it never authors.
      - notContains:
          path: rules
          content:
            apiGroups:
              - keystone.openstack.c5c3.io
            resources:
              - keystoneidentitybackends
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant full CRUD on horizons
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - horizon.openstack.c5c3.io
            resources:
              - horizons
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant full CRUD on k-orc applicationcredentials, services, endpoints, users, domains, projects
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - openstack.k-orc.cloud
            resources:
              - applicationcredentials
              - services
              - endpoints
              - users
              - domains
              - projects
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant full CRUD on externalsecrets and pushsecrets
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - external-secrets.io
            resources:
              - externalsecrets
              - pushsecrets
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  # reconcileDBCredentials uses CreateOrUpdate on a
  # per-ControlPlane externalsecret, which requires both create and update.
  # The full externalsecrets rule (which includes create and update) must be
  # present so the reconciler is permitted to CreateOrUpdate the ExternalSecret.
  - it: should allow create and update on externalsecrets so reconcileDBCredentials can CreateOrUpdate
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - external-secrets.io
            resources:
              - externalsecrets
              - pushsecrets
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant read-only on clustersecretstores
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - external-secrets.io
            resources:
              - clustersecretstores
            verbs:
              - get
              - list
              - watch

  # reconcileDBCredentials projects a per-ControlPlane VaultDynamicSecret
  # generator in Dynamic credentials mode to issue short-lived DB credentials.
  - it: should grant full CRUD on generators vaultdynamicsecrets
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - generators.external-secrets.io
            resources:
              - vaultdynamicsecrets
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  # reconcileDBCredentials projects a per-ControlPlane mTLS client Certificate
  # for the VaultDynamicSecret generator's OpenBao connection.
  - it: should grant full CRUD on cert-manager certificates
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - cert-manager.io
            resources:
              - certificates
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  # reconcileDBCredentials projects (and cleans up on a Static flip) the
  # per-ControlPlane ServiceAccount whose token the generator presents to OpenBao.
  - it: should grant full CRUD on core serviceaccounts
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - serviceaccounts
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant full CRUD on core secrets
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - secrets
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should restrict events to create and patch only
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - events
            verbs:
              - create
              - patch

  - it: should grant full CRUD on leases for leader election
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - coordination.k8s.io
            resources:
              - leases
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  # ClusterRole must not render in namespace-scoped mode.
  - it: should not render ClusterRole when rbac.namespaceScoped is true
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
