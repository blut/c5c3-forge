# CC-0110: ClusterRole RBAC rules unit tests.
# Rules mirror the +kubebuilder:rbac markers on the ControlPlane and
# CredentialRotation reconcilers (deduplicated), plus the leases rule for
# leader election — 15 rules total.
suite: ClusterRole
templates:
  - templates/clusterrole.yaml
tests:
  - it: should have the correct number of rules
    asserts:
      - lengthEqual:
          path: rules
          count: 15

  - it: should grant full CRUD on controlplanes
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - c5c3.io
            resources:
              - controlplanes
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant get/update/patch on controlplanes/status
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - c5c3.io
            resources:
              - controlplanes/status
            verbs:
              - get
              - update
              - patch

  - it: should grant update on controlplanes/finalizers
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - c5c3.io
            resources:
              - controlplanes/finalizers
            verbs:
              - update

  - it: should grant full CRUD on credentialrotations
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - c5c3.io
            resources:
              - credentialrotations
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant get/update/patch on credentialrotations/status
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - c5c3.io
            resources:
              - credentialrotations/status
            verbs:
              - get
              - update
              - patch

  - it: should grant read-only on secretaggregates
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - c5c3.io
            resources:
              - secretaggregates
            verbs:
              - get
              - list
              - watch

  - it: should grant full CRUD on mariadbs
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - k8s.mariadb.com
            resources:
              - mariadbs
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant full CRUD on memcacheds
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - memcached.c5c3.io
            resources:
              - memcacheds
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant full CRUD on keystones
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - keystone.openstack.c5c3.io
            resources:
              - keystones
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant full CRUD on k-orc applicationcredentials, services, endpoints, users, domains
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - openstack.k-orc.cloud
            resources:
              - applicationcredentials
              - services
              - endpoints
              - users
              - domains
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant full CRUD on externalsecrets and pushsecrets
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - external-secrets.io
            resources:
              - externalsecrets
              - pushsecrets
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant read-only on clustersecretstores
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - external-secrets.io
            resources:
              - clustersecretstores
            verbs:
              - get
              - list
              - watch

  - it: should grant full CRUD on core secrets
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - secrets
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should restrict events to create and patch only
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - events
            verbs:
              - create
              - patch

  - it: should grant full CRUD on leases for leader election
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - coordination.k8s.io
            resources:
              - leases
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  # CC-0043: ClusterRole must not render in namespace-scoped mode.
  - it: should not render ClusterRole when rbac.namespaceScoped is true
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
