# CC-0110: Release namespace unit tests.
#
# Verifies that the c5c3-operator Helm chart correctly threads
# .Release.Namespace through every namespaced resource, the
# cert-manager.io/inject-ca-from annotation on the webhook configurations,
# and the ClusterRoleBinding subjects entry — when installed with
# --namespace c5c3-system.
#
# These assertions are namespace-parametric: the release namespace is set
# once at the suite level via `release.namespace` and the expected value is
# `c5c3-system` in every assertion. The other test suites in this chart rely
# on the helm-unittest default release namespace (NAMESPACE) and remain
# untouched.
suite: Release Namespace
release:
  name: c5c3-operator
  namespace: c5c3-system
templates:
  - templates/certificate.yaml
  - templates/clusterrolebinding.yaml
  - templates/deployment.yaml
  - templates/rolebinding.yaml
  - templates/service.yaml
  - templates/serviceaccount.yaml
  - templates/servicemonitor.yaml
  - templates/webhook-configuration.yaml
tests:
  # ---------------------------------------------------------------------------
  # Namespaced resources rendered with default values (webhook on, monitoring
  # off, namespaceScoped off).
  # ---------------------------------------------------------------------------
  - it: should render the Deployment in c5c3-system (CC-0110)
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: metadata.namespace
          value: c5c3-system

  - it: should render the ServiceAccount in c5c3-system (CC-0110)
    template: templates/serviceaccount.yaml
    asserts:
      - equal:
          path: metadata.namespace
          value: c5c3-system

  - it: should render the Service in c5c3-system (CC-0110)
    template: templates/service.yaml
    asserts:
      - equal:
          path: metadata.namespace
          value: c5c3-system

  - it: should render the self-signed Issuer in c5c3-system (CC-0110)
    template: templates/certificate.yaml
    documentIndex: 0
    asserts:
      - isKind:
          of: Issuer
      - equal:
          path: metadata.namespace
          value: c5c3-system

  - it: should render the webhook Certificate in c5c3-system (CC-0110)
    template: templates/certificate.yaml
    documentIndex: 1
    asserts:
      - isKind:
          of: Certificate
      - equal:
          path: metadata.namespace
          value: c5c3-system

  - it: should reference c5c3-system in the Certificate SAN DNS names (CC-0110)
    template: templates/certificate.yaml
    documentIndex: 1
    asserts:
      - contains:
          path: spec.dnsNames
          content: c5c3-operator.c5c3-system.svc
      - contains:
          path: spec.dnsNames
          content: c5c3-operator.c5c3-system.svc.cluster.local

  # ---------------------------------------------------------------------------
  # Webhook configurations are cluster-scoped, but the inject-ca-from
  # annotation MUST point to the release namespace so cert-manager finds the
  # Certificate object emitted into c5c3-system.
  # ---------------------------------------------------------------------------
  - it: should set inject-ca-from to c5c3-system/<fullname>-webhook on the MutatingWebhookConfiguration (CC-0110)
    template: templates/webhook-configuration.yaml
    documentIndex: 0
    asserts:
      - isKind:
          of: MutatingWebhookConfiguration
      - equal:
          path: metadata.annotations["cert-manager.io/inject-ca-from"]
          value: c5c3-system/c5c3-operator-webhook
      - equal:
          path: webhooks[0].clientConfig.service.namespace
          value: c5c3-system

  - it: should set inject-ca-from to c5c3-system/<fullname>-webhook on the ValidatingWebhookConfiguration (CC-0110)
    template: templates/webhook-configuration.yaml
    documentIndex: 1
    asserts:
      - isKind:
          of: ValidatingWebhookConfiguration
      - equal:
          path: metadata.annotations["cert-manager.io/inject-ca-from"]
          value: c5c3-system/c5c3-operator-webhook
      - equal:
          path: webhooks[0].clientConfig.service.namespace
          value: c5c3-system

  # ---------------------------------------------------------------------------
  # ClusterRoleBinding is cluster-scoped but binds a ServiceAccount that lives
  # in the release namespace — subjects[0].namespace MUST be c5c3-system.
  # ---------------------------------------------------------------------------
  - it: should bind to the ServiceAccount in c5c3-system (CC-0110)
    template: templates/clusterrolebinding.yaml
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].namespace
          value: c5c3-system

  # ---------------------------------------------------------------------------
  # Conditionally-rendered namespaced resources.
  # ---------------------------------------------------------------------------
  - it: should render the ServiceMonitor in c5c3-system when enabled (CC-0110)
    template: templates/servicemonitor.yaml
    set:
      monitoring:
        serviceMonitor:
          enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.namespace
          value: c5c3-system

  - it: should render the RoleBinding in c5c3-system in namespace-scoped mode (CC-0110)
    template: templates/rolebinding.yaml
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - isKind:
          of: RoleBinding
      - equal:
          path: metadata.namespace
          value: c5c3-system
      - equal:
          path: subjects[0].namespace
          value: c5c3-system
