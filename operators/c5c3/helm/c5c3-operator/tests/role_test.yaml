  - it: should grant full CRUD on externalsecrets and pushsecrets
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - external-secrets.io
            resources:
              - externalsecrets
              - pushsecrets
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  # CC-0116 (REQ-009): reconcileDBCredentials uses CreateOrUpdate on a
  # per-ControlPlane externalsecret, which requires both create and update.
  # The full externalsecrets rule (which includes create and update) must be
  # present so the reconciler is permitted to CreateOrUpdate the ExternalSecret.
  - it: should allow create and update on externalsecrets so reconcileDBCredentials can CreateOrUpdate (CC-0116, REQ-009)
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - external-secrets.io
            resources:
              - externalsecrets
              - pushsecrets
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant read-only on clustersecretstores
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - external-secrets.io
            resources:
              - clustersecretstores
            verbs:
              - get
              - list
              - watch

  - it: should grant full CRUD on core secrets
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - secrets
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should restrict events to create and patch only
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - events
            verbs:
              - create
              - patch

  - it: should grant full CRUD on leases for leader election
    set:
      rbac:
        namespaceScoped: true
      webhook:
        enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - coordination.k8s.io
            resources:
              - leases
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete
