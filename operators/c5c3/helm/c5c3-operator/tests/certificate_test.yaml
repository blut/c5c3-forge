# Certificate and Issuer unit tests.
suite: Certificate
templates:
  - templates/certificate.yaml
tests:
  - it: should render self-signed Issuer when webhook is enabled
    documentIndex: 0
    asserts:
      - isKind:
          of: Issuer
      - equal:
          path: metadata.name
          value: RELEASE-NAME-c5c3-operator-selfsigned
      - equal:
          path: metadata.namespace
          value: NAMESPACE
      - equal:
          path: spec.selfSigned
          value: {}

  - it: should render Certificate when webhook is enabled
    documentIndex: 1
    asserts:
      - isKind:
          of: Certificate
      - equal:
          path: metadata.name
          value: RELEASE-NAME-c5c3-operator-webhook
      - equal:
          path: metadata.namespace
          value: NAMESPACE

  - it: should reference correct service DNS names in Certificate
    documentIndex: 1
    asserts:
      - contains:
          path: spec.dnsNames
          content: RELEASE-NAME-c5c3-operator.NAMESPACE.svc
      - contains:
          path: spec.dnsNames
          content: RELEASE-NAME-c5c3-operator.NAMESPACE.svc.cluster.local

  - it: should reference self-signed Issuer in Certificate
    documentIndex: 1
    asserts:
      - equal:
          path: spec.issuerRef.kind
          value: Issuer
      - equal:
          path: spec.issuerRef.name
          value: RELEASE-NAME-c5c3-operator-selfsigned
      - equal:
          path: spec.secretName
          value: RELEASE-NAME-c5c3-operator-webhook-cert

  - it: should not render any documents when webhook is disabled
    set:
      webhook:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
