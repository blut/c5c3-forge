{{- if .Values.webhook.enabled -}}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "operator-library.fullname" . }}-mutating
  labels:
    {{- include "operator-library.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "operator-library.fullname" . }}-webhook
webhooks:
  - name: mcontrolplane.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "operator-library.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-c5c3-io-v1alpha1-controlplane
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - c5c3.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - controlplanes
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "operator-library.fullname" . }}-validating
  labels:
    {{- include "operator-library.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "operator-library.fullname" . }}-webhook
webhooks:
  - name: vcontrolplane.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "operator-library.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-c5c3-io-v1alpha1-controlplane
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - c5c3.io
        apiVersions:
          - v1alpha1
        # No DELETE: the webhook is served in-process by the operator, so with
        # failurePolicy=Fail a DELETE rule would let a down operator block CR
        # and namespace deletion. ValidateDelete is a no-op anyway.
        operations:
          - CREATE
          - UPDATE
        resources:
          - controlplanes
{{- end }}
