{{- if .Values.webhook.enabled -}}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "c5c3-operator.fullname" . }}-mutating
  labels:
    {{- include "c5c3-operator.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "c5c3-operator.fullname" . }}-webhook
webhooks:
  - name: mcontrolplane.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "c5c3-operator.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-c5c3-io-v1alpha1-controlplane
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - c5c3.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - controlplanes
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "c5c3-operator.fullname" . }}-validating
  labels:
    {{- include "c5c3-operator.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "c5c3-operator.fullname" . }}-webhook
webhooks:
  - name: vcontrolplane.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "c5c3-operator.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-c5c3-io-v1alpha1-controlplane
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - c5c3.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
          - DELETE
        resources:
          - controlplanes
{{- end }}
