version: "2"

linters:
  default: none
  enable:
    # Existing linters (CC-0003)
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Security and correctness linters (CC-0059)
    - bodyclose
    - errorlint
    - exhaustive
    - gosec
    - nilerr
    - noctx
  exclusions:
    rules:
      # Suppress gosec G101 (hardcoded credential heuristics) in test files —
      # test fixtures contain fake connection strings and token endpoints that
      # trigger false positives (CC-0059).
      - linters:
          - gosec
        path: "_test\\.go$"
        text: "G101:"
    paths:
      - "zz_generated.*\\.go$"

run:
  timeout: 5m
